<script>
        // ================= CONFIGURACIÓN Y VARIABLES GLOBALES =================
        const SUPABASE_URL = 'https://icvfmdvvochzaktugqvj.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImljdmZtZHZ2b2NoemFrdHVncXZqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYyNDEzMzEsImV4cCI6MjA5MTgxNzMzMX0.gO3D39piT6KGbMMOzrPGWXUp5-g_nOBAgJ-nwPv8IcQ';
        const TOKEN_JWT = localStorage.getItem('pyp_token_seguro');
        
        let dbInventario = [], carrito = [], dbClientes = [], fuseInventario = null, fuseClientes = null, empresaActual = null;
        let tasaBCV = 1, tasaBCVEur = 1;
        let pypIva = 0.16, pypIvaRed1 = 0.08, pypIvaRed2 = 0.12, pypIgtf = 0.03;
        let pypMostrarExento = 'SI';
        let imgDefecto = 'https://via.placeholder.com/150/f8fafc/94a3b8?text=P%26P';
        let posVistaActual = 'grid';
        let modoSupermercado = false;
        let nroFacturaEditable = false; 
        
        let ultimaFechaFactura = null;
        let correlativoActual = 1;

        function getFechaHoy() { const hoy = new Date(); return hoy.toISOString().split('T')[0]; }
        function fmt(num) { return parseFloat(num || 0).toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 }); }

        // ================= INICIALIZACIÓN DEL SISTEMA =================
        window.onload = async () => {
            const nombreUsuario = localStorage.getItem('pyp_usuario_nombre') || 'SISTEMA';
            if(document.getElementById('nombre-usuario')) document.getElementById('nombre-usuario').innerText = nombreUsuario.split(' ')[0];
            if(document.getElementById('txt-cajero-nombre')) document.getElementById('txt-cajero-nombre').innerText = nombreUsuario;

            document.getElementById('filtro-stock-pos').value = localStorage.getItem('pyp_pos_filtro_stock_default') || 'DISPONIBLE';
            
            document.getElementById('pos-fecha-emision').value = getFechaHoy();
            document.getElementById('pos-fecha-vencimiento').value = getFechaHoy();
            actualizarBotonesVistaPos();
            
            await iniciarPuntoVenta();
            await inicializarCorrelativos(); 

            // Sincronización Automática Inteligente
            sincronizarBCVSilencioso();
            
            document.addEventListener('keydown', (e) => { 
                if (e.key === 'Escape') { cerrarCobro(); cerrarModalNuevoCliente(); cerrarModalFichaCompleta(); cerrarVisor(); cerrarInfoProducto(); } 
            });
        };

        // ================= ACTUALIZACIÓN DEL BADGE DE TASA BCV =================
        function actualizarIndicadorTasa(fechaIsoStr) {
            const badge = document.getElementById('status-tasa-badge');
            const texto = document.getElementById('status-tasa-texto');
            const icono = badge.querySelector('i');
            
            let fechaTasa = new Date(fechaIsoStr);
            if (isNaN(fechaTasa.getTime())) fechaTasa = new Date(); 
            
            const hoy = new Date();
            const isToday = fechaTasa.getDate() === hoy.getDate() && fechaTasa.getMonth() === hoy.getMonth() && fechaTasa.getFullYear() === hoy.getFullYear();
            const fechaFormat = fechaTasa.toLocaleDateString('es-VE');

            if (isToday) {
                badge.className = "hidden md:flex items-center px-2 py-1 rounded text-[9px] font-bold uppercase tracking-wider bg-blue-50 text-primary border border-blue-200 shadow-sm transition-all";
                texto.innerText = `TASA ACTUALIZADA (${fechaFormat})`;
                icono.className = "fa-solid fa-check-circle mr-1 text-blue-500";
            } else {
                badge.className = "hidden md:flex items-center px-2 py-1 rounded text-[9px] font-bold uppercase tracking-wider bg-red-50 text-red-600 border border-red-300 shadow-sm animate-pulse transition-all";
                texto.innerText = `¡TASA DESACTUALIZADA! (${fechaFormat})`;
                icono.className = "fa-solid fa-triangle-exclamation mr-1";
            }
        }

        // ================= INTERFAZ Y VALIDACIÓN DE FECHAS =================
        function validarFechaEmision() {
            const inputFecha = document.getElementById('pos-fecha-emision');
            const fechaElegida = inputFecha.value;
            if (ultimaFechaFactura && fechaElegida < ultimaFechaFactura) {
                alert(`🛑 SEGURIDAD FISCAL:\nNo puedes emitir una factura con fecha (${fechaElegida}) anterior a la última registrada en el sistema (${ultimaFechaFactura}).`);
                inputFecha.value = getFechaHoy();
            }
            ajustarFechaVencimiento();
        }

        function toggleEditNroFactura() {
            const inputNro = document.getElementById('pos-nro-factura');
            const btnEdit = document.getElementById('btn-edit-nro-factura');
            const icon = btnEdit.querySelector('i');
            
            nroFacturaEditable = !nroFacturaEditable;
            
            if (nroFacturaEditable) {
                inputNro.readOnly = false;
                inputNro.classList.replace('border-red-300', 'border-secondary');
                inputNro.classList.replace('text-red-600', 'text-secondary');
                inputNro.focus();
                btnEdit.classList.replace('bg-gray-400', 'bg-secondary');
                icon.classList.replace('fa-lock', 'fa-lock-open');
                btnEdit.title = "Guardar número actual y bloquear";
            } else {
                inputNro.readOnly = true;
                inputNro.value = inputNro.value.trim().toUpperCase();
                inputNro.classList.replace('border-secondary', 'border-red-300');
                inputNro.classList.replace('text-secondary', 'text-red-600');
                btnEdit.classList.replace('bg-secondary', 'bg-gray-400');
                icon.classList.replace('fa-lock-open', 'fa-lock');
                btnEdit.title = "Permitir editar número manualmente";
            }
        }

        function ajustarFechaVencimiento() {
            const selectVal = document.getElementById('pos-condicion').value;
            const inputVenc = document.getElementById('pos-fecha-vencimiento');
            const emisionStr = document.getElementById('pos-fecha-emision').value;
            
            if (selectVal === 'MANUAL') {
                inputVenc.readOnly = false; inputVenc.classList.remove('bg-gray-100'); inputVenc.classList.add('bg-white');
                return;
            }

            const dias = parseInt(selectVal) || 0;
            let fechaBase = new Date(emisionStr + 'T12:00:00Z');
            fechaBase.setDate(fechaBase.getDate() + dias);
            inputVenc.value = fechaBase.toISOString().split('T')[0];
            
            if (dias === 0) {
                inputVenc.readOnly = true; inputVenc.classList.add('bg-gray-100'); inputVenc.classList.remove('bg-white');
            } else {
                inputVenc.readOnly = false; inputVenc.classList.remove('bg-gray-100'); inputVenc.classList.add('bg-white');
            }
        }

        function toggleSupermercado() {
            modoSupermercado = !modoSupermercado;
            const panelIzq = document.getElementById('panel-izquierdo');
            const panelDer = document.getElementById('panel-derecho');
            const btn = document.getElementById('btn-supermercado');

            if (modoSupermercado) {
                panelIzq.style.width = '0px'; panelIzq.classList.add('opacity-0', 'overflow-hidden');
                panelDer.style.width = '100%'; panelDer.classList.remove('md:w-2/5', 'lg:w-1/3');
                btn.innerHTML = `<i class="fa-solid fa-compress mr-1"></i> Contraer`;
                btn.classList.replace('bg-slate-800', 'bg-blue-600');
            } else {
                panelIzq.style.width = ''; panelIzq.classList.remove('opacity-0', 'overflow-hidden');
                panelDer.style.width = ''; panelDer.classList.add('md:w-2/5', 'lg:w-1/3');
                btn.innerHTML = `<i class="fa-solid fa-expand mr-1"></i> Expandir`;
                btn.classList.replace('bg-blue-600', 'bg-slate-800');
            }
        }

        function toggleAcordeon() {
            const caja = document.getElementById('caja-acordeon-totales');
            const icon = document.getElementById('icon-toggle-acordeon');
            const txt = document.getElementById('txt-toggle-acordeon');
            if (caja.classList.contains('hidden')) {
                caja.classList.remove('hidden'); icon.className = 'fa-solid fa-chevron-down text-[9px] text-gray-400'; txt.innerText = 'OCULTAR DESGLOSE FISCAL';
            } else {
                caja.classList.add('hidden'); icon.className = 'fa-solid fa-chevron-up text-[9px] text-gray-300'; txt.innerText = 'VER DESGLOSE FISCAL';
            }
        }

        function mostrarErrorConexion(msg = "Se ha perdido la conexión.") {
            const ol = document.getElementById('loading-overlay');
            document.getElementById('loading-text').innerText = "Fallo de Conexión";
            document.getElementById('loading-text').classList.replace('text-primary', 'text-red-600');
            document.getElementById('loading-icon').className = "fa-solid fa-wifi text-5xl text-red-500 mb-4"; 
            document.getElementById('loading-error').innerText = msg; document.getElementById('loading-error').classList.remove('hidden');
            document.getElementById('error-actions').classList.remove('hidden');
            ol.classList.remove('hidden'); ol.classList.add('flex');
        }

        function forzarCierreSesion() { localStorage.removeItem('pyp_token_seguro'); localStorage.removeItem('pyp_usuario_nombre'); window.location.href = 'login.html'; }

        // ================= CONEXIÓN A DB Y DESCARGA INICIAL =================
        async function iniciarPuntoVenta() {
            try {
                const resUser = await fetch(`${SUPABASE_URL}/rest/v1/usuarios?select=id_empresa&limit=1`, { headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${TOKEN_JWT}` } });
                if (!resUser.ok) throw new Error("Sesión inválida.");
                const dataUser = await resUser.json();
                if (dataUser.length > 0 && dataUser[0].id_empresa) { empresaActual = dataUser[0].id_empresa; } 
                else { empresaActual = null; } // 🔥 Previene errores si el usuario no tiene empresa

                const [resTasa, resProd, resPre, resCli, resConf] = await Promise.all([
                    fetch(`${SUPABASE_URL}/rest/v1/tasas_bcv?select=*&order=fecha_actualizacion.desc&limit=5`, { headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${TOKEN_JWT}` } }),
                    fetch(`${SUPABASE_URL}/rest/v1/productos?select=*&estado_producto=eq.ACTIVO`, { headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${TOKEN_JWT}` } }),
                    fetch(`${SUPABASE_URL}/rest/v1/precios?select=*`, { headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${TOKEN_JWT}` } }),
                    fetch(`${SUPABASE_URL}/rest/v1/directorio_maestro?select=*&tipo_persona=eq.CLIENTE&estatus=eq.ACTIVO`, { headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${TOKEN_JWT}` } }),
                    fetch(`${SUPABASE_URL}/rest/v1/configuracion_sistema?select=*`, { headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${TOKEN_JWT}` } })
                ]);

                if (!resProd.ok || !resPre.ok) throw new Error("Fallo al descargar la base de datos.");

                const dataTasa = await resTasa.json(); 
                if(dataTasa.length > 0) { 
                    const tUsd = dataTasa.find(t => t.moneda === 'USD');
                    const tEur = dataTasa.find(t => t.moneda === 'EUR');
                    if(tUsd) { 
                        tasaBCV = tUsd.tasa; 
                        document.getElementById('input-tasa-usd').value = tasaBCV.toFixed(2); 
                        actualizarIndicadorTasa(tUsd.fecha_actualizacion);
                    }
                    if(tEur) { tasaBCVEur = tEur.tasa; document.getElementById('input-tasa-eur').value = tasaBCVEur.toFixed(2); }
                }
                
                let dConf = []; if(resConf.ok) dConf = await resConf.json();
                const getC = (p, def) => { const items = dConf.filter(c => c.parametro === p); return items.length > 0 ? items[items.length - 1].valor : def; };
                
                pypIva = parseFloat(getC('IVA_GENERAL', '16')) / 100;
                pypIvaRed1 = parseFloat(getC('IVA_REDUCIDO_1', '8')) / 100;
                pypIvaRed2 = parseFloat(getC('IVA_REDUCIDO_2', '12')) / 100;
                pypIgtf = parseFloat(getC('IGTF', '3')) / 100;
                pypMostrarExento = getC('POS_MOSTRAR_EXENTO', 'SI');
                
                const strCond = getC('CONDICIONES_PAGO', 'CONTADO|0');
                let htmlCond = '';
                strCond.split(',').forEach(c => {
                    const p = c.split('|');
                    if(p[0]) htmlCond += `<option value="${p[1] ? p[1].trim() : '0'}">${p[0].trim().toUpperCase()}</option>`;
                });
                document.getElementById('pos-condicion').innerHTML = htmlCond;
                ajustarFechaVencimiento();

                dbClientes = await resCli.json();
                fuseClientes = new Fuse(dbClientes, { keys: ['documento_identidad', 'nombre_razon_social'], threshold: 0.4, ignoreLocation: true, getFn: function(obj, path) { let val = obj; for (let i = 0; i < path.length; i++) { val = val ? val[path[i]] : null; } return typeof val === 'string' ? val.normalize("NFD").replace(/[\u0300-\u036f]/g, "") : val; } });

                const dataProd = await resProd.json(); const dataPre = await resPre.json();
                dbInventario = dataProd.map(p => { const pre = dataPre.find(pr => pr.id_producto_sku === p.id_producto_sku) || {}; return { ...p, pre: pre }; });
                fuseInventario = new Fuse(dbInventario, { keys: ['id_producto_sku', 'codigo_barras', 'nombre'], threshold: 0.4, ignoreLocation: true, getFn: function(obj, path) { let val = obj; for (let i = 0; i < path.length; i++) { val = val ? val[path[i]] : null; } return typeof val === 'string' ? val.normalize("NFD").replace(/[\u0300-\u036f]/g, "") : val; } });

                const catArr = [...new Set(dbInventario.map(p => p.categoria_del_producto))]; let catHtml = '<option value="TODAS">TODAS LAS CATEGORÍAS</option>';
                catArr.forEach(c => { if(c) catHtml += `<option value="${c}">${c}</option>` }); document.getElementById('filtro-cat-pos').innerHTML = catHtml;
                
                buscarProductos(); 
            } catch(e) { mostrarErrorConexion(e.message); }
        }

        // ================= INGENIERÍA DE CORRELATIVOS FISCALES (CORREGIDO ERROR 400) =================
        async function inicializarCorrelativos() {
            const inputNroFactura = document.getElementById('pos-nro-factura'); inputNroFactura.value = "Cargando...";
            try {
                const resConf = await fetch(`${SUPABASE_URL}/rest/v1/configuracion_sistema?parametro=eq.CORRELATIVO_INICIAL&select=valor`, { headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${TOKEN_JWT}` } });
                let corrInicial = 0; if(resConf.ok) { const dConf = await resConf.json(); if(dConf.length > 0) corrInicial = parseInt(dConf[0].valor) || 0; }

                // 🔥 PROTECCIÓN: Si empresaActual es null, usamos la sintaxis "is.null" para evitar Error 400
                const filtroEmpresa = empresaActual ? `id_empresa=eq.${empresaActual}` : `id_empresa=is.null`;
                const res = await fetch(`${SUPABASE_URL}/rest/v1/facturas?${filtroEmpresa}&select=correlativo,nro_factura_manual,fecha_emision&order=fecha_emision.desc&limit=1`, { headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${TOKEN_JWT}` } });
                
                if (res.ok) { 
                    const data = await res.json(); 
                    if (data.length > 0) { 
                        ultimaFechaFactura = new Date(data[0].fecha_emision).toISOString().split('T')[0];
                        let maxCorr = data[0].correlativo || 0;
                        if (data[0].nro_factura_manual) { const soloNums = data[0].nro_factura_manual.replace(/\D/g, ''); if(soloNums !== '') { let mNum = parseInt(soloNums); if(mNum > maxCorr) maxCorr = mNum; } }
                        correlativoActual = Math.max(maxCorr, corrInicial) + 1; 
                    } else { correlativoActual = corrInicial > 0 ? corrInicial + 1 : 1; }
                } else { correlativoActual = corrInicial > 0 ? corrInicial + 1 : 1; }
                
                inputNroFactura.value = String(correlativoActual).padStart(6, '0');
            } catch (e) { inputNroFactura.value = ""; inputNroFactura.placeholder = "Ej: 000001"; inputNroFactura.readOnly = false; }
        }

        // ================= VISTAS Y BÚSQUEDA DE INVENTARIO =================
        function cambiarVistaPos(v) { posVistaActual = v; localStorage.setItem('pyp_pos_vista_inventario', v); actualizarBotonesVistaPos(); buscarProductos(); }
        function actualizarBotonesVistaPos() { document.getElementById('btn-vista-tabla-pos').classList.toggle('text-tertiary', posVistaActual === 'tabla'); document.getElementById('btn-vista-tabla-pos').classList.toggle('shadow-sm', posVistaActual === 'tabla'); document.getElementById('btn-vista-grid-pos').classList.toggle('text-tertiary', posVistaActual === 'grid'); document.getElementById('btn-vista-grid-pos').classList.toggle('shadow-sm', posVistaActual === 'grid'); }

        function buscarProductos() {
            let query = document.getElementById('buscador-pos').value.trim(); const cat = document.getElementById('filtro-cat-pos').value; const stockFilter = document.getElementById('filtro-stock-pos').value;
            let data = dbInventario;
            if (query !== '') { const queryNormalizada = query.normalize("NFD").replace(/[\u0300-\u036f]/g, ""); data = fuseInventario.search(queryNormalizada).map(r => r.item); }
            if (cat !== 'TODAS') data = data.filter(p => p.categoria_del_producto === cat);
            if (stockFilter === 'DISPONIBLE') data = data.filter(p => p.stock_actual > 0 || p.permitir_negativo);

            const grid = document.getElementById('grid-productos'); let html = '';
            if (data.length === 0) { grid.className = "flex flex-col gap-1"; grid.innerHTML = `<div class="col-span-full p-10 text-center text-gray-400 font-medium text-xs">Sin resultados.</div>`; return; }

            if (posVistaActual === 'tabla') {
                grid.className = "dynamic-grid-table"; 
                html = `<div class="bg-white rounded shadow-sm border border-gray-200 overflow-hidden"><table class="w-full text-left text-[9px] whitespace-nowrap"><thead class="bg-primary text-white uppercase tracking-wider sticky top-0"><tr><th class="py-1.5 px-2">Info</th><th class="py-1.5 px-2">SKU</th><th class="py-1.5 px-2">Producto</th><th class="py-1.5 px-2 text-center">Stock</th><th class="py-1.5 px-2 text-right">Precio ($)</th><th class="py-1.5 px-2 text-center">Acción</th></tr></thead><tbody class="divide-y divide-gray-100">`;
                data.slice(0, 50).forEach(p => {
                    const pUsd = p.pre && p.pre.es_precio_fijo_bs ? (p.pre.precio_fijo_bs / tasaBCV) : (p.pre ? p.pre.precio_general_usd : 0);
                    const prodStr = encodeURIComponent(JSON.stringify({...p, pUsd: pUsd}));
                    const bStkColor = p.stock_actual > 0 ? "text-gray-900 font-bold" : "text-red-600 font-bold";
                    html += `<tr class="hover:bg-blue-50 transition cursor-pointer" onclick="agregarAlCarrito('${prodStr}')"><td class="py-1 px-2 text-center"><button onclick="event.stopPropagation(); abrirInfoProducto('${prodStr}')" class="text-tertiary hover:opacity-80 transition"><i class="fa-solid fa-info-circle text-xs"></i></button></td><td class="py-1 px-2 font-mono text-gray-500">${p.id_producto_sku}</td><td class="py-1 px-2 font-bold text-primary truncate max-w-[150px]">${p.nombre}</td><td class="py-1 px-2 text-center ${bStkColor}">${p.stock_actual}</td><td class="py-1 px-2 text-right font-black text-primary">$${fmt(pUsd)}</td><td class="py-1 px-2 text-center"><button class="bg-secondary text-white px-2 py-0.5 rounded text-[8px] font-bold">Agregar</button></td></tr>`;
                });
                html += `</tbody></table></div>`;
            } else {
                grid.className = "dynamic-grid-grid"; 
                data.slice(0, 40).forEach(p => {
                    const img = p.imagen_principal || imgDefecto; 
                    const pUsd = p.pre && p.pre.es_precio_fijo_bs ? (p.pre.precio_fijo_bs / tasaBCV) : (p.pre ? p.pre.precio_general_usd : 0); 
                    const pBs = pUsd * tasaBCV; 
                    const prodStr = encodeURIComponent(JSON.stringify({...p, pUsd: pUsd}));
                    let btnInfo = `<button onclick="event.stopPropagation(); abrirInfoProducto('${prodStr}')" class="absolute top-1 left-1 bg-tertiary text-white w-5 h-5 rounded flex items-center justify-center transition shadow hover:opacity-90 z-10"><i class="fa-solid fa-info text-[8px]"></i></button>`;
                    const bStkColor = p.stock_actual > 0 ? "text-gray-900 bg-gray-100 border border-gray-200" : "text-red-600 bg-red-50 border border-red-200";
                    html += `<div class="bg-white border border-gray-200 rounded-lg p-1.5 flex flex-col shadow-sm hover:shadow-md transition cursor-pointer active:scale-95 fade-in relative" onclick="agregarAlCarrito('${prodStr}')">${btnInfo}<div class="h-16 w-full mb-1 bg-white flex items-center justify-center rounded"><img src="${img}" class="max-h-full max-w-full object-contain"></div><div class="flex-1 flex flex-col justify-between min-w-0"><h4 class="text-[9px] font-bold text-primary leading-tight line-clamp-2 mb-1 uppercase">${p.nombre}</h4><div class="mt-auto pt-1 border-t border-gray-100"><div class="flex items-baseline mb-0.5"><span class="text-[8px] font-bold text-gray-900 mr-0.5">Bs.</span><span class="text-sm font-black text-gray-900 leading-none">${fmt(pBs)}</span></div><div class="text-[8px] font-bold text-tertiary">$${fmt(pUsd)}</div><div class="text-right text-[7px] font-bold ${bStkColor} px-1 rounded w-fit ml-auto mt-0.5">${p.stock_actual} und</div></div></div></div>`;
                });
            }
            grid.innerHTML = html;
        }

        // ================= FICHA DE PRODUCTO Y MULTIMEDIA =================
        function abrirInfoProducto(prodStr) {
            const p = JSON.parse(decodeURIComponent(prodStr)); const mainImg = document.getElementById('info-prod-img-main'); const contGal = document.getElementById('info-prod-galeria');
            mainImg.src = p.imagen_principal || imgDefecto; contGal.innerHTML = '';
            let arrayGaleria = [p.imagen_principal].filter(url => url);
            if(p.galeria_imagenes) { try { let parsed = typeof p.galeria_imagenes === 'string' ? JSON.parse(p.galeria_imagenes) : p.galeria_imagenes; if(Array.isArray(parsed)) arrayGaleria = [...new Set([...arrayGaleria, ...parsed])]; } catch(e) {} }
            if(arrayGaleria.length > 1) { arrayGaleria.forEach(url => { contGal.innerHTML += `<div class="h-10 bg-white rounded border border-gray-200 p-0.5 cursor-pointer flex items-center justify-center hover:border-secondary" onclick="document.getElementById('info-prod-img-main').src='${url}'"><img src="${url}" class="max-h-full max-w-full object-contain"></div>`; }); } else { contGal.innerHTML = `<span class="text-[8px] font-bold text-gray-400 uppercase col-span-full text-center">Sin Galería</span>`; }
            
            const videoUrl = p.video_url || ''; const videoIframe = document.getElementById('info-prod-video'); const videoPlaceholder = document.getElementById('info-prod-video-placeholder');
            if(videoUrl) { let videoId = ''; if(videoUrl.includes('youtube.com/watch?v=')) videoId = videoUrl.split('v=')[1].split('&')[0]; else if(videoUrl.includes('youtu.be/')) videoId = videoUrl.split('youtu.be/')[1].split('?')[0]; else if(videoUrl.includes('youtube.com/shorts/')) videoId = videoUrl.split('shorts/')[1].split('?')[0];

            const metodo = document.getElementById('cobro-metodo').value; const aplica = (metodo === 'EFECTIVO_USD' || metodo === 'ZELLE');
            document.getElementById('caja-igtf').classList.toggle('hidden', !aplica);
            const tBs = granTotalUsd * tasaBCV; const igtfBs = aplica ? tBs * pypIgtf : 0;
            document.getElementById('modal-total-bs-final').innerText = `Bs. ${fmt(tBs + igtfBs)}`; document.getElementById('modal-total-usd-final').innerText = `US$ ${fmt((tBs + igtfBs)/tasaBCV)}`;
        }
        function abrirCobro() { verificarIGTF(); document.getElementById('modal-cobro').classList.remove('hidden'); document.getElementById('modal-cobro').classList.add('flex'); }
        function cerrarCobro() { document.getElementById('modal-cobro').classList.add('hidden'); }
        function mostrarCarga(t,d,e=false) { const ol=document.getElementById('loading-overlay'); document.getElementById('loading-text').innerText=t; document.getElementById('loading-error').innerText=d; if(e) { document.getElementById('loading-error').classList.remove('hidden'); document.getElementById('error-actions').classList.remove('hidden'); } else { document.getElementById('loading-error').classList.add('hidden'); document.getElementById('error-actions').classList.add('hidden'); } ol.classList.remove('hidden');ol.classList.add('flex'); }
        function cerrarErrorCarga() { document.getElementById('loading-overlay').classList.add('hidden'); document.getElementById('error-actions').classList.add('hidden'); }

        async function procesarVenta() {
            const btn = document.getElementById('btn-confirmar'); btn.disabled = true; mostrarCarga("Procesando...", "Registrando venta en la base de datos");
            try {
                const metodo = document.getElementById('cobro-metodo').value; const formatoPrint = document.getElementById('cobro-formato-impresion').value; const condicionSel = document.getElementById('pos-condicion'); const condicion = condicionSel.options[condicionSel.selectedIndex].text; const nroFactura = document.getElementById('pos-nro-factura').value.trim().toUpperCase(); const nroControl = document.getElementById('pos-nro-control').value.trim().toUpperCase(); const fechaVenc = document.getElementById('pos-fecha-vencimiento').value; const fechaEmision = document.getElementById('pos-fecha-emision').value + 'T12:00:00Z';
                
                const aplicaIgtf = (metodo === 'EFECTIVO_USD' || metodo === 'ZELLE');
                const igtfVal = aplicaIgtf ? pypIgtf * 100 : 0;
                const totalBsFinal = (granTotalUsd * tasaBCV) + (aplicaIgtf ? (granTotalUsd * tasaBCV * pypIgtf) : 0);
                const totalUsdFinal = totalBsFinal / tasaBCV;
                
                const baseImpUsd = parseFloat(document.getElementById('contenedor-totales-fiscales').dataset.baseTotalUsd) || 0; 
                const exentoUsd = parseFloat(document.getElementById('contenedor-totales-fiscales').dataset.exentoTotalUsd) || 0;

                const payloadFactura = { 
                    id_empresa: empresaActual || null, 
                    id_cliente: document.getElementById('pos-id-cliente').value || null, 
                    cliente_documento: document.getElementById('txt-cli-doc').innerText,
                    cliente_nombre: document.getElementById('txt-cli-nom').innerText,
                    subtotal_usd: sumSubtotalBasePuroUsd,
                    descuento_usd: descGeneralTotalUsd,
                    total_usd: totalUsdFinal,
                    total_bs: totalBsFinal,
                    tasa_bcv_aplicada: tasaBCV, 
                    metodos_pago: metodo, 
                    condicion_pago: condicion, 
                    iva_porcentaje: pypIva * 100, 
                    igtf_porcentaje: igtfVal, 
                    base_imponible: baseImpUsd * tasaBCV, 
                    monto_exento: exentoUsd * tasaBCV, 
                    nombre_cajero: document.getElementById('txt-cajero-nombre').innerText, 
                    nro_factura_manual: nroFactura || null, 
                    nro_control_manual: nroControl || null, 
                    fecha_vencimiento: fechaVenc, 
                    fecha_emision: fechaEmision,
                    estatus: 'Completada', 
                    tipo_transaccion: 'Venta' 
                };

                const resF = await fetch(`${SUPABASE_URL}/rest/v1/facturas`, { method: 'POST', headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${TOKEN_JWT}`, 'Content-Type': 'application/json', 'Prefer': 'return=representation' }, body: JSON.stringify(payloadFactura) });
                if(!resF.ok) { const errObj = await resF.json(); throw new Error(errObj.message || "Fallo al guardar factura. Verifica las columnas en Supabase."); }
                
                const fId = (await resF.json())[0].id_factura;
                
                const payloadCaja = {
                    id_empresa: empresaActual || null, id_factura: fId, fecha: new Date().toISOString(), tipo: 'INGRESO', concepto: `COBRO FACTURA NRO: ${nroFactura} - CLIENTE: ${document.getElementById('txt-cli-nom').innerText}`, monto_usd: totalUsdFinal, monto_bs: totalBsFinal, metodo_pago: metodo, usuario: document.getElementById('txt-cajero-nombre').innerText
                };
                fetch(`${SUPABASE_URL}/rest/v1/caja_movimientos`, { method: 'POST', headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${TOKEN_JWT}`, 'Content-Type': 'application/json' }, body: JSON.stringify(payloadCaja) });

                const promesas = []; 
                carrito.forEach(i => { 
                    const prAplicado = calcularPrecioUnitario(i, i.cantidad);
                    promesas.push(fetch(`${SUPABASE_URL}/rest/v1/detalles_factura`, { method: 'POST', headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${TOKEN_JWT}`, 'Content-Type': 'application/json' }, body: JSON.stringify({ id_empresa: empresaActual || null, factura_id: fId, producto_sku: i.id_producto_sku, producto_nombre: i.nombre, cantidad: i.cantidad, precio_unitario_usd: prAplicado, subtotal_usd: prAplicado * i.cantidad }) })); 
                    if(!i.permitir_negativo) { promesas.push(fetch(`${SUPABASE_URL}/rest/v1/productos?id_producto_sku=eq.${i.id_producto_sku}`, { method: 'PATCH', headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${TOKEN_JWT}`, 'Content-Type': 'application/json' }, body: JSON.stringify({ stock_actual: i.stock_actual - i.cantidad }) })); } 
                });
                await Promise.all(promesas);
                
                let empresaPrint = { nombre_empresa: 'P&P SOLUCIONES', rif: 'J-00000000-0', direccion_fiscal: 'SIN DIRECCIÓN FISCAL' };
                generarHTMLImpresion(formatoPrint, empresaPrint, payloadFactura, carrito); window.print();
                
                if(nroFacturaEditable) toggleEditNroFactura();
                carrito = []; document.getElementById('pos-input-desc-general').value = ''; document.getElementById('pos-nro-control').value = ''; document.getElementById('pos-condicion').selectedIndex = 0; document.getElementById('pos-fecha-emision').value = getFechaHoy(); ajustarFechaVencimiento(); limpiarCliente(); cerrarCobro(); actualizarUI_Carrito(); await iniciarPuntoVenta(); await inicializarCorrelativos(); cerrarErrorCarga(); 
            } catch(e) { mostrarCarga("Fallo Crítico", e.message, true); } finally { btn.disabled = false; }
        }

        // ================= MOTOR DE IMPRESIÓN =================
        function generarHTMLImpresion(formato, empresa, factura, items) {
            const contenedor = document.getElementById('ticket-impresion'); contenedor.className = `hidden print:block formato-${formato}`;
            const docCliente = document.getElementById('txt-cli-doc').innerText; const nomCliente = document.getElementById('txt-cli-nom').innerText; const dirCliente = document.getElementById('txt-cli-dir').innerText; const fechaE = new Date(factura.fecha_emision).toLocaleDateString('es-VE'); const fechaV = new Date(factura.fecha_vencimiento + 'T12:00:00Z').toLocaleDateString('es-VE');
            let htmlItems = '';
            items.forEach(i => { const prAplicado = calcularPrecioUnitario(i, i.cantidad); const subTotBs = (prAplicado * i.cantidad * factura.tasa_bcv_aplicada); const indImpuesto = (i.tipo_impuesto === 'EXENTO') ? '(E)' : '(G)'; if(formato === 'carta') { htmlItems += `<tr style="border-bottom: 1px solid #ddd; font-size: 11px;"><td style="padding: 6px 4px;">${i.id_producto_sku}</td><td style="padding: 6px 4px;">${i.nombre}</td><td style="padding: 6px 4px; text-align: center;">${i.cantidad}</td><td style="padding: 6px 4px; text-align: right;">Bs. ${fmt(prAplicado * factura.tasa_bcv_aplicada)}</td><td style="padding: 6px 4px; text-align: right; font-weight: bold;">Bs. ${fmt(subTotBs)} ${indImpuesto}</td></tr>`; } else { htmlItems += `<div style="margin-bottom: 5px;"><div style="font-weight: bold;">${i.nombre}</div><div style="display: flex; justify-content: space-between;"><span>${i.cantidad}x ${fmt(prAplicado)}$/Bs.${fmt(prAplicado * factura.tasa_bcv_aplicada)}</span><span>Bs.${fmt(subTotBs)} ${indImpuesto}</span></div></div>`; } });

            if(formato === 'carta') {
                contenedor.innerHTML = `<div style="max-width: 800px; margin: 0 auto; color: #333;"><div style="text-align: center; margin-bottom: 20px;"><h2 style="margin:0; font-size: 24px; color: var(--color-primary);">${empresa.nombre_empresa}</h2><p style="margin:0; font-weight: bold;">RIF: ${empresa.rif}</p><p style="margin:0; font-size: 11px;">DIRECCIÓN: ${empresa.direccion_fiscal}</p><h3 style="margin-top:15px; font-size: 18px;">DOCUMENTO ${factura.nro_factura_manual ? 'NRO: ' + factura.nro_factura_manual : ''}</h3></div><div style="display: flex; justify-content: space-between; margin-bottom: 20px; border: 1px solid #ccc; padding: 15px; border-radius: 4px; background: #fafafa; font-size: 12px;"><div><strong>Cliente:</strong> ${nomCliente}<br><strong>C.I./RIF:</strong> ${docCliente}<br><strong>Dirección:</strong> ${dirCliente}</div><div style="text-align: right;"><strong>Fecha Emisión:</strong> ${fechaE}<br><strong>Vencimiento:</strong> ${fechaV}<br><strong>Condición:</strong> ${factura.condicion_pago}<br><strong>Pago:</strong> ${factura.metodos_pago.replace('_', ' ')}</div></div><table style="width: 100%; border-collapse: collapse; margin-bottom: 20px;"><thead style="background: var(--color-primary); color: white;"><tr><th style="padding: 8px 4px; text-align:left;">SKU</th><th style="padding: 8px 4px; text-align:left;">Descripción</th><th style="padding: 8px 4px; width: 50px;">Cant.</th><th style="padding: 8px 4px; text-align:right;">Precio Unt.</th><th style="padding: 8px 4px; text-align:right;">Total Bs</th></tr></thead><tbody>${htmlItems}</tbody></table><div style="width: 320px; margin-left: auto; font-size: 12px;"><div style="display: flex; justify-content: space-between; padding: 3px 0;"><span>Exento:</span><span>Bs. ${fmt(factura.monto_exento)}</span></div><div style="display: flex; justify-content: space-between; padding: 3px 0;"><span>Base Imponible:</span><span>Bs. ${fmt(factura.base_imponible)}</span></div><div style="display: flex; justify-content: space-between; padding: 3px 0;"><span>IVA (16%):</span><span>Bs. ${fmt(factura.base_imponible * 0.16)}</span></div>${factura.igtf_porcentaje > 0 ? `<div style="display: flex; justify-content: space-between; padding: 3px 0;"><span>IGTF (3%):</span><span>Bs. ${fmt(factura.total_bs * 0.03)}</span></div>` : ''}<div style="display: flex; justify-content: space-between; font-weight: 900; font-size: 18px; margin-top: 5px; border-top: 2px solid var(--color-primary); padding-top: 5px;"><span>TOTAL:</span><span>Bs. ${fmt(factura.total_bs)}</span></div><div style="display: flex; justify-content: space-between; color: var(--color-secondary); font-weight: bold; font-size: 14px;"><span>Ref USD (Tasa: ${fmt(factura.tasa_bcv_aplicada)}):</span><span>$${fmt(factura.total_usd)}</span></div></div></div>`;
            } else {
                contenedor.innerHTML = `<div style="text-align: center; margin-bottom: 10px; border-bottom: 1px dashed #000; padding-bottom: 5px;"><strong style="font-size: 1.2em;">${empresa.nombre_empresa}</strong><br>RIF: ${empresa.rif}<br>${empresa.direccion_fiscal}<br><br>FACT: ${factura.nro_factura_manual || 'N/A'}<br>CTRL: ${factura.nro_control_manual || 'N/A'}<br>FECHA: ${fechaE} ${factura.condicion_pago !== 'CONTADO' ? '<br>VENCE: ' + fechaV : ''}</div><div style="margin-bottom: 10px;"><strong>Cliente:</strong> ${nomCliente}<br><strong>C.I./RIF:</strong> ${docCliente}</div><div style="border-top: 1px dashed #000; border-bottom: 1px dashed #000; margin-bottom: 10px; padding: 5px 0;">${htmlItems}</div><div><div style="display: flex; justify-content: space-between;"><span>Exento:</span><span>Bs. ${fmt(factura.monto_exento)}</span></div><div style="display: flex; justify-content: space-between;"><span>B. Imponible:</span><span>Bs. ${fmt(factura.base_imponible)}</span></div><div style="display: flex; justify-content: space-between;"><span>IVA (16%):</span><span>Bs. ${fmt(factura.base_imponible * 0.16)}</span></div>${factura.igtf_porcentaje > 0 ? `<div style="display: flex; justify-content: space-between;"><span>IGTF (3%):</span><span>Bs. ${fmt(factura.total_bs * 0.03)}</span></div>` : ''}<div style="display: flex; justify-content: space-between; font-weight: bold; font-size: 1.2em; border-top: 1px solid #000; margin-top: 5px; padding-top: 5px;"><span>TOTAL Bs:</span><span>${fmt(factura.total_bs)}</span></div><div style="display: flex; justify-content: space-between; font-weight: bold; margin-top: 2px;"><span>Ref USD:</span><span>$${fmt(factura.total_usd)}</span></div><div style="text-align: right; font-size: 0.8em; color: #555;">Tasa: Bs. ${fmt(factura.tasa_bcv_aplicada)}</div></div><div style="text-align: center; margin-top: 15px; font-size: 0.9em;">¡Gracias por su compra!<br>Cajero: ${factura.nombre_cajero}</div>`;
            }
        }

        // ================= MOTOR DE TASAS =================
        async function guardarTasaManual(moneda, valor) { 
            const t = parseFloat(valor); if(isNaN(t) || t <= 0) return; 
            if(moneda === 'USD') tasaBCV = t; if(moneda === 'EUR') tasaBCVEur = t; 
            try { 
                await fetch(`${SUPABASE_URL}/rest/v1/tasas_bcv?moneda=eq.${moneda}`, { method: 'DELETE', headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${TOKEN_JWT}` } }); 
                await fetch(`${SUPABASE_URL}/rest/v1/tasas_bcv`, { method: 'POST', headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${TOKEN_JWT}`, 'Content-Type': 'application/json' }, body: JSON.stringify({ moneda: moneda, tasa: t, fecha_actualizacion: new Date().toISOString() }) }); 
                if(moneda === 'USD') actualizarIndicadorTasa(new Date().toISOString()); 
                actualizarUI_Carrito(); 
            } catch(e) { console.error(e); } 
        }
        
        // 🔴 SINCRONIZACIÓN API DE ALTA VELOCIDAD (ve.dolarapi.com)
        async function sincronizarBCVSilencioso() {
            try {
                // API Pública JSON 100% Estable (En vez de AllOrigins)
                const resUsd = await fetch('https://ve.dolarapi.com/v1/dolares/oficial');
                if (!resUsd.ok) return;
                const dataUsd = await resUsd.json();
                
                if (dataUsd && dataUsd.promedio) {
                    tasaBCV = parseFloat(dataUsd.promedio);
                    document.getElementById('input-tasa-usd').value = tasaBCV.toFixed(2);
                    
                    await fetch(`${SUPABASE_URL}/rest/v1/tasas_bcv?moneda=eq.USD`, { method: 'DELETE', headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${TOKEN_JWT}` } });
                    await fetch(`${SUPABASE_URL}/rest/v1/tasas_bcv`, { method: 'POST', headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${TOKEN_JWT}`, 'Content-Type': 'application/json' }, body: JSON.stringify({ moneda: 'USD', tasa: tasaBCV, fecha_actualizacion: new Date().toISOString() }) });
                    
                    actualizarIndicadorTasa(new Date().toISOString());
                    actualizarUI_Carrito();
                }
            } catch (e) { console.log("Sincronización API BCV falló:", e.message); }
        }

        async function sincronizarBCV() { 
            const btn = document.getElementById('btn-sync-bcv');
            const icon = btn.querySelector('i');
            btn.disabled = true; icon.classList.add('fa-spin');
            mostrarCarga("Sincronizando...", "Conectando al BCV..."); 
            
            try { 
                const resUsd = await fetch('https://ve.dolarapi.com/v1/dolares/oficial');
                if (!resUsd.ok) throw new Error("API de Dólar caída."); 
                const dataUsd = await resUsd.json();

                if (dataUsd && dataUsd.promedio) { 
                    tasaBCV = parseFloat(dataUsd.promedio);
                    document.getElementById('input-tasa-usd').value = tasaBCV.toFixed(2); 
                    
                    await fetch(`${SUPABASE_URL}/rest/v1/tasas_bcv?moneda=eq.USD`, { method: 'DELETE', headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${TOKEN_JWT}` } }); 
                    await fetch(`${SUPABASE_URL}/rest/v1/tasas_bcv`, { method: 'POST', headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${TOKEN_JWT}`, 'Content-Type': 'application/json' }, body: JSON.stringify({ moneda: 'USD', tasa: tasaBCV, fecha_actualizacion: new Date().toISOString() }) }); 
                    
                    actualizarIndicadorTasa(new Date().toISOString());
                    actualizarUI_Carrito(); 
                    cerrarErrorCarga(); 
                } else throw new Error("Datos del BCV inválidos."); 
            } catch (e) { 
                mostrarCarga("Error BCV", "El servidor oficial no responde. Por favor verifica la tasa en internet e ingrésala manualmente en la caja de arriba.", true); 
            } finally {
                btn.disabled = false; icon.classList.remove('fa-spin');
            }
        }
    </script>
