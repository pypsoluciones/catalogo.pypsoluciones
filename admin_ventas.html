<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>P&P POS | Facturación y Cotizaciones</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/fuse.js/dist/fuse.js"></script>
    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
    <style>
        .hide-scroll::-webkit-scrollbar { display: none; }
        .hide-scroll { -ms-overflow-style: none; scrollbar-width: none; }
        .ticket-scroll::-webkit-scrollbar { width: 4px; }
        .ticket-scroll::-webkit-scrollbar-thumb { background-color: #cbd5e1; border-radius: 4px; }
        .btn-press:active { transform: scale(0.95); transition: transform 0.1s; }
        #reader video { border-radius: 10px; width: 100% !important; }
    </style>
    <script>if (localStorage.getItem('pyp_sesion_activa') !== 'true') window.location.href = 'login.html';</script>
</head>
<body class="bg-[#f0f2f5] font-sans h-screen flex flex-col overflow-hidden text-gray-800">

    <header class="bg-[#143B62] text-white shadow-md z-20 shrink-0">
        <div class="px-4 py-3 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <button onclick="window.location.href='admin_dashboard.html'" class="text-xl btn-press hover:text-[#E67E22] transition"><i class="fa-solid fa-home"></i></button>
                <h1 class="font-bold text-lg tracking-wide">P&P <span class="text-[#E67E22]">POS</span></h1>
            </div>
            <div class="flex items-center gap-4 text-xs font-bold">
                <div class="bg-black/20 px-3 py-1 rounded">Tasa: <span class="text-yellow-400" id="tasa-actual">Bs. 0.00</span></div>
                <button class="bg-[#E67E22] px-3 py-1 rounded shadow btn-press"><i class="fa-solid fa-user-tie"></i> Admin</button>
            </div>
        </div>
    </header>

    <main class="flex-1 flex flex-col lg:flex-row overflow-y-auto lg:overflow-hidden pb-12 lg:pb-0">
        
        <section class="w-full lg:flex-1 flex flex-col bg-white lg:border-r border-gray-200 lg:overflow-hidden relative shrink-0">
            <button onclick="toggleSeccion('sec-productos', 'icono-prod')" class="lg:hidden w-full bg-[#143B62] text-white p-3 flex justify-between items-center font-bold text-sm border-b border-white/10 shadow-sm">
                <span><i class="fa-solid fa-box-open mr-2"></i> Buscar Productos</span><i id="icono-prod" class="fa-solid fa-chevron-up transition-transform"></i>
            </button>

            <div id="sec-productos" class="flex flex-col lg:h-full transition-all">
                <div class="p-3 bg-white shadow-sm z-10 shrink-0 border-b">
                    <div class="relative flex gap-2">
                        <div class="relative flex-1">
                            <i class="fa-solid fa-barcode absolute left-3 top-3 text-gray-400"></i>
                            <input type="text" id="pos-buscador" oninput="buscarProductoPOS()" placeholder="Buscar por Nombre o SKU..." class="w-full bg-gray-100 border border-gray-300 rounded-lg pl-10 pr-4 py-2.5 focus:outline-none focus:border-[#143B62] focus:bg-white transition text-sm">
                        </div>
                        <button onclick="abrirScanner()" class="bg-[#143B62] text-white px-4 rounded-lg btn-press hover:bg-[#0f2d4a] shadow-sm"><i class="fa-solid fa-camera"></i></button>
                        <button onclick="limpiarBuscador()" class="bg-gray-200 text-gray-600 px-4 rounded-lg btn-press hover:bg-gray-300"><i class="fa-solid fa-xmark"></i></button>
                    </div>
                    <div class="flex gap-2 mt-3 overflow-x-auto hide-scroll pb-1" id="pos-categorias"></div>
                </div>
                <div class="lg:flex-1 overflow-y-auto p-3 bg-[#f8f9fa] min-h-[300px] lg:h-auto shrink-0" id="pos-grilla"><div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-3" id="pos-contenedor-productos"></div></div>
            </div>
        </section>

        <section class="w-full lg:w-[400px] xl:w-[450px] bg-white flex flex-col shrink-0 lg:h-full shadow-[0_-5px_15px_rgba(0,0,0,0.05)] lg:shadow-none z-10">
            
            <button onclick="toggleSeccion('sec-cliente', 'icono-cli')" class="lg:hidden w-full bg-gray-800 text-white p-3 flex justify-between items-center font-bold text-sm border-b border-gray-700">
                <span><i class="fa-solid fa-user mr-2"></i> Datos del Cliente</span><i id="icono-cli" class="fa-solid fa-chevron-down transition-transform"></i>
            </button>

            <div id="sec-cliente" class="hidden lg:block p-3 bg-gray-50 border-b shrink-0 space-y-2">
                <div class="flex justify-between items-center mb-1">
                    <span class="text-[10px] font-bold text-gray-500 uppercase tracking-wider">Facturar o Cotizar a:</span>
                    <div class="flex gap-2">
                        <button onclick="abrirModalDirectorio()" class="bg-blue-50 text-blue-600 border border-blue-200 px-2 py-1.5 rounded transition text-[10px] font-bold flex items-center gap-1"><i class="fa-solid fa-address-book"></i> Directorio</button>
                        <button onclick="limpiarCliente()" class="bg-orange-50 text-[#E67E22] border border-orange-200 px-2 py-1.5 rounded transition text-[10px] font-bold flex items-center gap-1"><i class="fa-solid fa-eraser"></i></button>
                    </div>
                </div>
                <div class="flex gap-2">
                    <select id="pos-tipo-doc" class="border border-gray-300 rounded bg-white text-sm px-1 font-bold text-[#143B62]"><option>V</option><option>E</option><option>J</option><option>G</option><option>C</option></select>
                    <input type="text" id="pos-cedula" placeholder="Cédula/RIF" class="flex-1 border border-gray-300 rounded px-2 py-1.5 text-sm">
                    <button onclick="buscarClientePOS()" class="bg-[#143B62] text-white px-3 rounded btn-press"><i class="fa-solid fa-search"></i></button>
                </div>
                <input type="text" id="pos-nombre" placeholder="Nombre o Razón Social (Consumidor Final)" class="w-full border border-gray-300 rounded px-2 py-1.5 text-sm font-semibold text-gray-700">
                <div class="grid grid-cols-2 gap-2">
                    <input type="tel" id="pos-telefono" placeholder="Teléfono" class="border border-gray-300 rounded px-2 py-1.5 text-xs outline-none text-gray-600">
                    <input type="email" id="pos-correo" placeholder="Correo Electrónico" class="border border-gray-300 rounded px-2 py-1.5 text-xs outline-none text-gray-600">
                </div>
                <input type="text" id="pos-direccion" placeholder="Dirección Fiscal" class="w-full border border-gray-300 rounded px-2 py-1.5 text-xs outline-none text-gray-600">
            </div>

            <button onclick="toggleSeccion('sec-carrito', 'icono-car')" class="lg:hidden w-full bg-[#E67E22] text-white p-3 flex justify-between items-center font-bold text-sm border-b border-orange-600">
                <span><i class="fa-solid fa-cart-shopping mr-2"></i> Ver Ticket de Compra</span><i id="icono-car" class="fa-solid fa-chevron-down transition-transform"></i>
            </button>

            <div id="sec-carrito" class="hidden lg:flex flex-col lg:flex-1 overflow-hidden shrink-0">
                <div class="flex-1 overflow-y-auto bg-white p-2 ticket-scroll min-h-[200px]" id="pos-ticket-items"></div>

                <div class="bg-gray-50 p-3 border-t shrink-0">
                    <div class="space-y-1 mb-3">
                        <div class="flex justify-between text-xs text-gray-600"><span>Subtotal:</span><span id="pos-subtotal" class="font-bold">US$ 0.00</span></div>
                        <div class="flex justify-between text-xs text-green-600"><span>Descuento:</span><span id="pos-descuento" class="font-bold">- US$ 0.00</span></div>
                        <div class="flex justify-between text-xs text-gray-600"><span class="flex items-center gap-1">IVA <select id="pos-tipo-iva" onchange="actualizarTicket()" class="bg-transparent border rounded px-1 text-[10px]"><option value="0">Exento</option><option value="0.16">General</option></select></span><span id="pos-iva" class="font-bold">US$ 0.00</span></div>
                    </div>
                    <div class="flex justify-between items-end mb-3">
                        <div><p class="text-[10px] text-gray-500 font-bold uppercase tracking-wider mb-0.5">Total a Cobrar</p><p class="text-3xl font-black text-[#143B62] leading-none" id="pos-total-usd">US$ 0.00</p></div>
                        <div class="text-right"><p class="text-sm font-bold text-[#E67E22]" id="pos-total-bs">Bs. 0.00</p></div>
                    </div>
                    <div class="flex justify-between items-center mb-2 gap-2">
                        <select id="pos-metodo-pago" class="border rounded bg-white text-xs px-1 py-2 font-semibold text-gray-700 flex-1"><option>Pago Móvil</option><option>Divisas Efectivo</option><option>Punto de Venta</option><option>Zelle</option><option>Transferencia</option></select>
                        <button onclick="limpiarTodoTicket()" class="border border-red-200 text-red-500 bg-red-50 rounded px-3 py-1.5 btn-press text-xs font-bold"><i class="fa-solid fa-trash-can"></i> Anular</button>
                    </div>
                    
                    <div class="flex gap-2">
                        <button onclick="procesarTransaccion('Presupuesto')" class="w-1/3 bg-gray-800 hover:bg-gray-900 text-white font-bold py-3 rounded-lg btn-press text-xs flex flex-col justify-center items-center gap-1 shadow-md">
                            <i class="fa-solid fa-file-invoice text-lg"></i> Cotizar
                        </button>
                        <button onclick="procesarTransaccion('Venta')" class="w-2/3 bg-[#25D366] hover:bg-[#1ebd5c] text-white font-black py-3 rounded-lg shadow-md btn-press text-lg uppercase tracking-wider flex justify-center items-center gap-2">
                            <i class="fa-solid fa-check-double text-xl"></i> Vender
                        </button>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <div id="modal-scanner" class="fixed inset-0 bg-black/80 z-[120] hidden flex items-center justify-center p-4">
        <div class="bg-white rounded-xl shadow-2xl w-full max-w-sm flex flex-col overflow-hidden">
            <div class="bg-[#143B62] text-white p-4 flex justify-between items-center"><h3 class="font-bold text-md"><i class="fa-solid fa-barcode mr-2"></i> Escáner</h3><button onclick="cerrarScanner()" class="text-gray-300"><i class="fa-solid fa-times"></i></button></div>
            <div class="p-0 bg-black flex justify-center w-full"><div id="reader" style="width: 100%; border: none;"></div></div>
        </div>
    </div>

    <div id="modal-directorio" class="fixed inset-0 bg-black/60 z-[100] hidden flex items-center justify-center p-4"><div class="bg-white rounded-xl w-full max-w-2xl flex flex-col max-h-[85vh] overflow-hidden" id="modal-dir-content"><div class="bg-[#143B62] text-white p-4 flex justify-between items-center"><h3 class="font-bold text-lg"><i class="fa-solid fa-users mr-2"></i> Directorio</h3><button onclick="cerrarModalDirectorio()" class="text-gray-300"><i class="fa-solid fa-times"></i></button></div><div class="p-4 bg-gray-50 border-b"><input type="text" id="buscador-modal" oninput="filtrarModalDirectorio()" placeholder="Buscar cliente..." class="w-full border rounded px-3 py-2 text-sm"></div><div class="p-0 overflow-y-auto flex-1 bg-white"><table class="w-full text-left text-sm border-collapse"><thead class="bg-gray-100 text-[10px] uppercase"><tr><th class="p-3 pl-4">Doc</th><th class="p-3">Cliente</th><th class="p-3 text-center">Acción</th></tr></thead><tbody id="tabla-modal-dir"></tbody></table></div></div></div>
    <div id="modal-alerta" class="fixed inset-0 bg-black/60 z-[110] hidden flex items-center justify-center p-4"><div class="bg-white rounded-xl shadow-2xl p-6 w-full max-w-sm text-center" id="modal-alerta-content"><i id="alerta-icono" class="fa-solid fa-circle-check text-5xl text-green-500 mb-4"></i><h3 id="alerta-titulo" class="text-xl font-bold mb-2"></h3><p id="alerta-mensaje" class="text-sm text-gray-600 mb-6"></p><button onclick="cerrarAlerta()" class="w-full bg-[#143B62] text-white font-bold py-3 rounded-lg btn-press">Aceptar</button></div></div>

    <script>
        const SUPABASE_URL = 'https://icvfmdvvochzaktugqvj.supabase.co'; const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImljdmZtZHZ2b2NoemFrdHVncXZqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYyNDEzMzEsImV4cCI6MjA5MTgxNzMzMX0.gO3D39piT6KGbMMOzrPGWXUp5-g_nOBAgJ-nwPv8IcQ';
        let inventario = []; let fuse; let ticket = []; let tasaBCV = 1; let categoriaActiva = 'Todas'; let clientesUnicos = []; let fuseCli;
        let html5QrCode; 

        window.onload = async () => {
            const resTasa = await fetch(`${SUPABASE_URL}/rest/v1/tasas_bcv?select=tasa&order=fecha_actualizacion.desc&limit=1`, { headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` } }); const dataTasa = await resTasa.json(); if(dataTasa.length > 0) { tasaBCV = dataTasa[0].tasa; document.getElementById('tasa-actual').innerText = `Bs. ${tasaBCV.toFixed(2)}`; }
            const resProd = await fetch(`${SUPABASE_URL}/rest/v1/vista_catalogo_web?select=*&limit=1000`, { headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` } }); inventario = await resProd.json(); fuse = new Fuse(inventario, { keys: ['nombre', 'id_producto_sku'], threshold: 0.3 });
            const resCli = await fetch(`${SUPABASE_URL}/rest/v1/clientes?select=*`, { headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` } }); clientesUnicos = resCli.ok ? await resCli.json() : []; fuseCli = new Fuse(clientesUnicos, { keys: ['nombre_razon_social', 'documento_identidad'], threshold: 0.3 });
            pintarCategoriasPOS(); pintarGrillaPOS(inventario); actualizarTicket();
        };

        function toggleSeccion(idContenido, idIcono) { if(window.innerWidth >= 1024) return; const c = document.getElementById(idContenido); const i = document.getElementById(idIcono); if (c.classList.contains('hidden')) { c.classList.remove('hidden'); c.classList.add('flex', 'flex-col'); i.classList.replace('fa-chevron-down', 'fa-chevron-up'); } else { c.classList.add('hidden'); c.classList.remove('flex', 'flex-col'); i.classList.replace('fa-chevron-up', 'fa-chevron-down'); } }

        function abrirScanner() { document.getElementById('modal-scanner').classList.remove('hidden'); html5QrCode = new Html5Qrcode("reader"); html5QrCode.start({ facingMode: "environment" }, { fps: 10, qrbox: { width: 250, height: 250 } }, onScanSuccess, () => {}).catch(err => { alert("Error de cámara"); cerrarScanner(); }); }
        function onScanSuccess(t, r) { cerrarScanner(); document.getElementById('pos-buscador').value = t; const p = inventario.find(x => x.id_producto_sku === t || x.id_producto_sku.includes(t)); if(p) { agregarAlTicket(encodeURIComponent(JSON.stringify(p))); document.getElementById('pos-buscador').value = ''; if(window.innerWidth < 1024) toggleSeccion('sec-carrito', 'icono-car'); } else { buscarProductoPOS(); alert("Código " + t + " no inventariado."); } }
        function cerrarScanner() { if(html5QrCode) html5QrCode.stop().then(()=>{html5QrCode.clear();}).catch(e=>{}); document.getElementById('modal-scanner').classList.add('hidden'); }

        function pintarCategoriasPOS() { const cont = document.getElementById('pos-categorias'); const cats = [...new Set(inventario.map(p => p.categoria_producto).filter(c => c))].sort(); cont.innerHTML = `<button onclick="filtrarCatPOS('Todas')" class="px-4 py-1.5 rounded-full text-xs font-bold btn-press ${categoriaActiva === 'Todas' ? 'bg-[#143B62] text-white' : 'bg-gray-200 text-gray-700'}">Todas</button>` + cats.map(cat => `<button onclick="filtrarCatPOS('${cat}')" class="px-4 py-1.5 rounded-full text-xs font-bold btn-press ${categoriaActiva === cat ? 'bg-[#143B62] text-white' : 'bg-gray-200 text-gray-700'}">${cat}</button>`).join(''); }
        function filtrarCatPOS(cat) { categoriaActiva = cat; pintarCategoriasPOS(); document.getElementById('pos-buscador').value = ''; if(cat === 'Todas') pintarGrillaPOS(inventario); else pintarGrillaPOS(inventario.filter(p => p.categoria_producto === cat)); }
        function limpiarBuscador() { document.getElementById('pos-buscador').value = ''; filtrarCatPOS('Todas'); }
        function buscarProductoPOS() { const txt = document.getElementById('pos-buscador').value; if(txt.trim()===''){filtrarCatPOS(categoriaActiva); return;} pintarGrillaPOS(fuse.search(txt).map(r=>r.item)); }
        function pintarGrillaPOS(arr) { const cont = document.getElementById('pos-contenedor-productos'); if(arr.length===0){cont.innerHTML='<p class="col-span-full text-center text-gray-500 py-10">No hay productos.</p>';return;} cont.innerHTML = arr.map(p => `<div onclick="agregarAlTicket('${encodeURIComponent(JSON.stringify(p))}')" class="bg-white rounded-lg shadow-sm border p-2 cursor-pointer btn-press flex flex-col h-40 relative group"><div class="h-20 w-full mb-2 flex justify-center items-center"><img src="${p.imagen_principal||'#'}" class="max-h-full max-w-full object-contain group-hover:scale-110 transition"></div><h4 class="text-[10px] font-bold text-gray-700 line-clamp-2 mb-1">${p.nombre}</h4><div class="mt-auto flex justify-between items-end"><span class="text-[10px] text-gray-400 font-bold">${p.id_producto_sku}</span><span class="text-sm font-black text-[#143B62]">$${(Number(p.precio_detal_usd)||0).toFixed(2)}</span></div></div>`).join(''); }

        function agregarAlTicket(str) { const p = JSON.parse(decodeURIComponent(str)); const idx = ticket.findIndex(i => i.id_producto_sku === p.id_producto_sku); if(idx!==-1) ticket[idx].cantidad++; else { p.cantidad = 1; ticket.unshift(p); } actualizarTicket(); }
        function cambiarCantTicket(sku, delta) { const idx = ticket.findIndex(i => i.id_producto_sku === sku); if(idx!==-1){ ticket[idx].cantidad+=delta; if(ticket[idx].cantidad<=0) ticket.splice(idx,1); actualizarTicket(); } }
        function calcularPrecioTiers(prod, cantidad) { let pU = Number(prod.precio_detal_usd) || 0; if (prod.requerido_precio_3 && cantidad >= prod.requerido_precio_3 && prod.precio_tier3_usd != null) pU = Number(prod.precio_tier3_usd); else if (prod.requerido_precio_2 && cantidad >= prod.requerido_precio_2 && prod.precio_tier2_usd != null) pU = Number(prod.precio_tier2_usd); else if (prod.requerido_precio_1 && cantidad >= prod.requerido_precio_1 && prod.precio_tier1_usd != null) pU = Number(prod.precio_tier1_usd); return pU; }
        
        function actualizarTicket() {
            const cont = document.getElementById('pos-ticket-items'); if(ticket.length===0){ cont.innerHTML='<div class="flex flex-col items-center justify-center h-full text-gray-300"><i class="fa-solid fa-cart-arrow-down text-4xl mb-2"></i><p class="text-xs">Ticket vacío</p></div>'; document.getElementById('pos-subtotal').innerText='US$ 0.00'; document.getElementById('pos-descuento').innerText='- US$ 0.00'; document.getElementById('pos-iva').innerText='US$ 0.00'; document.getElementById('pos-total-usd').innerText='US$ 0.00'; document.getElementById('pos-total-bs').innerText='Bs. 0.00'; return; }
            let subBase = 0; let totalDesc = 0; const iva = parseFloat(document.getElementById('pos-tipo-iva').value);
            cont.innerHTML = ticket.map(i => {
                const pB = Number(i.precio_detal_usd)||0; const pF = calcularPrecioTiers(i, i.cantidad); subBase += (pB*i.cantidad); totalDesc += (pF*i.cantidad);
                return `<div class="bg-white border rounded p-2 mb-2 flex gap-2 relative"><img src="${i.imagen_principal}" class="w-10 h-10 border rounded object-contain"><div class="flex-1"><h5 class="text-[11px] font-bold leading-tight pr-5">${i.nombre}</h5><div class="flex justify-between mt-1"><div class="flex bg-gray-100 rounded"><button onclick="cambiarCantTicket('${i.id_producto_sku}', -1)" class="px-2 font-bold">-</button><span class="px-2 text-xs font-black pt-0.5">${i.cantidad}</span><button onclick="cambiarCantTicket('${i.id_producto_sku}', 1)" class="px-2 font-bold">+</button></div><div class="text-xs font-black text-[#143B62] pt-0.5">$${(pF*i.cantidad).toFixed(2)}</div></div></div><button onclick="cambiarCantTicket('${i.id_producto_sku}', -999)" class="absolute top-1 right-1 text-gray-300 hover:text-red-500"><i class="fa-solid fa-times"></i></button></div>`;
            }).join('');
            const desc = subBase - totalDesc; const montoIva = totalDesc * iva; const granTotal = totalDesc + montoIva;
            document.getElementById('pos-subtotal').innerText = `US$ ${subBase.toFixed(2)}`; document.getElementById('pos-descuento').innerText = `- US$ ${desc.toFixed(2)}`; document.getElementById('pos-iva').innerText = `US$ ${montoIva.toFixed(2)}`; document.getElementById('pos-total-usd').innerText = `US$ ${granTotal.toFixed(2)}`; document.getElementById('pos-total-bs').innerText = `Bs. ${(granTotal*tasaBCV).toFixed(2)}`;
        }

        function abrirModalDirectorio() { document.getElementById('modal-directorio').classList.remove('hidden'); document.getElementById('tabla-modal-dir').innerHTML = clientesUnicos.map(c => `<tr class="border-b"><td class="p-2 pl-4 text-xs">${c.documento_identidad}</td><td class="p-2 text-xs font-bold text-[#143B62]">${c.nombre_razon_social}</td><td class="p-2 text-center"><button onclick="seleccionarCli('${encodeURIComponent(JSON.stringify(c))}')" class="bg-blue-100 text-blue-700 px-2 py-1 text-[10px] font-bold rounded">Sel</button></td></tr>`).join(''); }
        function cerrarModalDirectorio() { document.getElementById('modal-directorio').classList.add('hidden'); }
        function seleccionarCli(str) { const c = JSON.parse(decodeURIComponent(str)); document.getElementById('pos-cedula').value = c.documento_identidad.substring(1); document.getElementById('pos-tipo-doc').value = c.documento_identidad.charAt(0); document.getElementById('pos-nombre').value = c.nombre_razon_social; document.getElementById('pos-telefono').value = c.celular || ''; document.getElementById('pos-correo').value = c.correo || ''; document.getElementById('pos-direccion').value = c.direccion_fiscal || ''; cerrarModalDirectorio(); }
        async function buscarClientePOS() { const doc = document.getElementById('pos-tipo-doc').value + document.getElementById('pos-cedula').value.trim(); const res = await fetch(`${SUPABASE_URL}/rest/v1/clientes?documento_identidad=eq.${doc}`, { headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` } }); const data = await res.json(); if(data.length>0) { document.getElementById('pos-nombre').value = data[0].nombre_razon_social; document.getElementById('pos-telefono').value = data[0].celular || ''; document.getElementById('pos-correo').value = data[0].correo || ''; document.getElementById('pos-direccion').value = data[0].direccion_fiscal || ''; } }
        function limpiarCliente() { document.getElementById('pos-cedula').value = ''; document.getElementById('pos-nombre').value = ''; document.getElementById('pos-telefono').value = ''; document.getElementById('pos-correo').value = ''; document.getElementById('pos-direccion').value = ''; }
        function limpiarTodoTicket() { ticket=[]; limpiarCliente(); actualizarTicket(); }

        // LÓGICA DUAL: VENTA O PRESUPUESTO
        async function procesarTransaccion(tipoDoc) {
            if(ticket.length===0) return alert("Ticket vacío.");
            
            const doc = document.getElementById('pos-cedula').value ? document.getElementById('pos-tipo-doc').value + document.getElementById('pos-cedula').value : 'Consumidor Final'; 
            const nom = document.getElementById('pos-nombre').value || 'Consumidor Final'; 
            
            if(tipoDoc === 'Presupuesto' && doc === 'Consumidor Final') {
                if(!confirm("Advertencia: Estás haciendo una Cotización a 'Consumidor Final'. ¿Deseas continuar de todos modos?")) return;
            }

            // Cambiar botones a estado de carga
            const btns = document.querySelectorAll('#sec-carrito button');
            btns.forEach(b => b.disabled = true);
            
            try {
                if(doc !== 'Consumidor Final' && document.getElementById('pos-cedula').value.trim() !== '') {
                    const bodyCli = { documento_identidad: doc, nombre_razon_social: nom, celular: document.getElementById('pos-telefono').value, correo: document.getElementById('pos-correo').value, direccion_fiscal: document.getElementById('pos-direccion').value };
                    await fetch(`${SUPABASE_URL}/rest/v1/clientes?on_conflict=documento_identidad`, { method: 'POST', headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}`, 'Content-Type': 'application/json', 'Prefer': 'resolution=merge-duplicates' }, body: JSON.stringify(bodyCli) });
                }

                // El estatus cambia: Una venta es "Completada", un presupuesto es "Pendiente"
                const estatus = tipoDoc === 'Presupuesto' ? 'Pendiente' : 'Completada';
                
                const bodyFac = { tipo_transaccion: tipoDoc, cliente_documento: doc, cliente_nombre: nom, subtotal_usd: parseFloat(document.getElementById('pos-subtotal').innerText.replace('US$ ','')), descuento_usd: parseFloat(document.getElementById('pos-descuento').innerText.replace('- US$ ','')), total_usd: parseFloat(document.getElementById('pos-total-usd').innerText.replace('US$ ','')), total_bs: parseFloat(document.getElementById('pos-total-bs').innerText.replace('Bs. ','')), tasa_bcv_aplicada: tasaBCV, metodos_pago: document.getElementById('pos-metodo-pago').value, estatus: estatus };
                const resFac = await fetch(`${SUPABASE_URL}/rest/v1/facturas`, { method: 'POST', headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}`, 'Content-Type': 'application/json', 'Prefer': 'return=representation' }, body: JSON.stringify(bodyFac) }); const fac = await resFac.json();
                
                const bodyDet = ticket.map(i => { const pF = calcularPrecioTiers(i, i.cantidad); return { factura_id: fac[0].id_factura, producto_sku: i.id_producto_sku, producto_nombre: i.nombre, cantidad: i.cantidad, precio_unitario_usd: pF, subtotal_usd: (pF*i.cantidad) }; });
                await fetch(`${SUPABASE_URL}/rest/v1/detalles_factura`, { method: 'POST', headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}`, 'Content-Type': 'application/json' }, body: JSON.stringify(bodyDet) });
                
                const titulo = tipoDoc === 'Presupuesto' ? "¡Cotización Guardada!" : "¡Venta Exitosa!";
                const msj = tipoDoc === 'Presupuesto' ? `Presupuesto #00${fac[0].correlativo} creado. (No restó inventario).` : `Factura #00${fac[0].correlativo} registrada. (Inventario descontado).`;
                
                document.getElementById('alerta-titulo').innerText = titulo; 
                document.getElementById('alerta-mensaje').innerText = msj; 
                document.getElementById('modal-alerta').classList.remove('hidden'); 
                limpiarTodoTicket();
            } catch(e) { 
                alert("Error al procesar la operación."); 
            } finally { 
                btns.forEach(b => b.disabled = false);
            }
        }
        function cerrarAlerta() { document.getElementById('modal-alerta').classList.add('hidden'); }
    </script>
</body>
</html>
