<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>P&P Admin | Terminal POS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/fuse.js/dist/fuse.js"></script>
    <style>
        body { font-family: 'Inter', sans-serif; }
        .custom-scroll::-webkit-scrollbar { width: 5px; height: 5px; }
        .custom-scroll::-webkit-scrollbar-thumb { background-color: #cbd5e1; border-radius: 4px; }
        .btn-press:active { transform: scale(0.95); }
        .fade-in { animation: fadeIn 0.2s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        input[type=number]::-webkit-inner-spin-button, input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
    </style>
    <script src="config.js"></script>
    <script>if (!localStorage.getItem('pyp_token_seguro')) window.location.href = 'login.html';</script>
</head>
<body class="bg-[#f4f6f8] flex h-screen overflow-hidden text-gray-800" onclick="cerrarDropdownCliente(event)">

    <div id="media-viewer" class="fixed inset-0 bg-black/90 z-[9999] hidden flex-col items-center justify-center p-4 fade-in" onclick="cerrarVisor()">
        <button class="absolute top-4 right-4 text-white text-4xl hover:text-gray-300 z-10 transition"><i class="fa-solid fa-times"></i></button>
        <img id="viewer-img" src="" class="max-w-full max-h-[90vh] object-contain hidden rounded-md shadow-2xl" onclick="event.stopPropagation()">
    </div>

    <script src="menu.js"></script>

    <main class="flex-1 flex flex-col h-screen overflow-hidden bg-[#f4f6f8] w-full z-10 relative">
        <header class="bg-white shadow-sm px-4 py-2 flex justify-between items-center z-10 shrink-0 border-b border-gray-200 h-14">
            <div class="flex items-center gap-3">
                <button onclick="toggleMobileMenu()" class="md:hidden text-gray-600 hover:text-[#143B62] text-xl transition px-2"><i class="fa-solid fa-bars"></i></button>
                <h1 class="text-base font-bold text-[#143B62] flex items-center gap-2"><i class="fa-solid fa-cash-register text-[#25D366]"></i> Punto de Venta (POS)</h1>
            </div>
            <div class="flex items-center gap-3 shrink-0">
                <div class="bg-blue-50 border border-blue-200 px-3 py-1 rounded hidden sm:flex items-center gap-2">
                    <span class="text-[10px] font-bold text-blue-800 uppercase tracking-wider">Tasa BCV:</span>
                    <span class="text-sm font-black text-[#143B62]" id="tasa-display">Bs. 0.00</span>
                </div>
                <div class="text-[11px] font-semibold text-gray-500 bg-gray-100 px-3 py-1 rounded border border-gray-200 uppercase tracking-wide hidden md:block">
                    <i class="fa-solid fa-user-tie text-[#143B62] mr-1"></i> <span id="nombre-usuario">Admin</span>
                </div>
            </div>
        </header>

        <div class="flex-1 flex flex-col md:flex-row overflow-hidden">
            
            <div class="w-full md:w-3/5 lg:w-2/3 h-full flex flex-col border-r border-gray-200 bg-white relative z-0">
                <div class="p-3 border-b border-gray-100 bg-gray-50 flex gap-2 shrink-0">
                    <div class="relative flex-1">
                        <i class="fa-solid fa-search absolute left-3 top-2.5 text-gray-400"></i>
                        <input type="text" id="buscador-pos" oninput="buscarProductos()" placeholder="Buscar producto por Nombre o SKU..." class="w-full border border-gray-300 rounded-lg pl-9 pr-4 py-2 text-sm focus:outline-none focus:border-[#25D366] uppercase transition shadow-sm font-medium">
                    </div>
                    <select id="filtro-cat-pos" onchange="buscarProductos()" class="w-1/3 border border-gray-300 rounded-lg px-3 py-2 text-sm font-bold text-[#143B62] outline-none shadow-sm hidden sm:block">
                        <option value="TODAS">TODAS LAS CATEGORÍAS</option>
                    </select>
                </div>

                <div class="flex-1 overflow-y-auto p-3 custom-scroll bg-slate-50">
                    <div id="grid-productos" class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-3">
                        <div class="col-span-full p-10 text-center text-gray-400"><i class="fa-solid fa-spinner fa-spin text-3xl mb-3 block"></i> Cargando inventario...</div>
                    </div>
                </div>
            </div>

            <div class="w-full md:w-2/5 lg:w-1/3 h-full flex flex-col bg-white shadow-[-5px_0_15px_rgba(0,0,0,0.03)] z-10">
                
                <div class="p-3 border-b border-gray-200 bg-white shrink-0 relative z-20">
                    <div class="flex justify-between items-end mb-1.5">
                        <label class="text-[10px] font-bold text-gray-500 uppercase tracking-wider">Cliente a Facturar</label>
                    </div>
                    
                    <div class="flex gap-2 mb-2 relative" onclick="event.stopPropagation()">
                        <div class="flex-1 relative">
                            <i class="fa-solid fa-search absolute left-2.5 top-2 text-gray-400 text-xs"></i>
                            <input type="text" id="pos-buscador-cliente" oninput="buscarPredictivoCliente()" placeholder="Cédula, RIF o Nombre..." class="w-full border border-gray-300 rounded px-2 pl-8 py-1.5 text-xs font-bold uppercase outline-none focus:border-[#143B62] transition" autocomplete="off">
                            
                            <div id="dropdown-clientes" class="absolute w-full bg-white border border-gray-200 shadow-xl rounded-b mt-0.5 hidden z-50 max-h-48 overflow-y-auto custom-scroll"></div>
                        </div>
                        <button onclick="abrirModalNuevoCliente()" class="bg-[#E67E22] hover:bg-[#d6731e] text-white px-3 py-1.5 rounded text-xs font-bold transition flex items-center gap-1 shadow-sm btn-press shrink-0"><i class="fa-solid fa-user-plus"></i> Nuevo</button>
                    </div>

                    <div class="flex gap-2 relative">
                        <input type="text" id="pos-doc-cliente" placeholder="DOCUMENTO" class="w-1/3 border border-gray-300 rounded px-2 py-1.5 text-[10px] font-bold uppercase focus:border-[#143B62] outline-none" onkeydown="if(event.key === 'Enter') buscarClienteBotonPOS()">
                        <input type="text" id="pos-nom-cliente" placeholder="PÚBLICO GENERAL" class="flex-1 border border-gray-200 rounded px-2 py-1.5 text-[10px] font-bold uppercase bg-blue-50 text-[#143B62] outline-none" readonly>
                        <input type="hidden" id="pos-id-cliente" value="">
                        
                        <button onclick="buscarClienteBotonPOS()" class="bg-[#143B62] text-white px-2.5 rounded hover:bg-[#0f2d4a] transition btn-press" title="Buscar por Doc"><i class="fa-solid fa-search text-xs"></i></button>
                        <button onclick="limpiarCliente()" class="bg-red-50 hover:bg-red-100 text-red-500 px-2.5 rounded transition btn-press" title="Quitar Cliente"><i class="fa-solid fa-times text-xs"></i></button>
                    </div>
                    <p id="msg-cliente-pos" class="text-[10px] font-semibold text-gray-400 mt-1 h-3"></p>
                </div>

                <div class="flex-1 overflow-y-auto p-3 bg-gray-50 custom-scroll" id="lista-carrito">
                    <div class="h-full flex flex-col items-center justify-center text-gray-300 opacity-50">
                        <i class="fa-solid fa-cart-arrow-down text-6xl mb-3"></i>
                        <p class="font-bold text-sm">El carrito está vacío</p>
                    </div>
                </div>

                <div class="p-4 bg-white border-t border-gray-200 shrink-0 shadow-[0_-10px_20px_rgba(0,0,0,0.03)]">
                    <div class="flex justify-between items-center mb-1">
                        <span class="text-xs font-bold text-gray-500 uppercase">Subtotal</span>
                        <span class="text-sm font-bold text-gray-700" id="pos-subtotal">US$ 0.00</span>
                    </div>
                    <div class="flex justify-between items-center mb-3 border-b border-gray-100 pb-3">
                        <span class="text-xs font-bold text-gray-500 uppercase">Artículos</span>
                        <span class="text-sm font-bold text-[#143B62] bg-blue-50 px-2 py-0.5 rounded" id="pos-items">0</span>
                    </div>
                    <div class="flex justify-between items-end mb-1">
                        <span class="text-sm font-black text-[#143B62] uppercase tracking-wider">Total Dólares</span>
                        <span class="text-3xl font-black text-[#25D366] leading-none" id="pos-total-usd">US$ 0.00</span>
                    </div>
                    <div class="flex justify-between items-center mb-4">
                        <span class="text-xs font-bold text-gray-400 uppercase">Equivalente BCV</span>
                        <span class="text-lg font-bold text-[#E67E22]" id="pos-total-bs">Bs. 0.00</span>
                    </div>
                    
                    <button onclick="abrirCobro()" id="btn-cobrar" disabled class="w-full bg-[#25D366] hover:bg-[#1ebd5c] disabled:bg-gray-300 disabled:cursor-not-allowed text-white font-black py-4 rounded-xl shadow-lg transition-all text-xl uppercase tracking-widest flex justify-center items-center gap-3 btn-press">
                        <i class="fa-solid fa-hand-holding-dollar"></i> Procesar Pago
                    </button>
                </div>
            </div>
        </div>
    </main>

    <div id="modal-cobro" class="fixed inset-0 bg-slate-900/80 backdrop-blur-sm z-[100] hidden flex items-center justify-center p-4 fade-in">
        <div class="bg-white rounded-2xl shadow-2xl w-full max-w-md overflow-hidden flex flex-col">
            <div class="bg-[#143B62] px-5 py-4 flex justify-between items-center">
                <h3 class="font-black text-white text-lg tracking-wide uppercase"><i class="fa-solid fa-cash-register mr-2 text-[#25D366]"></i> Liquidar Venta</h3>
                <button onclick="cerrarCobro()" class="text-gray-300 hover:text-white text-xl transition"><i class="fa-solid fa-times"></i></button>
            </div>
            
            <div class="p-6 bg-gray-50 flex-1">
                <div class="bg-[#143B62] rounded-xl p-4 mb-5 shadow-inner text-center">
                    <p class="text-blue-200 text-[10px] font-bold uppercase tracking-widest mb-1">Monto a Cobrar</p>
                    <h2 class="text-4xl font-black text-[#25D366] leading-none mb-1" id="modal-total-usd">US$ 0.00</h2>
                    <p class="text-white font-semibold text-sm" id="modal-total-bs">Bs. 0.00</p>
                </div>

                <div class="space-y-4">
                    <div>
                        <label class="block text-[11px] font-bold text-gray-500 uppercase tracking-wider mb-1">Método de Pago Principal</label>
                        <select id="cobro-metodo" class="w-full border-2 border-gray-300 rounded-lg px-3 py-2.5 text-sm font-bold text-[#143B62] outline-none focus:border-[#25D366] bg-white">
                            <option value="EFECTIVO_USD">💵 Efectivo Dólares (Divisas)</option>
                            <option value="PAGO_MOVIL">📱 Pago Móvil (Bs)</option>
                            <option value="PUNTO_VENTA">💳 Punto de Venta (Bs)</option>
                            <option value="ZELLE">🟣 Zelle (USD)</option>
                            <option value="EFECTIVO_BS">🇻🇪 Efectivo Bolívares</option>
                        </select>
                    </div>
                    <div id="caja-referencia" class="hidden">
                        <label class="block text-[11px] font-bold text-gray-500 uppercase tracking-wider mb-1">Referencia / Lote</label>
                        <input type="text" id="cobro-referencia" placeholder="Últimos 4 o 6 dígitos" class="w-full border-2 border-gray-300 rounded-lg px-3 py-2.5 text-sm font-bold outline-none focus:border-[#25D366] uppercase">
                    </div>
                    
                    <div class="border-t border-gray-200 pt-4 mt-2">
                        <label class="block text-[11px] font-bold text-gray-500 uppercase tracking-wider mb-1 text-center">Calculadora de Vuelto (Efectivo)</label>
                        <div class="flex items-center gap-2">
                            <div class="flex-1 relative">
                                <span class="absolute left-3 top-2.5 font-bold text-gray-400">$</span>
                                <input type="number" id="cobro-recibido" placeholder="0.00" class="w-full border-2 border-gray-300 rounded-lg pl-7 pr-3 py-2 text-lg font-black text-center outline-none focus:border-blue-500 bg-white" oninput="calcularVuelto()">
                            </div>
                            <div class="flex-1 bg-gray-200 rounded-lg p-2 text-center border-2 border-transparent">
                                <p class="text-[9px] font-bold text-gray-500 uppercase leading-none mb-1">Cambio a Dar</p>
                                <p class="text-xl font-black text-gray-800 leading-none" id="cobro-vuelto">$0.00</p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="p-4 bg-white border-t border-gray-200">
                <button onclick="procesarVenta()" id="btn-confirmar" class="w-full bg-[#143B62] hover:bg-[#0f2d4a] text-white font-black py-3.5 rounded-xl shadow-md transition-all text-lg uppercase tracking-wider flex justify-center items-center gap-2 btn-press">
                    <i class="fa-solid fa-check-circle"></i> Confirmar y Guardar
                </button>
            </div>
        </div>
    </div>

    <div id="modal-nuevo-cliente" class="fixed inset-0 bg-slate-900/80 backdrop-blur-sm z-[110] hidden flex items-center justify-center p-4 fade-in">
        <div class="bg-white rounded-xl shadow-2xl w-full max-w-sm overflow-hidden flex flex-col border border-gray-200">
            <div class="bg-[#143B62] text-white px-4 py-3 flex justify-between items-center">
                <h3 class="font-bold text-sm tracking-wide uppercase"><i class="fa-solid fa-user-plus mr-2 text-[#E67E22]"></i> Registro Rápido</h3>
                <button onclick="cerrarModalNuevoCliente()" class="text-gray-300 hover:text-white transition"><i class="fa-solid fa-times"></i></button>
            </div>
            <form id="form-cliente-rapido" onsubmit="guardarClienteRapido(event)" class="p-5 bg-gray-50 space-y-3">
                <div><label class="block text-[10px] font-bold text-gray-500 uppercase mb-1">Doc. Identidad / RIF *</label><input type="text" id="cli-rap-doc" required class="w-full border border-gray-300 rounded px-3 py-2 text-xs font-bold uppercase focus:border-[#143B62] outline-none bg-white"></div>
                <div><label class="block text-[10px] font-bold text-gray-500 uppercase mb-1">Nombre / Razón Social *</label><input type="text" id="cli-rap-nom" required class="w-full border border-gray-300 rounded px-3 py-2 text-xs font-bold uppercase focus:border-[#143B62] outline-none bg-white"></div>
                <div><label class="block text-[10px] font-bold text-gray-500 uppercase mb-1">Celular Principal *</label><input type="text" id="cli-rap-tel" required class="w-full border border-gray-300 rounded px-3 py-2 text-xs font-bold focus:border-[#143B62] outline-none bg-white"></div>
                <button type="submit" id="btn-guardar-cli-rap" class="w-full bg-[#25D366] hover:bg-[#1ebd5c] text-white font-bold py-3 rounded shadow transition-all text-sm uppercase tracking-wider mt-4 btn-press"><i class="fa-solid fa-save"></i> Guardar y Seleccionar</button>
            </form>
        </div>
    </div>

    <div id="loading-overlay" class="fixed inset-0 bg-white/90 z-[999] hidden flex-col items-center justify-center">
        <i class="fa-solid fa-circle-notch fa-spin text-5xl text-[#25D366] mb-4"></i>
        <h2 class="text-2xl font-black text-[#143B62] tracking-wider uppercase">Procesando Transacción</h2>
    </div>

    <script>
        const TOKEN_JWT = localStorage.getItem('pyp_token_seguro');
        
        let dbInventario = [];
        let carrito = [];
        let dbClientes = [];
        let tasaBCV = 1;
        let fuseInventario = null;
        let fuseClientes = null;
        let empresaActual = null;
        let imagenGlobalDefecto = 'https://via.placeholder.com/150/f8fafc/94a3b8?text=P%26P';

        window.onload = async () => {
            const nombre = localStorage.getItem('pyp_usuario_nombre');
            if(nombre && document.getElementById('nombre-usuario')) {
                document.getElementById('nombre-usuario').innerText = nombre.split(' ')[0];
            }
            
            document.getElementById('cobro-metodo').addEventListener('change', function() {
                const reqRef = ['PAGO_MOVIL', 'PUNTO_VENTA', 'ZELLE'].includes(this.value);
                document.getElementById('caja-referencia').classList.toggle('hidden', !reqRef);
            });

            await iniciarPuntoVenta();
        };

        // VISOR DE IMÁGENES 
        function abrirVisorImagen(url) { 
            if(!url) return; 
            const visor = document.getElementById('media-viewer'); 
            const img = document.getElementById('viewer-img'); 
            img.src = url; 
            img.classList.remove('hidden'); 
            visor.classList.remove('hidden'); 
            visor.classList.add('flex'); 
        }
        function cerrarVisor() { 
            const visor = document.getElementById('media-viewer'); 
            visor.classList.add('hidden'); 
            visor.classList.remove('flex'); 
        }

        async function iniciarPuntoVenta() {
            try {
                // 1. Obtener ID Empresa
                const resUser = await fetch(`${SUPABASE_URL}/rest/v1/usuarios?select=id_empresa&limit=1`, { headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${TOKEN_JWT}` } });
                const dataUser = await resUser.json();
                empresaActual = dataUser.length > 0 ? dataUser[0].id_empresa : null;

                // 2. Obtener Datos Concurrentes
                const [resTasa, resProd, resPre, resPar, resCli] = await Promise.all([
                    fetch(`${SUPABASE_URL}/rest/v1/tasas_bcv?select=tasa&order=fecha_actualizacion.desc&limit=1`, { headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${TOKEN_JWT}` } }),
                    fetch(`${SUPABASE_URL}/rest/v1/productos?select=id_producto_sku,nombre,imagen_principal,stock_actual,categoria_del_producto&estado_producto=eq.ACTIVO&stock_actual=gt.0`, { headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${TOKEN_JWT}` } }),
                    fetch(`${SUPABASE_URL}/rest/v1/precios?select=id_producto_sku,precio_general_usd,es_precio_fijo_bs,precio_fijo_bs`, { headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${TOKEN_JWT}` } }),
                    fetch(`${SUPABASE_URL}/rest/v1/parametros_inventario?select=valor&grupo=eq.CATEGORIA&estatus=eq.ACTIVO`, { headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${TOKEN_JWT}` } }),
                    fetch(`${SUPABASE_URL}/rest/v1/directorio_maestro?select=id,documento_identidad,nombre_razon_social&tipo_persona=eq.CLIENTE&estatus=eq.ACTIVO`, { headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${TOKEN_JWT}` } })
                ]);

                // Tasa BCV
                const dataTasa = await resTasa.json();
                if(dataTasa.length > 0) {
                    tasaBCV = dataTasa[0].tasa;
                    document.getElementById('tasa-display').innerText = `Bs. ${tasaBCV.toFixed(2)}`;
                }

                // Clientes (Directorio Maestro)
                dbClientes = await resCli.json();
                fuseClientes = new Fuse(dbClientes, { keys: ['documento_identidad', 'nombre_razon_social'], threshold: 0.3, ignoreLocation: true });

                // Fusionar Productos y Precios
                const dataProd = await resProd.json();
                const dataPre = await resPre.json();
                dbInventario = dataProd.map(p => {
                    const pre = dataPre.find(pr => pr.id_producto_sku === p.id_producto_sku) || {};
                    let precioFinalUsd = 0;
                    if(pre.es_precio_fijo_bs && pre.precio_fijo_bs > 0) { precioFinalUsd = pre.precio_fijo_bs / tasaBCV; } else { precioFinalUsd = pre.precio_general_usd || 0; }
                    return { ...p, precio_usd: precioFinalUsd };
                }).filter(p => p.precio_usd > 0); 
                
                fuseInventario = new Fuse(dbInventario, { keys: ['nombre', 'id_producto_sku'], threshold: 0.2 });

                // Llenar Filtro Categorías
                const categorias = await resPar.json();
                let catHtml = '<option value="TODAS">TODAS LAS CATEGORÍAS</option>';
                categorias.forEach(c => catHtml += `<option value="${c.valor}">${c.valor}</option>`);
                document.getElementById('filtro-cat-pos').innerHTML = catHtml;

                buscarProductos(); 
            } catch(e) { document.getElementById('grid-productos').innerHTML = `<div class="col-span-full p-10 text-center text-red-500 font-bold uppercase">Error conectando al servidor.</div>`; }
        }

        // --- BÚSQUEDA DE PRODUCTOS ---
        function buscarProductos() {
            const query = document.getElementById('buscador-pos').value.trim();
            const cat = document.getElementById('filtro-cat-pos').value;
            let data = dbInventario;
            
            if (query !== '') { data = fuseInventario.search(query).map(r => r.item); }
            if (cat !== 'TODAS') { data = data.filter(p => p.categoria_del_producto === cat); }

            const grid = document.getElementById('grid-productos');
            if (data.length === 0) { grid.innerHTML = `<div class="col-span-full p-10 text-center text-gray-400 font-medium">No se encontraron productos.</div>`; return; }

            let html = '';
            data.slice(0, 50).forEach(p => {
                const prodStr = encodeURIComponent(JSON.stringify(p));
                const img = p.imagen_principal || imagenGlobalDefecto;
                html += `
                <div class="bg-white border border-gray-200 rounded-xl p-2 flex flex-col shadow-sm hover:shadow-md transition cursor-pointer active:scale-95 fade-in" onclick="agregarAlCarrito('${prodStr}')">
                    <div class="h-20 w-full mb-2 bg-white flex items-center justify-center rounded relative group">
                        <img src="${img}" class="max-h-full max-w-full object-contain">
                        <button onclick="event.stopPropagation(); abrirVisorImagen('${img}')" class="absolute top-1 right-1 bg-black/50 text-white w-6 h-6 rounded flex items-center justify-center opacity-0 group-hover:opacity-100 transition"><i class="fa-solid fa-expand text-[10px]"></i></button>
                    </div>
                    <div class="flex-1 flex flex-col justify-between">
                        <h4 class="text-[10px] font-bold text-gray-700 leading-tight line-clamp-2 mb-1">${p.nombre}</h4>
                        <div class="flex justify-between items-end mt-auto">
                            <span class="text-xs font-black text-[#143B62]">$${p.precio_usd.toFixed(2)}</span>
                            <span class="text-[9px] font-bold text-emerald-600 bg-emerald-50 px-1.5 rounded">${p.stock_actual} und</span>
                        </div>
                    </div>
                </div>`;
            });
            grid.innerHTML = html;
        }

        // --- LUPA: BÚSQUEDA EXACTA EN BASE DE DATOS ---
        async function buscarClienteBotonPOS() {
            const doc = document.getElementById('pos-doc-cliente').value.trim().replace(/\s/g, '').toUpperCase();
            const msg = document.getElementById('msg-cliente-pos');
            if(!doc) return;
            
            msg.innerText = "Buscando..."; msg.className = "text-[10px] font-semibold text-gray-400 mt-1 h-3";
            
            try {
                // Ahora apunta a la tabla correcta "directorio_maestro"
                const res = await fetch(`${SUPABASE_URL}/rest/v1/directorio_maestro?tipo_persona=eq.CLIENTE&documento_identidad=ilike.%${doc}%`, { 
                    headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${TOKEN_JWT}` } 
                }); 
                const datos = await res.json();
                
                if(datos.length > 0) {
                    document.getElementById('pos-nom-cliente').value = datos[0].nombre_razon_social;
                    document.getElementById('pos-id-cliente').value = datos[0].id;
                    msg.innerHTML = '<i class="fa-solid fa-check-circle text-green-500"></i> Cliente verificado';
                } else {
                    document.getElementById('pos-nom-cliente').value = '';
                    document.getElementById('pos-id-cliente').value = '';
                    msg.innerHTML = '<i class="fa-solid fa-triangle-exclamation text-yellow-500"></i> Cliente no registrado';
                }
            } catch(e) { msg.innerText = "Error de red"; }
        }

        // --- BÚSQUEDA PREDICTIVA IA (La que busca mientras escribes) ---
        function buscarPredictivoCliente() {
            const query = document.getElementById('pos-buscador-cliente').value.trim();
            const drop = document.getElementById('dropdown-clientes');
            
            if(query === '') { drop.classList.add('hidden'); return; }
            
            const resultados = fuseClientes.search(query).slice(0, 6);
            drop.innerHTML = '';
            
            if(resultados.length === 0) {
                drop.innerHTML = `<div class="p-3 text-xs text-gray-500 text-center bg-gray-50 rounded-b">No encontrado. <button onclick="abrirModalNuevoCliente('${query}')" class="text-[#E67E22] font-bold hover:underline ml-1">Registrar Nuevo</button></div>`;
            } else {
                resultados.forEach(r => {
                    const c = r.item;
                    const cStr = encodeURIComponent(JSON.stringify(c));
                    drop.innerHTML += `
                    <div class="p-2.5 border-b border-gray-100 hover:bg-blue-50 cursor-pointer transition flex justify-between items-center" onclick="seleccionarCliente('${cStr}')">
                        <div class="flex-1 min-w-0">
                            <div class="font-bold text-[#143B62] text-[11px] truncate">${c.nombre_razon_social}</div>
                            <div class="text-[9px] text-gray-500 font-mono">${c.documento_identidad}</div>
                        </div>
                        <i class="fa-solid fa-check text-blue-300 opacity-0 group-hover:opacity-100 transition"></i>
                    </div>`;
                });
            }
            drop.classList.remove('hidden');
        }

        function seleccionarCliente(cStr) {
            const c = JSON.parse(decodeURIComponent(cStr));
            document.getElementById('pos-doc-cliente').value = c.documento_identidad || '';
            document.getElementById('pos-nom-cliente').value = c.nombre_razon_social || '';
            document.getElementById('pos-id-cliente').value = c.id || '';
            
            document.getElementById('pos-buscador-cliente').value = '';
            document.getElementById('dropdown-clientes').classList.add('hidden');
            document.getElementById('msg-cliente-pos').innerHTML = '<i class="fa-solid fa-check-circle text-green-500"></i> Seleccionado';
        }

        function limpiarCliente() {
            document.getElementById('pos-doc-cliente').value = '';
            document.getElementById('pos-nom-cliente').value = '';
            document.getElementById('pos-id-cliente').value = '';
            document.getElementById('pos-buscador-cliente').value = '';
            document.getElementById('msg-cliente-pos').innerText = '';
        }

        function cerrarDropdownCliente(e) {
            if(e.target.id !== 'pos-buscador-cliente') {
                document.getElementById('dropdown-clientes').classList.add('hidden');
            }
        }

        // --- MODAL DE REGISTRO RÁPIDO DE CLIENTE ---
        function abrirModalNuevoCliente(queryDoc = '') {
            document.getElementById('form-cliente-rapido').reset();
            if(queryDoc && /^[0-9VEJG]+$/i.test(queryDoc)) { document.getElementById('cli-rap-doc').value = queryDoc.toUpperCase(); }
            document.getElementById('dropdown-clientes').classList.add('hidden');
            document.getElementById('modal-nuevo-cliente').classList.remove('hidden');
            document.getElementById('modal-nuevo-cliente').classList.add('flex');
        }
        function cerrarModalNuevoCliente() {
            document.getElementById('modal-nuevo-cliente').classList.add('hidden');
            document.getElementById('modal-nuevo-cliente').classList.remove('flex');
        }

        async function guardarClienteRapido(e) {
            e.preventDefault();
            const btn = document.getElementById('btn-guardar-cli-rap');
            btn.innerHTML = `<i class="fa-solid fa-spinner fa-spin"></i> Guardando...`; btn.disabled = true;

            try {
                const payload = {
                    id_empresa: empresaActual,
                    tipo_persona: 'CLIENTE',
                    documento_identidad: document.getElementById('cli-rap-doc').value.trim().toUpperCase(),
                    nombre_razon_social: document.getElementById('cli-rap-nom').value.trim().toUpperCase(),
                    telefono_principal: document.getElementById('cli-rap-tel').value.trim(),
                    estatus: 'ACTIVO'
                };

                const res = await fetch(`${SUPABASE_URL}/rest/v1/directorio_maestro`, {
                    method: 'POST',
                    headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${TOKEN_JWT}`, 'Content-Type': 'application/json', 'Prefer': 'return=representation' },
                    body: JSON.stringify(payload)
                });

                if(!res.ok) throw new Error("Documento posiblemente duplicado.");
                
                const dataGuardada = await res.json();
                const nuevoCliente = dataGuardada[0];

                // Actualizar IA y Seleccionarlo Automáticamente
                dbClientes.push(nuevoCliente);
                fuseClientes = new Fuse(dbClientes, { keys: ['documento_identidad', 'nombre_razon_social'], threshold: 0.3, ignoreLocation: true });
                
                const cStr = encodeURIComponent(JSON.stringify(nuevoCliente));
                seleccionarCliente(cStr);
                cerrarModalNuevoCliente();

            } catch(error) {
                alert("Error: " + error.message);
            } finally {
                btn.innerHTML = `<i class="fa-solid fa-save"></i> Guardar y Seleccionar`; btn.disabled = false;
            }
        }

        // --- LÓGICA DEL CARRITO ---
        function agregarAlCarrito(prodStr) {
            const prod = JSON.parse(decodeURIComponent(prodStr));
            const idx = carrito.findIndex(item => item.id_producto_sku === prod.id_producto_sku);
            
            if (idx !== -1) {
                if(carrito[idx].cantidad < prod.stock_actual) carrito[idx].cantidad++;
                else alert("Stock máximo alcanzado para este producto.");
            } else { carrito.push({ ...prod, cantidad: 1 }); }
            actualizarUI_Carrito();
        }

        function modificarCantidad(sku, delta) {
            const idx = carrito.findIndex(item => item.id_producto_sku === sku);
            if (idx === -1) return;
            carrito[idx].cantidad += delta;
            if (carrito[idx].cantidad <= 0) carrito.splice(idx, 1);
            else if (carrito[idx].cantidad > carrito[idx].stock_actual) { carrito[idx].cantidad = carrito[idx].stock_actual; }
            actualizarUI_Carrito();
        }

        function actualizarUI_Carrito() {
            const lista = document.getElementById('lista-carrito');
            const btnCobrar = document.getElementById('btn-cobrar');
            
            if (carrito.length === 0) {
                lista.innerHTML = `<div class="h-full flex flex-col items-center justify-center text-gray-300 opacity-50"><i class="fa-solid fa-cart-arrow-down text-6xl mb-3"></i><p class="font-bold text-sm">El carrito está vacío</p></div>`;
                document.getElementById('pos-subtotal').innerText = 'US$ 0.00';
                document.getElementById('pos-total-usd').innerText = 'US$ 0.00';
                document.getElementById('pos-total-bs').innerText = 'Bs. 0.00';
                document.getElementById('pos-items').innerText = '0';
                btnCobrar.disabled = true; return;
            }

            let html = ''; let totalUsd = 0; let totalItems = 0;

            carrito.forEach(item => {
                const subLinea = item.precio_usd * item.cantidad;
                totalUsd += subLinea; totalItems += item.cantidad;
                const img = item.imagen_principal || imagenGlobalDefecto;

                html += `
                <div class="bg-white border border-gray-200 rounded-lg p-2 mb-2 flex items-center shadow-sm relative fade-in">
                    <img src="${img}" class="w-10 h-10 object-contain rounded border border-gray-100 p-0.5 mr-2">
                    <div class="flex-1 min-w-0">
                        <h4 class="text-[10px] font-bold text-[#143B62] truncate pr-5">${item.nombre}</h4>
                        <div class="text-[10px] font-semibold text-gray-500 mt-0.5">$${item.precio_usd.toFixed(2)} c/u</div>
                    </div>
                    <div class="flex flex-col items-end shrink-0 ml-2">
                        <div class="font-black text-sm text-[#25D366] mb-1">$${subLinea.toFixed(2)}</div>
                        <div class="flex items-center border border-gray-200 rounded overflow-hidden">
                            <button onclick="modificarCantidad('${item.id_producto_sku}', -1)" class="bg-gray-50 hover:bg-gray-200 px-2 py-0.5 text-gray-600 font-bold transition"><i class="fa-solid fa-minus text-[8px]"></i></button>
                            <span class="px-2 py-0.5 text-[10px] font-black bg-white w-6 text-center">${item.cantidad}</span>
                            <button onclick="modificarCantidad('${item.id_producto_sku}', 1)" class="bg-gray-50 hover:bg-gray-200 px-2 py-0.5 text-gray-600 font-bold transition"><i class="fa-solid fa-plus text-[8px]"></i></button>
                        </div>
                    </div>
                </div>`;
            });

            lista.innerHTML = html;
            document.getElementById('pos-subtotal').innerText = `US$ ${totalUsd.toFixed(2)}`;
            document.getElementById('pos-total-usd').innerText = `US$ ${totalUsd.toFixed(2)}`;
            document.getElementById('pos-total-bs').innerText = `Bs. ${(totalUsd * tasaBCV).toFixed(2)}`;
            document.getElementById('pos-items').innerText = totalItems;
            
            document.getElementById('modal-total-usd').innerText = `US$ ${totalUsd.toFixed(2)}`;
            document.getElementById('modal-total-bs').innerText = `Bs. ${(totalUsd * tasaBCV).toFixed(2)}`;
            btnCobrar.disabled = false;
        }

        // --- MODAL DE COBRO ---
        function abrirCobro() { 
            document.getElementById('cobro-recibido').value = '';
            document.getElementById('cobro-vuelto').innerText = '$0.00';
            document.getElementById('modal-cobro').classList.remove('hidden'); 
            document.getElementById('modal-cobro').classList.add('flex'); 
        }
        function cerrarCobro() { 
            document.getElementById('modal-cobro').classList.add('hidden'); 
            document.getElementById('modal-cobro').classList.remove('flex'); 
        }
        function calcularVuelto() {
            let total = 0; carrito.forEach(i => total += (i.precio_usd * i.cantidad));
            const recibido = parseFloat(document.getElementById('cobro-recibido').value) || 0;
            const vuelto = recibido - total;
            document.getElementById('cobro-vuelto').innerText = vuelto > 0 ? `$${vuelto.toFixed(2)}` : '$0.00';
            if(vuelto > 0) document.getElementById('cobro-vuelto').className = "text-xl font-black text-green-500 leading-none";
            else document.getElementById('cobro-vuelto').className = "text-xl font-black text-gray-800 leading-none";
        }

        // --- PROCESAR LA VENTA ---
        async function procesarVenta() {
            const btn = document.getElementById('btn-confirmar');
            btn.disabled = true;
            document.getElementById('loading-overlay').classList.remove('hidden');
            document.getElementById('loading-overlay').classList.add('flex');

            try {
                let totalUsd = 0; carrito.forEach(i => totalUsd += (i.precio_usd * i.cantidad));
                const totalBs = totalUsd * tasaBCV;
                const idCliente = document.getElementById('pos-id-cliente').value || null;
                const metodo = document.getElementById('cobro-metodo').value;
                const referencia = document.getElementById('cobro-referencia').value.trim() || null;

                const payloadFactura = {
                    id_empresa: empresaActual, id_cliente: idCliente, subtotal_usd: totalUsd,
                    total_usd: totalUsd, tasa_bcv: tasaBCV, total_bs: totalBs,
                    metodo_pago: metodo, referencia_pago: referencia, estatus: 'PAGADA'
                };

                const resFactura = await fetch(`${SUPABASE_URL}/rest/v1/facturas`, {
                    method: 'POST', headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${TOKEN_JWT}`, 'Content-Type': 'application/json', 'Prefer': 'return=representation' },
                    body: JSON.stringify(payloadFactura)
                });
                
                if(!resFactura.ok) throw new Error("Error creando factura.");
                const facturaData = await resFactura.json(); const idFactura = facturaData[0].id;

                const promesas = []; const payloadDetalles = [];

                for (let i = 0; i < carrito.length; i++) {
                    const item = carrito[i];
                    payloadDetalles.push({ id_factura: idFactura, id_producto_sku: item.id_producto_sku, nombre_producto: item.nombre, cantidad: item.cantidad, precio_unitario_usd: item.precio_usd, total_linea_usd: item.precio_usd * item.cantidad });
                    const nuevoStock = item.stock_actual - item.cantidad;
                    promesas.push(fetch(`${SUPABASE_URL}/rest/v1/productos?id_producto_sku=eq.${item.id_producto_sku}`, { method: 'PATCH', headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${TOKEN_JWT}`, 'Content-Type': 'application/json' }, body: JSON.stringify({ stock_actual: nuevoStock }) }));
                }

                promesas.push(fetch(`${SUPABASE_URL}/rest/v1/detalles_factura`, { method: 'POST', headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${TOKEN_JWT}`, 'Content-Type': 'application/json' }, body: JSON.stringify(payloadDetalles) }));
                await Promise.all(promesas);

                carrito = []; limpiarCliente(); cerrarCobro(); actualizarUI_Carrito(); await iniciarPuntoVenta(); 
            } catch(e) { alert("Error: " + e.message); } finally { btn.disabled = false; document.getElementById('loading-overlay').classList.add('hidden'); document.getElementById('loading-overlay').classList.remove('flex'); }
        }
    </script>
</body>
</html>
