<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>P&P Admin | Ventas POS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .custom-scroll::-webkit-scrollbar { width: 5px; height: 5px; }
        .custom-scroll::-webkit-scrollbar-thumb { background-color: #cbd5e1; border-radius: 4px; }
        .btn-press:active { transform: scale(0.97); }
        .fade-in { animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .sidebar-link { font-weight: 500; padding: 8px 14px; font-size: 13px; letter-spacing: 0.01em; }
        .sidebar-icon { font-size: 14px; width: 22px; text-align: center; }
    </style>
   <script>
    // Guardián de Seguridad: Exige el Token Real
    if (!localStorage.getItem('pyp_token_seguro')) {
        window.location.href = 'login.html';
    }
</script>
</head>
<body class="bg-[#f4f6f8] flex h-screen overflow-hidden text-gray-800 relative">
   
    <main class="flex-1 flex flex-col h-screen overflow-hidden bg-[#f4f6f8] w-full">
        <header class="bg-white shadow-sm px-4 md:px-6 py-2 flex justify-between items-center z-10 shrink-0 border-b border-gray-200 h-16">
            <div class="flex items-center gap-3 h-full">
                <button onclick="toggleMobileMenu()" class="md:hidden text-gray-600 hover:text-[#143B62] text-xl transition btn-press px-2"><i class="fa-solid fa-bars"></i></button>
                <h1 class="text-base md:text-lg font-semibold text-[#143B62] flex items-center gap-2 truncate h-full">
                    <img id="app-logo-header" src="" class="max-h-12 w-auto hidden object-contain">
                    <div id="app-text-header" class="flex items-center gap-2">
                        <i class="fa-solid fa-cash-register text-[#E67E22] hidden sm:inline-block"></i> <span>Punto de Venta</span>
                    </div>
                </h1>
            </div>
            <div class="flex items-center gap-2 md:gap-3">
                <div class="bg-gray-50 px-2 md:px-3 py-1.5 rounded-md border border-gray-200 flex items-center gap-2 text-[10px] md:text-[11px] font-semibold text-gray-600 tracking-wide uppercase">
                    <i class="fa-solid fa-user-tie text-[#143B62]"></i> <span id="nombre-usuario" class="hidden sm:inline-block">Admin</span>
                </div>
            </div>
        </header>

        <div class="flex-1 overflow-auto p-4 md:p-6 custom-scroll pb-24 md:pb-6 flex flex-col items-center justify-center fade-in">
            <i class="fa-solid fa-cash-register text-6xl text-gray-300 mb-4"></i>
            <h2 class="text-xl font-bold text-[#143B62] mb-2">Módulo de Ventas (Próximamente)</h2>
            <p class="text-sm text-gray-500 font-medium max-w-md text-center">Aquí construiremos el cajero (POS). Por ahora, usa la barra de navegación para volver.</p>
        </div>
    </main>

    <nav class="md:hidden fixed bottom-0 w-full bg-white border-t border-gray-200 flex justify-around items-center pb-2 pt-2 px-1 z-50 shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.05)]">
        <a href="admin_dashboard.html" class="flex flex-col items-center p-2 text-gray-400 hover:text-[#143B62] transition w-1/4"><i class="fa-solid fa-chart-pie text-lg mb-1"></i><span class="text-[9px] font-semibold">Inicio</span></a>
        
        <a href="admin_ventas.html" class="flex flex-col items-center p-2 text-[#E67E22] transition w-1/4"><i class="fa-solid fa-cash-register text-lg mb-1"></i><span class="text-[9px] font-bold">Vender</span></a>
        
        <a href="admin_productos.html" class="flex flex-col items-center p-2 text-gray-400 hover:text-[#143B62] transition w-1/4"><i class="fa-solid fa-boxes-stacked text-lg mb-1"></i><span class="text-[9px] font-semibold">Inventario</span></a>
        <button onclick="toggleMobileMenu()" class="flex flex-col items-center p-2 text-gray-400 hover:text-[#143B62] transition w-1/4 btn-press"><i class="fa-solid fa-bars text-lg mb-1"></i><span class="text-[9px] font-semibold">Menú</span></button>
    </nav>

    <script>
        window.onload = () => {
            const nombre = localStorage.getItem('pyp_usuario_nombre');
            if(nombre) { document.getElementById('nombre-usuario').innerText = nombre.split(' ')[0]; }
            cargarBrandingSidebar();
        };

        function cargarBrandingSidebar() {
            const logoPc = localStorage.getItem('pyp_logo_pc_url');
            if(logoPc) {
                document.getElementById('app-logo-sidebar').src = logoPc;
                document.getElementById('app-logo-sidebar').classList.remove('hidden');
                document.getElementById('app-text-sidebar').classList.add('hidden');
            }
            
            const logoMovil = localStorage.getItem('pyp_logo_movil_url');
            if(logoMovil) {
                document.getElementById('app-logo-header').src = logoMovil;
                document.getElementById('app-logo-header').classList.remove('hidden');
                document.getElementById('app-text-header').classList.add('hidden');
            }
        }

        function toggleMobileMenu() {
            document.getElementById('sidebar').classList.toggle('-translate-x-full');
            document.getElementById('mobile-overlay').classList.toggle('hidden');
        }

           </script>
    <script src="menu.js"></script>
</body>
</html>
