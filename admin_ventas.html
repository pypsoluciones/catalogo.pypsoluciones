<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>P&P Admin | Punto de Venta (POS)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/fuse.js/dist/fuse.js"></script>
    <style>
        body { font-family: 'Inter', sans-serif; }
        .custom-scroll::-webkit-scrollbar { width: 5px; height: 5px; }
        .custom-scroll::-webkit-scrollbar-thumb { background-color: #cbd5e1; border-radius: 4px; }
        .btn-press:active { transform: scale(0.97); }
    </style>
    
    <script src="config.js"></script>
    <script>
        if (!localStorage.getItem('pyp_token_seguro')) window.location.href = 'login.html';
    </script>
</head>
<body class="bg-[#f4f6f8] flex h-screen overflow-hidden text-gray-800 relative">

    <script src="menu.js"></script>

    <main class="flex-1 flex flex-col h-screen overflow-hidden bg-[#f4f6f8] w-full z-10 relative">
        
        <header class="bg-white shadow-sm px-4 md:px-6 py-3 flex justify-between items-center z-10 shrink-0 border-b border-gray-200">
            <div class="flex items-center gap-3">
                <button onclick="toggleMobileMenu()" class="md:hidden text-gray-600 hover:text-[#143B62] text-xl transition px-2"><i class="fa-solid fa-bars"></i></button>
                <h1 class="text-lg font-bold text-[#143B62] flex items-center gap-2"><i class="fa-solid fa-cash-register text-[#E67E22]"></i> Punto de Venta</h1>
            </div>
            <div class="flex items-center gap-4">
                <div class="hidden sm:flex text-xs font-bold bg-green-50 text-green-700 px-3 py-1.5 rounded border border-green-200 shadow-sm items-center gap-2">
                    <i class="fa-solid fa-money-bill-trend-up"></i> Tasa BCV: <span id="tasa-actual">Cargando...</span>
                </div>
                <div class="text-[11px] font-semibold text-gray-500 bg-gray-100 px-3 py-1.5 rounded border border-gray-200 uppercase tracking-wide">
                    <i class="fa-solid fa-user-tie text-[#143B62] mr-1"></i> <span id="nombre-usuario">Cajero</span>
                </div>
            </div>
        </header>

        <div class="flex-1 overflow-hidden flex flex-col lg:flex-row gap-4 p-4 md:p-6">
            
            <div class="w-full lg:w-2/3 flex flex-col gap-4 h-full">
                
                <div class="bg-white p-4 rounded-xl shadow-sm border border-gray-200 shrink-0 relative">
                    <div class="relative">
                        <i class="fa-solid fa-barcode absolute left-4 top-3.5 text-gray-400 text-lg"></i>
                        <input type="text" id="buscador-pos" oninput="buscarProducto()" onclick="event.stopPropagation()" placeholder="Escanear Código de Barras o Buscar Producto..." class="w-full bg-gray-50 border border-gray-300 rounded-lg pl-12 pr-4 py-3 text-sm font-semibold focus:outline-none focus:border-[#E67E22] focus:ring-1 focus:ring-[#E67E22] transition shadow-inner">
                    </div>
                    <div id="lista-resultados" class="absolute left-0 right-0 top-[70px] bg-white shadow-2xl rounded-b-lg border border-gray-200 hidden z-50 max-h-64 overflow-y-auto custom-scroll mx-4"></div>
                </div>

                <div class="bg-white rounded-xl shadow-sm border border-gray-200 flex-1 flex flex-col overflow-hidden">
                    <div class="bg-[#143B62] px-4 py-2 flex justify-between items-center shrink-0">
                        <h3 class="text-xs font-bold text-white uppercase tracking-wider">Carrito de Compras</h3>
                        <button onclick="limpiarCarrito()" class="text-red-300 hover:text-red-100 text-[10px] font-bold uppercase transition btn-press"><i class="fa-solid fa-trash mr-1"></i> Vaciar</button>
                    </div>
                    <div class="flex-1 overflow-auto custom-scroll p-2">
                        <table class="w-full text-left border-collapse">
                            <thead>
                                <tr class="text-[10px] text-gray-400 uppercase border-b border-gray-100">
                                    <th class="pb-2 pl-2">Producto</th>
                                    <th class="pb-2 text-center w-20">Cant.</th>
                                    <th class="pb-2 text-right w-24">Precio ($)</th>
                                    <th class="pb-2 text-right w-24">Total ($)</th>
                                    <th class="pb-2 text-center w-10"></th>
                                </tr>
                            </thead>
                            <tbody id="tabla-carrito" class="divide-y divide-gray-50">
                                <tr><td colspan="5" class="py-16 text-center text-gray-400 font-medium"><i class="fa-solid fa-cart-arrow-down text-5xl mb-3 opacity-30 block"></i> El carrito está vacío.</td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>

            <div class="w-full lg:w-1/3 bg-white rounded-xl shadow-sm border border-gray-200 flex flex-col shrink-0 h-full overflow-y-auto custom-scroll">
                
                <div class="p-5 border-b border-gray-100 bg-gray-50">
                    <h3 class="text-xs font-bold text-gray-500 uppercase tracking-wider mb-3"><i class="fa-solid fa-user-tag text-[#E67E22] mr-1"></i> Datos del Cliente</h3>
                    <div class="space-y-3">
                        <div class="flex gap-2">
                            <select id="cli-tipo" class="border border-gray-300 rounded px-2 py-2 text-xs focus:outline-none font-bold text-[#143B62] bg-white"><option value="V">V</option><option value="J">J</option><option value="E">E</option></select>
                            <input type="text" id="cli-doc" placeholder="Cédula o RIF" value="00000000" class="flex-1 border border-gray-300 rounded px-3 py-2 text-xs focus:outline-none focus:border-[#E67E22] bg-white">
                        </div>
                        <input type="text" id="cli-nombre" placeholder="Nombre del Cliente" value="CLIENTE GENÉRICO" class="w-full border border-gray-300 rounded px-3 py-2 text-xs focus:outline-none focus:border-[#E67E22] font-semibold uppercase bg-white">
                    </div>
                </div>

                <div class="p-5 flex-1 flex flex-col justify-end">
                    <div class="space-y-2 mb-6">
                        <div class="flex justify-between text-xs text-gray-500 font-semibold"><p>Subtotal</p><p id="lbl-subtotal">$0.00</p></div>
                        <div class="flex justify-between text-xs text-emerald-600 font-semibold"><p>Descuento</p><p>-$0.00</p></div>
                        <div class="border-t border-dashed border-gray-300 pt-2 mt-2"></div>
                        <div class="flex justify-between items-end">
                            <p class="text-xs font-bold text-gray-500 uppercase">TOTAL A PAGAR</p>
                            <div class="text-right">
                                <p class="text-4xl font-black text-[#143B62]" id="lbl-total-usd">$0.00</p>
                                <p class="text-sm font-bold text-[#E67E22] mt-1" id="lbl-total-bs">Bs. 0.00</p>
                            </div>
                        </div>
                    </div>

                    <div class="mb-5">
                        <label class="block text-[10px] font-bold text-gray-400 uppercase mb-1">Método de Pago</label>
                        <select id="metodo-pago" class="w-full border border-gray-300 rounded-lg px-3 py-2.5 text-sm font-bold text-[#143B62] focus:outline-none bg-gray-50">
                            <option value="EFECTIVO_USD">💵 Efectivo (Divisas)</option>
                            <option value="EFECTIVO_BS">💵 Efectivo (Bolívares)</option>
                            <option value="PAGO_MOVIL">📱 Pago Móvil</option>
                            <option value="PUNTO_VENTA">💳 Punto de Venta</option>
                            <option value="ZELLE">🟣 Zelle</option>
                        </select>
                    </div>

                    <button onclick="procesarVenta()" id="btn-cobrar" class="w-full bg-[#25D366] hover:bg-[#1ebd5c] text-white font-black py-4 rounded-xl shadow-lg transition btn-press text-lg uppercase tracking-widest flex justify-center items-center gap-2">
                        <i class="fa-solid fa-check-double text-xl"></i> FACTURAR
                    </button>
                </div>
            </div>

        </div>
    </main>

    <script>
        const TOKEN_JWT = localStorage.getItem('pyp_token_seguro');
        
        let inventario = []; 
        let fuseBusqueda; 
        let carrito = []; 
        let tasaBCV = 1;

        window.onload = async () => {
            const nombre = localStorage.getItem('pyp_usuario_nombre');
            if(nombre) document.getElementById('nombre-usuario').innerText = nombre.split(' ')[0];
            
            // Cerrar menú flotante al hacer clic afuera
            document.body.addEventListener('click', () => { document.getElementById('lista-resultados').classList.add('hidden'); });

            await inicializarPOS();
        };

        async function inicializarPOS() {
            try {
                // 1. Obtener Tasa BCV
                const resTasa = await fetch(`${SUPABASE_URL}/rest/v1/tasas_bcv?select=tasa&order=fecha_actualizacion.desc&limit=1`, { headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${TOKEN_JWT}` } });
                const dataTasa = await resTasa.json();
                if(dataTasa.length > 0) { 
                    tasaBCV = dataTasa[0].tasa; 
                    document.getElementById('tasa-actual').innerText = `Bs. ${tasaBCV.toFixed(2)}`; 
                }

                // 2. Cargar Inventario para el buscador
                const [resProd, resPre] = await Promise.all([
                    fetch(`${SUPABASE_URL}/rest/v1/productos?select=id_producto_sku,nombre,stock_actual,imagen_principal`, { headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${TOKEN_JWT}` } }),
                    fetch(`${SUPABASE_URL}/rest/v1/precios?select=id_producto_sku,precio_general_usd`, { headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${TOKEN_JWT}` } })
                ]);
                
                const dataProd = await resProd.json();
                const dataPre = await resPre.json();

                // Fusionar productos con sus precios
                inventario = dataProd.map(p => {
                    const precioInfo = dataPre.find(pr => pr.id_producto_sku === p.id_producto_sku);
                    return { ...p, precio_usd: precioInfo ? precioInfo.precio_general_usd : 0 };
                });

                // Configurar motor de búsqueda ultrarrápido
                fuseBusqueda = new Fuse(inventario, { keys: ['id_producto_sku', 'nombre'], threshold: 0.3 });

            } catch(e) { alert("Error de conexión al cargar el POS."); }
        }

        // ==========================================
        // LÓGICA DEL BUSCADOR
        // ==========================================
        function buscarProducto() {
            const texto = document.getElementById('buscador-pos').value;
            const cont = document.getElementById('lista-resultados');
            
            if (texto.trim() === '') { cont.classList.add('hidden'); return; }
            
            const resultados = fuseBusqueda.search(texto).slice(0, 8).map(r => r.item);
            
            if(resultados.length === 0) { 
                cont.innerHTML = '<p class="p-4 text-xs text-red-500 text-center font-bold">Producto no encontrado.</p>'; 
            } else {
                cont.innerHTML = resultados.map(p => {
                    const pStr = encodeURIComponent(JSON.stringify(p));
                    const stockClass = p.stock_actual > 0 ? 'text-emerald-600 bg-emerald-50' : 'text-red-600 bg-red-50';
                    return `
                    <div onclick="agregarAlCarrito('${pStr}')" class="p-3 border-b border-gray-100 hover:bg-gray-50 cursor-pointer transition flex justify-between items-center gap-3">
                        <img src="${p.imagen_principal || 'https://via.placeholder.com/40'}" class="w-8 h-8 object-contain rounded border border-gray-200 bg-white shrink-0">
                        <div class="flex-1 min-w-0">
                            <p class="text-[11px] font-bold text-[#143B62] truncate">${p.nombre}</p>
                            <p class="text-[9px] text-gray-400 font-mono">${p.id_producto_sku}</p>
                        </div>
                        <div class="text-right shrink-0">
                            <p class="text-sm font-black text-emerald-600">$${p.precio_usd.toFixed(2)}</p>
                            <p class="text-[9px] font-bold px-1.5 py-0.5 rounded ${stockClass}">Stock: ${p.stock_actual}</p>
                        </div>
                    </div>`;
                }).join('');
            }
            cont.classList.remove('hidden');
        }

        // ==========================================
        // LÓGICA DEL CARRITO
        // ==========================================
        function agregarAlCarrito(prodStr) {
            const p = JSON.parse(decodeURIComponent(prodStr));
            
            if (p.stock_actual <= 0) { alert(`¡El producto ${p.nombre} está agotado!`); return; }

            const existe = carrito.find(item => item.id_producto_sku === p.id_producto_sku);
            if (existe) {
                if(existe.cantidad + 1 > p.stock_actual) { alert("No hay más stock disponible de este producto."); return; }
                existe.cantidad += 1;
            } else {
                p.cantidad = 1;
                carrito.unshift(p);
            }
            
            document.getElementById('buscador-pos').value = ''; 
            document.getElementById('lista-resultados').classList.add('hidden');
            document.getElementById('buscador-pos').focus();
            actualizarInterfazCarrito();
        }

        function cambiarCantidad(sku, delta) {
            const item = carrito.find(i => i.id_producto_sku === sku);
            if(item) {
                const nuevaCant = item.cantidad + delta;
                if(nuevaCant > item.stock_actual) { alert("Supera el stock disponible."); return; }
                if(nuevaCant > 0) { item.cantidad = nuevaCant; }
                else { eliminarDelCarrito(sku); return; }
                actualizarInterfazCarrito();
            }
        }

        function eliminarDelCarrito(sku) {
            carrito = carrito.filter(item => item.id_producto_sku !== sku);
            actualizarInterfazCarrito();
        }

        function limpiarCarrito() {
            if(carrito.length > 0 && confirm("¿Deseas vaciar todo el carrito?")) {
                carrito = []; actualizarInterfazCarrito();
            }
        }

        function actualizarInterfazCarrito() {
            const tbody = document.getElementById('tabla-carrito');
            let totalUSD = 0;

            if(carrito.length === 0) { 
                tbody.innerHTML = '<tr><td colspan="5" class="py-16 text-center text-gray-400 font-medium"><i class="fa-solid fa-cart-arrow-down text-5xl mb-3 opacity-30 block"></i> El carrito está vacío.</td></tr>'; 
                document.getElementById('lbl-subtotal').innerText = '$0.00';
                document.getElementById('lbl-total-usd').innerText = '$0.00';
                document.getElementById('lbl-total-bs').innerText = 'Bs. 0.00';
                return; 
            }

            tbody.innerHTML = carrito.map(item => {
                const subT = item.cantidad * item.precio_usd;
                totalUSD += subT;
                return `
                <tr class="border-b border-gray-50 hover:bg-gray-50 transition">
                    <td class="py-2 pl-2 pr-1">
                        <p class="text-[11px] font-bold text-[#143B62] leading-tight line-clamp-2">${item.nombre}</p>
                        <p class="text-[9px] text-gray-400 mt-0.5">${item.id_producto_sku}</p>
                    </td>
                    <td class="py-2 text-center w-24">
                        <div class="flex items-center justify-center bg-gray-100 rounded-md border border-gray-200 p-0.5">
                            <button onclick="cambiarCantidad('${item.id_producto_sku}', -1)" class="w-6 h-6 flex items-center justify-center text-gray-600 hover:bg-white rounded transition"><i class="fa-solid fa-minus text-[10px]"></i></button>
                            <span class="w-8 text-center text-xs font-bold">${item.cantidad}</span>
                            <button onclick="cambiarCantidad('${item.id_producto_sku}', 1)" class="w-6 h-6 flex items-center justify-center text-gray-600 hover:bg-white rounded transition"><i class="fa-solid fa-plus text-[10px]"></i></button>
                        </div>
                    </td>
                    <td class="py-2 text-right text-[11px] font-semibold text-gray-500 w-20">$${item.precio_usd.toFixed(2)}</td>
                    <td class="py-2 text-right font-black text-[#143B62] w-20">$${subT.toFixed(2)}</td>
                    <td class="py-2 text-center w-10">
                        <button onclick="eliminarDelCarrito('${item.id_producto_sku}')" class="text-gray-300 hover:text-red-500 transition text-sm p-1"><i class="fa-solid fa-times"></i></button>
                    </td>
                </tr>`;
            }).join('');

            document.getElementById('lbl-subtotal').innerText = `$${totalUSD.toFixed(2)}`;
            document.getElementById('lbl-total-usd').innerText = `$${totalUSD.toFixed(2)}`;
            document.getElementById('lbl-total-bs').innerText = `Bs. ${(totalUSD * tasaBCV).toFixed(2)}`;
        }

        // ==========================================
        // LÓGICA DE COBRO Y BASE DE DATOS
        // ==========================================
        async function procesarVenta() {
            if(carrito.length === 0) return alert("El carrito está vacío.");
            
            const docC = document.getElementById('cli-tipo').value + document.getElementById('cli-doc').value.trim();
            const nomC = document.getElementById('cli-nombre').value.trim().toUpperCase();
            
            if(!nomC) return alert("Debe ingresar el nombre del cliente.");

            const totalUSD = parseFloat(document.getElementById('lbl-total-usd').innerText.replace('$', ''));
            const btn = document.getElementById('btn-cobrar');
            btn.innerHTML = `<i class="fa-solid fa-spinner fa-spin text-xl"></i> PROCESANDO...`; btn.disabled = true;

            try {
                // 1. Conseguir el ID de la Empresa (Para el SaaS Multi-Tenant)
                const resUser = await fetch(`${SUPABASE_URL}/rest/v1/usuarios?select=id_empresa&limit=1`, { headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${TOKEN_JWT}` } });
                const dataUser = await resUser.json();
                const miEmpresa = dataUser.length > 0 ? dataUser[0].id_empresa : null;

                // 2. Crear Factura Maestra
                const bodyFactura = {
                    tipo_transaccion: 'Venta',
                    cliente_documento: docC,
                    cliente_nombre: nomC,
                    subtotal_usd: totalUSD,
                    total_usd: totalUSD,
                    total_bs: totalUSD * tasaBCV,
                    tasa_bcv_aplicada: tasaBCV,
                    estatus: 'Completada',
                    id_empresa: miEmpresa
                };
                
                const resFactura = await fetch(`${SUPABASE_URL}/rest/v1/facturas`, { 
                    method: 'POST', 
                    headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${TOKEN_JWT}`, 'Content-Type': 'application/json', 'Prefer': 'return=representation' }, 
                    body: JSON.stringify(bodyFactura) 
                });
                if(!resFactura.ok) throw new Error("Fallo al crear la factura matriz.");
                const facData = await resFactura.json();

                // 3. Crear Renglones de la Factura y Restar Stock
                for (const item of carrito) {
                    // Insertar Renglón
                    await fetch(`${SUPABASE_URL}/rest/v1/detalles_factura`, { 
                        method: 'POST', 
                        headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${TOKEN_JWT}`, 'Content-Type': 'application/json' }, 
                        body: JSON.stringify({ 
                            factura_id: facData[0].id_factura, 
                            producto_sku: item.id_producto_sku, 
                            producto_nombre: item.nombre, 
                            cantidad: item.cantidad, 
                            precio_unitario_usd: item.precio_usd, 
                            subtotal_usd: item.cantidad * item.precio_usd 
                        }) 
                    });

                    // Descontar Stock Real en Inventario
                    const nuevoStock = item.stock_actual - item.cantidad;
                    await fetch(`${SUPABASE_URL}/rest/v1/productos?id_producto_sku=eq.${item.id_producto_sku}`, {
                        method: 'PATCH',
                        headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${TOKEN_JWT}`, 'Content-Type': 'application/json' },
                        body: JSON.stringify({ stock_actual: nuevoStock })
                    });
                }

                alert(`¡Venta Registrada con Éxito!\nEl stock ha sido descontado.`);
                
                // Reiniciar para el siguiente cliente
                carrito = [];
                document.getElementById('cli-doc').value = '00000000';
                document.getElementById('cli-nombre').value = 'CLIENTE GENÉRICO';
                actualizarInterfazCarrito();
                await inicializarPOS(); // Recargar inventario fresco con stock actualizado

            } catch (error) {
                alert("Error al procesar la venta: " + error.message);
            } finally {
                btn.innerHTML = `<i class="fa-solid fa-check-double text-xl"></i> FACTURAR`; btn.disabled = false;
            }
        }
    </script>
</body>
</html>
