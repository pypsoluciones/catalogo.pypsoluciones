<!DOCTYPE html>
<html lang="es">
<head>
    <!-- Configuración central P&P (cargada antes de cualquier otro script) -->
    <script src="config.js"></script>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin | Publicidad P&P</title>

    <script>
        const cPri = localStorage.getItem('pyp_color_primario') || '#143B62';
        const cSec = localStorage.getItem('pyp_color_secundario') || '#E67E22';
        const cTer = localStorage.getItem('pyp_color_terciario') || '#64748b';
        const fontFam = localStorage.getItem('pyp_fuente') || "'Inter', sans-serif";
        const fontSiz = localStorage.getItem('pyp_tamano') || "14px";
        
        // Inyectamos variables CSS (Motor Marca Blanca)
        document.documentElement.style.setProperty('--color-primary', cPri);
        document.documentElement.style.setProperty('--color-secondary', cSec);
        document.documentElement.style.setProperty('--color-tertiary', cTer);
        document.documentElement.style.setProperty('--font-global', fontFam);
        document.documentElement.style.setProperty('--size-global', fontSiz);
    </script>

    <link rel="stylesheet" href="styles.css">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <script>
        // Guardián de Seguridad Estandarizado
        if (!localStorage.getItem('pyp_token_seguro')) {
            window.location.href = 'login.html';
        }

        function cerrarSesion() {
            localStorage.clear(); // Limpieza total por seguridad
            window.location.href = 'login.html';
        }
    </script>

    <style>
        body { font-family: var(--font-global); font-size: var(--size-global); }
        .bg-primary { background-color: var(--color-primary) !important; }
        .text-primary { color: var(--color-primary) !important; }
        .bg-secondary { background-color: var(--color-secondary) !important; }
        .text-secondary { color: var(--color-secondary) !important; }
        .text-tertiary { color: var(--color-tertiary) !important; }
        .border-primary { border-color: var(--color-primary) !important; }

        .btn-press:active { transform: scale(0.95); }
        .custom-scroll::-webkit-scrollbar, .modal-scroll::-webkit-scrollbar { width: 6px; height: 6px; }
        .custom-scroll::-webkit-scrollbar-thumb, .modal-scroll::-webkit-scrollbar-thumb { background-color: var(--color-primary); border-radius: 4px; }
        
        .fade-in { animation: fadeIn 0.2s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-[#f0f2f5] font-sans flex h-screen overflow-hidden text-gray-800">
    <main class="flex-1 flex flex-col h-screen overflow-hidden">
        <header class="bg-white shadow-sm px-6 py-4 flex justify-between items-center z-10 shrink-0">
            <h1 class="text-xl font-bold text-gray-800">Gestor de Banners y Publicidad</h1>
        </header>

        <div class="flex-1 overflow-auto p-4 md:p-6 bg-[#f8f9fa]">
            <div class="max-w-5xl mx-auto space-y-8" id="contenedor-banners">
                <div class="text-center py-10 text-gray-400"><i class="fa-solid fa-spinner fa-spin text-3xl"></i></div>
            </div>
        </div>
    </main>

    <div id="modal-banner" class="fixed inset-0 bg-black/60 z-[100] hidden flex items-center justify-center p-4">
        <div class="bg-white rounded-xl shadow-2xl w-full max-w-lg flex flex-col transform scale-95 transition-transform" id="modal-content">
            <div class="bg-[#143B62] text-white p-4 flex justify-between items-center">
                <h3 class="font-bold text-lg"><i class="fa-solid fa-pen-to-square mr-2"></i> Editar Banner</h3>
                <button onclick="cerrarModal()" class="text-gray-300 hover:text-white text-xl"><i class="fa-solid fa-times"></i></button>
            </div>
            
            <div class="p-6 space-y-4 bg-gray-50">
                <input type="hidden" id="edit-seccion">
                
                <div class="flex justify-center mb-4">
                    <img id="preview-img" src="" class="h-32 object-cover rounded border border-gray-300 shadow-sm w-full max-w-[300px]">
                </div>

                <div>
                    <label class="block text-[10px] font-bold text-gray-500 uppercase mb-1">URL de la Imagen (pega URL o sube desde tu equipo)</label>
                    <div style="display:flex; gap:8px; align-items:stretch;">
                        <input type="text" id="ban-img" oninput="document.getElementById('preview-img').src=this.value" class="flex-1 border border-gray-300 rounded px-3 py-2 text-sm focus:outline-none focus:border-[#E67E22]">
                        <button type="button" id="btn-subir-banner" onclick="document.getElementById('file-banner-img').click()" class="px-4 py-2 bg-[#143B62] text-white font-bold rounded text-xs flex items-center gap-1.5 hover:bg-[#0f2d4a] transition shrink-0 whitespace-nowrap">
                            <i class="fa-solid fa-cloud-arrow-up"></i> Subir
                        </button>
                        <input type="file" id="file-banner-img" accept="image/*" style="display:none;" onchange="subirBannerWebP(event)">
                    </div>
                    <div id="prog-banner" style="height:4px; background:#e5e7eb; border-radius:2px; overflow:hidden; margin-top:6px; display:none;">
                        <div id="prog-banner-bar" style="height:100%; background:#E67E22; width:0%; transition:width .2s;"></div>
                    </div>
                    <p id="prog-banner-info" style="font-size:10px; color:#10b981; margin-top:4px; display:none;"></p>
                </div>
                <div>
                    <label class="block text-[10px] font-bold text-gray-500 uppercase mb-1">Título (Texto Principal)</label>
                    <input type="text" id="ban-titulo" class="w-full border border-gray-300 rounded px-3 py-2 text-sm focus:outline-none focus:border-[#E67E22] font-bold">
                </div>
                <div>
                    <label class="block text-[10px] font-bold text-gray-500 uppercase mb-1">Subtítulo / Texto Secundario</label>
                    <input type="text" id="ban-subtitulo" class="w-full border border-gray-300 rounded px-3 py-2 text-sm focus:outline-none focus:border-[#E67E22]">
                </div>
                <div>
                    <label class="block text-[10px] font-bold text-gray-500 uppercase mb-1">Link de Destino (URL)</label>
                    <input type="text" id="ban-link" placeholder="Ej: https://pypsoluciones.com/?producto=123" class="w-full border border-gray-300 rounded px-3 py-2 text-sm focus:outline-none focus:border-[#E67E22] text-blue-600">
                </div>
            </div>
            
            <div class="p-4 border-t flex gap-3 bg-white rounded-b-xl">
                <button onclick="cerrarModal()" class="flex-1 py-3 bg-gray-100 text-gray-600 font-bold rounded-lg btn-press">Cancelar</button>
                <button onclick="guardarBanner()" class="flex-1 py-3 bg-[#E67E22] text-white font-bold rounded-lg shadow-lg btn-press">Guardar Cambios</button>
            </div>
        </div>
    </div>

    <script>
        let banners = [];

        window.onload = cargarBanners;

        async function cargarBanners() {
            try {
                const res = await fetch(`${SUPABASE_URL}/rest/v1/vitrinas_publicidad?select=*`, { headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${localStorage.getItem('pyp_token_seguro')}` } });
                banners = await res.json();
                dibujarBanners();
            } catch(e) { console.error(e); }
        }

        function dibujarBanners() {
            const cont = document.getElementById('contenedor-banners');
            let html = '';

            // Agrupar visualmente para el admin
            const hero = banners.find(b => b.seccion === 'hero');
            const destPrincipal = banners.find(b => b.seccion === 'destacado_principal');
            const destMinis = banners.filter(b => b.seccion.startsWith('destacado_mini_'));
            const amazons = banners.filter(b => b.seccion.startsWith('amazon_'));

            // 1. Hero
            if(hero) {
                html += `<div class="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
                    <div class="bg-gray-50 px-4 py-2 border-b flex justify-between items-center"><h3 class="font-bold text-sm text-gray-600 uppercase">Banner Principal (Hero)</h3><button onclick="editar('${hero.seccion}')" class="text-blue-600 hover:text-blue-800 text-sm font-bold"><i class="fa-solid fa-pen"></i> Editar</button></div>
                    <div class="flex items-center gap-4 p-4"><img src="${hero.imagen_url}" class="w-32 h-20 object-cover rounded border"><div><p class="font-bold text-lg">${hero.titulo}</p><p class="text-sm text-gray-500">${hero.subtitulo}</p></div></div>
                </div>`;
            }

            // 2. Destacado Grande + 4 Minis
            html += `<h2 class="text-lg font-bold text-[#143B62] mt-8 mb-4 border-l-4 border-[#E67E22] pl-2">Sección: Colecciones (1 Grande, 4 Pequeños)</h2>`;
            if(destPrincipal) {
                html += `<div class="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden mb-4">
                    <div class="bg-gray-50 px-4 py-2 border-b flex justify-between items-center"><h3 class="font-bold text-sm text-gray-600 uppercase">Imagen Grande</h3><button onclick="editar('${destPrincipal.seccion}')" class="text-blue-600 hover:text-blue-800 text-sm font-bold"><i class="fa-solid fa-pen"></i> Editar</button></div>
                    <div class="flex items-center gap-4 p-4"><img src="${destPrincipal.imagen_url}" class="w-32 h-20 object-cover rounded border"><div><p class="font-bold text-lg">${destPrincipal.titulo}</p></div></div>
                </div>`;
            }
            
            html += `<div class="grid grid-cols-2 md:grid-cols-4 gap-4">`;
            destMinis.forEach(m => {
                html += `<div class="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden flex flex-col">
                    <div class="bg-gray-50 px-3 py-2 border-b flex justify-between items-center"><span class="text-xs font-bold text-gray-500">Miniatura</span><button onclick="editar('${m.seccion}')" class="text-blue-600"><i class="fa-solid fa-pen"></i></button></div>
                    <div class="p-3 flex-1 flex flex-col items-center text-center"><img src="${m.imagen_url}" class="w-full h-20 object-cover rounded mb-2"><p class="font-bold text-sm">${m.titulo}</p></div>
                </div>`;
            });
            html += `</div>`;

            // 3. Amazon Style
            html += `<h2 class="text-lg font-bold text-[#143B62] mt-8 mb-4 border-l-4 border-[#143B62] pl-2">Sección: Categorías (3 Banners Medianos)</h2>`;
            html += `<div class="grid grid-cols-1 md:grid-cols-3 gap-4">`;
            amazons.forEach(a => {
                html += `<div class="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden flex flex-col">
                    <div class="bg-gray-50 px-3 py-2 border-b flex justify-between items-center"><span class="text-xs font-bold text-gray-500">Banner Categoría</span><button onclick="editar('${a.seccion}')" class="text-blue-600"><i class="fa-solid fa-pen"></i></button></div>
                    <div class="p-4 flex-1 flex flex-col items-start"><img src="${a.imagen_url}" class="w-full h-24 object-cover rounded mb-3"><p class="font-bold text-md">${a.titulo}</p><p class="text-xs text-blue-600">${a.subtitulo}</p></div>
                </div>`;
            });
            html += `</div>`;

            cont.innerHTML = html;
        }

        function editar(seccion) {
            const ban = banners.find(b => b.seccion === seccion);
            document.getElementById('edit-seccion').value = ban.seccion;
            document.getElementById('ban-img').value = ban.imagen_url;
            document.getElementById('preview-img').src = ban.imagen_url;
            document.getElementById('ban-titulo').value = ban.titulo || '';
            document.getElementById('ban-subtitulo').value = ban.subtitulo || '';
            document.getElementById('ban-link').value = ban.link_url || '';
            
            // Limpiar estado del progress (por si quedó de un upload anterior)
            const prog = document.getElementById('prog-banner');
            const progInfo = document.getElementById('prog-banner-info');
            if (prog) prog.style.display = 'none';
            if (progInfo) progInfo.style.display = 'none';

            document.getElementById('modal-banner').classList.remove('hidden');
            setTimeout(() => document.getElementById('modal-content').classList.replace('scale-95', 'scale-100'), 10);
        }

        function cerrarModal() {
            document.getElementById('modal-content').classList.replace('scale-100', 'scale-95');
            setTimeout(() => document.getElementById('modal-banner').classList.add('hidden'), 150);
        }

        async function guardarBanner() {
            const seccion = document.getElementById('edit-seccion').value;
            const data = {
                imagen_url: document.getElementById('ban-img').value,
                titulo: document.getElementById('ban-titulo').value,
                subtitulo: document.getElementById('ban-subtitulo').value,
                link_url: document.getElementById('ban-link').value
            };

            const btn = document.querySelector('button[onclick="guardarBanner()"]');
            btn.innerHTML = `<i class="fa-solid fa-spinner fa-spin"></i> Guardando...`;

            try {
                await fetch(`${SUPABASE_URL}/rest/v1/vitrinas_publicidad?seccion=eq.${seccion}`, {
                    method: 'PATCH',
                    headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${localStorage.getItem('pyp_token_seguro')}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                cerrarModal();
                await cargarBanners();
            } catch (e) {
                alert("Error al guardar.");
            } finally {
                btn.innerHTML = `Guardar Cambios`;
            }
        }
        
        // ============================================
        // SUBIDA DE IMÁGENES CON COMPRESIÓN WEBP
        // ============================================
        // Convierte un File de imagen a Blob WebP comprimido
        function comprimirAWebP(file, maxWidth = 1600, quality = 0.85) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const img = new Image();
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        let { width, height } = img;
                        // Reducir si excede maxWidth
                        if (width > maxWidth) {
                            height = Math.round(height * (maxWidth / width));
                            width = maxWidth;
                        }
                        canvas.width = width;
                        canvas.height = height;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, width, height);
                        canvas.toBlob(blob => {
                            if (blob) resolve(blob);
                            else reject(new Error('No se pudo generar el blob WebP'));
                        }, 'image/webp', quality);
                    };
                    img.onerror = () => reject(new Error('Imagen inválida'));
                    img.src = e.target.result;
                };
                reader.onerror = () => reject(new Error('No se pudo leer el archivo'));
                reader.readAsDataURL(file);
            });
        }
        
        async function subirBannerWebP(event) {
            const file = event.target.files[0];
            if (!file) return;
            
            // Validaciones
            if (!file.type.startsWith('image/')) {
                alert('Por favor selecciona un archivo de imagen.');
                return;
            }
            if (file.size > 10 * 1024 * 1024) {
                alert('La imagen es demasiado grande. Máximo 10 MB.');
                return;
            }
            
            const btn = document.getElementById('btn-subir-banner');
            const prog = document.getElementById('prog-banner');
            const progBar = document.getElementById('prog-banner-bar');
            const progInfo = document.getElementById('prog-banner-info');
            const inputUrl = document.getElementById('ban-img');
            const previewImg = document.getElementById('preview-img');
            const seccion = document.getElementById('edit-seccion').value || 'banner';
            
            const btnOriginal = btn.innerHTML;
            btn.disabled = true;
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Procesando...';
            prog.style.display = 'block';
            progBar.style.width = '15%';
            progInfo.style.display = 'none';
            
            try {
                // 1. Convertir a WebP comprimido (banners pueden ser más grandes: 1600px y mejor calidad)
                const blobWebP = await comprimirAWebP(file, 1600, 0.85);
                progBar.style.width = '40%';
                btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Subiendo...';
                
                // 2. Subir a Supabase Storage (bucket "inventario")
                const nombreArchivo = `banner_${seccion}_${Date.now()}.webp`;
                const path = `inventario/${nombreArchivo}`;
                
                const TOKEN = localStorage.getItem('pyp_token_seguro');
                const uploadRes = await fetch(`${SUPABASE_URL}/storage/v1/object/${path}`, {
                    method: 'POST',
                    headers: {
                        'apikey': SUPABASE_KEY,
                        'Authorization': `Bearer ${TOKEN}`,
                        'Content-Type': 'image/webp',
                        'x-upsert': 'true'
                    },
                    body: blobWebP
                });
                
                progBar.style.width = '85%';
                
                if (!uploadRes.ok) {
                    const errText = await uploadRes.text();
                    throw new Error(`Error al subir: ${uploadRes.status} - ${errText.substring(0, 100)}`);
                }
                
                // 3. Construir URL pública y poner en el input
                const urlPublica = `${SUPABASE_URL}/storage/v1/object/public/${path}`;
                inputUrl.value = urlPublica;
                previewImg.src = urlPublica;
                
                // Mostrar info de la compresión
                const kbOriginal = (file.size / 1024).toFixed(1);
                const kbWebP = (blobWebP.size / 1024).toFixed(1);
                const reduccion = ((1 - blobWebP.size / file.size) * 100).toFixed(0);
                progInfo.innerHTML = `<i class="fa-solid fa-check-circle"></i> Subido: ${kbWebP} KB · ${reduccion}% más liviana que el original (${kbOriginal} KB)`;
                progInfo.style.display = 'block';
                
                progBar.style.width = '100%';
                setTimeout(() => { prog.style.display = 'none'; progBar.style.width = '0%'; }, 800);
                
            } catch (err) {
                console.error('Error subida banner:', err);
                alert('Error al subir la imagen: ' + err.message);
                prog.style.display = 'none';
                progBar.style.width = '0%';
            } finally {
                btn.disabled = false;
                btn.innerHTML = btnOriginal;
                event.target.value = ''; // Limpiar input file para permitir re-subir el mismo archivo
            }
        }
        
        // Limpiar info de progreso al abrir modal
        const _editarOriginal = window.editar;
        // No sobreescribimos editar(), solo aseguramos que se limpie en cerrarModal
        const _cerrarModalOrig = window.cerrarModal;
    </script>
    <script src="menu.js"></script>
</body>
</html>
