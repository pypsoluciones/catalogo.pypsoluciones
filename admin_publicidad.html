<!DOCTYPE html>
<html lang="es">
<head>
    <!-- Configuración central P&P (cargada antes de cualquier otro script) -->
    <script src="config.js"></script>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin | Publicidad P&P</title>

    <script>
        const cPri = localStorage.getItem('pyp_color_primario') || '#143B62';
        const cSec = localStorage.getItem('pyp_color_secundario') || '#E67E22';
        const cTer = localStorage.getItem('pyp_color_terciario') || '#64748b';
        const fontFam = localStorage.getItem('pyp_fuente') || "'Inter', sans-serif";
        const fontSiz = localStorage.getItem('pyp_tamano') || "14px";
        
        // Inyectamos variables CSS (Motor Marca Blanca)
        document.documentElement.style.setProperty('--color-primary', cPri);
        document.documentElement.style.setProperty('--color-secondary', cSec);
        document.documentElement.style.setProperty('--color-tertiary', cTer);
        document.documentElement.style.setProperty('--font-global', fontFam);
        document.documentElement.style.setProperty('--size-global', fontSiz);
    </script>

    <link rel="stylesheet" href="styles.css">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <script>
        // Guardián de Seguridad Estandarizado
        if (!localStorage.getItem('pyp_token_seguro')) {
            window.location.href = 'login.html';
        }

        function cerrarSesion() {
            localStorage.clear(); // Limpieza total por seguridad
            window.location.href = 'login.html';
        }
    </script>

    <style>
        body { font-family: var(--font-global); font-size: var(--size-global); }
        .bg-primary { background-color: var(--color-primary) !important; }
        .text-primary { color: var(--color-primary) !important; }
        .bg-secondary { background-color: var(--color-secondary) !important; }
        .text-secondary { color: var(--color-secondary) !important; }
        .text-tertiary { color: var(--color-tertiary) !important; }
        .border-primary { border-color: var(--color-primary) !important; }

        .btn-press:active { transform: scale(0.95); }
        .custom-scroll::-webkit-scrollbar, .modal-scroll::-webkit-scrollbar { width: 6px; height: 6px; }
        .custom-scroll::-webkit-scrollbar-thumb, .modal-scroll::-webkit-scrollbar-thumb { background-color: var(--color-primary); border-radius: 4px; }
        
        .fade-in { animation: fadeIn 0.2s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-[#f0f2f5] font-sans flex h-screen overflow-hidden text-gray-800">
    <main class="flex-1 flex flex-col h-screen overflow-hidden">
        <header class="bg-white shadow-sm px-6 py-4 flex justify-between items-center z-10 shrink-0">
            <h1 class="text-xl font-bold text-gray-800">Gestor de Banners y Publicidad</h1>
        </header>

        <div class="flex-1 overflow-auto p-4 md:p-6 bg-[#f8f9fa]">
            <div class="max-w-5xl mx-auto space-y-8" id="contenedor-banners">
                <div class="text-center py-10 text-gray-400"><i class="fa-solid fa-spinner fa-spin text-3xl"></i></div>
            </div>
        </div>
    </main>

    <div id="modal-banner" class="fixed inset-0 bg-black/60 z-[100] hidden flex items-center justify-center p-4">
        <div class="bg-white rounded-xl shadow-2xl w-full max-w-lg flex flex-col transform scale-95 transition-transform" id="modal-content">
            <div class="bg-[#143B62] text-white p-4 flex justify-between items-center">
                <h3 class="font-bold text-lg"><i class="fa-solid fa-pen-to-square mr-2"></i> Editar Banner</h3>
                <button onclick="cerrarModal()" class="text-gray-300 hover:text-white text-xl"><i class="fa-solid fa-times"></i></button>
            </div>
            
            <div class="p-6 space-y-4 bg-gray-50">
                <input type="hidden" id="edit-seccion">
                
                <!-- Bloque de info técnica del banner que se está editando -->
                <div id="modal-info-tecnica" class="bg-blue-50 border-l-4 border-blue-500 p-3 rounded-r text-xs text-gray-700">
                    <!-- Se llena dinámicamente al abrir el modal -->
                </div>
                
                <div class="flex justify-center mb-4">
                    <img id="preview-img" src="" class="h-32 object-cover rounded border border-gray-300 shadow-sm w-full max-w-[300px]">
                </div>

                <div>
                    <label class="block text-[10px] font-bold text-gray-500 uppercase mb-1">URL de la Imagen (pega URL o sube desde tu equipo)</label>
                    <div style="display:flex; gap:8px; align-items:stretch;">
                        <input type="text" id="ban-img" oninput="document.getElementById('preview-img').src=this.value" class="flex-1 border border-gray-300 rounded px-3 py-2 text-sm focus:outline-none focus:border-[#E67E22]">
                        <button type="button" id="btn-subir-banner" onclick="document.getElementById('file-banner-img').click()" class="px-4 py-2 bg-[#143B62] text-white font-bold rounded text-xs flex items-center gap-1.5 hover:bg-[#0f2d4a] transition shrink-0 whitespace-nowrap">
                            <i class="fa-solid fa-cloud-arrow-up"></i> Subir
                        </button>
                        <input type="file" id="file-banner-img" accept="image/*" style="display:none;" onchange="subirBannerWebP(event)">
                    </div>
                    <div id="prog-banner" style="height:4px; background:#e5e7eb; border-radius:2px; overflow:hidden; margin-top:6px; display:none;">
                        <div id="prog-banner-bar" style="height:100%; background:#E67E22; width:0%; transition:width .2s;"></div>
                    </div>
                    <p id="prog-banner-info" style="font-size:10px; color:#10b981; margin-top:4px; display:none;"></p>
                </div>
                <div>
                    <label class="block text-[10px] font-bold text-gray-500 uppercase mb-1">Título (Texto Principal)</label>
                    <input type="text" id="ban-titulo" class="w-full border border-gray-300 rounded px-3 py-2 text-sm focus:outline-none focus:border-[#E67E22] font-bold">
                </div>
                <div>
                    <label class="block text-[10px] font-bold text-gray-500 uppercase mb-1">Subtítulo / Texto Secundario</label>
                    <input type="text" id="ban-subtitulo" class="w-full border border-gray-300 rounded px-3 py-2 text-sm focus:outline-none focus:border-[#E67E22]">
                </div>
                <div>
                    <label class="block text-[10px] font-bold text-gray-500 uppercase mb-1">Link de Destino (URL)</label>
                    <input type="text" id="ban-link" placeholder="Ej: https://pypsoluciones.com/?producto=123" class="w-full border border-gray-300 rounded px-3 py-2 text-sm focus:outline-none focus:border-[#E67E22] text-blue-600">
                </div>
            </div>
            
            <div class="p-4 border-t flex gap-3 bg-white rounded-b-xl">
                <button onclick="cerrarModal()" class="flex-1 py-3 bg-gray-100 text-gray-600 font-bold rounded-lg btn-press">Cancelar</button>
                <button onclick="guardarBanner()" class="flex-1 py-3 bg-[#E67E22] text-white font-bold rounded-lg shadow-lg btn-press">Guardar Cambios</button>
            </div>
        </div>
    </div>

    <script>
        let banners = [];

        // ============================================
        // GUÍA TÉCNICA DE CADA BANNER
        // Aquí están las dimensiones exactas, qué se ve en cada lugar y consejos.
        // Esta info se muestra al usuario en cada tarjeta del admin.
        // ============================================
        const GUIA_BANNERS = {
            hero: {
                titulo: 'Banner Principal (Hero)',
                ubicacion: 'Aparece arriba del catálogo, ocupa todo el ancho. Es lo primero que ve el visitante.',
                dimension: '1600 × 480 px',
                aspectRatio: '10:3 (extra panorámico)',
                pesoMaximo: '350 KB',
                consejos: [
                    'Texto importante en el centro o izquierda',
                    'Evita texto en los bordes (se cortan en móvil)',
                    'Usa una imagen impactante con poco texto',
                    'Alta resolución porque es la imagen más grande del sitio'
                ],
                color: '#143B62'
            },
            destacado_principal: {
                titulo: 'Destacado Principal (Imagen Grande)',
                ubicacion: 'Ocupa la mitad izquierda de la fila de promociones. Se acompaña de 4 mini-banners a la derecha.',
                dimension: '1200 × 480 px',
                aspectRatio: '5:2 (panorámico)',
                pesoMaximo: '250 KB',
                consejos: [
                    'Idealmente con una persona/producto destacado',
                    'Usa colores que contrasten con el fondo blanco del catálogo',
                    'NO incluyas texto pequeño (no se lee)',
                    'Esta imagen NO tiene overlay de texto, así que el texto del mensaje debe estar dentro de la imagen'
                ],
                color: '#E67E22'
            },
            destacado_mini: {
                titulo: 'Mini-Destacados (4 banners pequeños)',
                ubicacion: 'Aparecen al lado del destacado principal, en grilla 2×2. Tienen overlay con texto encima.',
                dimension: '600 × 500 px',
                aspectRatio: '6:5 (casi cuadrado)',
                pesoMaximo: '150 KB',
                consejos: [
                    'NO pongas texto en la imagen (el sistema agrega el título sobre un degradado oscuro)',
                    'Usa una imagen con elemento principal centrado',
                    'Los bordes inferiores se oscurecen automáticamente para que el texto sea legible',
                    'Funcionan bien con fondos claros o coloridos'
                ],
                color: '#10b981'
            },
            amazon: {
                titulo: 'Banners Categoría (3 medianos)',
                ubicacion: 'Aparecen debajo de los destacados, en una fila horizontal de 3. Tienen una banda de texto debajo (no encima).',
                dimension: '700 × 500 px',
                aspectRatio: '7:5 (paisaje suave)',
                pesoMaximo: '180 KB',
                consejos: [
                    'El texto del título y subtítulo va en una banda BLANCA debajo de la imagen',
                    'Usa imágenes con contenido centrado',
                    'Funcionan bien con escenas o productos en uso',
                    'Estilo similar a las categorías de Amazon'
                ],
                color: '#3b82f6'
            }
        };
        
        // Genera una imagen SVG de muestra con las dimensiones del banner.
        // Útil para que el admin vea cómo se verá un banner antes de subir el real.
        function placeholderSVG(width, height, label, color = '#143B62') {
            const svg = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 ${width} ${height}" preserveAspectRatio="xMidYMid slice">
                <defs>
                    <pattern id="grid-${width}-${height}" width="40" height="40" patternUnits="userSpaceOnUse">
                        <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
                    </pattern>
                    <linearGradient id="grad-${width}-${height}" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" stop-color="${color}" stop-opacity="0.95"/>
                        <stop offset="100%" stop-color="${color}" stop-opacity="0.65"/>
                    </linearGradient>
                </defs>
                <rect width="${width}" height="${height}" fill="url(#grad-${width}-${height})"/>
                <rect width="${width}" height="${height}" fill="url(#grid-${width}-${height})"/>
                <text x="50%" y="46%" font-family="system-ui, sans-serif" font-size="${Math.min(width, height) * 0.08}" fill="white" text-anchor="middle" font-weight="700" opacity="0.95">${label}</text>
                <text x="50%" y="60%" font-family="system-ui, sans-serif" font-size="${Math.min(width, height) * 0.045}" fill="white" text-anchor="middle" opacity="0.75">${width} × ${height} px</text>
                <text x="50%" y="${height - 20}" font-family="system-ui, sans-serif" font-size="${Math.min(width, height) * 0.035}" fill="white" text-anchor="middle" opacity="0.55">Imagen de muestra · Reemplaza con tu imagen</text>
            </svg>`;
            return 'data:image/svg+xml;utf8,' + encodeURIComponent(svg);
        }

        window.onload = cargarBanners;

        async function cargarBanners() {
            try {
                const res = await fetch(`${SUPABASE_URL}/rest/v1/vitrinas_publicidad?select=*`, { headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${localStorage.getItem('pyp_token_seguro')}` } });
                banners = await res.json();
                dibujarBanners();
            } catch(e) { console.error(e); }
        }

        // Bloque de info técnica que se muestra en cada banner del admin
        function bloqueInfo(guia) {
            const consejosHtml = guia.consejos.map(c => `<li class="flex items-start gap-1.5"><i class="fa-solid fa-check text-green-600 mt-0.5 text-[10px]"></i><span>${c}</span></li>`).join('');
            return `<div class="bg-blue-50 border-l-4 border-blue-400 p-3 mt-3 rounded-r text-[11px] text-gray-700 leading-relaxed">
                <div class="flex flex-wrap gap-x-4 gap-y-1 mb-2 font-semibold">
                    <span><i class="fa-solid fa-ruler-combined text-blue-600 mr-1"></i> <strong class="text-blue-900">Dimensión:</strong> ${guia.dimension}</span>
                    <span><i class="fa-solid fa-image text-blue-600 mr-1"></i> <strong class="text-blue-900">Proporción:</strong> ${guia.aspectRatio}</span>
                    <span><i class="fa-solid fa-weight-hanging text-blue-600 mr-1"></i> <strong class="text-blue-900">Peso máx:</strong> ${guia.pesoMaximo}</span>
                </div>
                <p class="text-gray-600 mb-2 italic">${guia.ubicacion}</p>
                <ul class="space-y-1 text-gray-700">${consejosHtml}</ul>
            </div>`;
        }
        
        // Verifica si un banner tiene imagen real o está vacío (entonces muestra placeholder)
        function urlImagenOPlaceholder(banner, w, h, label, color) {
            const url = (banner && banner.imagen_url || '').trim();
            if (url && url !== '#' && /^(https?:|data:)/i.test(url)) return url;
            return placeholderSVG(w, h, label, color);
        }

        function dibujarBanners() {
            const cont = document.getElementById('contenedor-banners');
            let html = '';

            // Agrupar visualmente para el admin
            const hero = banners.find(b => b.seccion === 'hero');
            const destPrincipal = banners.find(b => b.seccion === 'destacado_principal');
            const destMinis = banners.filter(b => b.seccion.startsWith('destacado_mini_')).sort((a,b) => a.seccion.localeCompare(b.seccion));
            const amazons = banners.filter(b => b.seccion.startsWith('amazon_')).sort((a,b) => a.seccion.localeCompare(b.seccion));

            // ====================================================
            // BLOQUE INTRODUCTORIO: explicación general
            // ====================================================
            html += `<div class="bg-gradient-to-r from-[#143B62] to-[#1e5491] text-white rounded-xl shadow-lg p-5 mb-6">
                <h2 class="text-xl font-bold mb-2 flex items-center gap-2"><i class="fa-solid fa-circle-info"></i> Guía Rápida de Banners</h2>
                <p class="text-sm text-blue-100 mb-3">Cada banner tiene una ubicación específica en tu catálogo y dimensiones óptimas. Sigue las recomendaciones de cada sección para que tus imágenes se vean profesionales sin recortes ni distorsiones.</p>
                <div class="grid grid-cols-2 md:grid-cols-4 gap-3 text-xs">
                    <div class="bg-white/10 rounded p-2"><strong>1 Hero</strong><div class="text-blue-200">Principal arriba</div></div>
                    <div class="bg-white/10 rounded p-2"><strong>1 Destacado</strong><div class="text-blue-200">Promo grande</div></div>
                    <div class="bg-white/10 rounded p-2"><strong>4 Mini</strong><div class="text-blue-200">Mini-banners</div></div>
                    <div class="bg-white/10 rounded p-2"><strong>3 Amazon</strong><div class="text-blue-200">Categorías</div></div>
                </div>
            </div>`;

            // ====================================================
            // 1. BANNER HERO
            // ====================================================
            const guiaHero = GUIA_BANNERS.hero;
            const heroImg = hero ? urlImagenOPlaceholder(hero, 1600, 480, 'BANNER HERO', guiaHero.color) : placeholderSVG(1600, 480, 'BANNER HERO (sin configurar)', guiaHero.color);
            const heroBtn = hero 
                ? `<button onclick="editar('${hero.seccion}')" class="text-white bg-[#E67E22] hover:bg-[#d96e0f] px-3 py-1.5 rounded text-xs font-bold transition"><i class="fa-solid fa-pen mr-1"></i> Editar</button>`
                : `<span class="text-orange-600 text-xs font-bold"><i class="fa-solid fa-triangle-exclamation"></i> Sin configurar</span>`;
            html += `<div class="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden mb-6">
                <div class="bg-gradient-to-r from-blue-50 to-indigo-50 px-4 py-3 border-b flex justify-between items-center">
                    <h3 class="font-bold text-sm text-[#143B62]"><i class="fa-solid fa-rectangle-ad mr-2"></i> ${guiaHero.titulo}</h3>
                    ${heroBtn}
                </div>
                <div class="p-4">
                    <div class="rounded-lg overflow-hidden border border-gray-200" style="aspect-ratio: 10/3; background: #f3f4f6;">
                        <img src="${heroImg}" class="w-full h-full object-cover block">
                    </div>
                    ${hero && hero.titulo ? `<div class="mt-3 text-sm"><strong class="text-gray-800">${hero.titulo || ''}</strong> <span class="text-gray-500">— ${hero.subtitulo || ''}</span></div>` : ''}
                    ${bloqueInfo(guiaHero)}
                </div>
            </div>`;

            // ====================================================
            // 2. DESTACADO PRINCIPAL + 4 MINI
            // ====================================================
            html += `<h2 class="text-base font-bold text-[#143B62] mt-8 mb-3 border-l-4 border-[#E67E22] pl-3 flex items-center gap-2"><i class="fa-solid fa-star text-[#E67E22]"></i> Sección: Destacados (1 grande + 4 pequeños)</h2>`;
            
            // Destacado Principal
            const guiaDP = GUIA_BANNERS.destacado_principal;
            const dpImg = destPrincipal ? urlImagenOPlaceholder(destPrincipal, 1200, 480, 'DESTACADO PRINCIPAL', guiaDP.color) : placeholderSVG(1200, 480, 'DESTACADO PRINCIPAL (sin configurar)', guiaDP.color);
            const dpBtn = destPrincipal 
                ? `<button onclick="editar('${destPrincipal.seccion}')" class="text-white bg-[#E67E22] hover:bg-[#d96e0f] px-3 py-1.5 rounded text-xs font-bold transition"><i class="fa-solid fa-pen mr-1"></i> Editar</button>`
                : `<span class="text-orange-600 text-xs font-bold"><i class="fa-solid fa-triangle-exclamation"></i> Sin configurar</span>`;
            html += `<div class="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden mb-4">
                <div class="bg-gradient-to-r from-orange-50 to-amber-50 px-4 py-3 border-b flex justify-between items-center">
                    <h3 class="font-bold text-sm text-[#E67E22]"><i class="fa-solid fa-image mr-2"></i> ${guiaDP.titulo}</h3>
                    ${dpBtn}
                </div>
                <div class="p-4">
                    <div class="rounded-lg overflow-hidden border border-gray-200" style="aspect-ratio: 5/2; background: #f3f4f6;">
                        <img src="${dpImg}" class="w-full h-full object-cover block">
                    </div>
                    ${destPrincipal && destPrincipal.titulo ? `<div class="mt-3 text-sm"><strong class="text-gray-800">${destPrincipal.titulo}</strong></div>` : ''}
                    ${bloqueInfo(guiaDP)}
                </div>
            </div>`;
            
            // 4 Mini-banners
            const guiaMini = GUIA_BANNERS.destacado_mini;
            html += `<div class="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden mb-4">
                <div class="bg-gradient-to-r from-green-50 to-emerald-50 px-4 py-3 border-b">
                    <h3 class="font-bold text-sm text-green-700"><i class="fa-solid fa-th-large mr-2"></i> ${guiaMini.titulo}</h3>
                </div>
                <div class="p-4">
                    <div class="grid grid-cols-2 md:grid-cols-4 gap-3">`;
            for (let i = 1; i <= 4; i++) {
                const banner = destMinis.find(m => m.seccion === `destacado_mini_${i}`);
                const img = banner ? urlImagenOPlaceholder(banner, 600, 500, `MINI ${i}`, guiaMini.color) : placeholderSVG(600, 500, `MINI ${i} (sin configurar)`, guiaMini.color);
                const btn = banner 
                    ? `<button onclick="editar('${banner.seccion}')" class="absolute top-2 right-2 bg-white shadow text-[#E67E22] hover:bg-[#E67E22] hover:text-white p-1.5 rounded transition text-xs" title="Editar"><i class="fa-solid fa-pen"></i></button>`
                    : `<span class="absolute top-2 right-2 bg-orange-100 text-orange-700 px-1.5 py-0.5 rounded text-[9px] font-bold">VACÍO</span>`;
                const titulo = banner && banner.titulo ? banner.titulo : `Mini ${i}`;
                html += `<div class="relative">
                    <div class="rounded-lg overflow-hidden border border-gray-200 relative" style="aspect-ratio: 6/5; background: #f3f4f6;">
                        <img src="${img}" class="w-full h-full object-cover block">
                        <!-- Simulación del overlay de texto que aparece en el catálogo público -->
                        <div class="absolute bottom-0 left-0 right-0 px-2 py-2 text-white text-xs font-bold" style="background: linear-gradient(to top, rgba(0,0,0,0.75), transparent);">${titulo}</div>
                        ${btn}
                    </div>
                </div>`;
            }
            html += `</div>${bloqueInfo(guiaMini)}</div></div>`;

            // ====================================================
            // 3. AMAZON STYLE (3 banners categoría)
            // ====================================================
            const guiaAmz = GUIA_BANNERS.amazon;
            html += `<h2 class="text-base font-bold text-[#143B62] mt-8 mb-3 border-l-4 border-blue-500 pl-3 flex items-center gap-2"><i class="fa-solid fa-tags text-blue-500"></i> Sección: Categorías Visuales (3 banners estilo Amazon)</h2>`;
            html += `<div class="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden mb-4">
                <div class="bg-gradient-to-r from-blue-50 to-cyan-50 px-4 py-3 border-b">
                    <h3 class="font-bold text-sm text-blue-700"><i class="fa-solid fa-store mr-2"></i> ${guiaAmz.titulo}</h3>
                </div>
                <div class="p-4">
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-4">`;
            for (let i = 1; i <= 3; i++) {
                const banner = amazons.find(a => a.seccion === `amazon_${i}`);
                const img = banner ? urlImagenOPlaceholder(banner, 700, 500, `AMAZON ${i}`, guiaAmz.color) : placeholderSVG(700, 500, `AMAZON ${i} (sin configurar)`, guiaAmz.color);
                const btn = banner 
                    ? `<button onclick="editar('${banner.seccion}')" class="bg-[#E67E22] hover:bg-[#d96e0f] text-white px-3 py-1 rounded text-xs font-bold transition"><i class="fa-solid fa-pen mr-1"></i> Editar</button>`
                    : `<span class="bg-orange-100 text-orange-700 px-2 py-1 rounded text-[10px] font-bold">VACÍO</span>`;
                const titulo = banner && banner.titulo ? banner.titulo : `Amazon ${i}`;
                const subtitulo = banner && banner.subtitulo ? banner.subtitulo : 'Ver más';
                html += `<div class="border border-gray-200 rounded-lg overflow-hidden bg-white">
                    <div style="aspect-ratio: 7/5; background: #f3f4f6; overflow: hidden;">
                        <img src="${img}" class="w-full h-full object-cover block">
                    </div>
                    <div class="p-3 flex items-start justify-between gap-2">
                        <div class="flex-1 min-w-0">
                            <p class="font-bold text-sm text-gray-800 truncate">${titulo}</p>
                            <p class="text-xs text-[#E67E22] font-semibold truncate">${subtitulo} <i class="fa-solid fa-chevron-right text-[8px]"></i></p>
                        </div>
                        ${btn}
                    </div>
                </div>`;
            }
            html += `</div>${bloqueInfo(guiaAmz)}</div></div>`;

            cont.innerHTML = html;
        }

        function editar(seccion) {
            const ban = banners.find(b => b.seccion === seccion);
            document.getElementById('edit-seccion').value = ban.seccion;
            document.getElementById('ban-img').value = ban.imagen_url;
            document.getElementById('preview-img').src = ban.imagen_url;
            document.getElementById('ban-titulo').value = ban.titulo || '';
            document.getElementById('ban-subtitulo').value = ban.subtitulo || '';
            document.getElementById('ban-link').value = ban.link_url || '';
            
            // Llenar el bloque de info técnica según el tipo de banner
            let guia;
            if (seccion === 'hero') guia = GUIA_BANNERS.hero;
            else if (seccion === 'destacado_principal') guia = GUIA_BANNERS.destacado_principal;
            else if (seccion.startsWith('destacado_mini_')) guia = GUIA_BANNERS.destacado_mini;
            else if (seccion.startsWith('amazon_')) guia = GUIA_BANNERS.amazon;
            
            const infoBox = document.getElementById('modal-info-tecnica');
            if (guia && infoBox) {
                infoBox.innerHTML = `
                    <div class="font-bold text-blue-900 mb-1.5"><i class="fa-solid fa-circle-info mr-1"></i> Editando: ${guia.titulo}</div>
                    <div class="grid grid-cols-3 gap-2 text-[11px] mb-2">
                        <div class="bg-white rounded px-2 py-1.5"><strong class="text-blue-700 block text-[9px] uppercase">Dimensión</strong><span class="font-bold">${guia.dimension}</span></div>
                        <div class="bg-white rounded px-2 py-1.5"><strong class="text-blue-700 block text-[9px] uppercase">Proporción</strong><span class="font-bold">${guia.aspectRatio}</span></div>
                        <div class="bg-white rounded px-2 py-1.5"><strong class="text-blue-700 block text-[9px] uppercase">Peso máx</strong><span class="font-bold">${guia.pesoMaximo}</span></div>
                    </div>
                    <p class="text-[10px] text-gray-600 italic">${guia.ubicacion}</p>`;
            }
            
            // Limpiar estado del progress (por si quedó de un upload anterior)
            const prog = document.getElementById('prog-banner');
            const progInfo = document.getElementById('prog-banner-info');
            if (prog) prog.style.display = 'none';
            if (progInfo) progInfo.style.display = 'none';

            document.getElementById('modal-banner').classList.remove('hidden');
            setTimeout(() => document.getElementById('modal-content').classList.replace('scale-95', 'scale-100'), 10);
        }

        function cerrarModal() {
            document.getElementById('modal-content').classList.replace('scale-100', 'scale-95');
            setTimeout(() => document.getElementById('modal-banner').classList.add('hidden'), 150);
        }

        async function guardarBanner() {
            const seccion = document.getElementById('edit-seccion').value;
            const data = {
                imagen_url: document.getElementById('ban-img').value,
                titulo: document.getElementById('ban-titulo').value,
                subtitulo: document.getElementById('ban-subtitulo').value,
                link_url: document.getElementById('ban-link').value
            };

            const btn = document.querySelector('button[onclick="guardarBanner()"]');
            btn.innerHTML = `<i class="fa-solid fa-spinner fa-spin"></i> Guardando...`;

            try {
                await fetch(`${SUPABASE_URL}/rest/v1/vitrinas_publicidad?seccion=eq.${seccion}`, {
                    method: 'PATCH',
                    headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${localStorage.getItem('pyp_token_seguro')}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                cerrarModal();
                await cargarBanners();
            } catch (e) {
                alert("Error al guardar.");
            } finally {
                btn.innerHTML = `Guardar Cambios`;
            }
        }
        
        // ============================================
        // SUBIDA DE IMÁGENES CON COMPRESIÓN WEBP
        // ============================================
        // Convierte un File de imagen a Blob WebP comprimido
        function comprimirAWebP(file, maxWidth = 1600, quality = 0.85) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const img = new Image();
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        let { width, height } = img;
                        // Reducir si excede maxWidth
                        if (width > maxWidth) {
                            height = Math.round(height * (maxWidth / width));
                            width = maxWidth;
                        }
                        canvas.width = width;
                        canvas.height = height;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, width, height);
                        canvas.toBlob(blob => {
                            if (blob) resolve(blob);
                            else reject(new Error('No se pudo generar el blob WebP'));
                        }, 'image/webp', quality);
                    };
                    img.onerror = () => reject(new Error('Imagen inválida'));
                    img.src = e.target.result;
                };
                reader.onerror = () => reject(new Error('No se pudo leer el archivo'));
                reader.readAsDataURL(file);
            });
        }
        
        async function subirBannerWebP(event) {
            const file = event.target.files[0];
            if (!file) return;
            
            // Validaciones
            if (!file.type.startsWith('image/')) {
                alert('Por favor selecciona un archivo de imagen.');
                return;
            }
            if (file.size > 10 * 1024 * 1024) {
                alert('La imagen es demasiado grande. Máximo 10 MB.');
                return;
            }
            
            const btn = document.getElementById('btn-subir-banner');
            const prog = document.getElementById('prog-banner');
            const progBar = document.getElementById('prog-banner-bar');
            const progInfo = document.getElementById('prog-banner-info');
            const inputUrl = document.getElementById('ban-img');
            const previewImg = document.getElementById('preview-img');
            const seccion = document.getElementById('edit-seccion').value || 'banner';
            
            const btnOriginal = btn.innerHTML;
            btn.disabled = true;
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Procesando...';
            prog.style.display = 'block';
            progBar.style.width = '15%';
            progInfo.style.display = 'none';
            
            try {
                // 1. Convertir a WebP comprimido (banners pueden ser más grandes: 1600px y mejor calidad)
                const blobWebP = await comprimirAWebP(file, 1600, 0.85);
                progBar.style.width = '40%';
                btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Subiendo...';
                
                // 2. Subir a Supabase Storage (bucket "inventario")
                const nombreArchivo = `banner_${seccion}_${Date.now()}.webp`;
                const path = `inventario/${nombreArchivo}`;
                
                const TOKEN = localStorage.getItem('pyp_token_seguro');
                const uploadRes = await fetch(`${SUPABASE_URL}/storage/v1/object/${path}`, {
                    method: 'POST',
                    headers: {
                        'apikey': SUPABASE_KEY,
                        'Authorization': `Bearer ${TOKEN}`,
                        'Content-Type': 'image/webp',
                        'x-upsert': 'true'
                    },
                    body: blobWebP
                });
                
                progBar.style.width = '85%';
                
                if (!uploadRes.ok) {
                    const errText = await uploadRes.text();
                    throw new Error(`Error al subir: ${uploadRes.status} - ${errText.substring(0, 100)}`);
                }
                
                // 3. Construir URL pública y poner en el input
                const urlPublica = `${SUPABASE_URL}/storage/v1/object/public/${path}`;
                inputUrl.value = urlPublica;
                previewImg.src = urlPublica;
                
                // Mostrar info de la compresión
                const kbOriginal = (file.size / 1024).toFixed(1);
                const kbWebP = (blobWebP.size / 1024).toFixed(1);
                const reduccion = ((1 - blobWebP.size / file.size) * 100).toFixed(0);
                progInfo.innerHTML = `<i class="fa-solid fa-check-circle"></i> Subido: ${kbWebP} KB · ${reduccion}% más liviana que el original (${kbOriginal} KB)`;
                progInfo.style.display = 'block';
                
                progBar.style.width = '100%';
                setTimeout(() => { prog.style.display = 'none'; progBar.style.width = '0%'; }, 800);
                
            } catch (err) {
                console.error('Error subida banner:', err);
                alert('Error al subir la imagen: ' + err.message);
                prog.style.display = 'none';
                progBar.style.width = '0%';
            } finally {
                btn.disabled = false;
                btn.innerHTML = btnOriginal;
                event.target.value = ''; // Limpiar input file para permitir re-subir el mismo archivo
            }
        }
        
        // Limpiar info de progreso al abrir modal
        const _editarOriginal = window.editar;
        // No sobreescribimos editar(), solo aseguramos que se limpie en cerrarModal
        const _cerrarModalOrig = window.cerrarModal;
    </script>
