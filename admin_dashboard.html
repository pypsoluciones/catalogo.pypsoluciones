<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>P&P Admin | Dashboard</title>

    <script>
        const cPri    = localStorage.getItem('pyp_color_primario')    || '#143B62';
        const cSec    = localStorage.getItem('pyp_color_secundario')  || '#E67E22';
        const cTer    = localStorage.getItem('pyp_color_terciario')   || '#64748b';
        const fontFam = localStorage.getItem('pyp_fuente')            || "'Inter', sans-serif";
        document.documentElement.style.setProperty('--color-primary',   cPri);
        document.documentElement.style.setProperty('--color-secondary', cSec);
        document.documentElement.style.setProperty('--color-tertiary',  cTer);
        document.documentElement.style.setProperty('--font-global',     fontFam);
    </script>

    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
    <script src="config.js"></script>

    <style>
        *, *::before, *::after { box-sizing: border-box; }
        body { font-family: var(--font-global); font-size: 14px; overscroll-behavior-y: none; background-color: #f4f6f8; }

        .text-primary   { color: var(--color-primary) !important; }
        .bg-primary     { background-color: var(--color-primary) !important; }
        .text-secondary { color: var(--color-secondary) !important; }
        .text-tertiary  { color: var(--color-tertiary) !important; }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        .fade-in { animation: fadeIn 0.35s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }

        /* Privacidad */
        .dato-sensible { transition: filter 0.2s ease; }
        .modo-privado .dato-sensible { filter: blur(6px); user-select: none; pointer-events: none; opacity: 0.7; }

        /* Tarjetas KPI */
        .kpi-scroll { scroll-snap-type: x mandatory; }
        .kpi-card { 
            scroll-snap-align: start; flex: 0 0 auto; width: 165px; 
            background: #fff; border-radius: 14px; border: 1px solid #e2e8f0; 
            padding: 16px; position: relative; overflow: hidden;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
        }
        .kpi-icon-bg { 
            position: absolute; right: -10px; bottom: -15px; font-size: 65px; 
            opacity: 0.05; transform: rotate(-15deg); pointer-events: none;
        }

        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>

<body class="flex h-screen overflow-hidden text-gray-800 relative">

    <script src="menu.js"></script>

    <main class="flex-1 flex flex-col h-[100dvh] overflow-hidden w-full relative z-10">
        
        <div class="bg-primary px-4 py-3 flex justify-between items-center shrink-0 z-10 shadow-lg">
            <div class="flex flex-col">
                <div class="text-white/80 text-[11px] font-bold uppercase tracking-wide mb-0.5 flex items-center gap-1.5">
                    <i class="fa-solid fa-building-circle-check text-[10px]"></i>
                    <span id="nombre-empresa">ESTABLECIENDO CONEXIÓN...</span>
                </div>
                <div class="text-white text-base font-black flex items-center gap-3">
                    <button onclick="toggleMobileMenu()" class="md:hidden text-white/80 hover:text-white transition">
                        <i class="fa-solid fa-bars text-xl"></i>
                    </button>
                    Dashboard Principal
                </div>
            </div>
            <div class="flex items-center gap-4">
                <button onclick="togglePrivacidad()" id="btn-privacidad" class="text-white/80 hover:text-white transition text-lg bg-white/5 p-2 rounded-full border border-white/5">
                    <i class="fa-solid fa-eye-slash"></i>
                </button>
                <div class="bg-white/10 rounded-full px-3 py-1.5 text-xs font-bold text-white flex items-center gap-2 border border-white/10">
                    <i class="fa-solid fa-user-tie text-tertiary"></i> <span id="nombre-usuario">Usuario</span>
                </div>
            </div>
        </div>

        <div class="bg-slate-900 border-t border-slate-800 px-4 py-3 flex items-center gap-5 overflow-x-auto no-scrollbar shrink-0 shadow-inner">
            <div class="flex items-center gap-2 shrink-0 bg-slate-800/40 px-3 py-1.5 rounded-lg border border-slate-700">
                <span class="text-sm">🇺🇸</span>
                <div class="text-[11px] text-gray-400 font-bold uppercase tracking-wider">USD <span class="text-white font-black ml-1.5 text-[13px]" id="dash-tasa-usd">Bs. --</span></div>
            </div>
            <div class="flex items-center gap-2 shrink-0 bg-slate-800/40 px-3 py-1.5 rounded-lg border border-slate-700">
                <span class="text-sm">🇪🇺</span>
                <div class="text-[11px] text-gray-400 font-bold uppercase tracking-wider">EUR <span class="text-white font-black ml-1.5 text-[13px]" id="dash-tasa-eur">Bs. --</span></div>
            </div>
            <div class="ml-auto flex items-center gap-2 shrink-0 pl-4 border-l border-slate-800">
                <div id="dash-caja-dot" class="w-2.5 h-2.5 rounded-full bg-gray-500 animate-pulse"></div>
                <a href="admin_caja.html" class="text-[10px] text-gray-400 font-black hover:text-white tracking-widest" id="dash-caja-status">CAJA...</a>
            </div>
        </div>

        <div class="flex-1 overflow-y-auto custom-scroll fade-in flex flex-col pb-6">
            
            <div class="flex gap-4 overflow-x-auto kpi-scroll no-scrollbar px-4 py-5 shrink-0">
                <div class="kpi-card">
                    <i class="fa-solid fa-cash-register kpi-icon-bg text-primary"></i>
                    <div class="text-[10px] text-gray-500 font-black uppercase mb-1.5 tracking-widest">Ventas Hoy</div>
                    <div class="text-2xl font-black text-primary dato-sensible leading-none" id="dash-ventas-hoy">$0.00</div>
                </div>
                <div class="kpi-card">
                    <i class="fa-solid fa-boxes-stacked kpi-icon-bg" style="color:#10b981;"></i>
                    <div class="text-[10px] text-gray-500 font-black uppercase mb-1.5 tracking-widest">Productos</div>
                    <div class="text-2xl font-black dato-sensible leading-none" style="color:#10b981;" id="indicador-productos">0</div>
                </div>
                <div class="kpi-card">
                    <i class="fa-solid fa-users kpi-icon-bg" style="color:#3b82f6;"></i>
                    <div class="text-[10px] text-gray-500 font-black uppercase mb-1.5 tracking-widest">Clientes</div>
                    <div class="text-2xl font-black dato-sensible leading-none" style="color:#3b82f6;" id="indicador-clientes">0</div>
                </div>
            </div>

            <div class="px-4 mb-6 shrink-0">
                <div class="grid grid-cols-4 gap-3">
                    <a href="admin_ventas.html" class="bg-white border border-gray-200 rounded-xl py-3 px-1 flex flex-col items-center justify-center gap-2.5 shadow-sm active:scale-95 transition group">
                        <div class="w-12 h-12 rounded-full bg-blue-50 text-blue-600 flex items-center justify-center text-xl group-hover:bg-blue-600 group-hover:text-white transition-colors"><i class="fa-solid fa-file-invoice-dollar"></i></div>
                        <span class="text-[9px] font-black text-gray-700 uppercase text-center leading-tight tracking-widest">Nueva<br>Venta</span>
                    </a>
                    <a href="admin_cxc.html" class="bg-white border border-gray-200 rounded-xl py-3 px-1 flex flex-col items-center justify-center gap-2.5 shadow-sm active:scale-95 transition group">
                        <div class="w-12 h-12 rounded-full bg-emerald-50 text-emerald-600 flex items-center justify-center text-xl group-hover:bg-emerald-600 group-hover:text-white transition-colors"><i class="fa-solid fa-hand-holding-dollar"></i></div>
                        <span class="text-[9px] font-black text-gray-700 uppercase text-center leading-tight tracking-widest">Cobrar<br>Factura</span>
                    </a>
                    <a href="admin_productos.html" class="bg-white border border-gray-200 rounded-xl py-3 px-1 flex flex-col items-center justify-center gap-2.5 shadow-sm active:scale-95 transition group">
                        <div class="w-12 h-12 rounded-full bg-orange-50 text-orange-600 flex items-center justify-center text-xl group-hover:bg-orange-600 group-hover:text-white transition-colors"><i class="fa-solid fa-boxes-stacked"></i></div>
                        <span class="text-[9px] font-black text-gray-700 uppercase text-center leading-tight tracking-widest">Inventario</span>
                    </a>
                    <a href="admin_caja.html" class="bg-white border border-gray-200 rounded-xl py-3 px-1 flex flex-col items-center justify-center gap-2.5 shadow-sm active:scale-95 transition group">
                        <div class="w-12 h-12 rounded-full bg-purple-50 text-purple-600 flex items-center justify-center text-xl group-hover:bg-purple-600 group-hover:text-white transition-colors"><i class="fa-solid fa-cash-register"></i></div>
                        <span class="text-[9px] font-black text-gray-700 uppercase text-center leading-tight tracking-widest">Caja</span>
                    </a>
                </div>
            </div>

            <div class="px-4 pb-10 flex-1 flex flex-col min-h-0">
                <h3 class="text-xs font-black text-primary uppercase tracking-widest mb-2.5 shrink-0">Últimas Transacciones</h3>
                <div class="bg-white border border-gray-200 rounded-xl shadow-sm flex-1 overflow-y-auto no-scrollbar">
                    <div class="divide-y divide-gray-100" id="lista-movimientos">
                        <div class="p-6 text-center text-[11px] text-gray-400 font-bold uppercase">Actualizando movimientos...</div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        // ================================================================
        // MOTOR LÓGICO DEL DASHBOARD
        // ================================================================
        const TOKEN_JWT = localStorage.getItem('pyp_token_seguro');
        let modoPrivado = localStorage.getItem('pyp_dash_privado') === 'true';

        if (!TOKEN_JWT) window.location.href = 'login.html';

        document.addEventListener('DOMContentLoaded', async () => {
            // Cargar interfaz básica (Empresa, Tasas, Usuario)
            configurarUIBasica();
            
            // Carga de datos pesados (Supabase)
            try {
                // Ejecutamos todo en paralelo para que no se bloquee la pantalla
                Promise.all([
                    cargarMetricasPrincipales(),
                    cargarUltimosMovimientos(),
                    verificarEstadoCaja()
                ]);
            } catch (e) { 
                console.error("Error cargando el Dashboard:", e); 
            }
        });

        function configurarUIBasica() {
            // 1. Nombre de la Empresa (CORREGIDO: Legibilidad Mejorada)
            const empresa = localStorage.getItem('pyp_empresa_nombre') || 'SISTEMA P&P';
            const elEmpresa = document.getElementById('nombre-empresa');
            if (elEmpresa) elEmpresa.innerText = empresa.toUpperCase();
            
            // 2. Usuario
            const usr = localStorage.getItem('pyp_usuario_nombre') || 'Administrador';
            document.getElementById('nombre-usuario').innerText = usr.split(' ')[0];

            // 3. Tasas de Cambio (CORREGIDO: Si están en 0, revisa los nombres de las llaves abajo)
            const tUsd = localStorage.getItem('pyp_tasa_usd') || '0.00';
            const tEur = localStorage.getItem('pyp_tasa_eur') || '0.00';
            
            document.getElementById('dash-tasa-usd').innerText = `Bs. ${parseFloat(tUsd).toFixed(2)}`;
            document.getElementById('dash-tasa-eur').innerText = `Bs. ${parseFloat(tEur).toFixed(2)}`;

            aplicarPrivacidadUI();
        }

        function togglePrivacidad() {
            modoPrivado = !modoPrivado;
            localStorage.setItem('pyp_dash_privado', modoPrivado);
            aplicarPrivacidadUI();
        }

        function aplicarPrivacidadUI() {
            document.body.classList.toggle('modo-privado', modoPrivado);
            const btn = document.getElementById('btn-privacidad');
            btn.innerHTML = modoPrivado ? '<i class="fa-solid fa-eye text-secondary"></i>' : '<i class="fa-solid fa-eye-slash"></i>';
        }

        async function cargarMetricasPrincipales() {
            try {
                const hoy = new Date().toISOString().split('T')[0];
                
                // Ventas del día (Asumiendo tabla 'ventas')
                const resV = await fetch(`${SUPABASE_URL}/rest/v1/ventas?select=total_usd&fecha_venta=eq.${hoy}`, {
                    headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${TOKEN_JWT}` }
                });
                if (resV.ok) {
                    const dataV = await resV.json();
                    const total = dataV.reduce((acc, v) => acc + (parseFloat(v.total_usd) || 0), 0);
                    document.getElementById('dash-ventas-hoy').innerText = `$${total.toLocaleString('en-US', {minimumFractionDigits:2})}`;
                }

                // Conteos rápidos
                const resP = await fetch(`${SUPABASE_URL}/rest/v1/productos?select=id&estado_producto=eq.ACTIVO`, { headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${TOKEN_JWT}`, 'Prefer': 'count=exact' } });
                const resC = await fetch(`${SUPABASE_URL}/rest/v1/clientes?select=id`, { headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${TOKEN_JWT}`, 'Prefer': 'count=exact' } });
                
                if (resP.ok) document.getElementById('indicador-productos').innerText = resP.headers.get('content-range')?.split('/')[1] || '0';
                if (resC.ok) document.getElementById('indicador-clientes').innerText  = resC.headers.get('content-range')?.split('/')[1] || '0';
                
            } catch (e) { console.error("Error en métricas:", e); }
        }

        async function verificarEstadoCaja() {
            // Lógica de estado de caja
            const statusEl = document.getElementById('dash-caja-status');
            const dotEl    = document.getElementById('dash-caja-dot');
            statusEl.innerText = "CAJA OPERATIVA";
            dotEl.classList.replace('bg-gray-500', 'bg-emerald-500');
        }

        async function cargarUltimosMovimientos() {
            const contenedor = document.getElementById('lista-movimientos');
            try {
                const res = await fetch(`${SUPABASE_URL}/rest/v1/ventas?select=numero_factura,cliente_nombre,total_usd,fecha_venta&order=fecha_venta.desc&limit=5`, {
                    headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${TOKEN_JWT}` }
                });
                
                if (!res.ok) throw new Error("Falla en consulta de movimientos");
                
                const movs = await res.json();
                
                if (movs.length === 0) {
                    contenedor.innerHTML = '<div class="p-8 text-center text-[10px] text-gray-400 font-bold uppercase">Sin ventas recientes</div>';
                    return;
                }

                contenedor.innerHTML = movs.map(m => {
                    const h = new Date(m.fecha_venta).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
                    return `
                    <div class="px-4 py-4 flex justify-between items-center border-b border-gray-50 last:border-0">
                        <div class="flex items-center gap-3">
                            <div class="w-10 h-10 rounded-full bg-slate-100 flex items-center justify-center text-slate-500 shadow-inner"><i class="fa-solid fa-receipt text-sm"></i></div>
                            <div class="flex flex-col">
                                <span class="text-[11px] font-black text-slate-800 uppercase leading-none truncate max-w-[140px]">${m.cliente_nombre || 'CONSUMIDOR FINAL'}</span>
                                <div class="flex items-center gap-2 mt-2">
                                    <span class="text-[9px] font-black bg-slate-200 text-slate-600 px-1.5 py-0.5 rounded">#${m.numero_factura}</span>
                                    <span class="text-[9px] text-slate-400 font-bold">${h}</span>
                                </div>
                            </div>
                        </div>
                        <div class="text-right">
                            <div class="text-xs font-black text-primary dato-sensible">+$${parseFloat(m.total_usd).toFixed(2)}</div>
                            <div class="text-[8px] font-black text-emerald-500 mt-1 uppercase tracking-tight">Procesado</div>
                        </div>
                    </div>`;
                }).join('');
            } catch (e) { 
                contenedor.innerHTML = '<div class="p-6 text-center text-red-400 text-[10px] font-black uppercase"><i class="fa-solid fa-wifi-slash mb-1 block text-lg"></i> Error de sincronización</div>'; 
            }
        }
    </script>
</body>
</html>
