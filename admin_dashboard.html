<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>P&P Admin | Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .custom-scroll::-webkit-scrollbar { width: 5px; height: 5px; }
        .custom-scroll::-webkit-scrollbar-thumb { background-color: #cbd5e1; border-radius: 4px; }
        .btn-press:active { transform: scale(0.97); }
        .fade-in { animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        
        .dato-sensible { transition: filter 0.3s ease; }
        .modo-privado .dato-sensible { filter: blur(6px); user-select: none; pointer-events: none; }
        
        #watermark-bg { background-size: 50%; background-position: center; background-repeat: no-repeat; opacity: 0.04; pointer-events: none; z-index: 0; }
    </style>
    
    <script src="config.js"></script>
    <script>if (!localStorage.getItem('pyp_token_seguro')) window.location.href = 'login.html';</script>
</head>
<body class="bg-[#f4f6f8] flex h-screen overflow-hidden text-gray-800 relative modo-privado" id="body-dashboard">

    <div id="watermark-bg" class="absolute inset-0"></div>

    <main class="flex-1 flex flex-col h-screen overflow-hidden w-full relative z-10">
        
        <header class="bg-white/90 backdrop-blur shadow-sm px-4 md:px-6 py-3 flex justify-between items-center z-10 shrink-0 border-b border-gray-200">
            <div class="flex items-center gap-3 min-w-0">
                <button onclick="toggleMobileMenu()" class="md:hidden text-gray-600 hover:text-[#143B62] text-xl transition btn-press shrink-0"><i class="fa-solid fa-bars"></i></button>
                <h1 class="text-lg md:text-xl font-bold text-[#143B62] flex items-center gap-2 truncate">
                    <i class="fa-solid fa-chart-pie text-[#E67E22] shrink-0"></i> 
                    <span class="truncate">Resumen Gerencial</span>
                </h1>
            </div>
            <div class="flex items-center gap-3 shrink-0">
                <button onclick="window.location.reload()" class="md:hidden text-blue-600 bg-blue-50 w-8 h-8 rounded-full flex items-center justify-center hover:bg-blue-100 transition shadow-sm btn-press" title="Actualizar Pantalla"><i class="fa-solid fa-rotate-right"></i></button>
                <button onclick="togglePrivacidad()" id="btn-privacidad" class="text-gray-400 hover:text-[#143B62] transition text-lg btn-press" title="Ocultar/Mostrar Valores"><i class="fa-solid fa-eye-slash"></i></button>
                <div class="bg-gray-50 px-3 py-1.5 rounded-md border border-gray-200 hidden sm:flex items-center gap-2 text-[11px] font-semibold text-gray-600 tracking-wide uppercase">
                    <i class="fa-solid fa-user-tie text-[#143B62]"></i> <span id="nombre-usuario">Admin</span>
                </div>
            </div>
        </header>

        <div class="flex-1 overflow-auto p-4 md:p-6 custom-scroll fade-in pb-10">
            <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4 mb-6">
                <div class="bg-white/80 backdrop-blur rounded-lg border border-gray-200 p-5 shadow-sm flex items-center gap-4">
                    <div class="w-12 h-12 rounded-full bg-blue-50 text-blue-500 flex items-center justify-center text-xl shrink-0"><i class="fa-solid fa-cash-register"></i></div>
                    <div><p class="text-[10px] font-bold text-gray-500 uppercase tracking-wider mb-0.5">Ventas Hoy</p><h3 class="text-2xl font-bold text-[#143B62] dato-sensible">$0.00</h3></div>
                </div>
                <div class="bg-white/80 backdrop-blur rounded-lg border border-gray-200 p-5 shadow-sm flex items-center gap-4">
                    <div class="w-12 h-12 rounded-full bg-emerald-50 text-emerald-500 flex items-center justify-center text-xl shrink-0"><i class="fa-solid fa-boxes-stacked"></i></div>
                    <div><p class="text-[10px] font-bold text-gray-500 uppercase tracking-wider mb-0.5">Prod. Activos</p><h3 class="text-2xl font-bold text-[#143B62]" id="indicador-productos">0</h3></div>
                </div>
                <div class="bg-white/80 backdrop-blur rounded-lg border border-gray-200 p-5 shadow-sm flex items-center gap-4">
                    <div class="w-12 h-12 rounded-full bg-orange-50 text-orange-500 flex items-center justify-center text-xl shrink-0"><i class="fa-solid fa-screwdriver-wrench"></i></div>
                    <div><p class="text-[10px] font-bold text-gray-500 uppercase tracking-wider mb-0.5">Equipos Taller</p><h3 class="text-2xl font-bold text-[#143B62]">0</h3></div>
                </div>
                <div class="bg-white/80 backdrop-blur rounded-lg border border-gray-200 p-5 shadow-sm flex items-center gap-4">
                    <div class="w-12 h-12 rounded-full bg-purple-50 text-purple-500 flex items-center justify-center text-xl shrink-0"><i class="fa-solid fa-users"></i></div>
                    <div><p class="text-[10px] font-bold text-gray-500 uppercase tracking-wider mb-0.5">Clientes</p><h3 class="text-2xl font-bold text-[#143B62]" id="indicador-clientes">0</h3></div>
                </div>
            </div>

            <div class="bg-white/80 backdrop-blur rounded-lg border border-gray-200 p-10 shadow-sm flex flex-col items-center justify-center text-center h-64">
                <i class="fa-solid fa-shield-halved text-6xl text-gray-300 mb-4"></i>
                <h2 class="text-xl font-bold text-[#143B62] mb-2">Modo Privacidad Activo</h2>
                <p class="text-sm text-gray-500 font-medium max-w-md">Para proteger tus datos financieros frente a clientes o empleados, los montos están ocultos por defecto. Toca el ícono del "Ojo" en la barra superior para revelarlos.</p>
            </div>
        </div>
    </main>

    <script src="menu.js"></script>

    <script>
        const TOKEN_JWT = localStorage.getItem('pyp_token_seguro');

        window.onload = async () => {
            const nombre = localStorage.getItem('pyp_usuario_nombre');
            if (nombre) document.getElementById('nombre-usuario').innerText = nombre.split(' ')[0];
            
            if(localStorage.getItem('pyp_privacidad') === 'false') { togglePrivacidad(); }
            
            await cargarConfiguracionGlobal();
            cargarIndicadores();
        };

        async function cargarConfiguracionGlobal() {
            try {
                const res = await fetch(`${SUPABASE_URL}/rest/v1/configuracion_sistema?select=*`, {
                    headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${TOKEN_JWT}` }
                });
                if(res.ok) {
                    const config = await res.json();
                    const logoObj = config.find(c => c.parametro === 'LOGO_URL');
                    const fondoObj = config.find(c => c.parametro === 'FONDO_URL');
                    
                    if(logoObj && logoObj.valor) localStorage.setItem('pyp_logo_pc_url', logoObj.valor);
                    if(fondoObj && fondoObj.valor) {
                        localStorage.setItem('pyp_fondo_url', fondoObj.valor);
                        document.getElementById('watermark-bg').style.backgroundImage = `url('${fondoObj.valor}')`;
                    }
                }
            } catch(e) { console.error("No se pudo cargar la configuración."); }
        }

        function togglePrivacidad() {
            const body = document.getElementById('body-dashboard');
            const icon = document.querySelector('#btn-privacidad i');
            
            if(body.classList.contains('modo-privado')) {
                body.classList.remove('modo-privado');
                icon.classList.replace('fa-eye-slash', 'fa-eye');
                icon.classList.add('text-[#E67E22]');
                localStorage.setItem('pyp_privacidad', 'false');
            } else {
                body.classList.add('modo-privado');
                icon.classList.replace('fa-eye', 'fa-eye-slash');
                icon.classList.remove('text-[#E67E22]');
                localStorage.setItem('pyp_privacidad', 'true');
            }
        }

        async function cargarIndicadores() {
            try {
                const [resProd, resCli] = await Promise.all([
                    fetch(`${SUPABASE_URL}/rest/v1/productos?select=id_producto_sku&estado_producto=eq.ACTIVO`, { headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${TOKEN_JWT}` } }),
                    fetch(`${SUPABASE_URL}/rest/v1/clientes?select=id`, { headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${TOKEN_JWT}` } })
                ]);
                const dataProd = await resProd.json(); const dataCli = await resCli.json();
                if(Array.isArray(dataProd)) document.getElementById('indicador-productos').innerText = dataProd.length;
                if(Array.isArray(dataCli)) document.getElementById('indicador-clientes').innerText = dataCli.length;
            } catch(e) { console.error("Error cargando indicadores", e); }
        }
    </script>
</body>
</html>
