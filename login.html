<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SaaS | Iniciar Sesión</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Admin">
    
    <script>
        const cPri = localStorage.getItem('pyp_color_primario') || '#143B62';
        const cSec = localStorage.getItem('pyp_color_secundario') || '#E67E22';
        const fontFam = localStorage.getItem('pyp_fuente') || "'Inter', sans-serif";
        
        document.documentElement.style.setProperty('--color-primary', cPri);
        document.documentElement.style.setProperty('--color-secondary', cSec);
        document.documentElement.style.setProperty('--font-global', fontFam);

        // Actualizar el meta theme-color dinámicamente
        const metaTheme = document.createElement('meta');
        metaTheme.name = "theme-color";
        metaTheme.content = cPri;
        document.getElementsByTagName('head')[0].appendChild(metaTheme);
    </script>

    <link rel="manifest" href="admin_manifest.json">
    <link rel="apple-touch-icon" href="https://i.ibb.co/Y7kFmQbj/Favicon-P-P-Soluciones-Tinified.png">
    <link rel="shortcut icon" type="image/png" href="https://i.ibb.co/Y7kFmQbj/Favicon-P-P-Soluciones-Tinified.png">

    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: var(--font-global); }
        .fade-in { animation: fadeIn 0.5s ease-out; }
        .slide-up { animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1); }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        .btn-press:active { transform: scale(0.97); }
        .glass { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 20%, 60% { transform: translateX(-5px); } 40%, 80% { transform: translateX(5px); } }

        .text-primary { color: var(--color-primary); }
        .bg-primary { background-color: var(--color-primary); }
        .border-primary { border-color: var(--color-primary); }
        .border-secondary { border-color: var(--color-secondary); }
        .focus-ring-secondary:focus { border-color: var(--color-secondary); box-shadow: 0 0 0 2px color-mix(in srgb, var(--color-secondary) 20%, transparent); }
        
        /* Marca Blanca en Gradientes */
        .grad-bg { background: radial-gradient(circle at 0% 0%, var(--color-primary), color-mix(in srgb, var(--color-primary) 30%, transparent) 70%); }
        .grad-accent { background: radial-gradient(circle at 100% 100%, var(--color-secondary), transparent 60%); }
        .grad-line { background: linear-gradient(to right, var(--color-primary), var(--color-secondary), var(--color-primary)); }

        /* Banner PWA */
        #cartel-instalacion { position: fixed; top: 0; left: 0; width: 100%; background-color: var(--color-secondary); color: white; box-shadow: 0 10px 25px rgba(0,0,0,0.2); padding: 16px 24px; box-sizing: border-box; display: flex; justify-content: space-between; align-items: center; z-index: 9999; transform: translateY(-150%); transition: transform 0.6s cubic-bezier(0.16, 1, 0.3, 1); border-bottom-left-radius: 15px; border-bottom-right-radius: 15px; }
        #cartel-instalacion.mostrar { transform: translateY(0); }
        .texto-instalar { font-size: 14px; line-height: 1.4; flex-grow: 1; padding-right: 15px; font-weight: 500; }
        .botones-instalar { display: flex; align-items: center; gap: 12px; }
        .btn-accion { background-color: var(--color-primary); color: white; border: none; padding: 10px 20px; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 14px; text-transform: uppercase; box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3); transition: transform 0.2s; }
        .btn-accion:active { transform: scale(0.95); }
        .btn-cerrar { background: rgba(255,255,255,0.2); border: none; font-size: 16px; color: white; cursor: pointer; width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body class="bg-[#f0f2f5] font-sans h-screen flex items-center justify-center relative overflow-hidden">

    <div class="absolute inset-0 z-0 overflow-hidden hidden md:block">
        <div class="absolute -top-[20%] -left-[10%] w-[50%] h-[70%] grad-bg rounded-full blur-[100px] opacity-60"></div>
        <div class="absolute top-[40%] -right-[10%] w-[40%] h-[60%] grad-accent rounded-full blur-[100px] opacity-20"></div>
    </div>

    <div id="cartel-instalacion">
        <div class="texto-instalar"><i class="fa-solid fa-mobile-screen mr-2"></i> Instala la <b>App</b> en tu celular.</div>
        <div class="botones-instalar">
            <button id="btn-instalar" class="btn-accion">Instalar</button>
            <button id="btn-cerrar-cartel" class="btn-cerrar">✕</button>
        </div>
    </div>

    <div class="w-full max-w-md p-6 z-10 slide-up">
        
        <div class="text-center mb-8" id="contenedor-branding">
            <div class="inline-flex items-center justify-center w-20 h-20 bg-white rounded-2xl shadow-lg mb-4">
                <i class="fa-solid fa-layer-group text-primary text-5xl" style="color: var(--color-secondary);"></i>
            </div>
            <h1 class="text-3xl font-black text-primary tracking-tight">Acceso Privado</h1>
            <p class="text-gray-500 text-sm mt-1 font-medium">Sistema ERP</p>
        </div>

        <div class="glass rounded-2xl shadow-[0_8px_30px_rgb(0,0,0,0.08)] border border-white/50 p-8 relative overflow-hidden">
            <div class="absolute top-0 left-0 w-full h-1 grad-line"></div>
            <h2 class="text-xl font-bold text-gray-800 mb-6 border-l-4 border-primary pl-3">Iniciar Sesión</h2>

            <form id="form-login" onsubmit="procesarLogin(event)" class="space-y-5">
                <div>
                    <label class="block text-xs font-bold text-gray-500 uppercase tracking-wider mb-2">Usuario / Email</label>
                    <div class="relative">
                        <i class="fa-solid fa-user absolute left-4 top-3.5 text-gray-400"></i>
                        <input type="text" id="login-user" required placeholder="ej: usuario@empresa.com" class="w-full bg-gray-50 border border-gray-200 rounded-xl pl-11 pr-4 py-3 focus:outline-none focus-ring-secondary transition text-gray-700 font-bold">
                    </div>
                </div>

                <div>
                    <label class="block text-xs font-bold text-gray-500 uppercase tracking-wider mb-2">Contraseña</label>
                    <div class="relative">
                        <i class="fa-solid fa-lock absolute left-4 top-3.5 text-gray-400"></i>
                        <input type="password" id="login-pass" required placeholder="••••••••" class="w-full bg-gray-50 border border-gray-200 rounded-xl pl-11 pr-10 py-3 focus:outline-none focus-ring-secondary transition text-gray-700 font-bold">
                        <button type="button" onclick="togglePassword()" class="absolute right-4 top-3.5 text-gray-400 hover:text-gray-600 transition"><i id="icono-ojo" class="fa-solid fa-eye"></i></button>
                    </div>
                </div>

                <div id="msg-error" class="hidden bg-red-50 text-red-600 border border-red-200 text-sm p-3 rounded-lg flex items-center gap-2 font-semibold fade-in">
                    <i class="fa-solid fa-triangle-exclamation"></i> <span id="txt-error">Credenciales incorrectas.</span>
                </div>

                <button type="submit" id="btn-submit" class="w-full bg-primary hover:opacity-90 text-white font-bold py-3.5 rounded-xl shadow-lg transition-all btn-press mt-4 flex justify-center items-center gap-2 text-lg">
                    Entrar al Sistema <i class="fa-solid fa-arrow-right-to-bracket"></i>
                </button>
            </form>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://icvfmdvvochzaktugqvj.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImljdmZtZHZ2b2NoemFrdHVncXZqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYyNDEzMzEsImV4cCI6MjA5MTgxNzMzMX0.gO3D39piT6KGbMMOzrPGWXUp5-g_nOBAgJ-nwPv8IcQ';

document.addEventListener("DOMContentLoaded", () => {
            const logoLogin = localStorage.getItem('pyp_logo_login_url');
            if (logoLogin && logoLogin.trim() !== '') {
                document.getElementById('contenedor-branding').innerHTML = `
                    <img src="${logoLogin}" 
                         alt="Logo Empresa" 
                         class="mx-auto max-h-30 w-auto object-contain fade-in drop-shadow-sm -mb-12 relative z-20">
                `;
            }
        });
        
        function togglePassword() {
            const input = document.getElementById('login-pass');
            const icono = document.getElementById('icono-ojo');
            if (input.type === 'password') { input.type = 'text'; icono.classList.replace('fa-eye', 'fa-eye-slash'); } 
            else { input.type = 'password'; icono.classList.replace('fa-eye-slash', 'fa-eye'); }
        }

        function mostrarError(msj) {
            const btn = document.getElementById('btn-submit');
            const msgError = document.getElementById('msg-error');
            btn.innerHTML = `Entrar al Sistema <i class="fa-solid fa-arrow-right-to-bracket"></i>`;
            btn.disabled = false;
            document.getElementById('txt-error').innerText = msj;
            msgError.classList.remove('hidden');
            const card = document.querySelector('.glass');
            card.classList.add('animate-[shake_0.5s_ease-in-out]');
            setTimeout(() => card.classList.remove('animate-[shake_0.5s_ease-in-out]'), 500);
        }

        async function procesarLogin(e) {
            e.preventDefault();
            
            let user = document.getElementById('login-user').value.trim().toLowerCase();
            if (!user.includes('@')) { user = user + '@pypsoluciones.com'; }
            
            const pass = document.getElementById('login-pass').value.trim();
            const btn = document.getElementById('btn-submit');
            const msgError = document.getElementById('msg-error');

            btn.innerHTML = `<i class="fa-solid fa-spinner fa-spin text-xl"></i> Verificando...`;
            btn.disabled = true; msgError.classList.add('hidden');

            try {
                const res = await fetch(`${SUPABASE_URL}/auth/v1/token?grant_type=password`, {
                    method: 'POST', headers: { 'apikey': SUPABASE_KEY, 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: user, password: pass })
                });
                
                const data = await res.json();

                if (data.error) {
                    mostrarError(data.error_description || "Credenciales incorrectas.");
                    return;
                }

                localStorage.setItem('pyp_token_seguro', data.access_token);
                localStorage.setItem('pyp_sesion_activa', 'true');
                localStorage.setItem('pyp_usuario_rol', 'Admin');
                
                // =======================================================================
                // LA MAGIA: VAMOS A BUSCAR QUIÉN ES ESTE USUARIO EN TU TABLA DE 'usuarios'
                // =======================================================================
                const userAuthId = data.user?.id;
                const loginPrefix = user.split('@')[0];
                let nombreCompleto = loginPrefix; // Fallback
                let usuarioLogin = loginPrefix;   // Fallback

                try {
                    // Busca por auth_id o por el usuario_login
                    const resDb = await fetch(`${SUPABASE_URL}/rest/v1/usuarios?or=(auth_id.eq.${userAuthId},usuario_login.eq.${loginPrefix})&select=nombre_completo,usuario_login&limit=1`, {
                        headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${data.access_token}` }
                    });
                    if(resDb.ok) {
                        const dbUsers = await resDb.json();
                        if(dbUsers.length > 0) {
                            nombreCompleto = dbUsers[0].nombre_completo;
                            usuarioLogin = dbUsers[0].usuario_login;
                        }
                    }
                } catch(e) { console.warn("No se pudo obtener el perfil de la tabla usuarios."); }

                // Guardamos la identidad real y blindada
                localStorage.setItem('pyp_usuario_nombre', nombreCompleto);
                localStorage.setItem('pyp_usuario_login', usuarioLogin);
                // =======================================================================

                btn.innerHTML = `<i class="fa-solid fa-check text-xl"></i> ¡Bienvenido!`;
                btn.classList.replace('bg-primary', 'bg-green-500');
                
                const resConf = await fetch(`${SUPABASE_URL}/rest/v1/configuracion_sistema?select=*`, { headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${data.access_token}` } });
                if(resConf.ok) {
                    const dataConf = await resConf.json();
                    const getV = (p) => dataConf.find(c => c.parametro === p)?.valor;
                    if(getV('COLOR_PRIMARIO')) localStorage.setItem('pyp_color_primario', getV('COLOR_PRIMARIO'));
                    if(getV('COLOR_SECUNDARIO')) localStorage.setItem('pyp_color_secundario', getV('COLOR_SECUNDARIO'));
                    if(getV('LOGO_LOGIN')) localStorage.setItem('pyp_logo_login_url', getV('LOGO_LOGIN'));
                    if(getV('LOGO_SIDEBAR')) localStorage.setItem('pyp_logo_pc_url', getV('LOGO_SIDEBAR'));
                }
                
                setTimeout(() => { window.location.href = 'admin_dashboard.html'; }, 500);

            } catch (error) { mostrarError("Error conectando al servidor."); }
        }
    </script>
</body>
</html>
