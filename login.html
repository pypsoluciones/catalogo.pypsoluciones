<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>P&P Soluciones | Iniciar Sesión</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .fade-in { animation: fadeIn 0.5s ease-out; }
        .slide-up { animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1); }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        .btn-press:active { transform: scale(0.97); }
        /* Efecto Glassmorphism */
        .glass { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); }
    </style>
</head>
<body class="bg-[#f0f2f5] font-sans h-screen flex items-center justify-center relative overflow-hidden">

    <div class="absolute inset-0 z-0 overflow-hidden hidden md:block">
        <div class="absolute -top-[20%] -left-[10%] w-[50%] h-[70%] bg-gradient-to-br from-[#143B62] to-[#1a4a7a] rounded-full blur-[100px] opacity-60"></div>
        <div class="absolute top-[40%] -right-[10%] w-[40%] h-[60%] bg-gradient-to-tl from-[#E67E22] to-yellow-400 rounded-full blur-[100px] opacity-20"></div>
    </div>

    <div class="w-full max-w-md p-6 z-10 slide-up">
        
        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-20 h-20 bg-white rounded-2xl shadow-lg mb-4">
                <i class="fa-solid fa-layer-group text-[#E67E22] text-5xl"></i>
            </div>
            <h1 class="text-3xl font-black text-[#143B62] tracking-tight">P&P Admin</h1>
            <p class="text-gray-500 text-sm mt-1 font-medium">Sistema de Gestión Empresarial</p>
        </div>

        <div class="glass rounded-2xl shadow-[0_8px_30px_rgb(0,0,0,0.08)] border border-white/50 p-8 relative overflow-hidden">
            
            <div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-[#143B62] via-[#E67E22] to-[#143B62]"></div>

            <h2 class="text-xl font-bold text-gray-800 mb-6 border-l-4 border-[#143B62] pl-3">Iniciar Sesión</h2>

            <form id="form-login" onsubmit="procesarLogin(event)" class="space-y-5">
                
                <div>
                    <label class="block text-xs font-bold text-gray-500 uppercase tracking-wider mb-2">Usuario o Correo</label>
                    <div class="relative">
                        <i class="fa-solid fa-user absolute left-4 top-3.5 text-gray-400"></i>
                        <input type="text" id="login-user" required placeholder="ejemplo@pypsoluciones.com" 
                               class="w-full bg-gray-50 border border-gray-200 rounded-xl pl-11 pr-4 py-3 focus:outline-none focus:border-[#E67E22] focus:bg-white focus:ring-2 focus:ring-[#E67E22]/20 transition text-gray-700 font-semibold">
                    </div>
                </div>

                <div>
                    <label class="block text-xs font-bold text-gray-500 uppercase tracking-wider mb-2">Contraseña</label>
                    <div class="relative">
                        <i class="fa-solid fa-lock absolute left-4 top-3.5 text-gray-400"></i>
                        <input type="password" id="login-pass" required placeholder="••••••••" 
                               class="w-full bg-gray-50 border border-gray-200 rounded-xl pl-11 pr-10 py-3 focus:outline-none focus:border-[#E67E22] focus:bg-white focus:ring-2 focus:ring-[#E67E22]/20 transition text-gray-700 font-semibold">
                        <button type="button" onclick="togglePassword()" class="absolute right-4 top-3.5 text-gray-400 hover:text-gray-600 transition">
                            <i id="icono-ojo" class="fa-solid fa-eye"></i>
                        </button>
                    </div>
                </div>

                <div class="flex items-center justify-between text-sm mt-2">
                    <label class="flex items-center gap-2 cursor-pointer">
                        <input type="checkbox" class="rounded text-[#143B62] focus:ring-[#143B62] w-4 h-4">
                        <span class="text-gray-600 font-medium">Recordarme</span>
                    </label>
                    <a href="#" class="text-[#143B62] font-bold hover:underline hover:text-[#E67E22] transition">¿Olvidaste tu clave?</a>
                </div>

                <div id="msg-error" class="hidden bg-red-50 text-red-600 border border-red-200 text-sm p-3 rounded-lg flex items-center gap-2 font-semibold fade-in">
                    <i class="fa-solid fa-triangle-exclamation"></i>
                    <span>Credenciales incorrectas. Intente de nuevo.</span>
                </div>

                <button type="submit" id="btn-submit" class="w-full bg-[#143B62] hover:bg-[#0f2d4a] text-white font-bold py-3.5 rounded-xl shadow-lg shadow-[#143B62]/30 transition-all btn-press mt-4 flex justify-center items-center gap-2 text-lg">
                    Entrar al Sistema <i class="fa-solid fa-arrow-right-to-bracket"></i>
                </button>

            </form>
        </div>

        <div class="text-center mt-8 text-xs text-gray-400 font-medium">
            <p>&copy; 2024 P&P Soluciones. Todos los derechos reservados.</p>
            <p class="mt-1">Versión 1.0 (MVP)</p>
        </div>

    </div>

    <script>
        // Función para ver/ocultar la contraseña
        function togglePassword() {
            const input = document.getElementById('login-pass');
            const icono = document.getElementById('icono-ojo');
            if (input.type === 'password') {
                input.type = 'text';
                icono.classList.replace('fa-eye', 'fa-eye-slash');
            } else {
                input.type = 'password';
                icono.classList.replace('fa-eye-slash', 'fa-eye');
            }
        }

        // Simulación de Login (Fase 1: Protección Básica)
        function procesarLogin(e) {
            e.preventDefault(); // Evita que la página recargue
            
            const user = document.getElementById('login-user').value;
            const pass = document.getElementById('login-pass').value;
            const btn = document.getElementById('btn-submit');
            const msgError = document.getElementById('msg-error');

            // Estado de carga
            btn.innerHTML = `<i class="fa-solid fa-spinner fa-spin text-xl"></i> Verificando...`;
            btn.disabled = true;
            msgError.classList.add('hidden');

            // Simulamos un retraso de red de 1 segundo para dar sensación de seguridad
            setTimeout(() => {
                // Validación "Hardcodeada" temporal para proteger tus pantallas
                // Usuario: admin | Clave: pyp2024
                if (user.toLowerCase() === 'admin' && pass === 'pyp2024') {
                    
                    // Guardamos un "Token falso" en el navegador para saber que ya entró
                    localStorage.setItem('pyp_sesion_activa', 'true');
                    localStorage.setItem('pyp_usuario_rol', 'SuperAdmin');
                    
                    // Éxito: Lo enviamos al Dashboard
                    btn.innerHTML = `<i class="fa-solid fa-check text-xl"></i> ¡Bienvenido!`;
                    btn.classList.replace('bg-[#143B62]', 'bg-green-500');
                    btn.classList.replace('shadow-[#143B62]/30', 'shadow-green-500/30');
                    
                    setTimeout(() => {
                        window.location.href = 'admin_dashboard.html';
                    }, 500);

                } else {
                    // Fallo: Credenciales incorrectas
                    btn.innerHTML = `Entrar al Sistema <i class="fa-solid fa-arrow-right-to-bracket"></i>`;
                    btn.disabled = false;
                    msgError.classList.remove('hidden');
                    
                    // Animación de sacudida (Shake) en la tarjeta
                    const card = document.querySelector('.glass');
                    card.classList.add('animate-[shake_0.5s_ease-in-out]');
                    setTimeout(() => card.classList.remove('animate-[shake_0.5s_ease-in-out]'), 500);
                }
            }, 1000);
        }
    </script>
    
    <style>
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-5px); }
            40%, 80% { transform: translateX(5px); }
        }
    </style>
</body>
</html>
