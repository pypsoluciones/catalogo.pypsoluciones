<!DOCTYPE html>
<html lang="es">
<head>
    <script src="config.js"></script>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SaaS | Iniciar Sesión</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Admin">
    
    <script>
        const cPri = localStorage.getItem('pyp_color_primario') || '#143B62';
        const cSec = localStorage.getItem('pyp_color_secundario') || '#E67E22';
        const fontFam = localStorage.getItem('pyp_fuente') || "'Inter', sans-serif";
        
        document.documentElement.style.setProperty('--color-primary', cPri);
        document.documentElement.style.setProperty('--color-secondary', cSec);
        document.documentElement.style.setProperty('--font-global', fontFam);

        const metaTheme = document.createElement('meta');
        metaTheme.name = "theme-color";
        metaTheme.content = cPri;
        document.getElementsByTagName('head')[0].appendChild(metaTheme);
    </script>

    <link rel="manifest" href="admin_manifest.json">
    <link rel="apple-touch-icon" href="https://i.ibb.co/Y7kFmQbj/Favicon-P-P-Soluciones-Tinified.png">
    <link rel="shortcut icon" type="image/png" href="https://i.ibb.co/Y7kFmQbj/Favicon-P-P-Soluciones-Tinified.png">

    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --radius-card: 24px;
            --shadow-card: 0 20px 60px rgba(0,0,0,0.12), 0 4px 16px rgba(0,0,0,0.06);
            --shadow-btn:  0 4px 20px rgba(0,0,0,0.25);
            --transition:  all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }

        body {
            font-family: var(--font-global);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #f0f4f8;
            overflow: hidden;
            position: relative;
        }

        /* ── Fondo decorativo ── */
        .bg-shapes {
            position: fixed;
            inset: 0;
            z-index: 0;
            overflow: hidden;
            pointer-events: none;
        }
        .bg-shape {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.18;
        }
        .bg-shape-1 {
            width: 600px; height: 600px;
            background: var(--color-primary);
            top: -180px; left: -180px;
            animation: drift1 18s ease-in-out infinite alternate;
        }
        .bg-shape-2 {
            width: 400px; height: 400px;
            background: var(--color-secondary);
            bottom: -120px; right: -120px;
            animation: drift2 22s ease-in-out infinite alternate;
        }
        .bg-shape-3 {
            width: 300px; height: 300px;
            background: var(--color-primary);
            top: 50%; right: 10%;
            opacity: 0.08;
            animation: drift1 15s ease-in-out infinite alternate-reverse;
        }
        @keyframes drift1 { from { transform: translate(0,0) scale(1); } to { transform: translate(30px, 40px) scale(1.08); } }
        @keyframes drift2 { from { transform: translate(0,0) scale(1); } to { transform: translate(-25px, -35px) scale(1.06); } }

        /* ── Línea decorativa superior ── */
        .grad-line {
            background: linear-gradient(90deg, var(--color-primary), var(--color-secondary), var(--color-primary));
            background-size: 200% 100%;
            animation: shimmer 4s linear infinite;
        }
        @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

        /* ── Tarjeta principal ── */
        .login-wrapper {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 440px;
            padding: 20px;
            animation: slideUp 0.7s cubic-bezier(0.16, 1, 0.3, 1) both;
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(32px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* ── Bloque logo ── */
        .logo-block {
            text-align: center;
            margin-bottom: 28px;
            animation: slideUp 0.7s 0.05s cubic-bezier(0.16,1,0.3,1) both;
        }

        /* Contenedor con fondo blanco para el logo */
        .logo-container {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: #ffffff;
            border-radius: 20px;
            padding: 22px 36px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.10), 0 2px 8px rgba(0,0,0,0.06);
            margin-bottom: 18px;
            min-width: 234px;
            min-height: 143px;
            transition: var(--transition);
        }
        .logo-container:hover {
            box-shadow: 0 12px 40px rgba(0,0,0,0.14);
            transform: translateY(-2px);
        }
        .logo-container img {
            max-height: 117px;
            max-width: 286px;
            width: auto;
            object-fit: contain;
            display: block;
        }

        /* Ícono fallback cuando no hay logo */
        .logo-icon-fallback {
            font-size: 3.5rem;
            color: var(--color-secondary);
            line-height: 1;
        }

        .logo-title {
            font-size: 1.6rem;
            font-weight: 800;
            color: var(--color-primary);
            letter-spacing: -0.5px;
            line-height: 1.2;
        }
        .logo-subtitle {
            font-size: 0.8rem;
            color: #94a3b8;
            font-weight: 500;
            margin-top: 4px;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }

        /* ── Tarjeta formulario ── */
        .card {
            background: rgba(255,255,255,0.97);
            backdrop-filter: blur(16px);
            border-radius: var(--radius-card);
            box-shadow: var(--shadow-card);
            border: 1px solid rgba(255,255,255,0.8);
            overflow: hidden;
            animation: slideUp 0.7s 0.1s cubic-bezier(0.16,1,0.3,1) both;
        }

        .card-top-bar {
            height: 4px;
        }

        .card-body {
            padding: 32px 32px 36px;
        }

        .card-title {
            font-size: 1.15rem;
            font-weight: 700;
            color: #1e293b;
            margin-bottom: 24px;
            padding-left: 14px;
            border-left: 4px solid var(--color-primary);
            line-height: 1.3;
        }

        /* ── Campos ── */
        .field { margin-bottom: 18px; }

        .field label {
            display: block;
            font-size: 10px;
            font-weight: 700;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-bottom: 8px;
        }

        .field-wrap {
            position: relative;
        }
        .field-wrap i.icon-left {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: #cbd5e1;
            font-size: 14px;
            transition: var(--transition);
            pointer-events: none;
        }
        .field-wrap:focus-within i.icon-left {
            color: var(--color-secondary);
        }

        .field-wrap input {
            width: 100%;
            background: #f8fafc;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            padding: 13px 14px 13px 42px;
            font-size: 0.92rem;
            font-weight: 600;
            color: #1e293b;
            outline: none;
            transition: var(--transition);
            font-family: var(--font-global);
        }
        .field-wrap input::placeholder { color: #cbd5e1; font-weight: 400; }
        .field-wrap input:focus {
            border-color: var(--color-secondary);
            background: #fff;
            box-shadow: 0 0 0 4px color-mix(in srgb, var(--color-secondary) 12%, transparent);
        }

        .btn-toggle-pass {
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: #cbd5e1;
            cursor: pointer;
            padding: 4px;
            transition: var(--transition);
            font-size: 14px;
        }
        .btn-toggle-pass:hover { color: #64748b; }

        /* ── Error ── */
        .msg-error {
            display: none;
            align-items: center;
            gap: 10px;
            background: #fef2f2;
            border: 1.5px solid #fecaca;
            color: #dc2626;
            font-size: 0.82rem;
            font-weight: 600;
            padding: 11px 14px;
            border-radius: 10px;
            margin-bottom: 18px;
            animation: slideUp 0.3s ease both;
        }
        .msg-error.visible { display: flex; }

        /* ── Botón principal ── */
        .btn-submit {
            width: 100%;
            background: var(--color-primary);
            color: white;
            border: none;
            border-radius: 14px;
            padding: 15px 24px;
            font-size: 1rem;
            font-weight: 700;
            letter-spacing: 0.02em;
            cursor: pointer;
            box-shadow: var(--shadow-btn);
            transition: var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            font-family: var(--font-global);
            position: relative;
            overflow: hidden;
        }
        .btn-submit::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(255,255,255,0.12) 0%, transparent 60%);
            pointer-events: none;
        }
        .btn-submit:hover:not(:disabled) {
            opacity: 0.92;
            transform: translateY(-1px);
            box-shadow: 0 8px 28px rgba(0,0,0,0.28);
        }
        .btn-submit:active:not(:disabled) {
            transform: translateY(0) scale(0.98);
        }
        .btn-submit:disabled { opacity: 0.75; cursor: not-allowed; }
        .btn-submit.success { background: #16a34a !important; }

        /* ── Footer ── */
        .card-footer {
            text-align: center;
            margin-top: 20px;
            font-size: 11px;
            color: #cbd5e1;
            font-weight: 500;
            animation: slideUp 0.7s 0.2s cubic-bezier(0.16,1,0.3,1) both;
        }
        .card-footer span { color: var(--color-secondary); font-weight: 700; }

        /* ── Shake ── */
        @keyframes shake {
            0%,100% { transform: translateX(0); }
            20%,60%  { transform: translateX(-5px); }
            40%,80%  { transform: translateX(5px); }
        }
        .shaking { animation: shake 0.45s ease; }

        /* ── Banner PWA ── */
        #cartel-instalacion {
            position: fixed; top: 0; left: 0; width: 100%;
            background-color: var(--color-secondary);
            color: white;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            padding: 14px 20px;
            display: flex; justify-content: space-between; align-items: center;
            z-index: 9999;
            transform: translateY(-150%);
            transition: transform 0.6s cubic-bezier(0.16,1,0.3,1);
            border-bottom-left-radius: 12px;
            border-bottom-right-radius: 12px;
        }
        #cartel-instalacion.mostrar { transform: translateY(0); }
        .texto-instalar { font-size: 13px; line-height: 1.4; flex-grow: 1; padding-right: 12px; font-weight: 500; }
        .botones-instalar { display: flex; align-items: center; gap: 10px; }
        .btn-accion { background: var(--color-primary); color: white; border: none; padding: 9px 18px; border-radius: 8px; font-weight: 700; cursor: pointer; font-size: 13px; text-transform: uppercase; }
        .btn-cerrar { background: rgba(255,255,255,0.2); border: none; color: white; cursor: pointer; width: 30px; height: 30px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 15px; }

        /* ── Responsive móvil ── */
        @media (max-width: 480px) {
            .login-wrapper { padding: 16px; }
            .card-body { padding: 24px 20px 28px; }
            .logo-container { padding: 18px 28px; min-height: 117px; }
            .logo-container img { max-height: 94px; max-width: 234px; }
            .logo-title { font-size: 1.35rem; }
        }
    </style>
</head>
<body>

    <!-- Fondo decorativo -->
    <div class="bg-shapes">
        <div class="bg-shape bg-shape-1"></div>
        <div class="bg-shape bg-shape-2"></div>
        <div class="bg-shape bg-shape-3"></div>
    </div>

    <!-- Banner PWA -->
    <div id="cartel-instalacion">
        <div class="texto-instalar"><i class="fa-solid fa-mobile-screen mr-2"></i> Instala la <b>App</b> en tu celular.</div>
        <div class="botones-instalar">
            <button id="btn-instalar" class="btn-accion">Instalar</button>
            <button id="btn-cerrar-cartel" class="btn-cerrar">✕</button>
        </div>
    </div>

    <!-- Contenido -->
    <div class="login-wrapper">

        <!-- Logo / Branding -->
        <div class="logo-block">
            <div id="contenedor-branding">
                <div class="logo-container">
                    <i class="fa-solid fa-layer-group logo-icon-fallback"></i>
                </div>
                <div class="logo-title">Acceso Privado</div>
                <div class="logo-subtitle">Sistema ERP · P&amp;P Soluciones</div>
            </div>
        </div>

        <!-- Tarjeta formulario -->
        <div class="card">
            <div class="card-top-bar grad-line"></div>
            <div class="card-body">
                <h2 class="card-title">Iniciar Sesión</h2>

                <form id="form-login" onsubmit="procesarLogin(event)">

                    <div class="field">
                        <label>Usuario / Email</label>
                        <div class="field-wrap">
                            <i class="fa-solid fa-user icon-left"></i>
                            <input type="text" id="login-user" required placeholder="ej: usuario@empresa.com" autocomplete="username">
                        </div>
                    </div>

                    <div class="field">
                        <label>Contraseña</label>
                        <div class="field-wrap">
                            <i class="fa-solid fa-lock icon-left"></i>
                            <input type="password" id="login-pass" required placeholder="••••••••" autocomplete="current-password">
                            <button type="button" class="btn-toggle-pass" onclick="togglePassword()">
                                <i id="icono-ojo" class="fa-solid fa-eye"></i>
                            </button>
                        </div>
                    </div>

                    <div id="msg-error" class="msg-error">
                        <i class="fa-solid fa-triangle-exclamation"></i>
                        <span id="txt-error">Credenciales incorrectas.</span>
                    </div>

                    <button type="submit" id="btn-submit" class="btn-submit">
                        Entrar al Sistema <i class="fa-solid fa-arrow-right-to-bracket"></i>
                    </button>

                </form>
            </div>
        </div>

        <div class="card-footer">
            Acceso restringido · <span>P&amp;P ERP</span>
        </div>

    </div>

    <script>
        // ── Branding dinámico ──────────────────────────────────────────────
        document.addEventListener("DOMContentLoaded", () => {
            const logoLogin = localStorage.getItem('pyp_logo_login_url');
            if (logoLogin && logoLogin.trim() !== '') {
                document.getElementById('contenedor-branding').innerHTML = `
                    <div class="logo-container">
                        <img src="${logoLogin}" alt="Logo Empresa" onerror="this.parentElement.innerHTML='<i class=\'fa-solid fa-layer-group logo-icon-fallback\'></i>'">
                    </div>
                    <div class="logo-title">Acceso Privado</div>
                    <div class="logo-subtitle">Sistema ERP · P&amp;P Soluciones</div>
                `;
            }
        });

        // ── Toggle contraseña ──────────────────────────────────────────────
        function togglePassword() {
            const input = document.getElementById('login-pass');
            const icono = document.getElementById('icono-ojo');
            if (input.type === 'password') {
                input.type = 'text';
                icono.classList.replace('fa-eye', 'fa-eye-slash');
            } else {
                input.type = 'password';
                icono.classList.replace('fa-eye-slash', 'fa-eye');
            }
        }

        // ── Mostrar error ──────────────────────────────────────────────────
        function mostrarError(msj) {
            const btn = document.getElementById('btn-submit');
            btn.innerHTML = `Entrar al Sistema <i class="fa-solid fa-arrow-right-to-bracket"></i>`;
            btn.disabled = false;
            btn.classList.remove('success');
            document.getElementById('txt-error').innerText = msj;
            const msgError = document.getElementById('msg-error');
            msgError.classList.add('visible');
            const card = document.querySelector('.card');
            card.classList.add('shaking');
            setTimeout(() => card.classList.remove('shaking'), 500);
        }

        // ── Login ──────────────────────────────────────────────────────────
        async function procesarLogin(e) {
            e.preventDefault();

            let user = document.getElementById('login-user').value.trim().toLowerCase();
            if (!user.includes('@')) { user = user + '@pypsoluciones.com'; }

            const pass = document.getElementById('login-pass').value.trim();
            const btn  = document.getElementById('btn-submit');
            const msgError = document.getElementById('msg-error');

            btn.innerHTML  = `<i class="fa-solid fa-spinner fa-spin"></i> Verificando...`;
            btn.disabled   = true;
            msgError.classList.remove('visible');

            try {
                const res = await fetch(`${SUPABASE_URL}/auth/v1/token?grant_type=password`, {
                    method: 'POST',
                    headers: { 'apikey': SUPABASE_KEY, 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: user, password: pass })
                });

                const data = await res.json();

                if (data.error) {
                    mostrarError(data.error_description || "Credenciales incorrectas.");
                    return;
                }

                localStorage.setItem('pyp_token_seguro', data.access_token);
                localStorage.setItem('pyp_sesion_activa', 'true');
                localStorage.setItem('pyp_usuario_rol', 'Admin');

                // Obtener perfil real del usuario
                const userAuthId  = data.user?.id;
                const loginPrefix = user.split('@')[0];
                let nombreCompleto = loginPrefix;
                let usuarioLogin   = loginPrefix;

                try {
                    const resDb = await fetch(`${SUPABASE_URL}/rest/v1/usuarios?or=(auth_id.eq.${userAuthId},usuario_login.eq.${loginPrefix})&select=nombre_completo,usuario_login&limit=1`, {
                        headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${data.access_token}` }
                    });
                    if (resDb.ok) {
                        const dbUsers = await resDb.json();
                        if (dbUsers.length > 0) {
                            nombreCompleto = dbUsers[0].nombre_completo;
                            usuarioLogin   = dbUsers[0].usuario_login;
                        }
                    }
                } catch(e) { console.warn("No se pudo obtener el perfil de la tabla usuarios."); }

                localStorage.setItem('pyp_usuario_nombre', nombreCompleto);
                localStorage.setItem('pyp_usuario_login', usuarioLogin);

                // Cargar configuración de marca blanca
                try {
                    const resConf = await fetch(`${SUPABASE_URL}/rest/v1/configuracion_sistema?select=*`, {
                        headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${data.access_token}` }
                    });
                    if (resConf.ok) {
                        const dataConf = await resConf.json();
                        const getV = (p) => dataConf.find(c => c.parametro === p)?.valor;
                        if (getV('COLOR_PRIMARIO'))   localStorage.setItem('pyp_color_primario',  getV('COLOR_PRIMARIO'));
                        if (getV('COLOR_SECUNDARIO')) localStorage.setItem('pyp_color_secundario', getV('COLOR_SECUNDARIO'));
                        if (getV('LOGO_LOGIN'))       localStorage.setItem('pyp_logo_login_url',   getV('LOGO_LOGIN'));
                        if (getV('LOGO_SIDEBAR'))     localStorage.setItem('pyp_logo_pc_url',      getV('LOGO_SIDEBAR'));
                    }
                } catch(e) {}

                // Feedback de éxito
                btn.innerHTML = `<i class="fa-solid fa-check"></i> ¡Bienvenido!`;
                btn.classList.add('success');

                setTimeout(() => { window.location.href = 'admin_dashboard.html'; }, 520);

            } catch (error) {
                mostrarError("Error conectando al servidor.");
            }
        }
    </script>
</body>
</html>
