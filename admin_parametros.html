<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin | Parámetros del Sistema</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .custom-scroll::-webkit-scrollbar { width: 6px; height: 6px; }
        .custom-scroll::-webkit-scrollbar-thumb { background-color: #cbd5e1; border-radius: 4px; }
        .btn-press:active { transform: scale(0.95); }
        .uppercase-input { text-transform: uppercase; }
    </style>
    <script>if (localStorage.getItem('pyp_sesion_activa') !== 'true') window.location.href = 'login.html';</script>
</head>
<body class="bg-[#f0f2f5] font-sans flex h-screen overflow-hidden text-gray-800">

    <aside class="w-64 bg-[#143B62] text-white flex flex-col hidden md:flex shrink-0 shadow-xl z-20">
        <div class="p-6 border-b border-white/10 flex items-center gap-3">
            <i class="fa-solid fa-layer-group text-[#E67E22] text-3xl"></i>
            <h2 class="font-bold text-xl tracking-wide">P&P Admin</h2>
        </div>
        <nav class="flex-1 p-4 space-y-1 overflow-y-auto custom-scroll text-sm">
            <a href="admin_dashboard.html" class="flex items-center gap-3 text-gray-300 hover:bg-white/10 px-4 py-2.5 rounded-lg font-semibold transition"><i class="fa-solid fa-chart-pie w-5"></i> Dashboard</a>
            <a href="admin_ventas.html" class="flex items-center gap-3 text-gray-300 hover:bg-white/10 px-4 py-2.5 rounded-lg font-semibold transition"><i class="fa-solid fa-cash-register w-5"></i> Ventas (POS)</a>
            <a href="admin_notas.html" class="flex items-center gap-3 text-gray-300 hover:bg-white/10 px-4 py-2.5 rounded-lg font-semibold transition"><i class="fa-solid fa-truck-fast w-5"></i> Despachos</a>
            <a href="admin_presupuestos.html" class="flex items-center gap-3 text-gray-300 hover:bg-white/10 px-4 py-2.5 rounded-lg font-semibold transition"><i class="fa-solid fa-file-invoice w-5"></i> Cotizaciones</a>
            <a href="admin_rma.html" class="flex items-center gap-3 text-gray-300 hover:bg-white/10 px-4 py-2.5 rounded-lg font-semibold transition"><i class="fa-solid fa-rotate-left w-5"></i> RMA / Garantías</a>
            <a href="admin_compras.html" class="flex items-center gap-3 text-gray-300 hover:bg-white/10 px-4 py-2.5 rounded-lg font-semibold transition"><i class="fa-solid fa-truck-ramp-box w-5"></i> Compras</a>
            <a href="admin_productos.html" class="flex items-center gap-3 text-gray-300 hover:bg-white/10 px-4 py-2.5 rounded-lg font-semibold transition"><i class="fa-solid fa-boxes-stacked w-5"></i> Inventario</a>
            <a href="admin_taller.html" class="flex items-center gap-3 text-gray-300 hover:bg-white/10 px-4 py-2.5 rounded-lg font-semibold transition"><i class="fa-solid fa-screwdriver-wrench w-5"></i> Taller</a>
            <a href="admin_bancos.html" class="flex items-center gap-3 text-gray-300 hover:bg-white/10 px-4 py-2.5 rounded-lg font-semibold transition"><i class="fa-solid fa-building-columns w-5"></i> Bancos / Cajas</a>
            <a href="admin_nomina.html" class="flex items-center gap-3 text-gray-300 hover:bg-white/10 px-4 py-2.5 rounded-lg font-semibold transition"><i class="fa-solid fa-hand-holding-dollar w-5"></i> Nómina</a>
            <a href="admin_contactos.html" class="flex items-center gap-3 text-gray-300 hover:bg-white/10 px-4 py-2.5 rounded-lg font-semibold transition"><i class="fa-solid fa-address-book w-5"></i> Directorio</a>
            <a href="admin_usuarios.html" class="flex items-center gap-3 text-gray-300 hover:bg-white/10 px-4 py-2.5 rounded-lg font-semibold transition"><i class="fa-solid fa-users-gear w-5"></i> Usuarios y Roles</a>
            
            <div class="border-t border-white/10 my-2 pt-2"></div>
            <a href="#" class="flex items-center gap-3 bg-[#E67E22] text-white px-4 py-2.5 rounded-lg font-bold shadow-md"><i class="fa-solid fa-cogs w-5"></i> Parámetros</a>
        </nav>
        
        <div class="p-4 border-t border-white/10 shrink-0 bg-[#0f2d4a]">
            <button onclick="cerrarSesion()" class="w-full flex items-center justify-center gap-2 bg-red-500/20 text-red-300 hover:bg-red-500 hover:text-white py-2.5 rounded-lg font-bold transition text-sm shadow-sm btn-press">
                <i class="fa-solid fa-power-off"></i> Cerrar Sesión
            </button>
        </div>
    </aside>

    <main class="flex-1 flex flex-col h-screen overflow-hidden bg-gray-50">
        <header class="bg-white shadow-sm px-6 py-4 flex justify-between items-center z-10 shrink-0">
            <div>
                <h1 class="text-xl font-bold text-[#143B62] flex items-center gap-2"><i class="fa-solid fa-cogs"></i> Datos Maestros (Parámetros)</h1>
            </div>
            
            <div class="flex items-center gap-3">
                <div class="bg-blue-50 px-3 py-1.5 rounded-lg border border-blue-100 flex items-center gap-2 text-xs font-bold text-[#143B62]">
                    <i class="fa-solid fa-user-tie"></i> <span id="nombre-usuario">Admin</span>
                </div>
                <button onclick="cerrarSesion()" class="md:hidden text-red-500 hover:text-red-700 text-xl transition btn-press"><i class="fa-solid fa-power-off"></i></button>
            </div>
        </header>

        <div class="flex-1 overflow-auto p-4 md:p-6 custom-scroll">
            <div class="grid grid-cols-1 lg:grid-cols-3 gap-6 h-full">
                
                <div class="bg-white rounded-xl border border-gray-200 shadow-sm p-6 lg:col-span-1 h-fit">
                    <h3 class="font-bold text-[#143B62] mb-4 border-b pb-2"><i class="fa-solid fa-plus-circle mr-2"></i> Nuevo Parámetro</h3>
                    
                    <form id="form-parametro" onsubmit="guardarParametro(event)" class="space-y-4">
                        <div>
                            <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Grupo *</label>
                            <select id="param-grupo" required class="w-full border border-gray-300 rounded px-3 py-2 text-sm focus:border-[#E67E22] outline-none font-bold bg-gray-50">
                                <option value="MARCA">MARCA</option>
                                <option value="CATEGORIA">CATEGORÍA DE PRODUCTO</option>
                                <option value="CATEGORIA_VENTA">CATEGORÍA DE VENTA</option>
                                <option value="UNIDAD_MEDIDA">UNIDAD DE MEDIDA</option>
                                <option value="TIPO_IMPUESTO">TIPO DE IMPUESTO</option>
                                <option value="TALLA">TALLA</option>
                                <option value="COLOR">COLOR</option>
                                <option value="TIPO_CONTRIBUYENTE">TIPO DE CONTRIBUYENTE</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Valor *</label>
                            <input type="text" id="param-valor" required placeholder="Ej: HP, ROJO, PAQUETE" class="uppercase-input w-full border border-gray-300 rounded px-3 py-2 text-sm focus:border-[#E67E22] outline-none font-bold" oninput="this.value = this.value.toUpperCase()">
                        </div>
                        <button type="submit" id="btn-guardar" class="w-full bg-[#143B62] hover:bg-[#0f2d4a] text-white font-bold py-2.5 rounded shadow-sm transition btn-press mt-2">
                            Guardar Parámetro
                        </button>
                    </form>
                </div>

                <div class="bg-white rounded-xl border border-gray-200 shadow-sm flex flex-col lg:col-span-2 h-full">
                    <div class="p-4 border-b border-gray-100 flex justify-between items-center bg-gray-50">
                        <div class="relative w-full max-w-md">
                            <i class="fa-solid fa-filter absolute left-3 top-2.5 text-gray-400"></i>
                            <select id="filtro-grupo" onchange="filtrarTabla()" class="w-full border border-gray-300 rounded-lg pl-10 pr-4 py-2 text-sm focus:outline-none focus:border-[#E67E22] font-bold bg-white">
                                <option value="TODOS">Mostrar Todos los Grupos</option>
                                <option value="MARCA">MARCAS</option>
                                <option value="CATEGORIA">CATEGORÍAS</option>
                                <option value="CATEGORIA_VENTA">CATEGORÍA DE VENTA</option>
                                <option value="UNIDAD_MEDIDA">UNIDADES DE MEDIDA</option>
                                <option value="TIPO_IMPUESTO">TIPOS DE IMPUESTO</option>
                                <option value="TALLA">TALLAS</option>
                                <option value="COLOR">COLORES</option>
                            </select>
                        </div>
                    </div>

                    <div class="flex-1 overflow-y-auto custom-scroll p-0">
                        <table class="w-full text-left text-sm border-collapse">
                            <thead class="bg-[#143B62] text-white text-[10px] uppercase font-black sticky top-0 z-10">
                                <tr>
                                    <th class="p-3">Grupo</th>
                                    <th class="p-3">Valor Registrado</th>
                                    <th class="p-3 text-center">Estatus</th>
                                    <th class="p-3 text-center">Acción</th>
                                </tr>
                            </thead>
                            <tbody id="tabla-parametros" class="divide-y divide-gray-100">
                                <tr><td colspan="4" class="p-10 text-center text-gray-400"><i class="fa-solid fa-spinner fa-spin text-xl mb-2 block"></i> Cargando data maestra...</td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>

            </div>
        </div>
    </main>

    <script>
        const SUPABASE_URL = 'https://icvfmdvvochzaktugqvj.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImljdmZtZHZ2b2NoemFrdHVncXZqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYyNDEzMzEsImV4cCI6MjA5MTgxNzMzMX0.gO3D39piT6KGbMMOzrPGWXUp5-g_nOBAgJ-nwPv8IcQ';
        
        let parametros = [];

        window.onload = async () => {
            const nombre = localStorage.getItem('pyp_usuario_nombre');
            if(nombre) document.getElementById('nombre-usuario').innerText = nombre.split(' ')[0];
            await cargarParametros();
        };

        function cerrarSesion() {
            if(confirm("¿Estás seguro que deseas cerrar sesión?")) {
                localStorage.removeItem('pyp_sesion_activa');
                localStorage.removeItem('pyp_usuario_rol');
                localStorage.removeItem('pyp_usuario_nombre');
                window.location.href = 'login.html';
            }
        }

        async function cargarParametros() {
            try {
                const res = await fetch(`${SUPABASE_URL}/rest/v1/parametros_inventario?select=*&order=grupo.asc,valor.asc`, { 
                    headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` } 
                });
                parametros = await res.json();
                filtrarTabla();
            } catch(e) {
                document.getElementById('tabla-parametros').innerHTML = `<tr><td colspan="4" class="p-5 text-center text-red-500 font-bold">Error cargando parámetros.</td></tr>`;
            }
        }

        function pintarTabla(arr) {
            const tbody = document.getElementById('tabla-parametros');
            if(!arr.length) {
                tbody.innerHTML = `<tr><td colspan="4" class="p-10 text-center text-gray-500 font-bold">No se encontraron registros.</td></tr>`;
                return;
            }
            
            tbody.innerHTML = arr.map(p => `
                <tr class="hover:bg-gray-50 transition border-b border-gray-100">
                    <td class="p-3 font-bold text-gray-500 text-xs">${p.grupo}</td>
                    <td class="p-3 font-black text-[#143B62] text-sm">${p.valor}</td>
                    <td class="p-3 text-center">
                        <span class="bg-green-100 text-green-700 text-[10px] font-bold px-2 py-1 rounded">${p.estatus}</span>
                    </td>
                    <td class="p-3 text-center">
                        <button onclick="eliminarParametro('${p.id}')" class="text-red-400 hover:text-red-600 transition" title="Eliminar"><i class="fa-solid fa-trash-can"></i></button>
                    </td>
                </tr>
            `).join('');
        }

        function filtrarTabla() {
            const filtro = document.getElementById('filtro-grupo').value;
            if(filtro === 'TODOS') pintarTabla(parametros);
            else pintarTabla(parametros.filter(p => p.grupo === filtro));
        }

        async function guardarParametro(e) {
            e.preventDefault();
            const btn = document.getElementById('btn-guardar');
            const grupo = document.getElementById('param-grupo').value;
            // DOBLE SEGURIDAD: Transformamos a mayúsculas aquí antes de enviar
            const valor = document.getElementById('param-valor').value.trim().toUpperCase();

            btn.innerHTML = `<i class="fa-solid fa-spinner fa-spin"></i>`;
            btn.disabled = true;

            try {
                const res = await fetch(`${SUPABASE_URL}/rest/v1/parametros_inventario`, {
                    method: 'POST',
                    headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}`, 'Content-Type': 'application/json', 'Prefer': 'return=representation' },
                    body: JSON.stringify({ grupo: grupo, valor: valor })
                });

                if (!res.ok) throw new Error("Posible duplicado");
                
                document.getElementById('param-valor').value = '';
                await cargarParametros();
                
                // Mostrar el grupo que acabamos de agregar
                document.getElementById('filtro-grupo').value = grupo;
                filtrarTabla();

            } catch(e) {
                alert("Error: Es posible que este valor ya exista en ese grupo.");
            } finally {
                btn.innerHTML = `Guardar Parámetro`;
                btn.disabled = false;
            }
        }

        async function eliminarParametro(id) {
            if(!confirm("¿Eliminar este parámetro? (No se borrará de los productos existentes, solo de la lista seleccionable)")) return;
            
            try {
                await fetch(`${SUPABASE_URL}/rest/v1/parametros_inventario?id=eq.${id}`, {
                    method: 'DELETE',
                    headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` }
                });
                await cargarParametros();
            } catch(e) {
                alert("Error al eliminar.");
            }
        }
    </script>
</body>
</html>
