<!DOCTYPE html>
<html lang="es">
<head>
    <script src="config.js"></script>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>P&P Admin | Recepción de Mercancía V2</title>

    <script>
        const cPri = localStorage.getItem('pyp_color_primario') || '#143B62';
        const cSec = localStorage.getItem('pyp_color_secundario') || '#E67E22';
        const cTer = localStorage.getItem('pyp_color_terciario') || '#64748b';
        const fontFam = localStorage.getItem('pyp_fuente') || "'Inter', sans-serif";
        const fontSiz = localStorage.getItem('pyp_tamano') || "14px";
        
        document.documentElement.style.setProperty('--color-primary', cPri);
        document.documentElement.style.setProperty('--color-secondary', cSec);
        document.documentElement.style.setProperty('--color-tertiary', cTer);
        document.documentElement.style.setProperty('--font-global', fontFam);
        document.documentElement.style.setProperty('--size-global', fontSiz);
    </script>

    <script>
        if (!localStorage.getItem('pyp_token_seguro')) {
            window.location.href = 'login.html';
        }
    </script>

    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/fuse.js/dist/fuse.js"></script>

    <style>
        body { font-family: var(--font-global); font-size: var(--size-global); background: #f4f7fa; color: #333; }
        .bg-primary { background-color: var(--color-primary) !important; }
        .text-primary { color: var(--color-primary) !important; }
        .btn-brand { background-color: var(--color-primary); color: white; transition: 0.3s; }
        .btn-brand:hover { filter: brightness(1.2); }
        
        /* Layout ERP Clase Mundial */
        main { display: grid; grid-template-rows: 65px 1fr; height: 100vh; }
        header { background: white; border-bottom: 2px solid var(--color-secondary); display: flex; justify-content: space-between; align-items: center; padding: 0 25px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        
        .workspace { display: grid; grid-template-columns: 1fr 350px; gap: 20px; padding: 20px; overflow: hidden; }
        .billing-area { display: flex; flex-direction: column; gap: 20px; overflow-y: auto; padding-right: 5px; }
        
        .card { background: white; border-radius: 12px; border: 1px solid #e2e8f0; padding: 20px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        .grid-header { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; }
        .full-width { grid-column: span 2; }
        
        .section-title { font-size: 0.85rem; font-weight: 800; text-transform: uppercase; color: var(--color-primary); border-bottom: 1px solid #edf2f7; padding-bottom: 8px; margin-bottom: 15px; display: flex; align-items: center; gap: 8px; }
        
        label { font-size: 0.75rem; font-weight: 700; color: #64748b; text-transform: uppercase; display: block; margin-bottom: 5px; }
        input, select { width: 100%; padding: 10px; border: 1px solid #cbd5e1; border-radius: 8px; font-size: 0.9rem; outline: none; }
        input:focus { border-color: var(--color-secondary); }
        input[readonly] { background: #f8fafc; cursor: not-allowed; }

        /* Tabla de Renglones */
        .table-container { background: white; border-radius: 12px; border: 1px solid #e2e8f0; flex-grow: 1; overflow-y: auto; }
        table { width: 100%; border-collapse: collapse; }
        thead { position: sticky; top: 0; background: #f8fafc; z-index: 5; }
        th { text-align: left; padding: 12px; font-size: 0.75rem; color: #64748b; border-bottom: 2px solid #e2e8f0; }
        td { padding: 12px; border-bottom: 1px solid #f1f5f9; font-size: 0.9rem; }

        /* Buscadores Predictivos */
        .search-wrapper { position: relative; }
        .search-results { position: absolute; top: 100%; left: 0; right: 0; background: white; border: 1px solid #e2e8f0; border-radius: 8px; z-index: 50; max-height: 250px; overflow-y: auto; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); display: none; }
        .search-item { padding: 12px; cursor: pointer; border-bottom: 1px solid #f1f5f9; }
        .search-item:hover { background: #f1f5f9; color: var(--color-primary); font-weight: 600; }

        /* Panel Lateral de Totales (Modo Bancario) */
        .totals-card { background: #1e293b; color: white; display: flex; flex-direction: column; gap: 15px; }
        .total-row { display: flex; justify-content: space-between; align-items: center; }
        .total-val { font-family: 'Courier New', monospace; font-weight: bold; }
        .grand-total { font-size: 1.8rem; color: #4ade80; border-top: 1px solid #334155; pt: 10px; }
        .blur { filter: blur(6px); user-select: none; }
        
        .btn-process { width: 100%; padding: 15px; border-radius: 10px; border: none; font-weight: 800; font-size: 1.1rem; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; margin-top: 10px; }
    </style>
</head>
<body onclick="cerrarBuscadores()">

    <main>
        <header>
            <div style="display:flex; align-items:center; gap:15px">
                <i class="fa-solid fa-truck-loading text-primary" style="font-size: 1.8rem;"></i>
                <h1 style="color: var(--color-primary); font-weight: 900;">RECEPCIÓN DE COMPRAS V2</h1>
            </div>
            <div style="display:flex; gap:20px; align-items:center;">
                <div class="card" style="padding: 5px 15px; border-color: var(--color-secondary); color: var(--color-secondary); font-weight: 800;">
                    TASA BCV: <span id="val-tasa-bcv">0.00</span>
                </div>
            </div>
        </header>

        <div class="workspace">
            <div class="billing-area">
                <div class="card grid-header">
                    <div class="section-title full-width"><i class="fa-solid fa-address-card"></i> Datos del Proveedor y Factura</div>
                    
                    <div class="search-wrapper full-width">
                        <label>Buscar Proveedor (Directorio Maestro)</label>
                        <input type="text" id="bus-prov" placeholder="Escribe RIF o Razón Social..." onkeyup="buscarProv(this.value)" onclick="event.stopPropagation()">
                        <div id="res-prov" class="search-results"></div>
                        <input type="hidden" id="prov-id">
                    </div>

                    <div>
                        <label>Razón Social</label>
                        <input type="text" id="prov-nombre" readonly>
                    </div>
                    <div>
                        <label>RIF / Documento</label>
                        <input type="text" id="prov-rif" readonly>
                    </div>

                    <div class="section-title full-width" style="margin-top:10px;"><i class="fa-solid fa-file-invoice-dollar"></i> Información del Documento</div>
                    
                    <div>
                        <label>N° de Factura</label>
                        <input type="text" id="fac-nro" placeholder="Ej: F-12345">
                    </div>
                    <div>
                        <label>N° de Control</label>
                        <input type="text" id="fac-control" placeholder="Ej: 00-999">
                    </div>
                    <div>
                        <label>Vendedor (Proveedor)</label>
                        <input type="text" id="fac-vendedor" placeholder="Nombre del vendedor">
                    </div>
                    <div>
                        <label>Condición de Pago</label>
                        <select id="fac-condicion" onchange="toggleCredito(this.value)">
                            <option value="Contado">Contado</option>
                            <option value="Crédito">Crédito (Afecta CxP)</option>
                        </select>
                    </div>
                    <div id="div-dias" style="display:none">
                        <label>Días de Crédito</label>
                        <input type="number" id="fac-dias" value="15">
                    </div>
                    <div>
                        <label>Tasa EUR (Ref)</label>
                        <input type="number" id="tasa-eur" step="0.0001" placeholder="Ej: 1.085">
                    </div>
                </div>

                <div class="table-container">
                    <table>
                        <thead>
                            <tr>
                                <th style="width: 40%;">Producto</th>
                                <th>IVA</th>
                                <th style="text-align: center;">Cantidad</th>
                                <th style="text-align: right;">Costo USD</th>
                                <th style="text-align: right;">Subtotal</th>
                                <th style="width: 50px;"></th>
                            </tr>
                        </thead>
                        <tbody id="lista-items">
                            <tr><td colspan="6" style="text-align:center; padding: 40px; color: #94a3b8;">No hay productos agregados.</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>

            <div style="display: flex; flex-direction: column; gap: 20px;">
                <div class="card">
                    <div class="section-title"><i class="fa-solid fa-barcode"></i> Agregar Productos</div>
                    <div class="search-wrapper">
                        <input type="text" id="bus-prod" placeholder="SKU o Nombre..." onkeyup="buscarProd(this.value)" onclick="event.stopPropagation()">
                        <div id="res-prod" class="search-results"></div>
                    </div>
                </div>

                <div class="card totals-card">
                    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px">
                        <span style="font-size: 0.7rem; font-weight: 800; opacity: 0.7;">TOTALES DE RECEPCIÓN</span>
                        <i class="fa-solid fa-eye" id="eye-toggle" style="cursor:pointer" onclick="toggleBlur()"></i>
                    </div>
                    <div class="total-row">
                        <span>Base Imponible</span>
                        <span class="total-val blur" id="tot-base">US$ 0.00</span>
                    </div>
                    <div class="total-row">
                        <span>Impuestos (IVA)</span>
                        <span class="total-val blur" id="tot-iva" style="color: #f87171;">US$ 0.00</span>
                    </div>
                    <div class="total-row grand-total">
                        <span>TOTAL</span>
                        <span class="total-val blur" id="tot-final">US$ 0.00</span>
                    </div>
                    <div class="total-row" style="opacity: 0.8; font-size: 0.85rem;">
                        <span>Equivalente</span>
                        <span class="total-val blur" id="tot-bs">Bs. 0.00</span>
                    </div>
                </div>

                <button class="btn-process btn-brand" onclick="procesarCompra()">
                    <i class="fa-solid fa-check-double"></i> REGISTRAR COMPRA
                </button>
                <button class="btn-process" style="background:#f1f5f9; color:#64748b;" onclick="location.reload()">
                    <i class="fa-solid fa-rotate-left"></i> CANCELAR
                </button>
            </div>
        </div>
    </main>

    <script>
        const TOKEN_JWT = localStorage.getItem('pyp_token_seguro');
        let inventario = []; let fuseProd;
        let directorio = []; let fuseProv;
        let listaRecepcion = [];
        let tasaBCV = 1;
        let esBlur = true;

        window.onload = async () => {
            try {
                // 1. Cargar Tasa
                const resTasa = await fetch(`${SUPABASE_URL}/rest/v1/tasas_bcv?select=tasa&order=fecha_actualizacion.desc&limit=1`, { headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${TOKEN_JWT}` } });
                const dTasa = await resTasa.json();
                if(dTasa[0]) { tasaBCV = dTasa[0].tasa; document.getElementById('val-tasa-bcv').innerText = tasaBCV.toFixed(2); }

                // 2. Cargar Datos
                const [pRes, dRes] = await Promise.all([
                    fetch(`${SUPABASE_URL}/rest/v1/vista_catalogo_web?select=*&limit=2000`, { headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${TOKEN_JWT}` } }),
                    fetch(`${SUPABASE_URL}/rest/v1/directorio_maestro?select=*&limit=1000`, { headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${TOKEN_JWT}` } })
                ]);
                
                inventario = await pRes.json();
                fuseProd = new Fuse(inventario, { keys: ['nombre', 'id_producto_sku'], threshold: 0.3 });
                
                directorio = await dRes.json();
                fuseProv = new Fuse(directorio, { keys: ['nombre_razon_social', 'documento_identidad'], threshold: 0.3 });
            } catch(e) { console.error(e); }
        };

        function cerrarBuscadores() { 
            document.getElementById('res-prov').style.display = 'none'; 
            document.getElementById('res-prod').style.display = 'none'; 
        }

        function buscarProv(v) {
            const res = document.getElementById('res-prov');
            if(!v) return res.style.display = 'none';
            const r = fuseProv.search(v).slice(0, 6);
            res.innerHTML = r.map(i => `<div class="search-item" onclick="selProv('${i.item.id}')"><strong>${i.item.documento_identidad}</strong> - ${i.item.nombre_razon_social}</div>`).join('');
            res.style.display = 'block';
        }

        function selProv(id) {
            const p = directorio.find(x => x.id === id);
            document.getElementById('prov-id').value = p.id;
            document.getElementById('prov-nombre').value = p.nombre_razon_social;
            document.getElementById('prov-rif').value = p.documento_identidad;
            if(p.dias_credito) document.getElementById('fac-dias').value = p.dias_credito;
            cerrarBuscadores();
        }

        function buscarProd(v) {
            const res = document.getElementById('res-prod');
            if(!v) return res.style.display = 'none';
            const r = fuseProd.search(v).slice(0, 10);
            res.innerHTML = r.map(i => `<div class="search-item" onclick="addProd('${i.item.id_producto_sku}')"><strong>${i.item.id_producto_sku}</strong><br><small>${i.item.nombre}</small></div>`).join('');
            res.style.display = 'block';
        }

        function addProd(sku) {
            if(listaRecepcion.some(x => x.id_producto_sku === sku)) return alert("Ya agregado");
            const p = inventario.find(x => x.id_producto_sku === sku);
            listaRecepcion.push({
                id_producto_sku: p.id_producto_sku,
                nombre: p.nombre,
                cantidad_recibida: 1,
                costo_unitario_usd: 0,
                impuesto_porcentaje: 16,
                tipo_impuesto: 'GENERAL'
            });
            cerrarBuscadores();
            render();
        }

        function editItem(idx, campo, val) {
            listaRecepcion[idx][campo] = (campo === 'tipo_impuesto') ? val : parseFloat(val) || 0;
            if(campo === 'tipo_impuesto') listaRecepcion[idx].impuesto_porcentaje = (val==='GENERAL'?16:(val==='REDUCIDO'?8:0));
            render();
        }

        function render() {
            const cont = document.getElementById('lista-items');
            if(listaRecepcion.length === 0) { cont.innerHTML = '<tr><td colspan="6" style="text-align:center; padding: 40px; color: #94a3b8;">No hay productos.</td></tr>'; return updateTotals(0,0); }
            
            let b = 0; let i = 0;
            cont.innerHTML = listaRecepcion.map((item, index) => {
                const sub = item.cantidad_recibida * item.costo_unitario_usd;
                const iva = sub * (item.impuesto_porcentaje / 100);
                b += sub; i += iva;
                return `<tr>
                    <td><strong>${item.id_producto_sku}</strong><br><small>${item.nombre}</small></td>
                    <td>
                        <select onchange="editItem(${index}, 'tipo_impuesto', this.value)">
                            <option value="GENERAL" ${item.tipo_impuesto==='GENERAL'?'selected':''}>16%</option>
                            <option value="REDUCIDO" ${item.tipo_impuesto==='REDUCIDO'?'selected':''}>8%</option>
                            <option value="EXENTO" ${item.tipo_impuesto==='EXENTO'?'selected':''}>Exento</option>
                        </select>
                    </td>
                    <td><input type="number" value="${item.cantidad_recibida}" style="text-align:center" onchange="editItem(${index}, 'cantidad_recibida', this.value)"></td>
                    <td><input type="number" value="${item.costo_unitario_usd}" style="text-align:right" onchange="editItem(${index}, 'costo_unitario_usd', this.value)"></td>
                    <td style="text-align:right; font-weight:bold;">$ ${sub.toFixed(2)}</td>
                    <td><i class="fa-solid fa-trash" style="color:#cbd5e1; cursor:pointer" onclick="listaRecepcion.splice(${index},1); render();"></i></td>
                </tr>`;
            }).join('');
            updateTotals(b, i);
        }

        function updateTotals(b, i) {
            document.getElementById('tot-base').innerText = `US$ ${b.toFixed(2)}`;
            document.getElementById('tot-iva').innerText = `US$ ${i.toFixed(2)}`;
            const f = b + i;
            document.getElementById('tot-final').innerText = `US$ ${f.toFixed(2)}`;
            document.getElementById('tot-bs').innerText = `Bs. ${(f * tasaBCV).toFixed(2)}`;
        }

        async function procesarCompra() {
            const pId = document.getElementById('prov-id').value;
            const fac = document.getElementById('fac-nro').value.trim();
            const con = document.getElementById('fac-control').value.trim();
            if(!pId || !fac || !con || listaRecepcion.length === 0) return alert("Faltan datos obligatorios.");

            const btn = document.querySelector('.btn-brand');
            btn.innerHTML = `<i class="fa-solid fa-spinner fa-spin"></i> PROCESANDO...`; btn.disabled = true;

            const base = parseFloat(document.getElementById('tot-base').innerText.replace('US$ ',''));
            const iva = parseFloat(document.getElementById('tot-iva').innerText.replace('US$ ',''));
            const total = base + iva;

            try {
                const payload = {
                    p_id_proveedor: pId,
                    p_numero_factura: fac,
                    p_numero_control: con,
                    p_vendedor_proveedor: document.getElementById('fac-vendedor').value,
                    p_condicion_pago: document.getElementById('fac-condicion').value,
                    p_dias_credito: parseInt(document.getElementById('fac-dias').value) || 0,
                    p_base_imponible_usd: base,
                    p_total_iva_usd: iva,
                    p_total_usd: total,
                    p_total_bs: total * tasaBCV,
                    p_tasa_bcv: tasaBCV,
                    p_tasa_eur: parseFloat(document.getElementById('tasa-eur').value) || 0,
                    p_detalles: listaRecepcion
                };

                const res = await fetch(`${SUPABASE_URL}/rest/v1/rpc/registrar_compra_erp_v2`, { 
                    method: 'POST', 
                    headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${TOKEN_JWT}`, 'Content-Type': 'application/json' }, 
                    body: JSON.stringify(payload) 
                });

                if(!res.ok) throw await res.json();
                alert("¡Compra procesada con éxito! Inventario y CxP actualizados.");
                location.reload();
            } catch(e) { alert("Error: " + (e.message || "Fallo en servidor")); btn.innerHTML = `<i class="fa-solid fa-check-double"></i> REGISTRAR COMPRA`; btn.disabled = false; }
        }

        function toggleBlur() { esBlur = !esBlur; document.querySelectorAll('.total-val').forEach(e => esBlur ? e.classList.add('blur') : e.classList.remove('blur')); document.getElementById('eye-toggle').className = esBlur ? 'fa-solid fa-eye' : 'fa-solid fa-eye-slash'; }
        function toggleCredito(v) { document.getElementById('div-dias').style.display = (v === 'Crédito' ? 'block' : 'none'); }
    </script>
</body>
</html>
