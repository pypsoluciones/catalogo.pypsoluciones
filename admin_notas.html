<!DOCTYPE html>
<html lang="es">
<head>
    <!-- Configuración central P&P (cargada antes de cualquier otro script) -->
    <script src="config.js"></script>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin | Notas de Entrega (Cuentas por Cobrar)</title>

    <script>
        const cPri = localStorage.getItem('pyp_color_primario') || '#143B62';
        const cSec = localStorage.getItem('pyp_color_secundario') || '#E67E22';
        const cTer = localStorage.getItem('pyp_color_terciario') || '#64748b';
        const fontFam = localStorage.getItem('pyp_fuente') || "'Inter', sans-serif";
        const fontSiz = localStorage.getItem('pyp_tamano') || "14px";
        
        // Inyectamos variables CSS (Motor Marca Blanca)
        document.documentElement.style.setProperty('--color-primary', cPri);
        document.documentElement.style.setProperty('--color-secondary', cSec);
        document.documentElement.style.setProperty('--color-tertiary', cTer);
        document.documentElement.style.setProperty('--font-global', fontFam);
        document.documentElement.style.setProperty('--size-global', fontSiz);
    </script>

    <link rel="stylesheet" href="styles.css">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <script>
        // Guardián de Seguridad: Exige el Token Real
        if (!localStorage.getItem('pyp_token_seguro')) {
            window.location.href = 'login.html';
        }
    </script>

    <style>
        body { font-family: var(--font-global); font-size: var(--size-global); }
        .bg-primary { background-color: var(--color-primary) !important; }
        .text-primary { color: var(--color-primary) !important; }
        .bg-secondary { background-color: var(--color-secondary) !important; }
        .text-secondary { color: var(--color-secondary) !important; }
        .text-tertiary { color: var(--color-tertiary) !important; }
        .border-primary { border-color: var(--color-primary) !important; }

        .custom-scroll::-webkit-scrollbar { width: 5px; height: 5px; }
        .custom-scroll::-webkit-scrollbar-thumb { background-color: var(--color-primary); border-radius: 4px; }
        .btn-press:active { transform: scale(0.96); }
        .fade-in { animation: fadeIn 0.2s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-[#f0f2f5] font-sans flex h-screen overflow-hidden text-gray-800">
    <main class="flex-1 flex flex-col h-screen overflow-hidden bg-gray-50">
        <header class="bg-white shadow-sm px-6 py-4 flex justify-between items-center z-10 shrink-0">
            <div>
                <h1 class="text-xl font-bold text-[#143B62] flex items-center gap-2"><i class="fa-solid fa-truck-fast"></i> Notas de Entrega (Despachos)</h1>
                <p class="text-xs text-gray-500 font-bold mt-1">Control de mercancía entregada pendiente por facturar/cobrar.</p>
            </div>
            <button onclick="cargarDespachos()" class="bg-gray-100 hover:bg-gray-200 text-gray-700 px-4 py-2 rounded-lg font-bold text-sm shadow-sm transition flex items-center gap-2">
                <i class="fa-solid fa-rotate-right"></i> Refrescar
            </button>
        </header>

        <div class="flex-1 overflow-auto p-4 md:p-6 custom-scroll">
            <div class="bg-white rounded-xl border border-gray-200 shadow-sm overflow-hidden">
                <table class="w-full text-left text-sm border-collapse">
                    <thead class="bg-[#143B62] text-white text-[10px] uppercase font-black">
                        <tr>
                            <th class="p-4 rounded-tl-xl"># Nota</th>
                            <th class="p-4">Fecha de Entrega</th>
                            <th class="p-4">Cliente</th>
                            <th class="p-4 text-right">Deuda Pendiente</th>
                            <th class="p-4 text-center">Estatus</th>
                            <th class="p-4 text-center rounded-tr-xl">Acción</th>
                        </tr>
                    </thead>
                    <tbody id="tabla-despachos" class="divide-y divide-gray-100">
                        <tr><td colspan="6" class="p-10 text-center text-gray-400"><i class="fa-solid fa-spinner fa-spin text-xl"></i> Buscando despachos...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <script>
        const SUPABASE_URL = 'https://icvfmdvvochzaktugqvj.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImljdmZtZHZ2b2NoemFrdHVncXZqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYyNDEzMzEsImV4cCI6MjA5MTgxNzMzMX0.gO3D39piT6KGbMMOzrPGWXUp5-g_nOBAgJ-nwPv8IcQ';

        window.onload = cargarDespachos;

        async function cargarDespachos() {
            try {
                // Buscamos transacciones tipo 'Nota de Entrega'
                const res = await fetch(`${SUPABASE_URL}/rest/v1/facturas?tipo_transaccion=eq.Nota%20de%20Entrega&order=fecha_emision.desc`, { headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${localStorage.getItem('pyp_token_seguro')}` } });
                const data = await res.json();
                
                const tbody = document.getElementById('tabla-despachos');
                if(!data.length) { tbody.innerHTML = `<tr><td colspan="6" class="p-10 text-center text-gray-400 font-bold"><i class="fa-solid fa-box-open text-4xl mb-3 block opacity-50"></i> No hay notas de entrega registradas.</td></tr>`; return; }

                tbody.innerHTML = data.map(c => {
                    // Si está 'Por Facturar' (rojo), si está 'Completada' (verde)
                    let badge = '<span class="bg-green-100 text-green-700 px-3 py-1 rounded-full text-[9px] font-black border border-green-200">FACTURADO Y COBRADO</span>';
                    let btn = `<span class="text-gray-300 font-bold text-xs"><i class="fa-solid fa-lock"></i> Cerrado</span>`;
                    
                    if(c.estatus === 'Por Facturar') {
                        badge = '<span class="bg-red-50 text-red-600 px-3 py-1 rounded-full text-[9px] font-black border border-red-200 animate-pulse">POR FACTURAR</span>';
                        btn = `<button onclick="facturarDespacho('${c.id_factura}')" class="bg-blue-600 hover:bg-blue-700 text-white px-3 py-1.5 rounded shadow text-xs font-bold transition flex justify-center items-center gap-1 mx-auto w-full max-w-[120px]"><i class="fa-solid fa-file-invoice-dollar"></i> Facturar Ahora</button>`;
                    }
                    
                    return `
                    <tr class="hover:bg-gray-50 transition">
                        <td class="p-4 font-mono font-bold text-blue-600">NE-00${c.correlativo}</td>
                        <td class="p-4 text-gray-500 font-semibold text-xs">${new Date(c.fecha_emision).toLocaleDateString()}</td>
                        <td class="p-4"><p class="font-bold text-[#143B62]">${c.cliente_nombre}</p><p class="text-[9px] text-gray-400">${c.cliente_documento}</p></td>
                        <td class="p-4 text-right font-black text-gray-800 text-lg">$${Number(c.total_usd).toFixed(2)}</td>
                        <td class="p-4 text-center">${badge}</td>
                        <td class="p-4 text-center">${btn}</td>
                    </tr>`;
                }).join('');
            } catch(e) { alert("Error cargando los despachos."); }
        }

        async function facturarDespacho(id) {
            if(!confirm("¿El cliente ya pagó y deseas convertir esta Nota de Entrega en una FACTURA DEFINITIVA?")) return;

            try {
                // Actualizamos el estatus a 'Completada' para que la contabilidad la cierre.
                // Mantenemos el tipo "Nota de Entrega" por temas de auditoría, o podríamos cambiarlo a 'Venta'.
                // Dejémoslo en Nota de Entrega pero con estatus Completada.
                const res = await fetch(`${SUPABASE_URL}/rest/v1/facturas?id_factura=eq.${id}`, {
                    method: 'PATCH',
                    headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${localStorage.getItem('pyp_token_seguro')}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        estatus: 'Completada',
                        fecha_emision: new Date().toISOString() // Actualizamos la fecha a la del pago real
                    })
                });

                if(res.ok) {
                    alert("¡Éxito! El despacho ha sido facturado y cerrado en la contabilidad.");
                    cargarDespachos();
                }
            } catch(e) { alert("Error al procesar el pago del despacho."); }
        }
      
    </script>
    <script src="menu.js"></script>
</body>
</html>
