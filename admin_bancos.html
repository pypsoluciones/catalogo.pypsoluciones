<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin | Bancos y Tesorería</title>
    
    <script>
        const cPri = localStorage.getItem('pyp_color_primario') || '#143B62';
        const cSec = localStorage.getItem('pyp_color_secundario') || '#E67E22';
        const cTer = localStorage.getItem('pyp_color_terciario') || '#64748b';
        const fontFam = localStorage.getItem('pyp_fuente') || "'Inter', sans-serif";
        const fontSiz = localStorage.getItem('pyp_tamano') || "14px";
        
        // Inyectamos variables CSS (Motor Marca Blanca)
        document.documentElement.style.setProperty('--font-global', fontFam);
        document.documentElement.style.setProperty('--size-global', fontSiz);
        document.documentElement.style.setProperty('--color-primary', cPri);
        document.documentElement.style.setProperty('--color-secondary', cSec);
        document.documentElement.style.setProperty('--color-tertiary', cTer);
    </script>

    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        body { font-family: var(--font-global); font-size: var(--size-global); }
        .custom-scroll::-webkit-scrollbar { width: 6px; height: 6px; }
        .custom-scroll::-webkit-scrollbar-thumb { background-color: var(--color-primary); border-radius: 4px; }
        .btn-press:active { transform: scale(0.95); }
    </style>
    
    <script>
        // Guardián de Seguridad: Exige el Token Real
        if (!localStorage.getItem('pyp_token_seguro')) {
            window.location.href = 'login.html';
        }
    </script>
</head>
    <main class="flex-1 flex flex-col h-screen overflow-hidden bg-gray-50">
        <header class="bg-white shadow-sm px-6 py-4 flex flex-col md:flex-row justify-between items-center gap-4 z-10 shrink-0">
            <h1 class="text-xl font-bold text-[#143B62] flex items-center gap-2"><i class="fa-solid fa-building-columns"></i> Bancos y Tesorería</h1>
            <div class="flex gap-2">
                <button onclick="cerrarSesion()" class="bg-red-500 hover:bg-red-600 text-white px-3 py-1 rounded shadow text-[10px] font-bold transition btn-press" title="Cerrar Sesión">
                    <i class="fa-solid fa-power-off"></i>
                </button>
            </div>
                <button onclick="abrirModalCuenta()" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg font-bold text-sm shadow-md transition flex items-center gap-2 btn-press">
                    <i class="fa-solid fa-plus"></i> Nueva Cuenta
                </button>
                <button onclick="abrirModalTransaccion()" class="bg-[#25D366] hover:bg-[#1ebd5c] text-white px-4 py-2 rounded-lg font-bold text-sm shadow-md transition flex items-center gap-2 btn-press">
                    <i class="fa-solid fa-money-bill-transfer"></i> Movimiento
                </button>
            </div>
        </header>

        <div class="flex-1 overflow-auto p-6 custom-scroll">
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6">
                <div class="bg-[#143B62] rounded-xl p-5 text-white shadow-lg relative overflow-hidden">
                    <i class="fa-solid fa-dollar-sign absolute -right-4 -bottom-4 text-8xl text-white/10"></i>
                    <p class="text-xs font-bold text-blue-200 uppercase tracking-wider mb-1">Total Liquidez (USD)</p>
                    <h2 class="text-4xl font-black text-yellow-400" id="total-usd">$0.00</h2>
                </div>
                <div class="bg-white border border-gray-200 rounded-xl p-5 shadow-sm relative overflow-hidden">
                    <i class="fa-solid fa-money-bill-1-wave absolute -right-4 -bottom-4 text-8xl text-gray-100"></i>
                    <p class="text-xs font-bold text-gray-500 uppercase tracking-wider mb-1">Total Liquidez (Bs)</p>
                    <h2 class="text-4xl font-black text-[#143B62]" id="total-bs">Bs. 0.00</h2>
                </div>
            </div>

            <h3 class="text-sm font-bold text-gray-700 uppercase tracking-wider mb-4 border-l-4 border-[#E67E22] pl-2">Mis Cuentas y Cajas</h3>
            
            <div id="grilla-cuentas" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4">
                <div class="col-span-full text-center text-gray-400 py-10"><i class="fa-solid fa-spinner fa-spin text-2xl"></i> Cargando cuentas...</div>
            </div>

        </div>
    </main>

    <div id="modal-cuenta" class="fixed inset-0 bg-black/60 z-[100] hidden flex items-center justify-center p-4">
        <div class="bg-white rounded-xl shadow-2xl w-full max-w-sm flex flex-col transform scale-95 transition-transform" id="modal-cuenta-content">
            <div class="bg-[#143B62] text-white p-4 flex justify-between items-center">
                <h3 class="font-bold text-lg"><i class="fa-solid fa-piggy-bank mr-2"></i> Nueva Cuenta / Caja</h3>
                <button onclick="cerrarModalCuenta()" class="text-gray-300 hover:text-white text-xl"><i class="fa-solid fa-times"></i></button>
            </div>
            
            <form id="form-cuenta" onsubmit="guardarCuenta(event)" class="p-6 bg-gray-50 space-y-4">
                <div>
                    <label class="block text-[10px] font-bold text-gray-500 uppercase tracking-wider mb-1">Nombre de la Cuenta *</label>
                    <input type="text" id="cta-nombre" required placeholder="Ej: Mercantil, Caja Fuerte 2" class="w-full border border-gray-300 rounded px-3 py-2 text-sm focus:border-[#E67E22] outline-none font-bold text-gray-800">
                </div>
                
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-[10px] font-bold text-gray-500 uppercase tracking-wider mb-1">Tipo *</label>
                        <select id="cta-tipo" class="w-full border border-gray-300 rounded px-3 py-2 text-sm outline-none bg-white font-semibold text-gray-700">
                            <option value="Banco Nacional">Banco Nacional</option>
                            <option value="Billetera Digital">Billetera (Zelle, etc)</option>
                            <option value="Efectivo">Caja de Efectivo</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-[10px] font-bold text-gray-500 uppercase tracking-wider mb-1">Moneda *</label>
                        <select id="cta-moneda" class="w-full border border-gray-300 rounded px-3 py-2 text-sm outline-none bg-white font-black text-[#143B62]">
                            <option value="BS">Bolívares (Bs)</option>
                            <option value="USD">Dólares (USD)</option>
                            <option value="EUR">Euros (EUR)</option>
                        </select>
                    </div>
                </div>

                <div>
                    <label class="block text-[10px] font-bold text-gray-500 uppercase tracking-wider mb-1">Saldo Inicial (Opcional)</label>
                    <input type="number" id="cta-saldo" step="0.01" value="0.00" class="w-full border border-gray-300 rounded px-3 py-2 text-lg focus:border-[#E67E22] outline-none font-black text-[#143B62]">
                </div>
                
                <div class="pt-4 flex gap-3">
                    <button type="button" onclick="cerrarModalCuenta()" class="flex-1 py-3 bg-gray-200 text-gray-700 font-bold rounded-lg btn-press">Cancelar</button>
                    <button type="submit" id="btn-guardar-cta" class="flex-[2] py-3 bg-[#25D366] text-white font-bold rounded-lg shadow-md btn-press">Guardar Cuenta</button>
                </div>
            </form>
        </div>
    </div>

    <div id="modal-transaccion" class="fixed inset-0 bg-black/60 z-[100] hidden flex items-center justify-center p-4">
        <div class="bg-white rounded-xl shadow-2xl w-full max-w-md flex flex-col transform scale-95 transition-transform" id="modal-content">
            <div class="bg-[#143B62] text-white p-4 flex justify-between items-center">
                <h3 class="font-bold text-lg"><i class="fa-solid fa-money-bill-transfer mr-2"></i> Registrar Movimiento</h3>
                <button onclick="cerrarModal()" class="text-gray-300 hover:text-white text-xl"><i class="fa-solid fa-times"></i></button>
            </div>
            
            <form id="form-transaccion" onsubmit="procesarTransaccion(event)" class="p-6 bg-gray-50 space-y-4">
                
                <div class="grid grid-cols-3 gap-2 bg-gray-200 p-1 rounded-lg">
                    <label class="cursor-pointer text-center">
                        <input type="radio" name="tipo_mov" value="Ingreso" class="peer sr-only" onchange="cambiarVistaForm()">
                        <div class="peer-checked:bg-green-500 peer-checked:text-white peer-checked:shadow text-gray-600 text-xs font-bold py-2 rounded transition">INGRESO</div>
                    </label>
                    <label class="cursor-pointer text-center">
                        <input type="radio" name="tipo_mov" value="Egreso" class="peer sr-only" checked onchange="cambiarVistaForm()">
                        <div class="peer-checked:bg-red-500 peer-checked:text-white peer-checked:shadow text-gray-600 text-xs font-bold py-2 rounded transition">EGRESO</div>
                    </label>
                    <label class="cursor-pointer text-center">
                        <input type="radio" name="tipo_mov" value="Transferencia" class="peer sr-only" onchange="cambiarVistaForm()">
                        <div class="peer-checked:bg-blue-600 peer-checked:text-white peer-checked:shadow text-gray-600 text-xs font-bold py-2 rounded transition">TRANSFERIR</div>
                    </label>
                </div>

                <div id="bloque-cuenta-origen">
                    <label id="lbl-origen" class="block text-[10px] font-bold text-gray-500 uppercase tracking-wider mb-1">Sacar dinero de (Cuenta Origen):</label>
                    <select id="cuenta-origen" required class="w-full border border-gray-300 rounded px-3 py-2 text-sm focus:outline-none font-bold text-gray-800 bg-white shadow-sm"></select>
                </div>

                <div id="bloque-cuenta-destino" class="hidden">
                    <div class="flex justify-center my-2 text-gray-400"><i class="fa-solid fa-arrow-down"></i></div>
                    <label class="block text-[10px] font-bold text-gray-500 uppercase tracking-wider mb-1">Mover dinero a (Cuenta Destino):</label>
                    <select id="cuenta-destino" class="w-full border border-gray-300 rounded px-3 py-2 text-sm focus:outline-none font-bold text-gray-800 bg-white shadow-sm"></select>
                </div>

                <div>
                    <label class="block text-[10px] font-bold text-gray-500 uppercase tracking-wider mb-1">Monto Exacto</label>
                    <div class="relative">
                        <span class="absolute left-3 top-2 font-black text-gray-400">#</span>
                        <input type="number" id="monto-transaccion" step="0.01" min="0.01" required placeholder="0.00" class="w-full border border-gray-300 rounded pl-8 pr-3 py-2 text-lg focus:outline-none focus:border-[#E67E22] font-black text-[#143B62]">
                    </div>
                </div>

                <div>
                    <label class="block text-[10px] font-bold text-gray-500 uppercase tracking-wider mb-1">Concepto / Razón</label>
                    <input type="text" id="concepto-transaccion" required placeholder="Ej: Pago de luz / Depósito de efectivo" class="w-full border border-gray-300 rounded px-3 py-2 text-sm focus:outline-none focus:border-[#E67E22]">
                </div>
                
                <div class="pt-4 flex gap-3">
                    <button type="button" onclick="cerrarModal()" class="flex-1 py-3 bg-gray-200 text-gray-700 font-bold rounded-lg btn-press">Cancelar</button>
                    <button type="submit" id="btn-guardar" class="flex-[2] py-3 bg-[#143B62] text-white font-bold rounded-lg shadow-md btn-press flex justify-center items-center gap-2">
                        <i class="fa-solid fa-bolt"></i> Ejecutar
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://icvfmdvvochzaktugqvj.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImljdmZtZHZ2b2NoemFrdHVncXZqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYyNDEzMzEsImV4cCI6MjA5MTgxNzMzMX0.gO3D39piT6KGbMMOzrPGWXUp5-g_nOBAgJ-nwPv8IcQ';

        let cuentas = [];

        window.onload = cargarCuentas;

        async function cargarCuentas() {
            try {
                const res = await fetch(`${SUPABASE_URL}/rest/v1/cuentas_bancarias?order=tipo.asc,nombre.asc`, { headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${localStorage.getItem('pyp_token_seguro')});
                cuentas = await res.json();
                
                let totalUSD = 0; let totalBS = 0;
                let htmlGrilla = '';
                let htmlOpciones = '';

                cuentas.forEach(c => {
                    if(c.moneda === 'USD') totalUSD += Number(c.saldo);
                    else if(c.moneda === 'BS') totalBS += Number(c.saldo);

                    let icono = 'fa-building-columns'; let colorFondo = 'bg-white'; let colorIcono = 'text-blue-500';
                    if(c.tipo === 'Efectivo') { icono = 'fa-money-bill-wave'; colorIcono = 'text-green-500'; }
                    if(c.tipo === 'Billetera Digital') { icono = 'fa-mobile-screen'; colorIcono = 'text-purple-500'; colorFondo = 'bg-gray-50'; }

                    const simbolo = c.moneda === 'USD' ? '$' : (c.moneda === 'EUR' ? '€' : 'Bs.');

                    htmlGrilla += `
                    <div class="${colorFondo} rounded-xl border border-gray-200 p-5 shadow-sm hover:shadow-md transition relative group">
                        <div class="flex justify-between items-start mb-4">
                            <div class="w-10 h-10 rounded-full bg-white border border-gray-100 shadow-sm flex items-center justify-center">
                                <i class="fa-solid ${icono} ${colorIcono} text-lg"></i>
                            </div>
                            <span class="text-[9px] font-bold bg-gray-200 text-gray-600 px-2 py-1 rounded uppercase tracking-wider">${c.tipo}</span>
                        </div>
                        <h3 class="text-xs font-bold text-gray-500 mb-1">${c.nombre}</h3>
                        <p class="text-2xl font-black text-[#143B62]">${simbolo} ${Number(c.saldo).toFixed(2)}</p>
                    </div>`;

                    htmlOpciones += `<option value="${c.id_cuenta}">${c.nombre} (${c.moneda})</option>`;
                });

                document.getElementById('grilla-cuentas').innerHTML = htmlGrilla || '<div class="col-span-full text-center text-gray-400 py-10">No hay cuentas registradas.</div>';
                document.getElementById('total-usd').innerText = `$${totalUSD.toFixed(2)}`;
                document.getElementById('total-bs').innerText = `Bs. ${totalBS.toFixed(2)}`;

                document.getElementById('cuenta-origen').innerHTML = htmlOpciones;
                document.getElementById('cuenta-destino').innerHTML = htmlOpciones;

            } catch(e) { alert("Error cargando las cuentas bancarias."); }
        }

        // --- LÓGICA MODAL NUEVA CUENTA ---
        function abrirModalCuenta() {
            document.getElementById('form-cuenta').reset();
            document.getElementById('modal-cuenta').classList.remove('hidden');
            setTimeout(() => document.getElementById('modal-cuenta-content').classList.replace('scale-95', 'scale-100'), 10);
        }

        function cerrarModalCuenta() {
            document.getElementById('modal-cuenta-content').classList.replace('scale-100', 'scale-95');
            setTimeout(() => document.getElementById('modal-cuenta').classList.add('hidden'), 150);
        }

        async function guardarCuenta(e) {
            e.preventDefault();
            const btn = document.getElementById('btn-guardar-cta');
            btn.innerHTML = `<i class="fa-solid fa-spinner fa-spin"></i>...`; btn.disabled = true;

            try {
                const data = {
                    nombre: document.getElementById('cta-nombre').value.trim(),
                    tipo: document.getElementById('cta-tipo').value,
                    moneda: document.getElementById('cta-moneda').value,
                    saldo: parseFloat(document.getElementById('cta-saldo').value) || 0,
                    estatus: 'Activo'
                };

                const res = await fetch(`${SUPABASE_URL}/rest/v1/cuentas_bancarias`, {
                    method: 'POST',
                    headers: { 'apikey': SUPABASE_KEY, ''Authorization': `Bearer ${localStorage.getItem('pyp_token_seguro')}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });

                if(!res.ok) throw new Error("Error guardando cuenta");

                cerrarModalCuenta();
                await cargarCuentas();
            } catch(error) {
                alert("Error al crear la cuenta.");
            } finally {
                btn.innerHTML = 'Guardar Cuenta'; btn.disabled = false;
            }
        }

        // --- LÓGICA MODAL TRANSACCIONES ---
        function abrirModalTransaccion() {
            if(cuentas.length === 0) return alert("Debes crear al menos una cuenta primero.");
            document.getElementById('form-transaccion').reset();
            cambiarVistaForm(); 
            document.getElementById('modal-transaccion').classList.remove('hidden');
            setTimeout(() => document.getElementById('modal-content').classList.replace('scale-95', 'scale-100'), 10);
        }

        function cerrarModal() {
            document.getElementById('modal-content').classList.replace('scale-100', 'scale-95');
            setTimeout(() => document.getElementById('modal-transaccion').classList.add('hidden'), 150);
        }

        function cambiarVistaForm() {
            const tipo = document.querySelector('input[name="tipo_mov"]:checked').value;
            const bOrigen = document.getElementById('bloque-cuenta-origen');
            const bDestino = document.getElementById('bloque-cuenta-destino');
            const lblOrigen = document.getElementById('lbl-origen');

            if(tipo === 'Ingreso') {
                bOrigen.classList.remove('hidden'); bDestino.classList.add('hidden');
                lblOrigen.innerText = 'Ingresar dinero a (Cuenta Destino):';
            } 
            else if(tipo === 'Egreso') {
                bOrigen.classList.remove('hidden'); bDestino.classList.add('hidden');
                lblOrigen.innerText = 'Sacar dinero de (Cuenta Origen):';
            } 
            else if(tipo === 'Transferencia') {
                bOrigen.classList.remove('hidden'); bDestino.classList.remove('hidden');
                lblOrigen.innerText = 'Transferir DESDE (Origen):';
            }
        }

        async function procesarTransaccion(e) {
            e.preventDefault();
            const tipo = document.querySelector('input[name="tipo_mov"]:checked').value;
            const monto = parseFloat(document.getElementById('monto-transaccion').value);
            const idOrigen = document.getElementById('cuenta-origen').value;
            const idDestino = document.getElementById('cuenta-destino').value;
            
            if (tipo === 'Transferencia' && idOrigen === idDestino) {
                return alert("No puedes transferir dinero a la misma cuenta.");
            }

            const btn = document.getElementById('btn-guardar');
            btn.innerHTML = `<i class="fa-solid fa-spinner fa-spin"></i> Procesando...`; btn.disabled = true;

            try {
                const cuentaOrigenData = cuentas.find(c => c.id_cuenta === idOrigen);
                
                if(tipo === 'Egreso') {
                    await actualizarSaldo(idOrigen, Number(cuentaOrigenData.saldo) - monto);
                } 
                else if (tipo === 'Ingreso') {
                    await actualizarSaldo(idOrigen, Number(cuentaOrigenData.saldo) + monto);
                } 
                else if (tipo === 'Transferencia') {
                    const cuentaDestinoData = cuentas.find(c => c.id_cuenta === idDestino);
                    if(cuentaOrigenData.moneda !== cuentaDestinoData.moneda) {
                        alert("No puedes transferir directamente entre cuentas de diferente moneda (Ej: De Bs a USD).");
                        throw new Error("Monedas incompatibles");
                    }
                    await actualizarSaldo(idOrigen, Number(cuentaOrigenData.saldo) - monto);
                    await actualizarSaldo(idDestino, Number(cuentaDestinoData.saldo) + monto);
                }

                cerrarModal();
                await cargarCuentas(); 
            } catch (error) {
                if(error.message !== "Monedas incompatibles") alert("Ocurrió un error al procesar el movimiento.");
            } finally {
                btn.innerHTML = `<i class="fa-solid fa-bolt"></i> Ejecutar`; btn.disabled = false;
            }
        }

        async function actualizarSaldo(idCuenta, nuevoSaldo) {
            const res = await fetch(`${SUPABASE_URL}/rest/v1/cuentas_bancarias?id_cuenta=eq.${idCuenta}`, {
                method: 'PATCH',
                headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${localStorage.getItem('pyp_token_seguro')}`, 'Content-Type': 'application/json' },
                body: JSON.stringify({ saldo: nuevoSaldo })
            });
            if(!res.ok) throw new Error("Error en base de datos");
        }
      
    </script>
    <script src="menu.js"></script>
</body>
</html>
