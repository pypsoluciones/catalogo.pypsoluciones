<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>P&P Admin | Configuración</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
    <script src="config.js"></script>
    <script>if (!localStorage.getItem('pyp_token_seguro')) window.location.href = 'login.html';</script>
</head>
<body class="bg-[#f4f6f8] flex h-screen overflow-hidden text-gray-800">
    <script src="menu.js"></script>
    <main class="flex-1 flex flex-col h-screen overflow-hidden bg-[#f4f6f8] w-full z-10 relative">
        <header class="bg-white shadow-sm px-4 py-3 flex justify-between items-center z-10 border-b border-gray-200">
            <h1 class="text-base font-bold text-[#143B62] flex items-center gap-2"><i class="fa-solid fa-gear text-[#E67E22]"></i> Panel de Configuración del Sistema</h1>
        </header>

        <div class="flex-1 overflow-y-auto p-4 md:p-6 custom-scroll">
            <div class="max-w-5xl mx-auto space-y-6 pb-20">
                
                <div class="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
                    <div class="bg-emerald-600 px-4 py-2 text-white font-bold text-xs uppercase tracking-widest">💸 Moneda y Tasa de Cambio</div>
                    <div class="p-5">
                        <p class="text-[10px] text-gray-400 font-bold uppercase mb-3"><i class="fa-solid fa-circle-info"></i> Usa "Sincronizar" para leer de internet (2024) o "Guardar Manual" para simulaciones (Ej: 2026).</p>
                        <div class="flex items-end gap-4">
                            <div class="flex-1">
                                <label class="block text-[10px] font-black text-gray-500 uppercase mb-1">Tasa Oficial Dólar (USD)</label>
                                <div class="relative">
                                    <span class="absolute left-3 top-2.5 font-bold text-emerald-600">Bs.</span>
                                    <input type="number" id="conf-tasa" step="0.01" class="w-full border-2 border-gray-200 rounded-lg pl-10 pr-3 py-2 text-xl font-black text-[#143B62] outline-none focus:border-emerald-500">
                                </div>
                            </div>
                            <div class="flex flex-col gap-2 w-48">
                                <button type="button" onclick="sincronizarTasaBCV()" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded font-bold transition shadow text-[10px] uppercase btn-press flex items-center justify-center gap-2"><i class="fa-solid fa-rotate"></i> Sincronizar BCV</button>
                                <button type="button" onclick="guardarTasaManual()" class="bg-emerald-600 hover:bg-emerald-700 text-white px-4 py-2 rounded font-bold transition shadow text-[10px] uppercase btn-press flex items-center justify-center gap-2"><i class="fa-solid fa-save"></i> Guardar Manual</button>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
                    <div class="bg-[#143B62] px-4 py-2 text-white font-bold text-xs uppercase tracking-widest">⚖️ Configuración de Impuestos</div>
                    <div class="p-5 grid grid-cols-2 md:grid-cols-5 gap-6">
                        <div><label class="block text-[10px] font-black text-gray-500 uppercase mb-1">IVA General (%)</label><input type="number" id="conf-iva" class="w-full border border-gray-300 rounded px-3 py-2 font-bold text-[#143B62]"></div>
                        <div><label class="block text-[10px] font-black text-gray-500 uppercase mb-1">IGTF Divisas (%)</label><input type="number" id="conf-igtf" class="w-full border border-gray-300 rounded px-3 py-2 font-bold text-[#143B62]"></div>
                        <div><label class="block text-[10px] font-black text-gray-500 uppercase mb-1">IVA Reducido 1 (%)</label><input type="number" id="conf-iva-r1" class="w-full border border-gray-300 rounded px-3 py-2 font-bold text-[#143B62]"></div>
                        <div><label class="block text-[10px] font-black text-gray-500 uppercase mb-1">IVA Reducido 2 (%)</label><input type="number" id="conf-iva-r2" class="w-full border border-gray-300 rounded px-3 py-2 font-bold text-[#143B62]"></div>
                        <div><label class="block text-[10px] font-black text-gray-500 uppercase mb-1">Mostrar Exento POS</label><select id="conf-exento" class="w-full border border-gray-300 rounded px-3 py-2 font-bold text-[#143B62] outline-none"><option value="SI">SÍ MOSTRAR</option><option value="NO">OCULTAR</option></select></div>
                    </div>
                </div>

                <div class="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
                    <div class="bg-slate-800 px-4 py-2 text-white font-bold text-xs uppercase tracking-widest">🎨 Branding y Marca Blanca</div>
                    <div class="p-5 grid grid-cols-1 md:grid-cols-2 gap-8">
                        <div>
                            <label class="block text-[10px] font-black text-gray-500 uppercase mb-2">Logo Principal del Negocio</label>
                            <div class="bg-[#143B62] border-2 border-dashed border-gray-300 rounded-xl p-4 flex items-center justify-center h-32 mb-3 shadow-inner">
                                <img id="preview-logo" src="" class="max-h-full max-w-full object-contain hidden">
                                <span id="txt-logo" class="text-gray-400 text-[10px] font-bold">SIN LOGO CONFIGURADO</span>
                            </div>
                            <div class="flex gap-2">
                                <input type="text" id="url-logo" oninput="actualizarPreview('url-logo','preview-logo','txt-logo')" placeholder="Pega URL o sube archivo..." class="flex-1 border border-gray-300 rounded px-3 py-2 text-xs font-bold outline-none">
                                <input type="file" id="file-logo" accept="image/*" class="hidden" onchange="subirImagenLocal(event, 'url-logo', 'preview-logo', 'txt-logo')">
                                <button type="button" onclick="document.getElementById('file-logo').click()" class="bg-blue-50 hover:bg-blue-100 text-blue-700 border border-blue-200 px-3 rounded font-bold transition text-xs flex items-center gap-1"><i class="fa-solid fa-upload"></i> Subir</button>
                            </div>
                        </div>
                        <div>
                            <label class="block text-[10px] font-black text-gray-500 uppercase mb-2">Fondo / Marca de Agua</label>
                            <div class="bg-gray-100 border-2 border-dashed border-gray-300 rounded-xl p-4 flex items-center justify-center h-32 mb-3 shadow-inner">
                                <img id="preview-fondo" src="" class="max-h-full max-w-full object-contain hidden opacity-40">
                                <span id="txt-fondo" class="text-gray-400 text-[10px] font-bold">SIN FONDO CONFIGURADO</span>
                            </div>
                            <div class="flex gap-2">
                                <input type="text" id="url-fondo" oninput="actualizarPreview('url-fondo','preview-fondo','txt-fondo')" placeholder="Pega URL o sube archivo..." class="flex-1 border border-gray-300 rounded px-3 py-2 text-xs font-bold outline-none">
                                <input type="file" id="file-fondo" accept="image/*" class="hidden" onchange="subirImagenLocal(event, 'url-fondo', 'preview-fondo', 'txt-fondo')">
                                <button type="button" onclick="document.getElementById('file-fondo').click()" class="bg-blue-50 hover:bg-blue-100 text-blue-700 border border-blue-200 px-3 rounded font-bold transition text-xs flex items-center gap-1"><i class="fa-solid fa-upload"></i> Subir</button>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="flex justify-end gap-4">
                    <button onclick="guardarTodo(event)" class="bg-[#143B62] hover:bg-[#0f2d4a] text-white px-10 py-3 rounded-xl font-black shadow-lg transition-all uppercase tracking-widest btn-press"><i class="fa-solid fa-save mr-2"></i> Guardar Todos los Ajustes</button>
                </div>
            </div>
        </div>
    </main>

    <div id="loading-overlay-config" class="fixed inset-0 bg-slate-900/80 z-[999] hidden flex-col items-center justify-center p-6 text-center backdrop-blur-sm">
        <i class="fa-solid fa-cloud-arrow-up text-5xl text-[#E67E22] mb-4 animate-bounce"></i>
        <h2 id="loading-text-config" class="text-xl font-black text-white uppercase mb-2 tracking-widest">Subiendo...</h2>
    </div>

    <script>
        const TOKEN_JWT = localStorage.getItem('pyp_token_seguro');
        let empId = null;

        window.onload = async () => { 
            const resUser = await fetch(`${SUPABASE_URL}/rest/v1/usuarios?select=id_empresa&limit=1`, { headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${TOKEN_JWT}` } });
            const users = await resUser.json(); if(users.length > 0) empId = users[0].id_empresa;
            await cargarConfig(); 
        };

        async function cargarConfig() {
            const [resTasa, resConf] = await Promise.all([
                fetch(`${SUPABASE_URL}/rest/v1/tasas_bcv?moneda=eq.USD&select=tasa&order=fecha_actualizacion.desc&limit=1`, { headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${TOKEN_JWT}` } }),
                fetch(`${SUPABASE_URL}/rest/v1/configuracion_sistema?select=*`, { headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${TOKEN_JWT}` } })
            ]);
            
            const dataTasa = await resTasa.json(); if(dataTasa.length > 0) document.getElementById('conf-tasa').value = dataTasa[0].tasa;
            const dataConf = await resConf.json();
            const validRow = dataConf.find(c => c.id_empresa !== null); if (validRow && !empId) empId = validRow.id_empresa;

            const fill = (id, param, previewId, txtId) => {
                const items = dataConf.filter(c => c.parametro === param);
                if(items.length > 0) {
                    document.getElementById(id).value = items[items.length - 1].valor;
                    if(previewId) actualizarPreview(id, previewId, txtId);
                }
            };
            
            fill('conf-iva', 'IVA_GENERAL'); fill('conf-igtf', 'IGTF'); fill('conf-iva-r1', 'IVA_REDUCIDO_1'); fill('conf-iva-r2', 'IVA_REDUCIDO_2'); fill('conf-exento', 'POS_MOSTRAR_EXENTO'); fill('url-logo', 'LOGO_URL', 'preview-logo', 'txt-logo'); fill('url-fondo', 'FONDO_URL', 'preview-fondo', 'txt-fondo');
        }

        function actualizarPreview(inputId, imgId, txtId) {
            const url = document.getElementById(inputId).value; const img = document.getElementById(imgId); const txt = document.getElementById(txtId);
            if(url) { img.src = url; img.classList.remove('hidden'); txt.classList.add('hidden'); } else { img.classList.add('hidden'); txt.classList.remove('hidden'); }
        }

        // MOTOR DE SUBIDA DE IMÁGENES AL BUCKET
        async function comprimirYSubir(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader(); reader.readAsDataURL(file);
                reader.onload = e => {
                    const img = new Image(); img.src = e.target.result;
                    img.onload = async () => {
                        const canvas = document.createElement('canvas'); const ctx = canvas.getContext('2d');
                        let w = img.width, h = img.height; const max = 800;
                        if (w > h && w > max) { h *= max / w; w = max; } else if (h > max) { w *= max / h; h = max; }
                        canvas.width = w; canvas.height = h; ctx.drawImage(img, 0, 0, w, h);
                        canvas.toBlob(async (blob) => {
                            const ext = file.name.split('.').pop() || 'png';
                            const fileName = `brand_${Date.now()}_${Math.floor(Math.random()*1000)}.${ext}`;
                            try {
                                const formData = new FormData(); formData.append('file', blob, fileName);
                                const res = await fetch(`${SUPABASE_URL}/storage/v1/object/inventario/${fileName}`, { method: 'POST', headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${TOKEN_JWT}` }, body: formData });
                                if(!res.ok) throw new Error("Fallo upload");
                                resolve(`${SUPABASE_URL}/storage/v1/object/public/inventario/${fileName}`);
                            } catch(err) { reject(err); }
                        }, 'image/png', 0.9);
                    };
                };
            });
        }

        async function subirImagenLocal(event, urlInputId, previewId, txtId) {
            const file = event.target.files[0]; if(!file) return;
            document.getElementById('loading-overlay-config').classList.remove('hidden');
            document.getElementById('loading-overlay-config').classList.add('flex');
            try {
                const url = await comprimirYSubir(file);
                document.getElementById(urlInputId).value = url;
                actualizarPreview(urlInputId, previewId, txtId);
            } catch(e) { alert("Error al subir la imagen al servidor."); }
            document.getElementById('loading-overlay-config').classList.add('hidden');
            document.getElementById('loading-overlay-config').classList.remove('flex');
        }

        // NUEVOS BOTONES DE TASA
        async function guardarTasaManual() {
            const t = parseFloat(document.getElementById('conf-tasa').value);
            if(isNaN(t) || t <= 0) { alert("Por favor, ingresa una tasa válida mayor a 0."); return; }
            try {
                await fetch(`${SUPABASE_URL}/rest/v1/tasas_bcv`, { 
                    method: 'POST', 
                    headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${TOKEN_JWT}`, 'Content-Type': 'application/json' }, 
                    body: JSON.stringify({ moneda: 'USD', tasa: t }) 
                });
                alert("¡Tasa manual guardada correctamente!");
            } catch(e) { console.error(e); alert("Hubo un error al guardar la tasa."); }
        }

        async function sincronizarTasaBCV() {
            try {
                const resUsd = await fetch('https://ve.dolarapi.com/v1/dolares/oficial');
                if(!resUsd.ok) throw new Error("Fallo API USD");
                const dataUsd = await resUsd.json();
                document.getElementById('conf-tasa').value = dataUsd.promedio.toFixed(2);
                alert("Tasa obtenida de internet. Presiona 'Guardar Manual' para fijarla.");
            } catch(e) {
                alert("Error al conectar con el servidor. Ingresa la tasa manualmente y presiona 'Guardar Manual'.");
            }
        }

        async function guardarTodo(event) {
            const btn = event.currentTarget; const textoOriginal = btn.innerHTML; btn.innerHTML = `<i class="fa-solid fa-spinner fa-spin mr-2"></i> Guardando...`; btn.disabled = true;
            const configs = [ { parametro: 'IVA_GENERAL', valor: document.getElementById('conf-iva').value || '16' }, { parametro: 'IGTF', valor: document.getElementById('conf-igtf').value || '3' }, { parametro: 'IVA_REDUCIDO_1', valor: document.getElementById('conf-iva-r1').value || '8' }, { parametro: 'IVA_REDUCIDO_2', valor: document.getElementById('conf-iva-r2').value || '12' }, { parametro: 'POS_MOSTRAR_EXENTO', valor: document.getElementById('conf-exento').value || 'SI' }, { parametro: 'LOGO_URL', valor: document.getElementById('url-logo').value || '' }, { parametro: 'FONDO_URL', valor: document.getElementById('url-fondo').value || '' } ];

            try {
                for (let c of configs) {
                    await fetch(`${SUPABASE_URL}/rest/v1/configuracion_sistema?parametro=eq.${c.parametro}`, { method: 'DELETE', headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${TOKEN_JWT}` } });
                    
                    // ¡CORRECCIÓN CRÍTICA APLICADA: SIN LA COLUMNA ESTATUS!
                    const payload = { parametro: c.parametro, valor: String(c.valor) }; 
                    if (empId) payload.id_empresa = empId; 
                    
                    const res = await fetch(`${SUPABASE_URL}/rest/v1/configuracion_sistema`, { method: 'POST', headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${TOKEN_JWT}`, 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
                    if (!res.ok) throw new Error(`Fallo en ${c.parametro}`);
                }
                localStorage.setItem('pyp_logo_pc_url', document.getElementById('url-logo').value);
                alert("Ajustes guardados exitosamente."); location.reload();
            } catch (error) { alert("Hubo un error de conexión."); btn.innerHTML = textoOriginal; btn.disabled = false; }
        }
    </script>
</body>
</html>
