<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>P&P Admin | Configuración</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>body { font-family: 'Inter', sans-serif; } .custom-scroll::-webkit-scrollbar { width: 5px; height: 5px; } .custom-scroll::-webkit-scrollbar-thumb { background-color: #cbd5e1; border-radius: 4px; }</style>
    <script src="config.js"></script>
    <script>if (!localStorage.getItem('pyp_token_seguro')) window.location.href = 'login.html';</script>
</head>
<body class="bg-[#f4f6f8] flex h-screen overflow-hidden text-gray-800 relative">
    <script src="menu.js"></script>
    <main class="flex-1 flex flex-col h-screen overflow-hidden bg-[#f4f6f8] w-full z-10 relative">
        <header class="bg-white shadow-sm px-4 md:px-6 py-4 flex justify-between items-center z-10 shrink-0 border-b border-gray-200 h-14">
            <h1 class="text-lg font-bold text-[#143B62]"><i class="fa-solid fa-gear text-[#E67E22]"></i> Configuración</h1>
        </header>

        <div class="flex-1 overflow-y-auto p-4 md:p-6 custom-scroll relative">
            <div id="loading-overlay" class="absolute inset-0 bg-white/80 z-50 flex flex-col items-center justify-center hidden"><i class="fa-solid fa-spinner fa-spin text-4xl text-[#E67E22] mb-3"></i><p class="font-bold">Comprimiendo Logo...</p></div>
            <div class="max-w-4xl mx-auto space-y-6">
                <div class="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
                    <div class="bg-[#143B62] px-5 py-3 text-white font-bold text-sm">BRANDING / MARCA BLANCA</div>
                    <div class="p-5 grid grid-cols-1 md:grid-cols-2 gap-8">
                        <div>
                            <label class="block text-[10px] font-bold text-gray-500 uppercase mb-2">Logo Principal (WebP)</label>
                            <div class="border-2 border-dashed border-gray-300 rounded-lg p-2 flex flex-col items-center justify-center bg-[#143B62] h-28 mb-3 relative">
                                <img id="preview-logo-pc" src="" class="max-h-full max-w-full object-contain hidden z-10">
                                <span id="txt-logo-pc" class="text-xs text-gray-400">Sin Logo</span>
                            </div>
                            <div class="flex gap-2">
                                <input type="url" id="url-logo-pc" placeholder="URL o Sube Foto ➔" class="flex-1 border border-gray-300 rounded px-2 py-1.5 text-xs outline-none">
                                <input type="file" id="file-logo-pc" accept="image/*" class="hidden" onchange="subirImagenBranding(event, 'url-logo-pc', 'preview-logo-pc', 'txt-logo-pc')">
                                <button type="button" onclick="document.getElementById('file-logo-pc').click()" class="bg-blue-50 text-blue-600 border border-blue-200 px-3 py-1.5 rounded"><i class="fa-solid fa-upload"></i></button>
                            </div>
                        </div>
                        <div>
                            <label class="block text-[10px] font-bold text-gray-500 uppercase mb-2">Marca de Agua / Fondo</label>
                            <div class="border-2 border-dashed border-gray-300 rounded-lg p-2 flex flex-col items-center justify-center bg-gray-50 h-28 mb-3 relative">
                                <img id="preview-fondo" src="" class="max-h-full max-w-full object-contain hidden z-10 opacity-30">
                                <span id="txt-fondo" class="text-xs text-gray-400">Sin Fondo</span>
                            </div>
                            <div class="flex gap-2">
                                <input type="url" id="url-fondo" placeholder="URL o Sube Foto ➔" class="flex-1 border border-gray-300 rounded px-2 py-1.5 text-xs outline-none">
                                <input type="file" id="file-fondo" accept="image/*" class="hidden" onchange="subirImagenBranding(event, 'url-fondo', 'preview-fondo', 'txt-fondo')">
                                <button type="button" onclick="document.getElementById('file-fondo').click()" class="bg-blue-50 text-blue-600 border border-blue-200 px-3 py-1.5 rounded"><i class="fa-solid fa-upload"></i></button>
                            </div>
                        </div>
                    </div>
                    <div class="bg-gray-50 p-4 border-t flex justify-end">
                        <button onclick="guardarConfiguracion()" class="bg-[#143B62] text-white px-6 py-2 rounded font-bold text-xs"><i class="fa-solid fa-save mr-2"></i> APLICAR CAMBIOS</button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        const TOKEN_JWT = localStorage.getItem('pyp_token_seguro');
        window.onload = async () => { await cargarConfigActual(); };

        async function cargarConfigActual() {
            try {
                const res = await fetch(`${SUPABASE_URL}/rest/v1/configuracion_sistema?select=*`, { headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${TOKEN_JWT}` } });
                const data = await res.json();
                const logo = data.find(c => c.parametro === 'LOGO_URL')?.valor;
                const fondo = data.find(c => c.parametro === 'FONDO_URL')?.valor;
                if(logo) { document.getElementById('url-logo-pc').value = logo; document.getElementById('preview-logo-pc').src = logo; document.getElementById('preview-logo-pc').classList.remove('hidden'); document.getElementById('txt-logo-pc').classList.add('hidden'); }
                if(fondo) { document.getElementById('url-fondo').value = fondo; document.getElementById('preview-fondo').src = fondo; document.getElementById('preview-fondo').classList.remove('hidden'); document.getElementById('txt-fondo').classList.add('hidden'); }
            } catch(e) {}
        }

        async function comprimirWebP(file) {
            return new Promise((resolve) => {
                const reader = new FileReader(); reader.readAsDataURL(file);
                reader.onload = e => {
                    const img = new Image(); img.src = e.target.result;
                    img.onload = () => {
                        const canvas = document.createElement('canvas'); canvas.width = img.width; canvas.height = img.height;
                        canvas.getContext('2d').drawImage(img, 0, 0);
                        canvas.toBlob(blob => resolve(new File([blob], "img.webp", {type:"image/webp"})), 'image/webp', 0.8);
                    };
                };
            });
        }

        async function subirImagenBranding(event, inputUrlId, imgPreviewId, textId) {
            const file = event.target.files[0]; if(!file) return;
            document.getElementById('loading-overlay').classList.remove('hidden');
            try {
                const webpFile = await comprimirWebP(file);
                const name = `brand_${Date.now()}.webp`;
                const res = await fetch(`${SUPABASE_URL}/storage/v1/object/inventario/${name}`, { method: 'POST', headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${TOKEN_JWT}`, 'Content-Type': 'image/webp' }, body: webpFile });
                const url = `${SUPABASE_URL}/storage/v1/object/public/inventario/${name}`;
                document.getElementById(inputUrlId).value = url; document.getElementById(imgPreviewId).src = url; document.getElementById(imgPreviewId).classList.remove('hidden'); document.getElementById(textId).classList.add('hidden');
            } catch(e) { alert("Error al subir"); } finally { document.getElementById('loading-overlay').classList.add('hidden'); }
        }

        async function guardarConfiguracion() {
            try {
                const resUser = await fetch(`${SUPABASE_URL}/rest/v1/usuarios?select=id_empresa&limit=1`, { headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${TOKEN_JWT}` } });
                const empId = (await resUser.json())[0].id_empresa;
                const configs = [{ parametro: 'LOGO_URL', valor: document.getElementById('url-logo-pc').value, id_empresa: empId }, { parametro: 'FONDO_URL', valor: document.getElementById('url-fondo').value, id_empresa: empId }];
                for (let c of configs) { await fetch(`${SUPABASE_URL}/rest/v1/configuracion_sistema?on_conflict=parametro`, { method: 'POST', headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${TOKEN_JWT}`, 'Content-Type': 'application/json', 'Prefer': 'resolution=merge-duplicates' }, body: JSON.stringify(c) }); }
                localStorage.setItem('pyp_logo_pc_url', configs[0].valor);
                alert("¡Configuración actualizada!"); window.location.reload();
            } catch(e) { alert("Error al guardar"); }
        }
    </script>
</body>
</html>
