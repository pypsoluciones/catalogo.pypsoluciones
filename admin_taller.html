<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>P&P Admin | Taller y Servicio Técnico</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .kanban-column { min-height: 70vh; transition: background-color 0.3s; }
        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background-color: #cbd5e1; border-radius: 4px; }
        .card-anim { animation: slideIn 0.3s ease-out; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .btn-press:active { transform: scale(0.95); }
    </style>
    <script>
        if (localStorage.getItem('pyp_sesion_activa') !== 'true') window.location.href = 'login.html';
    </script>
</head>
<body class="bg-[#f0f2f5] font-sans flex h-screen overflow-hidden text-gray-800">

    <aside class="w-64 bg-[#143B62] text-white flex flex-col hidden md:flex shrink-0 shadow-xl z-20">
        <div class="p-6 border-b border-white/10 flex items-center gap-3">
            <i class="fa-solid fa-layer-group text-[#E67E22] text-3xl"></i>
            <h2 class="font-bold text-xl tracking-wide">P&P Admin</h2>
        </div>
        <nav class="flex-1 p-4 space-y-2 overflow-y-auto custom-scroll">
            <a href="admin_dashboard.html" class="flex items-center gap-3 text-gray-300 hover:bg-white/10 px-4 py-3 rounded-lg font-semibold transition"><i class="fa-solid fa-chart-pie w-5"></i> Dashboard</a>
            <a href="admin_ventas.html" class="flex items-center gap-3 text-gray-300 hover:bg-white/10 px-4 py-3 rounded-lg font-semibold transition"><i class="fa-solid fa-cash-register w-5"></i> Ventas (POS)</a>
            <a href="admin_compras.html" class="flex items-center gap-3 text-gray-300 hover:bg-white/10 px-4 py-3 rounded-lg font-semibold transition"><i class="fa-solid fa-truck-ramp-box w-5"></i> Compras</a>
            <a href="admin_productos.html" class="flex items-center gap-3 text-gray-300 hover:bg-white/10 px-4 py-3 rounded-lg font-semibold transition"><i class="fa-solid fa-boxes-stacked w-5"></i> Inventario</a>
            <a href="admin_contactos.html" class="flex items-center gap-3 text-gray-300 hover:bg-white/10 px-4 py-3 rounded-lg font-semibold transition"><i class="fa-solid fa-address-book w-5"></i> Directorio</a>
            <a href="#" class="flex items-center gap-3 bg-[#E67E22] text-white px-4 py-3 rounded-lg font-bold shadow-md"><i class="fa-solid fa-screwdriver-wrench w-5"></i> Taller</a>
            <a href="admin_caja.html" class="flex items-center gap-3 text-gray-300 hover:bg-white/10 px-4 py-3 rounded-lg font-semibold transition"><i class="fa-solid fa-vault w-5"></i> Caja y Tesorería</a>
        </nav>
    </aside>

    <main class="flex-1 flex flex-col h-screen overflow-hidden bg-gray-50">
        <header class="bg-white shadow-sm px-6 py-4 flex justify-between items-center z-10 shrink-0 border-b">
            <h1 class="text-xl font-bold text-[#143B62] flex items-center gap-2">
                <i class="fa-solid fa-screwdriver-wrench"></i> Control de Servicio Técnico
            </h1>
            <button onclick="abrirModalNuevaOrden()" class="bg-[#25D366] text-white font-bold px-5 py-2 rounded-lg shadow-md hover:bg-[#1ebd5c] transition btn-press flex items-center gap-2">
                <i class="fa-solid fa-plus-circle"></i> Recibir Equipo
            </button>
        </header>

        <div class="flex-1 overflow-x-auto p-6 flex gap-6 bg-[#f8f9fa] custom-scroll">
            
            <div class="w-80 shrink-0 flex flex-col">
                <div class="bg-blue-100 text-blue-700 px-4 py-2 rounded-t-lg font-black text-xs uppercase tracking-widest border-b-2 border-blue-500">Recibido</div>
                <div id="col-Recibido" class="kanban-column bg-gray-100/50 p-3 rounded-b-lg space-y-3 overflow-y-auto custom-scroll"></div>
            </div>

            <div class="w-80 shrink-0 flex flex-col">
                <div class="bg-orange-100 text-orange-700 px-4 py-2 rounded-t-lg font-black text-xs uppercase tracking-widest border-b-2 border-orange-500">En Revisión</div>
                <div id="col-Revision" class="kanban-column bg-gray-100/50 p-3 rounded-b-lg space-y-3 overflow-y-auto custom-scroll"></div>
            </div>

            <div class="w-80 shrink-0 flex flex-col">
                <div class="bg-purple-100 text-purple-700 px-4 py-2 rounded-t-lg font-black text-xs uppercase tracking-widest border-b-2 border-purple-500">Esperando Repuesto</div>
                <div id="col-Repuesto" class="kanban-column bg-gray-100/50 p-3 rounded-b-lg space-y-3 overflow-y-auto custom-scroll"></div>
            </div>

            <div class="w-80 shrink-0 flex flex-col">
                <div class="bg-green-100 text-green-700 px-4 py-2 rounded-t-lg font-black text-xs uppercase tracking-widest border-b-2 border-green-500">Listo para Entrega</div>
                <div id="col-Listo" class="kanban-column bg-gray-100/50 p-3 rounded-b-lg space-y-3 overflow-y-auto custom-scroll"></div>
            </div>

        </div>
    </main>

    <div id="modal-orden" class="fixed inset-0 bg-black/60 z-[100] hidden flex items-center justify-center p-4">
        <div class="bg-white rounded-xl shadow-2xl w-full max-w-lg flex flex-col max-h-[90vh] overflow-hidden">
            <div class="bg-[#143B62] text-white p-4 flex justify-between items-center">
                <h3 class="font-bold text-lg">Nueva Orden de Servicio</h3>
                <button onclick="cerrarModal()" class="text-gray-300 hover:text-white text-xl"><i class="fa-solid fa-times"></i></button>
            </div>
            <div class="p-6 overflow-y-auto custom-scroll flex-1 space-y-4 bg-gray-50">
                <div class="bg-white p-4 rounded border shadow-sm space-y-3">
                    <label class="block text-[10px] font-bold text-gray-400 uppercase">Datos del Cliente</label>
                    <div class="flex gap-2">
                        <input type="text" id="os-nombre" placeholder="Nombre del Cliente" class="flex-1 border-b py-1 outline-none font-bold">
                        <input type="text" id="os-doc" placeholder="Cédula / RIF" class="w-1/3 border-b py-1 outline-none text-sm">
                    </div>
                </div>
                <div class="bg-white p-4 rounded border shadow-sm space-y-3">
                    <label class="block text-[10px] font-bold text-gray-400 uppercase">Información del Equipo</label>
                    <div class="grid grid-cols-2 gap-3">
                        <input type="text" id="os-equipo" placeholder="Ej: Laptop Dell" class="border rounded px-3 py-2 text-sm">
                        <input type="text" id="os-serial" placeholder="Número de Serial" class="border rounded px-3 py-2 text-sm font-mono">
                    </div>
                    <textarea id="os-falla" rows="3" placeholder="Descripción de la falla reportada..." class="w-full border rounded px-3 py-2 text-sm"></textarea>
                </div>
            </div>
            <div class="p-4 border-t bg-white flex gap-3">
                <button onclick="cerrarModal()" class="flex-1 py-3 bg-gray-100 text-gray-600 font-bold rounded-lg">Cancelar</button>
                <button onclick="guardarOrden()" class="flex-1 py-3 bg-[#25D366] text-white font-bold rounded-lg shadow-lg">Registrar Ingreso</button>
            </div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://icvfmdvvochzaktugqvj.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImljdmZtZHZ2b2NoemFrdHVncXZqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYyNDEzMzEsImV4cCI6MjA5MTgxNzMzMX0.gO3D39piT6KGbMMOzrPGWXUp5-g_nOBAgJ-nwPv8IcQ';

        window.onload = cargarTablero;

        async function cargarTablero() {
            try {
                const res = await fetch(`${SUPABASE_URL}/rest/v1/ordenes_servicio?select=*&order=fecha_ingreso.desc`, { headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` } });
                const ordenes = await res.json();
                
                // Limpiar columnas
                const columnas = ['Recibido', 'Revision', 'Repuesto', 'Listo'];
                columnas.forEach(c => document.getElementById(`col-${c}`).innerHTML = '');

                ordenes.forEach(o => {
                    // Mapeo estatus a IDs de columna
                    let colId = o.estatus;
                    if(colId === 'En Revisión') colId = 'Revision';
                    if(colId === 'Esperando Repuesto') colId = 'Repuesto';
                    
                    const el = document.getElementById(`col-${colId}`);
                    if(el) el.innerHTML += generarCardOS(o);
                });
            } catch(e) { console.error(e); }
        }

        function generarCardOS(o) {
            return `
                <div class="bg-white p-4 rounded-xl shadow-sm border border-gray-200 card-anim hover:shadow-md transition cursor-pointer relative group">
                    <div class="flex justify-between items-start mb-2">
                        <span class="text-[10px] font-bold text-gray-400 font-mono">#OS-${o.correlativo}</span>
                        <div class="flex gap-1">
                            <button onclick="cambiarEstatus('${o.id_orden}', 'adelante')" class="text-blue-500 hover:scale-110"><i class="fa-solid fa-circle-arrow-right"></i></button>
                        </div>
                    </div>
                    <h4 class="font-black text-[#143B62] leading-tight mb-1 uppercase text-sm">${o.equipo}</h4>
                    <p class="text-xs text-gray-600 font-bold mb-3">${o.cliente_nombre}</p>
                    <div class="bg-gray-50 p-2 rounded text-[10px] text-gray-500 italic mb-3">
                        "${o.falla_reportada || 'Sin detalle'}"
                    </div>
                    <div class="flex justify-between items-center text-[9px] text-gray-400">
                        <span><i class="fa-solid fa-calendar mr-1"></i> ${new Date(o.fecha_ingreso).toLocaleDateString()}</span>
                        <button class="bg-[#143B62] text-white px-2 py-1 rounded group-hover:bg-[#E67E22] transition font-bold">GESTIONAR</button>
                    </div>
                </div>
            `;
        }

        function abrirModalNuevaOrden() {
            document.getElementById('modal-orden').classList.remove('hidden');
        }

        function cerrarModal() {
            document.getElementById('modal-orden').classList.add('hidden');
        }

        async function guardarOrden() {
            const data = {
                cliente_nombre: document.getElementById('os-nombre').value,
                cliente_documento: document.getElementById('os-doc').value,
                equipo: document.getElementById('os-equipo').value,
                serial_equipo: document.getElementById('os-serial').value,
                falla_reportada: document.getElementById('os-falla').value,
                estatus: 'Recibido'
            };

            if(!data.equipo || !data.cliente_nombre) return alert("Nombre y Equipo son obligatorios");

            try {
                await fetch(`${SUPABASE_URL}/rest/v1/ordenes_servicio`, {
                    method: 'POST',
                    headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                cerrarModal();
                cargarTablero();
            } catch(e) { alert("Error al registrar"); }
        }

        async function cambiarEstatus(id, direccion) {
            // Lógica simple de flujo: Recibido -> Revision -> Repuesto -> Listo
            const res = await fetch(`${SUPABASE_URL}/rest/v1/ordenes_servicio?id_orden=eq.${id}`, { headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` } });
            const data = await res.json();
            const actual = data[0].estatus;
            
            let nuevo = actual;
            if(actual === 'Recibido') nuevo = 'En Revisión';
            else if(actual === 'En Revisión') nuevo = 'Esperando Repuesto';
            else if(actual === 'Esperando Repuesto') nuevo = 'Listo';

            await fetch(`${SUPABASE_URL}/rest/v1/ordenes_servicio?id_orden=eq.${id}`, {
                method: 'PATCH',
                headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}`, 'Content-Type': 'application/json' },
                body: JSON.stringify({ estatus: nuevo })
            });
            cargarTablero();
        }
    </script>
</body>
</html>
