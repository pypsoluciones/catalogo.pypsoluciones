<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>P&P Admin | Taller y Servicio Técnico</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/fuse.js/dist/fuse.js"></script>
    <style>
        .kanban-column { min-height: 70vh; transition: background-color 0.3s; }
        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background-color: #cbd5e1; border-radius: 4px; }
        .card-anim { animation: slideIn 0.3s ease-out; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .btn-press:active { transform: scale(0.95); }
    </style>
    <script>
    // Guardián de Seguridad: Exige el Token Real
    if (!localStorage.getItem('pyp_token_seguro')) {
        window.location.href = 'login.html';
    }
</script>
</head>
<body class="bg-[#f0f2f5] font-sans flex h-screen overflow-hidden text-gray-800">
    <main class="flex-1 flex flex-col h-screen overflow-hidden bg-gray-50">
        <header class="bg-white shadow-sm px-6 py-4 flex justify-between items-center z-10 shrink-0 border-b">
            <h1 class="text-xl font-bold text-[#143B62] flex items-center gap-2"><i class="fa-solid fa-screwdriver-wrench"></i> Control de Servicio Técnico</h1>
            <button onclick="abrirModalNuevaOrden()" class="bg-[#25D366] text-white font-bold px-5 py-2 rounded-lg shadow-md hover:bg-[#1ebd5c] transition btn-press flex items-center gap-2">
                <i class="fa-solid fa-plus-circle"></i> Recibir Equipo
            </button>
        </header>

        <div class="flex-1 overflow-x-auto p-6 flex gap-6 bg-[#f8f9fa] custom-scroll">
            <div class="w-80 shrink-0 flex flex-col"><div class="bg-blue-100 text-blue-700 px-4 py-2 rounded-t-lg font-black text-xs uppercase tracking-widest border-b-2 border-blue-500">Recibido</div><div id="col-Recibido" class="kanban-column bg-gray-100/50 p-3 rounded-b-lg space-y-3 overflow-y-auto custom-scroll"></div></div>
            <div class="w-80 shrink-0 flex flex-col"><div class="bg-orange-100 text-orange-700 px-4 py-2 rounded-t-lg font-black text-xs uppercase tracking-widest border-b-2 border-orange-500">En Revisión</div><div id="col-Revision" class="kanban-column bg-gray-100/50 p-3 rounded-b-lg space-y-3 overflow-y-auto custom-scroll"></div></div>
            <div class="w-80 shrink-0 flex flex-col"><div class="bg-purple-100 text-purple-700 px-4 py-2 rounded-t-lg font-black text-xs uppercase tracking-widest border-b-2 border-purple-500">Esperando Repuesto</div><div id="col-Repuesto" class="kanban-column bg-gray-100/50 p-3 rounded-b-lg space-y-3 overflow-y-auto custom-scroll"></div></div>
            <div class="w-80 shrink-0 flex flex-col"><div class="bg-green-100 text-green-700 px-4 py-2 rounded-t-lg font-black text-xs uppercase tracking-widest border-b-2 border-green-500">Listo para Entrega</div><div id="col-Listo" class="kanban-column bg-gray-100/50 p-3 rounded-b-lg space-y-3 overflow-y-auto custom-scroll"></div></div>
        </div>
    </main>

    <div id="modal-orden" class="fixed inset-0 bg-black/60 z-[100] hidden flex items-center justify-center p-4">
        <div class="bg-white rounded-xl shadow-2xl w-full max-w-lg flex flex-col max-h-[90vh] overflow-hidden">
            <div class="bg-[#143B62] text-white p-4 flex justify-between items-center">
                <h3 class="font-bold text-lg">Nueva Orden de Servicio</h3>
                <button onclick="cerrarModal()" class="text-gray-300 hover:text-white text-xl"><i class="fa-solid fa-times"></i></button>
            </div>
            <div class="p-6 overflow-y-auto custom-scroll flex-1 space-y-4 bg-gray-50">
                <div class="bg-white p-4 rounded border shadow-sm space-y-3">
                    <div class="flex justify-between items-center">
                        <label class="block text-[10px] font-bold text-gray-400 uppercase">Datos del Cliente</label>
                        <button onclick="abrirModalDirectorio()" class="bg-blue-50 text-blue-600 border border-blue-200 px-2 py-1 rounded text-[10px] font-bold shadow-sm flex items-center gap-1 hover:bg-blue-600 hover:text-white transition">
                            <i class="fa-solid fa-address-book"></i> Directorio
                        </button>
                    </div>
                    <div class="flex gap-2">
                        <input type="text" id="os-nombre" placeholder="Nombre del Cliente" class="flex-1 border-b py-1 outline-none font-bold text-gray-800 bg-transparent">
                        <input type="text" id="os-doc" placeholder="Cédula / RIF" class="w-1/3 border-b py-1 outline-none text-sm text-gray-600 bg-transparent">
                    </div>
                </div>
                <div class="bg-white p-4 rounded border shadow-sm space-y-3">
                    <label class="block text-[10px] font-bold text-gray-400 uppercase">Información del Equipo</label>
                    <div class="grid grid-cols-2 gap-3">
                        <input type="text" id="os-equipo" placeholder="Ej: Laptop Dell" class="border rounded px-3 py-2 text-sm">
                        <input type="text" id="os-serial" placeholder="Número de Serial" class="border rounded px-3 py-2 text-sm font-mono">
                    </div>
                    <textarea id="os-falla" rows="3" placeholder="Descripción de la falla reportada..." class="w-full border rounded px-3 py-2 text-sm"></textarea>
                </div>
            </div>
            <div class="p-4 border-t bg-white flex gap-3">
                <button onclick="cerrarModal()" class="flex-1 py-3 bg-gray-100 text-gray-600 font-bold rounded-lg">Cancelar</button>
                <button onclick="guardarOrden()" class="flex-1 py-3 bg-[#25D366] text-white font-bold rounded-lg shadow-lg">Registrar Ingreso</button>
            </div>
        </div>
    </div>

    <div id="modal-directorio" class="fixed inset-0 bg-black/60 z-[110] hidden flex items-center justify-center p-4">
        <div class="bg-white rounded-xl shadow-2xl w-full max-w-2xl flex flex-col max-h-[85vh] overflow-hidden transform scale-95 transition-transform" id="modal-dir-content">
            <div class="bg-[#143B62] text-white p-4 flex justify-between items-center shrink-0">
                <h3 class="font-bold text-lg"><i class="fa-solid fa-users mr-2"></i> Directorio de Clientes</h3>
                <button onclick="cerrarModalDirectorio()" class="text-gray-300 hover:text-white text-xl"><i class="fa-solid fa-times"></i></button>
            </div>
            <div class="p-4 bg-gray-50 border-b border-gray-200 shrink-0">
                <input type="text" id="buscador-modal" oninput="filtrarModalDirectorio()" placeholder="Buscar por nombre, RIF o cédula..." class="w-full bg-white border border-gray-300 rounded px-3 py-2 text-sm focus:outline-none focus:border-[#E67E22] shadow-sm">
            </div>
            <div class="p-0 overflow-y-auto custom-scroll flex-1 bg-white">
                <table class="w-full text-left text-sm border-collapse">
                    <thead class="bg-gray-100 text-gray-500 text-[10px] uppercase sticky top-0 shadow-sm">
                        <tr><th class="p-3 pl-4">Documento</th><th class="p-3">Cliente / Razón Social</th><th class="p-3 text-center">Acción</th></tr>
                    </thead>
                    <tbody id="tabla-modal-dir"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://icvfmdvvochzaktugqvj.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImljdmZtZHZ2b2NoemFrdHVncXZqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYyNDEzMzEsImV4cCI6MjA5MTgxNzMzMX0.gO3D39piT6KGbMMOzrPGWXUp5-g_nOBAgJ-nwPv8IcQ';

        let clientesUnicos = []; let fuseCli;

        window.onload = async () => {
            cargarTablero();
            // Cargar Directorio
            try {
                const resCli = await fetch(`${SUPABASE_URL}/rest/v1/clientes?select=documento_identidad,nombre_razon_social`, { headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${localStorage.getItem('pyp_token_seguro')}`;
                clientesUnicos = resCli.ok ? await resCli.json() : [];
                fuseCli = new Fuse(clientesUnicos, { keys: ['nombre_razon_social', 'documento_identidad'], threshold: 0.3 });
            } catch(e) {}
        };

        // --- DIRECTORIO LOGIC ---
        function abrirModalDirectorio() { dibujarTablaModal(clientesUnicos); document.getElementById('buscador-modal').value = ''; document.getElementById('modal-directorio').classList.remove('hidden'); setTimeout(() => document.getElementById('modal-dir-content').classList.replace('scale-95', 'scale-100'), 10); }
        function cerrarModalDirectorio() { document.getElementById('modal-dir-content').classList.replace('scale-100', 'scale-95'); setTimeout(() => document.getElementById('modal-directorio').classList.add('hidden'), 150); }
        function dibujarTablaModal(arr) { const tbody = document.getElementById('tabla-modal-dir'); if(arr.length === 0) { tbody.innerHTML = `<tr><td colspan="3" class="p-6 text-center text-gray-400">No hay clientes.</td></tr>`; return; } tbody.innerHTML = arr.map(c => `<tr class="hover:bg-gray-50 transition border-b border-gray-100"><td class="p-3 pl-4 font-bold text-gray-500">${c.documento_identidad}</td><td class="p-3 font-bold text-[#143B62]">${c.nombre_razon_social}</td><td class="p-3 text-center"><button onclick="seleccionarCli('${c.documento_identidad}', \`${c.nombre_razon_social}\`)" class="bg-blue-100 text-[#143B62] hover:bg-[#143B62] hover:text-white px-3 py-1.5 rounded transition text-xs font-bold">Seleccionar</button></td></tr>`).join(''); }
        function filtrarModalDirectorio() { const txt = document.getElementById('buscador-modal').value; if(txt.trim() === '') return dibujarTablaModal(clientesUnicos); dibujarTablaModal(fuseCli.search(txt).map(r => r.item)); }
        function seleccionarCli(doc, nom) { document.getElementById('os-doc').value = doc; document.getElementById('os-nombre').value = nom; cerrarModalDirectorio(); }

        // --- KANBAN LOGIC ---
        async function cargarTablero() {
            try {
                const res = await fetch(`${SUPABASE_URL}/rest/v1/ordenes_servicio?select=*&order=fecha_ingreso.desc`, { headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${localStorage.getItem('pyp_token_seguro')}`;
                const ordenes = await res.json();
                ['Recibido', 'Revision', 'Repuesto', 'Listo'].forEach(c => document.getElementById(`col-${c}`).innerHTML = '');
                ordenes.forEach(o => {
                    let colId = o.estatus; if(colId === 'En Revisión') colId = 'Revision'; if(colId === 'Esperando Repuesto') colId = 'Repuesto';
                    const el = document.getElementById(`col-${colId}`); if(el) el.innerHTML += generarCardOS(o);
                });
            } catch(e) { console.error(e); }
        }

        function generarCardOS(o) {
            return `
                <div class="bg-white p-4 rounded-xl shadow-sm border border-gray-200 card-anim hover:shadow-md transition cursor-pointer relative group">
                    <div class="flex justify-between items-start mb-2"><span class="text-[10px] font-bold text-gray-400 font-mono">#OS-${o.correlativo}</span><div class="flex gap-1"><button onclick="cambiarEstatus('${o.id_orden}', 'adelante')" class="text-blue-500 hover:scale-110"><i class="fa-solid fa-circle-arrow-right"></i></button></div></div>
                    <h4 class="font-black text-[#143B62] leading-tight mb-1 uppercase text-sm">${o.equipo}</h4>
                    <p class="text-xs text-gray-600 font-bold mb-3">${o.cliente_nombre}</p>
                    <div class="bg-gray-50 p-2 rounded text-[10px] text-gray-500 italic mb-3">"${o.falla_reportada || 'Sin detalle'}"</div>
                    <div class="flex justify-between items-center text-[9px] text-gray-400"><span><i class="fa-solid fa-calendar mr-1"></i> ${new Date(o.fecha_ingreso).toLocaleDateString()}</span></div>
                </div>`;
        }

        function abrirModalNuevaOrden() { document.getElementById('modal-orden').classList.remove('hidden'); }
        function cerrarModal() { document.getElementById('modal-orden').classList.add('hidden'); }

        async function guardarOrden() {
            const data = { cliente_nombre: document.getElementById('os-nombre').value, cliente_documento: document.getElementById('os-doc').value, equipo: document.getElementById('os-equipo').value, serial_equipo: document.getElementById('os-serial').value, falla_reportada: document.getElementById('os-falla').value, estatus: 'Recibido' };
            if(!data.equipo || !data.cliente_nombre) return alert("Nombre y Equipo son obligatorios");
            try {
                await fetch(`${SUPABASE_URL}/rest/v1/ordenes_servicio`, { method: 'POST', headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${localStorage.getItem('pyp_token_seguro')}`, 'Content-Type': 'application/json' }, body: JSON.stringify(data) });
                cerrarModal(); cargarTablero();
            } catch(e) { alert("Error al registrar"); }
        }

        async function cambiarEstatus(id, direccion) {
            const res = await fetch(`${SUPABASE_URL}/rest/v1/ordenes_servicio?id_orden=eq.${id}`, { headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${localStorage.getItem('pyp_token_seguro')}`; const data = await res.json();
            const actual = data[0].estatus; let nuevo = actual;
            if(actual === 'Recibido') nuevo = 'En Revisión'; else if(actual === 'En Revisión') nuevo = 'Esperando Repuesto'; else if(actual === 'Esperando Repuesto') nuevo = 'Listo';
            await fetch(`${SUPABASE_URL}/rest/v1/ordenes_servicio?id_orden=eq.${id}`, { method: 'PATCH', headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${localStorage.getItem('pyp_token_seguro')}`, 'Content-Type': 'application/json' }, body: JSON.stringify({ estatus: nuevo }) });
            cargarTablero();
        }
          </script>
    <script src="menu.js"></script>
</body>
</html>
