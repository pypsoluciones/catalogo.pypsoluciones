<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>P&P Admin | Usuarios y Accesos</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .custom-scroll::-webkit-scrollbar { width: 6px; height: 6px; }
        .custom-scroll::-webkit-scrollbar-thumb { background-color: #cbd5e1; border-radius: 4px; }
        .btn-press:active { transform: scale(0.95); }
    </style>
    <script>if (localStorage.getItem('pyp_sesion_activa') !== 'true') window.location.href = 'login.html';</script>
</head>
<body class="bg-[#f0f2f5] font-sans flex h-screen overflow-hidden text-gray-800">

    <aside class="w-64 bg-[#143B62] text-white flex flex-col hidden md:flex shrink-0 shadow-xl z-20">
        <div class="p-6 border-b border-white/10 flex items-center gap-3">
            <i class="fa-solid fa-layer-group text-[#E67E22] text-3xl"></i>
            <h2 class="font-bold text-xl tracking-wide">P&P Admin</h2>
        </div>
        <nav class="flex-1 p-4 space-y-2 overflow-y-auto custom-scroll">
            <a href="admin_dashboard.html" class="flex items-center gap-3 text-gray-300 hover:bg-white/10 px-4 py-3 rounded-lg font-semibold transition"><i class="fa-solid fa-chart-pie w-5"></i> Dashboard</a>
            <a href="admin_ventas.html" class="flex items-center gap-3 text-gray-300 hover:bg-white/10 px-4 py-3 rounded-lg font-semibold transition"><i class="fa-solid fa-cash-register w-5"></i> Ventas (POS)</a>
            <a href="admin_compras.html" class="flex items-center gap-3 text-gray-300 hover:bg-white/10 px-4 py-3 rounded-lg font-semibold transition"><i class="fa-solid fa-truck-ramp-box w-5"></i> Compras</a>
            <a href="admin_productos.html" class="flex items-center gap-3 text-gray-300 hover:bg-white/10 px-4 py-3 rounded-lg font-semibold transition"><i class="fa-solid fa-boxes-stacked w-5"></i> Inventario</a>
            <a href="admin_contactos.html" class="flex items-center gap-3 text-gray-300 hover:bg-white/10 px-4 py-3 rounded-lg font-semibold transition"><i class="fa-solid fa-address-book w-5"></i> Directorio</a>
            <a href="admin_taller.html" class="flex items-center gap-3 text-gray-300 hover:bg-white/10 px-4 py-3 rounded-lg font-semibold transition"><i class="fa-solid fa-screwdriver-wrench w-5"></i> Taller</a>
            <a href="admin_caja.html" class="flex items-center gap-3 text-gray-300 hover:bg-white/10 px-4 py-3 rounded-lg font-semibold transition"><i class="fa-solid fa-vault w-5"></i> Caja / Tesorería</a>
            <a href="#" class="flex items-center gap-3 bg-[#E67E22] text-white px-4 py-3 rounded-lg font-bold shadow-md"><i class="fa-solid fa-users-gear w-5"></i> Usuarios y Roles</a>
        </nav>
    </aside>

    <main class="flex-1 flex flex-col h-screen overflow-hidden bg-gray-50">
        <header class="bg-white shadow-sm px-6 py-4 flex justify-between items-center z-10 shrink-0">
            <h1 class="text-xl font-bold text-[#143B62] flex items-center gap-2"><i class="fa-solid fa-users-gear"></i> Gestión de Empleados y Accesos</h1>
            <button onclick="abrirModalUsuario()" class="bg-[#25D366] hover:bg-[#1ebd5c] text-white px-4 py-2 rounded-lg font-bold text-sm shadow-md transition flex items-center gap-2 btn-press">
                <i class="fa-solid fa-user-plus"></i> Nuevo Usuario
            </button>
        </header>

        <div class="flex-1 overflow-auto p-6 custom-scroll">
            <div class="bg-white rounded-xl border border-gray-200 shadow-sm overflow-hidden">
                <table class="w-full text-left text-sm border-collapse">
                    <thead class="bg-gray-100 text-gray-500 text-[10px] uppercase tracking-wider font-black">
                        <tr>
                            <th class="p-4">Nombre del Empleado</th>
                            <th class="p-4">Usuario (Login)</th>
                            <th class="p-4">Rol / Permisos</th>
                            <th class="p-4 text-center">Estatus</th>
                            <th class="p-4 text-center">Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="tabla-usuarios" class="divide-y divide-gray-100">
                        <tr><td colspan="5" class="p-10 text-center text-gray-400"><i class="fa-solid fa-spinner fa-spin text-2xl"></i> Cargando usuarios...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <div id="modal-usuario" class="fixed inset-0 bg-black/60 z-[100] hidden flex items-center justify-center p-4">
        <div class="bg-white rounded-xl shadow-2xl w-full max-w-md flex flex-col transform scale-95 transition-transform" id="modal-content">
            <div class="bg-[#143B62] text-white p-4 flex justify-between items-center">
                <h3 class="font-bold text-lg" id="modal-titulo"><i class="fa-solid fa-user-shield mr-2"></i> Datos del Usuario</h3>
                <button onclick="cerrarModal()" class="text-gray-300 hover:text-white text-xl"><i class="fa-solid fa-times"></i></button>
            </div>
            
            <form id="form-usuario" onsubmit="guardarUsuario(event)" class="p-6 bg-gray-50 space-y-4">
                <input type="hidden" id="usr-id">
                
                <div>
                    <label class="block text-[10px] font-bold text-gray-500 uppercase tracking-wider mb-1">Nombre Completo del Empleado *</label>
                    <input type="text" id="usr-nombre" required placeholder="Ej: María Pérez" class="w-full border border-gray-300 rounded px-3 py-2 text-sm focus:outline-none focus:border-[#E67E22] font-semibold">
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-[10px] font-bold text-gray-500 uppercase tracking-wider mb-1">Usuario (Para entrar) *</label>
                        <input type="text" id="usr-login" required placeholder="Ej: mperez" class="w-full border border-gray-300 rounded px-3 py-2 text-sm focus:outline-none focus:border-[#E67E22] font-mono text-[#143B62]">
                    </div>
                    <div>
                        <label class="block text-[10px] font-bold text-gray-500 uppercase tracking-wider mb-1">Contraseña *</label>
                        <input type="text" id="usr-clave" required placeholder="Clave secreta" class="w-full border border-gray-300 rounded px-3 py-2 text-sm focus:outline-none focus:border-[#E67E22]">
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-4 border-t border-gray-200 pt-4 mt-2">
                    <div>
                        <label class="block text-[10px] font-bold text-gray-500 uppercase tracking-wider mb-1">Rol en el Sistema</label>
                        <select id="usr-rol" class="w-full border border-gray-300 rounded px-3 py-2 text-sm focus:outline-none font-bold text-gray-700 bg-white">
                            <option value="Cajero">Cajero (Solo Ventas)</option>
                            <option value="Supervisor">Supervisor (Caja y Taller)</option>
                            <option value="Admin">Administrador (Casi Todo)</option>
                            <option value="SuperAdmin">SuperAdmin (Acceso Total)</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-[10px] font-bold text-gray-500 uppercase tracking-wider mb-1">Estatus</label>
                        <select id="usr-estatus" class="w-full border border-gray-300 rounded px-3 py-2 text-sm focus:outline-none font-bold text-gray-700 bg-white">
                            <option value="Activo">🟢 Activo</option>
                            <option value="Inactivo">🔴 Inactivo (Suspendido)</option>
                        </select>
                    </div>
                </div>
                
                <div class="pt-4 flex gap-3">
                    <button type="button" onclick="cerrarModal()" class="flex-1 py-3 bg-gray-200 text-gray-700 font-bold rounded-lg btn-press">Cancelar</button>
                    <button type="submit" id="btn-guardar" class="flex-1 py-3 bg-[#143B62] text-white font-bold rounded-lg shadow-md btn-press">Guardar Usuario</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://icvfmdvvochzaktugqvj.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImljdmZtZHZ2b2NoemFrdHVncXZqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYyNDEzMzEsImV4cCI6MjA5MTgxNzMzMX0.gO3D39piT6KGbMMOzrPGWXUp5-g_nOBAgJ-nwPv8IcQ';

        window.onload = cargarUsuarios;

        async function cargarUsuarios() {
            try {
                const res = await fetch(`${SUPABASE_URL}/rest/v1/usuarios?order=fecha_creacion.asc`, { headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` } });
                const usuarios = await res.json();
                
                const tbody = document.getElementById('tabla-usuarios');
                if(usuarios.length === 0) return tbody.innerHTML = `<tr><td colspan="5" class="p-6 text-center text-gray-400">No hay usuarios registrados.</td></tr>`;

                tbody.innerHTML = usuarios.map(u => {
                    const colorRol = u.rol === 'SuperAdmin' ? 'bg-purple-100 text-purple-700' : (u.rol === 'Admin' ? 'bg-blue-100 text-blue-700' : 'bg-gray-100 text-gray-700');
                    const badgeEstatus = u.estatus === 'Activo' ? '<span class="text-green-500 font-bold"><i class="fa-solid fa-circle-check"></i> Activo</span>' : '<span class="text-red-500 font-bold"><i class="fa-solid fa-ban"></i> Inactivo</span>';
                    const uStr = encodeURIComponent(JSON.stringify(u));
                    
                    return `
                    <tr class="hover:bg-gray-50 transition border-b border-gray-50">
                        <td class="p-4 font-bold text-gray-800">${u.nombre_completo}</td>
                        <td class="p-4 font-mono text-sm text-gray-500">@${u.usuario_login}</td>
                        <td class="p-4"><span class="px-2 py-1 rounded text-[10px] font-bold ${colorRol} uppercase tracking-wider">${u.rol}</span></td>
                        <td class="p-4 text-center text-xs">${badgeEstatus}</td>
                        <td class="p-4 text-center">
                            <button onclick="editarUsuario('${uStr}')" class="bg-gray-100 text-gray-600 hover:bg-[#143B62] hover:text-white p-2 rounded shadow-sm transition btn-press" title="Editar">
                                <i class="fa-solid fa-pen-to-square"></i>
                            </button>
                        </td>
                    </tr>`;
                }).join('');
            } catch(e) { alert("Error cargando usuarios."); }
        }

        function abrirModalUsuario() {
            document.getElementById('form-usuario').reset();
            document.getElementById('usr-id').value = '';
            document.getElementById('usr-login').readOnly = false; // Permite editar login si es nuevo
            document.getElementById('modal-usuario').classList.remove('hidden');
            setTimeout(() => document.getElementById('modal-content').classList.replace('scale-95', 'scale-100'), 10);
        }

        function editarUsuario(str) {
            const u = JSON.parse(decodeURIComponent(str));
            document.getElementById('usr-id').value = u.id_usuario;
            document.getElementById('usr-nombre').value = u.nombre_completo;
            document.getElementById('usr-login').value = u.usuario_login;
            document.getElementById('usr-login').readOnly = true; // No se puede cambiar el login una vez creado
            document.getElementById('usr-clave').value = u.clave;
            document.getElementById('usr-rol').value = u.rol;
            document.getElementById('usr-estatus').value = u.estatus;
            
            document.getElementById('modal-usuario').classList.remove('hidden');
            setTimeout(() => document.getElementById('modal-content').classList.replace('scale-95', 'scale-100'), 10);
        }

        function cerrarModal() {
            document.getElementById('modal-content').classList.replace('scale-100', 'scale-95');
            setTimeout(() => document.getElementById('modal-usuario').classList.add('hidden'), 150);
        }

        async function guardarUsuario(e) {
            e.preventDefault();
            const id = document.getElementById('usr-id').value;
            const data = {
                nombre_completo: document.getElementById('usr-nombre').value.trim(),
                usuario_login: document.getElementById('usr-login').value.trim().toLowerCase(),
                clave: document.getElementById('usr-clave').value.trim(),
                rol: document.getElementById('usr-rol').value,
                estatus: document.getElementById('usr-estatus').value
            };

            const btn = document.getElementById('btn-guardar');
            btn.innerHTML = `<i class="fa-solid fa-spinner fa-spin"></i> Procesando...`;
            btn.disabled = true;

            try {
                let url = `${SUPABASE_URL}/rest/v1/usuarios`;
                let method = 'POST';

                if(id) { // Es una actualización
                    url += `?id_usuario=eq.${id}`;
                    method = 'PATCH';
                    delete data.usuario_login; // Aseguramos no modificar el usuario_login por error
                }

                const res = await fetch(url, {
                    method: method,
                    headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}`, 'Content-Type': 'application/json', 'Prefer': 'return=representation' },
                    body: JSON.stringify(data)
                });

                if(!res.ok) {
                    if(res.status === 409) throw new Error("El nombre de usuario (Login) ya está en uso.");
                    throw new Error("Error en la base de datos.");
                }

                cerrarModal();
                cargarUsuarios();
            } catch(error) {
                alert(error.message);
            } finally {
                btn.innerHTML = `Guardar Usuario`;
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
