<!DOCTYPE html>
<html lang="es">
<head>
    <script src="config.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>P&P Admin | Control de Presupuestos</title>

    <script>
        const cPri = localStorage.getItem('pyp_color_primario') || '#143B62';
        const cSec = localStorage.getItem('pyp_color_secundario') || '#E67E22';
        const cTer = localStorage.getItem('pyp_color_terciario') || '#64748b';
        document.documentElement.style.setProperty('--color-primary', cPri);
        document.documentElement.style.setProperty('--color-secondary', cSec);
        document.documentElement.style.setProperty('--color-tertiary', cTer);
        document.documentElement.style.setProperty('--font-global', localStorage.getItem('pyp_fuente') || "'Inter', sans-serif");
        document.documentElement.style.setProperty('--size-global', localStorage.getItem('pyp_tamano') || "14px");
    </script>

    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/fuse.js/dist/fuse.js"></script>

    <script>
        if (!localStorage.getItem('pyp_token_seguro')) { window.location.href = 'login.html'; }
    </script>

    <style>
        body { font-family: var(--font-global); font-size: var(--size-global); }
        .bg-primary { background-color: var(--color-primary) !important; }
        .text-primary { color: var(--color-primary) !important; }
        .bg-secondary { background-color: var(--color-secondary) !important; }
        .text-secondary { color: var(--color-secondary) !important; }
        .text-tertiary { color: var(--color-tertiary) !important; }

        .custom-scroll::-webkit-scrollbar { width: 5px; height: 5px; }
        .custom-scroll::-webkit-scrollbar-thumb { background-color: var(--color-primary); border-radius: 4px; }
        .btn-press:active { transform: scale(0.96); }
        
        /* Drawer (Panel Lateral) Animations */
        .drawer-overlay { transition: opacity 0.3s ease; }
        .drawer-panel { transform: translateX(100%); transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .drawer-open .drawer-overlay { opacity: 1; pointer-events: auto; }
        .drawer-open .drawer-panel { transform: translateX(0); }
    </style>
</head>
<body class="bg-[#f4f6f8] font-sans flex h-screen overflow-hidden text-gray-800">

    <script src="menu.js"></script>

    <main class="flex-1 flex flex-col h-screen overflow-hidden bg-gray-50 w-full z-10 relative">
        
        <header class="bg-white shadow-sm px-6 py-4 flex justify-between items-center z-10 shrink-0 border-b border-gray-200">
            <div class="flex items-center gap-3">
                <button onclick="toggleMobileMenu()" class="md:hidden text-gray-600 hover:text-primary text-xl px-2 transition"><i class="fa-solid fa-bars"></i></button>
                <div>
                    <h1 class="text-lg font-black text-primary uppercase flex items-center gap-2 tracking-wide"><i class="fa-solid fa-file-signature text-tertiary"></i> Módulo de Presupuestos</h1>
                    <p class="text-[10px] text-gray-500 font-bold uppercase tracking-widest mt-0.5">Aprobaciones y Cotizaciones a Clientes</p>
                </div>
            </div>
            <div class="flex gap-2">
                <div class="relative w-64">
                    <i class="fa-solid fa-search absolute left-3 top-2.5 text-gray-400 text-xs"></i>
                    <input type="text" id="buscador-presupuestos" oninput="filtrarPresupuestos()" placeholder="Buscar por Cliente o Nro..." class="w-full border border-gray-300 rounded-lg pl-8 pr-4 py-1.5 text-xs font-bold uppercase focus:outline-none focus:border-primary shadow-sm transition bg-white">
                </div>
                <select id="filtro-estatus" onchange="filtrarPresupuestos()" class="border border-gray-300 rounded-lg px-3 py-1.5 text-xs font-bold text-gray-700 outline-none bg-white shadow-sm focus:border-primary uppercase">
                    <option value="TODOS">Todos los Estados</option>
                    <option value="PENDIENTE">Pendientes (Por Aprobar)</option>
                    <option value="APROBADO">Aprobados</option>
                    <option value="FACTURADO">Facturados (Cerrados)</option>
                    <option value="RECHAZADO">Rechazados</option>
                </select>
            </div>
        </header>

        <div class="flex-1 overflow-auto p-6 custom-scroll">
            <div class="bg-white rounded-xl border border-gray-200 shadow-sm overflow-hidden flex flex-col h-full">
                <div class="overflow-x-auto custom-scroll flex-1">
                    <table class="w-full text-left text-xs whitespace-nowrap min-w-[800px]">
                        <thead class="bg-primary text-white text-[9px] uppercase font-black tracking-wider sticky top-0 z-10">
                            <tr>
                                <th class="py-3 px-4">Documento</th>
                                <th class="py-3 px-4">Fecha</th>
                                <th class="py-3 px-4">Cliente / Documento</th>
                                <th class="py-3 px-4 text-center">Origen</th>
                                <th class="py-3 px-4 text-right">Total ($)</th>
                                <th class="py-3 px-4 text-center">Estatus</th>
                                <th class="py-3 px-4 text-center">Acción</th>
                            </tr>
                        </thead>
                        <tbody id="tabla-presupuestos" class="divide-y divide-gray-100">
                            <tr><td colspan="7" class="p-10 text-center text-gray-400"><i class="fa-solid fa-spinner fa-spin text-xl mb-2 block"></i> Cargando Presupuestos...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <!-- SIDE DRAWER: VISTA DETALLADA DEL PRESUPUESTO -->
    <div id="drawer-container" class="fixed inset-0 z-[100] flex justify-end pointer-events-none drawer-overlay opacity-0 bg-slate-900/50 backdrop-blur-sm">
        <div class="bg-white w-full max-w-md h-full shadow-2xl flex flex-col drawer-panel pointer-events-auto border-l border-gray-200">
            
            <div class="bg-primary text-white px-5 py-4 flex justify-between items-center shrink-0">
                <div>
                    <h3 class="font-black text-sm uppercase tracking-wider flex items-center"><i class="fa-solid fa-file-invoice mr-2 text-tertiary"></i> Detalle Presupuesto</h3>
                    <p id="drawer-nro-doc" class="text-[10px] text-gray-300 font-bold mt-0.5 font-mono">CARGANDO...</p>
                </div>
                <button onclick="cerrarDrawer()" class="text-gray-300 hover:text-white text-xl transition"><i class="fa-solid fa-arrow-right"></i></button>
            </div>

            <div class="p-5 flex-1 overflow-y-auto custom-scroll bg-gray-50 space-y-4">
                
                <div class="bg-white p-4 rounded-lg border border-gray-200 shadow-sm">
                    <div class="flex justify-between items-start mb-2">
                        <label class="block text-[9px] font-black text-gray-400 uppercase tracking-wider">Datos del Cliente</label>
                        <span id="drawer-estatus-badge" class="px-2 py-0.5 rounded text-[8px] font-black uppercase border">ESTATUS</span>
                    </div>
                    <p id="drawer-cliente-nom" class="font-black text-primary text-sm uppercase leading-tight mb-0.5">NOMBRE CLIENTE</p>
                    <p id="drawer-cliente-doc" class="text-[10px] text-gray-500 font-mono font-bold">V-0000000</p>
                    <p id="drawer-notas" class="text-[9px] text-gray-400 mt-2 italic bg-gray-50 p-2 rounded hidden"></p>
                </div>

                <div class="bg-white rounded-lg border border-gray-200 shadow-sm overflow-hidden">
                    <div class="bg-gray-100 p-2 border-b border-gray-200">
                        <label class="block text-[9px] font-black text-gray-500 uppercase tracking-wider">Cargos Cotizados</label>
                    </div>
                    <div id="drawer-lista-detalles" class="p-2 space-y-1">
                        <!-- Detalles inyectados por JS -->
                    </div>
                    <div class="bg-gray-50 p-3 border-t border-gray-200 flex justify-between items-end">
                        <span class="text-[10px] font-black text-gray-500 uppercase">Total a Pagar</span>
                        <span id="drawer-total-usd" class="text-xl font-black text-secondary leading-none">$0.00</span>
                    </div>
                </div>

            </div>

            <div class="p-4 bg-white border-t border-gray-200 shrink-0 grid grid-cols-2 gap-2" id="botonera-drawer">
                <!-- Los botones se generan dinámicamente según el estatus -->
            </div>

        </div>
    </div>

</body>
</html>
