<!DOCTYPE html>
<html lang="es">
<head>
    <script src="config.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>P&P Admin | Control de Presupuestos</title>

    <script>
        const cPri = localStorage.getItem('pyp_color_primario') || '#143B62';
        const cSec = localStorage.getItem('pyp_color_secundario') || '#E67E22';
        const cTer = localStorage.getItem('pyp_color_terciario') || '#64748b';
        document.documentElement.style.setProperty('--color-primary', cPri);
        document.documentElement.style.setProperty('--color-secondary', cSec);
        document.documentElement.style.setProperty('--color-tertiary', cTer);
        document.documentElement.style.setProperty('--font-global', localStorage.getItem('pyp_fuente') || "'Inter', sans-serif");
        document.documentElement.style.setProperty('--size-global', localStorage.getItem('pyp_tamano') || "14px");
    </script>

    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/fuse.js/dist/fuse.js"></script>

    <script>
        if (!localStorage.getItem('pyp_token_seguro')) { window.location.href = 'login.html'; }
    </script>

    <style>
        body { font-family: var(--font-global); font-size: var(--size-global); }
        .bg-primary { background-color: var(--color-primary) !important; }
        .text-primary { color: var(--color-primary) !important; }
        .bg-secondary { background-color: var(--color-secondary) !important; }
        .text-secondary { color: var(--color-secondary) !important; }
        .text-tertiary { color: var(--color-tertiary) !important; }

        .custom-scroll::-webkit-scrollbar { width: 5px; height: 5px; }
        .custom-scroll::-webkit-scrollbar-thumb { background-color: var(--color-primary); border-radius: 4px; }
        .btn-press:active { transform: scale(0.96); }
        
        /* Drawer (Panel Lateral) Animations */
        .drawer-overlay { transition: opacity 0.3s ease; }
        .drawer-panel { transform: translateX(100%); transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .drawer-open .drawer-overlay { opacity: 1; pointer-events: auto; }
        .drawer-open .drawer-panel { transform: translateX(0); }
    </style>
</head>
<body class="bg-[#f4f6f8] font-sans flex h-screen overflow-hidden text-gray-800">

    <script src="menu.js"></script>

    <main class="flex-1 flex flex-col h-screen overflow-hidden bg-gray-50 w-full z-10 relative">
        
        <header class="bg-white shadow-sm px-6 py-4 flex justify-between items-center z-10 shrink-0 border-b border-gray-200">
            <div class="flex items-center gap-3">
                <button onclick="toggleMobileMenu()" class="md:hidden text-gray-600 hover:text-primary text-xl px-2 transition"><i class="fa-solid fa-bars"></i></button>
                <div>
                    <h1 class="text-lg font-black text-primary uppercase flex items-center gap-2 tracking-wide"><i class="fa-solid fa-file-signature text-tertiary"></i> Módulo de Presupuestos</h1>
                    <p class="text-[10px] text-gray-500 font-bold uppercase tracking-widest mt-0.5">Aprobaciones y Cotizaciones a Clientes</p>
                </div>
            </div>
          <div class="flex gap-3">
                <!-- Botón que redirige al POS para armar la cotización -->
                <button onclick="window.location.href='admin_ventas.html'" class="bg-emerald-500 hover:bg-emerald-600 text-white px-4 py-1.5 rounded-lg font-black text-[11px] uppercase tracking-wider shadow-sm transition btn-press flex items-center gap-2">
                    <i class="fa-solid fa-plus"></i> Nueva Cotización
                </button>
                <div class="relative w-64">
                    <i class="fa-solid fa-search absolute left-3 top-2.5 text-gray-400 text-xs"></i>    
                    <input type="text" id="buscador-presupuestos" oninput="filtrarPresupuestos()" placeholder="Buscar por Cliente o Nro..." class="w-full border border-gray-300 rounded-lg pl-8 pr-4 py-1.5 text-xs font-bold uppercase focus:outline-none focus:border-primary shadow-sm transition bg-white">
                </div>
                <select id="filtro-estatus" onchange="filtrarPresupuestos()" class="border border-gray-300 rounded-lg px-3 py-1.5 text-xs font-bold text-gray-700 outline-none bg-white shadow-sm focus:border-primary uppercase">
                    <option value="TODOS">Todos los Estados</option>
                    <option value="PENDIENTE">Pendientes (Por Aprobar)</option>
                    <option value="APROBADO">Aprobados</option>
                    <option value="FACTURADO">Facturados (Cerrados)</option>
                    <option value="RECHAZADO">Rechazados</option>
                </select>
            </div>
        </header>

        <div class="flex-1 overflow-auto p-6 custom-scroll">
            <div class="bg-white rounded-xl border border-gray-200 shadow-sm overflow-hidden flex flex-col h-full">
                <div class="overflow-x-auto custom-scroll flex-1">
                    <table class="w-full text-left text-xs whitespace-nowrap min-w-[800px]">
                        <thead class="bg-primary text-white text-[9px] uppercase font-black tracking-wider sticky top-0 z-10">
                            <tr>
                                <th class="py-3 px-4">Documento</th>
                                <th class="py-3 px-4">Fecha</th>
                                <th class="py-3 px-4">Cliente / Documento</th>
                                <th class="py-3 px-4 text-center">Origen</th>
                                <th class="py-3 px-4 text-right">Total ($)</th>
                                <th class="py-3 px-4 text-center">Estatus</th>
                                <th class="py-3 px-4 text-center">Acción</th>
                            </tr>
                        </thead>
                        <tbody id="tabla-presupuestos" class="divide-y divide-gray-100">
                            <tr><td colspan="7" class="p-10 text-center text-gray-400"><i class="fa-solid fa-spinner fa-spin text-xl mb-2 block"></i> Cargando Presupuestos...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <!-- SIDE DRAWER: VISTA DETALLADA DEL PRESUPUESTO -->
    <div id="drawer-container" class="fixed inset-0 z-[100] flex justify-end pointer-events-none drawer-overlay opacity-0 bg-slate-900/50 backdrop-blur-sm">
        <div class="bg-white w-full max-w-md h-full shadow-2xl flex flex-col drawer-panel pointer-events-auto border-l border-gray-200">
            
            <div class="bg-primary text-white px-5 py-4 flex justify-between items-center shrink-0">
                <div>
                    <h3 class="font-black text-sm uppercase tracking-wider flex items-center"><i class="fa-solid fa-file-invoice mr-2 text-tertiary"></i> Detalle Presupuesto</h3>
                    <p id="drawer-nro-doc" class="text-[10px] text-gray-300 font-bold mt-0.5 font-mono">CARGANDO...</p>
                </div>
                <button onclick="cerrarDrawer()" class="text-gray-300 hover:text-white text-xl transition"><i class="fa-solid fa-arrow-right"></i></button>
            </div>

            <div class="p-5 flex-1 overflow-y-auto custom-scroll bg-gray-50 space-y-4">
                
                <div class="bg-white p-4 rounded-lg border border-gray-200 shadow-sm">
                    <div class="flex justify-between items-start mb-2">
                        <label class="block text-[9px] font-black text-gray-400 uppercase tracking-wider">Datos del Cliente</label>
                        <span id="drawer-estatus-badge" class="px-2 py-0.5 rounded text-[8px] font-black uppercase border">ESTATUS</span>
                    </div>
                    <p id="drawer-cliente-nom" class="font-black text-primary text-sm uppercase leading-tight mb-0.5">NOMBRE CLIENTE</p>
                    <p id="drawer-cliente-doc" class="text-[10px] text-gray-500 font-mono font-bold">V-0000000</p>
                    <p id="drawer-notas" class="text-[9px] text-gray-400 mt-2 italic bg-gray-50 p-2 rounded hidden"></p>
                </div>

                <div class="bg-white rounded-lg border border-gray-200 shadow-sm overflow-hidden">
                    <div class="bg-gray-100 p-2 border-b border-gray-200">
                        <label class="block text-[9px] font-black text-gray-500 uppercase tracking-wider">Cargos Cotizados</label>
                    </div>
                    <div id="drawer-lista-detalles" class="p-2 space-y-1">
                        <!-- Detalles inyectados por JS -->
                    </div>
                    <div class="bg-gray-50 p-3 border-t border-gray-200 flex justify-between items-end">
                        <span class="text-[10px] font-black text-gray-500 uppercase">Total a Pagar</span>
                        <span id="drawer-total-usd" class="text-xl font-black text-secondary leading-none">$0.00</span>
                    </div>
                </div>

            </div>

            <div class="p-4 bg-white border-t border-gray-200 shrink-0 grid grid-cols-2 gap-2" id="botonera-drawer">
                <!-- Los botones se generan dinámicamente según el estatus -->
            </div>

        </div>
    </div>
<!-- ==========================================
         MOTOR LÓGICO: MÓDULO DE PRESUPUESTOS
    =========================================== -->
    <script>
        const TOKEN_JWT = localStorage.getItem('pyp_token_seguro');
        let presupuestosGlobal = [];
        let fusePresupuestos;
        let presupuestoActivo = null;

        window.onload = async () => {
            await cargarPresupuestos();
        };

        // --- 1. CARGA Y RENDERIZADO DE LA TABLA ---
        async function cargarPresupuestos() {
            try {
                // Descargamos solo las cotizaciones (tipo_documento = 'COTIZACION')
                const res = await fetch(`${SUPABASE_URL}/rest/v1/ventas_documentos?tipo_documento=eq.COTIZACION&order=fecha_emision.desc`, {
                    headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${TOKEN_JWT}` }
                });

                if (!res.ok) throw new Error("Fallo al descargar presupuestos.");
                
                presupuestosGlobal = await res.json();
                
                // Inicializamos el buscador predictivo
                fusePresupuestos = new Fuse(presupuestosGlobal, {
                    keys: ['correlativo', 'cliente_nombre', 'cliente_documento'],
                    threshold: 0.3,
                    ignoreLocation: true,
                    getFn: (obj, path) => {
                        let val = obj;
                        for (let i = 0; i < path.length; i++) val = val ? val[path[i]] : null;
                        return typeof val === 'string' ? val.normalize("NFD").replace(/[\u0300-\u036f]/g, "") : String(val);
                    }
                });

                renderizarTabla(presupuestosGlobal);
            } catch (e) {
                document.getElementById('tabla-presupuestos').innerHTML = `<tr><td colspan="7" class="p-10 text-center text-red-500 font-bold uppercase"><i class="fa-solid fa-triangle-exclamation mb-2 text-2xl block"></i>Error de conexión.</td></tr>`;
            }
        }

        function renderizarTabla(data) {
            const tbody = document.getElementById('tabla-presupuestos');
            
            if (data.length === 0) {
                tbody.innerHTML = `<tr><td colspan="7" class="p-10 text-center text-gray-400 font-bold uppercase"><i class="fa-solid fa-folder-open mb-2 text-2xl block opacity-50"></i>Sin Documentos</td></tr>`;
                return;
            }

            let html = '';
            data.forEach(p => {
                const fecha = new Date(p.fecha_emision).toLocaleDateString('es-VE', { year: 'numeric', month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit' });
                const total = parseFloat(p.total_usd).toFixed(2);
                
                let badgeClass = 'bg-gray-100 text-gray-600 border-gray-300';
                if (p.estatus === 'PENDIENTE') badgeClass = 'bg-amber-50 text-amber-700 border-amber-300 animate-pulse';
                if (p.estatus === 'APROBADO') badgeClass = 'bg-emerald-50 text-emerald-700 border-emerald-300';
                if (p.estatus === 'FACTURADO') badgeClass = 'bg-blue-50 text-blue-700 border-blue-300';
                if (p.estatus === 'RECHAZADO') badgeClass = 'bg-red-50 text-red-700 border-red-300';

                const origen = p.id_origen_taller ? `<span class="text-[9px] font-black text-purple-600 bg-purple-50 px-1.5 py-0.5 border border-purple-200 rounded uppercase">Taller</span>` : `<span class="text-[9px] font-black text-gray-500 bg-gray-100 px-1.5 py-0.5 border border-gray-200 rounded uppercase">Mostrador</span>`;

                html += `
                <tr class="hover:bg-blue-50 transition cursor-pointer border-b border-gray-50" onclick="abrirDrawer('${p.id_documento}')">
                    <td class="py-2.5 px-4 font-mono font-bold text-gray-500">PRE-${String(p.correlativo).padStart(6, '0')}</td>
                    <td class="py-2.5 px-4 text-[10px] text-gray-500 font-bold">${fecha}</td>
                    <td class="py-2.5 px-4"><div class="font-black text-primary uppercase text-[10px] truncate max-w-[200px]">${p.cliente_nombre}</div><div class="text-[8px] text-gray-400 font-mono">${p.cliente_documento || 'N/A'}</div></td>
                    <td class="py-2.5 px-4 text-center">${origen}</td>
                    <td class="py-2.5 px-4 text-right font-black text-secondary">$${total}</td>
                    <td class="py-2.5 px-4 text-center"><span class="px-2 py-0.5 rounded text-[8px] font-black border ${badgeClass} uppercase tracking-wider">${p.estatus}</span></td>
                    <td class="py-2.5 px-4 text-center"><button class="text-gray-400 hover:text-primary transition p-1"><i class="fa-solid fa-chevron-right"></i></button></td>
                </tr>`;
            });
            tbody.innerHTML = html;
        }

        // --- 2. FILTROS Y BÚSQUEDA ---
        function filtrarPresupuestos() {
            let query = document.getElementById('buscador-presupuestos').value.trim();
            const estatus = document.getElementById('filtro-estatus').value;
            
            let data = presupuestosGlobal;

            if (query !== '') {
                const qNorm = query.normalize("NFD").replace(/[\u0300-\u036f]/g, "");
                data = fusePresupuestos.search(qNorm).map(r => r.item);
            }

            if (estatus !== 'TODOS') {
                data = data.filter(p => p.estatus === estatus);
            }

            renderizarTabla(data);
        }

        // --- 3. PANEL LATERAL (DRAWER) ---
        async function abrirDrawer(id_documento) {
            presupuestoActivo = presupuestosGlobal.find(p => p.id_documento === id_documento);
            if (!presupuestoActivo) return;

            document.getElementById('drawer-nro-doc').innerText = `PRE-${String(presupuestoActivo.correlativo).padStart(6, '0')}`;
            document.getElementById('drawer-cliente-nom').innerText = presupuestoActivo.cliente_nombre;
            document.getElementById('drawer-cliente-doc').innerText = presupuestoActivo.cliente_documento || 'N/A';
            document.getElementById('drawer-total-usd').innerText = `$${parseFloat(presupuestoActivo.total_usd).toFixed(2)}`;
            
            const badge = document.getElementById('drawer-estatus-badge');
            badge.innerText = presupuestoActivo.estatus;
            badge.className = `px-2 py-0.5 rounded text-[8px] font-black uppercase border ${presupuestoActivo.estatus === 'PENDIENTE' ? 'bg-amber-50 text-amber-700 border-amber-300' : presupuestoActivo.estatus === 'APROBADO' ? 'bg-emerald-50 text-emerald-700 border-emerald-300' : 'bg-gray-100 text-gray-500 border-gray-300'}`;

            if (presupuestoActivo.notas_internas) {
                document.getElementById('drawer-notas').innerText = presupuestoActivo.notas_internas;
                document.getElementById('drawer-notas').classList.remove('hidden');
            } else {
                document.getElementById('drawer-notas').classList.add('hidden');
            }

            document.getElementById('drawer-lista-detalles').innerHTML = '<div class="text-center py-6"><i class="fa-solid fa-spinner fa-spin text-primary"></i></div>';
            construirBotonera(presupuestoActivo.estatus);
            
            document.getElementById('drawer-container').classList.add('drawer-open');

            // Descargar detalles dinámicamente
            try {
                const res = await fetch(`${SUPABASE_URL}/rest/v1/ventas_documentos_detalles?id_documento=eq.${id_documento}`, {
                    headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${TOKEN_JWT}` }
                });
                if (!res.ok) throw new Error("Fallo API");
                const detalles = await res.json();
                
                let htmlDetalles = '';
                detalles.forEach(d => {
                    htmlDetalles += `
                    <div class="bg-white border border-gray-200 rounded p-2 flex justify-between items-center shadow-sm">
                        <div class="flex-1 truncate pr-2">
                            <div class="font-bold text-primary text-[10px] uppercase truncate">${d.producto_nombre}</div>
                            <div class="text-[8px] text-gray-500 font-mono">${d.producto_sku}</div>
                        </div>
                        <div class="text-right">
                            <div class="text-[11px] font-black text-secondary">$${parseFloat(d.subtotal_linea_usd).toFixed(2)}</div>
                            <div class="text-[8px] text-gray-400 font-bold">${d.cantidad} x $${parseFloat(d.precio_unitario_usd).toFixed(2)}</div>
                        </div>
                    </div>`;
                });
                document.getElementById('drawer-lista-detalles').innerHTML = htmlDetalles;
            } catch (e) {
                document.getElementById('drawer-lista-detalles').innerHTML = '<div class="text-center text-red-500 text-[10px] font-bold">Error cargando cargos.</div>';
            }
        }

        function cerrarDrawer() {
            document.getElementById('drawer-container').classList.remove('drawer-open');
            presupuestoActivo = null;
        }

        // --- 4. ACCIONES FINANCIERAS (EL FILTRO PROFIT) ---
        function construirBotonera(estatus) {
            const btnContainer = document.getElementById('botonera-drawer');
            let html = '';

            // Botón de impresión (Siempre disponible)
            html += `<button onclick="imprimirPresupuesto()" class="col-span-2 bg-gray-100 hover:bg-gray-200 text-gray-700 font-black py-2 rounded text-[10px] uppercase tracking-wider shadow-sm transition btn-press border border-gray-200 flex items-center justify-center gap-2"><i class="fa-solid fa-print"></i> Imprimir / PDF</button>`;

            // Lógica Transaccional Estricta
            if (estatus === 'PENDIENTE') {
                html += `
                <button onclick="cambiarEstatusDocumento('RECHAZADO')" class="bg-red-50 hover:bg-red-500 hover:text-white text-red-600 border border-red-200 font-black py-2 rounded text-[10px] uppercase tracking-wider shadow-sm transition btn-press">Rechazar</button>
                <button onclick="cambiarEstatusDocumento('APROBADO')" class="bg-emerald-500 hover:bg-emerald-600 text-white font-black py-2 rounded text-[10px] uppercase tracking-wider shadow-sm transition btn-press flex items-center justify-center gap-1"><i class="fa-solid fa-check-double"></i> Aprobar</button>`;
            } 
            else if (estatus === 'APROBADO') {
                html += `<div class="col-span-2 text-center text-[9px] font-black text-emerald-600 bg-emerald-50 border border-emerald-200 rounded py-2 uppercase tracking-widest"><i class="fa-solid fa-check-circle mr-1"></i> Listo para que la Caja lo importe</div>`;
            }
            else if (estatus === 'FACTURADO') {
                html += `<div class="col-span-2 text-center text-[9px] font-black text-blue-600 bg-blue-50 border border-blue-200 rounded py-2 uppercase tracking-widest"><i class="fa-solid fa-lock mr-1"></i> Cerrado y Facturado</div>`;
            }

            btnContainer.innerHTML = html;
        }

        async function cambiarEstatusDocumento(nuevoEstatus) {
            if (!presupuestoActivo) return;
            if (!confirm(`¿Estás seguro de marcar este presupuesto como ${nuevoEstatus}?`)) return;

            try {
                // 1. Actualizamos el documento en la base de datos
                await fetch(`${SUPABASE_URL}/rest/v1/ventas_documentos?id_documento=eq.${presupuestoActivo.id_documento}`, {
                    method: 'PATCH',
                    headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${TOKEN_JWT}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({ estatus: nuevoEstatus })
                });

                // 2. Si proviene del taller y fue Aprobado, notificamos al taller automáticamente.
                if (nuevoEstatus === 'APROBADO' && presupuestoActivo.id_origen_taller) {
                    await fetch(`${SUPABASE_URL}/rest/v1/servicio_ordenes?id_orden=eq.${presupuestoActivo.id_origen_taller}`, {
                        method: 'PATCH',
                        headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${TOKEN_JWT}`, 'Content-Type': 'application/json' },
                        body: JSON.stringify({ estatus: 'En Revisión', diagnostico_tecnico: 'PRESUPUESTO APROBADO. PROCEDER A REPARAR.' })
                    });
                }

                alert(`Presupuesto ${nuevoEstatus} con éxito.`);
                cerrarDrawer();
                await cargarPresupuestos(); // Refrescamos la tabla

            } catch (e) {
                alert("Error de conexión al actualizar estatus.");
            }
        }

        function imprimirPresupuesto() {
            // Imprime la pantalla utilizando las reglas CSS print. 
            // Para un ERP B2B esto se maquilla vía CSS @media print o se envía a una API generadora de PDF.
            alert("Preparando documento para impresión...");
            window.print();
        }
    </script>
</body>
</html>
