<!DOCTYPE html> 
<html lang="es"> 
<head> 
    <meta charset="UTF-8"> 
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> 
    <title>P&P Admin | Cuentas por Cobrar</title> 
    <script src="https://cdn.tailwindcss.com"></script> 
    <script> 
        const cPri = localStorage.getItem('pyp_color_primario') || '#143B62'; 
        const cSec = localStorage.getItem('pyp_color_secundario') || '#E67E22'; 
        const cTer = localStorage.getItem('pyp_color_terciario') || '#64748b'; 
        const fontFam = localStorage.getItem('pyp_fuente') || "'Inter', sans-serif"; 
        const fontSiz = localStorage.getItem('pyp_tamano') || "14px"; 
        
        document.documentElement.style.setProperty('--color-primary', cPri); 
        document.documentElement.style.setProperty('--color-secondary', cSec); 
        document.documentElement.style.setProperty('--color-tertiary', cTer); 
        document.documentElement.style.setProperty('--font-global', fontFam); 
        document.documentElement.style.setProperty('--size-global', fontSiz); 
        
        tailwind.config = { theme: { extend: { colors: { primary: 'var(--color-primary)', secondary: 'var(--color-secondary)', tertiary: 'var(--color-tertiary)' } } } }; 
    </script> 
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"> 
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;700;900&display=swap" rel="stylesheet"> 
    <script src="https://cdn.jsdelivr.net/npm/fuse.js/dist/fuse.js"></script> 
    <style> 
        body { font-family: var(--font-global); font-size: var(--size-global); } 
        .bg-primary { background-color: var(--color-primary) !important; } 
        .text-primary { color: var(--color-primary) !important; } 
        .bg-secondary { background-color: var(--color-secondary) !important; } 
        .text-secondary { color: var(--color-secondary) !important; } 
        .text-tertiary { color: var(--color-tertiary) !important; } 
        .custom-scroll::-webkit-scrollbar { width: 5px; height: 5px; } 
        .custom-scroll::-webkit-scrollbar-thumb { background-color: var(--color-primary); border-radius: 4px; } 
        .btn-press:active { transform: scale(0.96); } 
        .fade-in { animation: fadeIn 0.15s ease-in-out; } 
        @keyframes fadeIn { from { opacity: 0; transform: translateY(2px); } to { opacity: 1; transform: translateY(0); } } 
        input[type=number]::-webkit-inner-spin-button, input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; } 
        
        @media print { 
            body * { visibility: hidden; } 
            #ticket-impresion, #ticket-impresion * { visibility: visible; } 
            #ticket-impresion { position: absolute; left: 0; top: 0; margin: 0; padding: 0; color: #000; background: #fff; width: 78mm; font-family: 'Courier New', monospace; font-size: 11px; } 
        } 
    </style> 
</head> 
<body class="bg-[#f4f6f8] flex h-screen overflow-hidden text-gray-800"> 

    <div id="loading-overlay" class="fixed inset-0 bg-white/95 z-[9999] hidden flex-col items-center justify-center p-6 text-center backdrop-blur-sm"> 
        <i id="loading-icon" class="fa-solid fa-circle-notch fa-spin text-5xl text-primary mb-4"></i> 
        <h2 id="loading-text" class="text-xl font-black text-primary uppercase mb-2">Cargando...</h2> 
        <p id="loading-error" class="text-xs text-gray-500 font-medium max-w-sm hidden text-center"></p> 
        <div id="error-actions" class="hidden mt-6 flex gap-3"> 
            <button onclick="cerrarErrorCarga()" class="bg-gray-500 hover:bg-gray-600 text-white px-6 py-2.5 rounded font-bold uppercase text-xs btn-press transition shadow">Cerrar</button> 
        </div> 
    </div> 

    <div id="modal-abono" class="fixed inset-0 bg-slate-900/80 backdrop-blur-sm z-[9990] hidden flex items-center justify-center p-4 fade-in"> 
        <div class="bg-white rounded-xl shadow-2xl w-full max-w-md overflow-hidden flex flex-col border border-gray-200 relative"> 
            <div class="bg-primary px-4 py-3 flex justify-between items-center shrink-0"> 
                <h3 class="font-bold text-white text-[12px] tracking-wide uppercase"><i class="fa-solid fa-hand-holding-dollar text-tertiary mr-2"></i> Registrar Abono</h3> 
                <button onclick="cerrarModalAbono()" class="text-gray-300 hover:text-white text-lg transition"><i class="fa-solid fa-times"></i></button> 
            </div> 
            <div class="p-5 bg-gray-50 space-y-3"> 
                <div class="bg-white border border-gray-200 rounded p-3 text-[10px] shadow-sm">
                    <div class="flex justify-between border-b border-gray-100 pb-1 mb-1">
                        <span class="text-gray-500 uppercase font-bold">Cliente:</span>
                        <span id="lbl-cliente" class="font-black text-primary uppercase">Cargando...</span>
                    </div>
                    <div class="flex justify-between border-b border-gray-100 pb-1 mb-1">
                        <span class="text-gray-500 uppercase font-bold">Factura / Ctrl:</span>
                        <span id="lbl-factura" class="font-bold text-gray-800">Cargando...</span>
                    </div>
                    <div class="flex justify-between">
                        <span class="text-gray-500 uppercase font-bold">Saldo Restante:</span>
                        <span id="lbl-saldo" class="font-black text-red-600 text-[12px]">US$ 0.00</span>
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-3"> 
                    <div class="col-span-2"> 
                        <label class="block text-[9px] font-bold text-gray-600 uppercase mb-1">Monto a Abonar (USD)</label> 
                        <div class="relative">
                            <span class="absolute left-3 top-2.5 text-gray-500 font-bold">$</span>
                            <input type="number" id="input-abono-usd" step="0.01" class="w-full border border-gray-300 rounded-lg pl-7 pr-3 py-2 text-base font-black text-primary outline-none shadow-sm bg-white focus:border-tertiary transition" placeholder="0.00" oninput="calcularEquivalenteBs()"> 
                        </div>
                        <div class="text-right mt-1">
                            <button onclick="abonarTotal()" class="text-[9px] font-bold text-tertiary hover:underline">Abonar Total Restante</button>
                        </div>
                    </div> 
                    
                    <div class="col-span-2 bg-slate-100 border border-slate-200 rounded p-2 text-center shadow-inner">
                        <p class="text-[8px] font-bold text-gray-500 uppercase tracking-widest mb-0.5">Equivalente BCV a Pagar</p>
                        <h3 class="text-xl font-black text-secondary" id="lbl-abono-bs">Bs. 0.00</h3>
                    </div>

                    <div class="col-span-2"> 
                        <label class="block text-[9px] font-bold text-gray-600 uppercase mb-1">Método de Pago</label> 
                        <select id="abono-metodo" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-[11px] font-bold text-gray-700 outline-none shadow-sm bg-white focus:border-tertiary transition"> 
                            <option value="TRANSFERENCIA_BS">🏦 Transferencia Bolívares</option> 
                            <option value="PAGO_MOVIL">📱 Pago Móvil</option> 
                            <option value="PUNTO_VENTA">💳 Punto de Venta</option> 
                            <option value="EFECTIVO_BS">🇻🇪 Efectivo Bolívares</option> 
                            <option value="EFECTIVO_USD">💵 Efectivo Divisas</option> 
                            <option value="ZELLE">🟣 Zelle</option> 
                        </select> 
                    </div> 
                    
                    <div class="col-span-2"> 
                        <label class="block text-[9px] font-bold text-gray-600 uppercase mb-1">Ref / Lote (Opcional)</label> 
                        <input type="text" id="abono-ref" class="w-full border border-gray-300 rounded px-3 py-1.5 text-[11px] font-bold uppercase text-gray-700 outline-none shadow-sm bg-white focus:border-tertiary transition" placeholder="Ej: 145980"> 
                    </div> 
                </div> 

                <button onclick="procesarAbono()" id="btn-procesar-abono" class="w-full bg-secondary hover:opacity-90 text-white font-bold py-3 mt-2 rounded-lg shadow-md transition-all text-xs uppercase tracking-wider btn-press flex justify-center items-center gap-2"><i class="fa-solid fa-receipt text-white"></i> Procesar e Imprimir Recibo</button> 
            </div> 
        </div> 
    </div> 

    <div id="ticket-impresion" class="hidden print:block"></div> 

    <script src="menu.js"></script> 
    
    <main class="flex-1 flex flex-col h-screen overflow-hidden w-full z-10 relative"> 
        <header class="bg-white shadow-sm px-4 flex justify-between items-center z-10 shrink-0 border-b border-gray-200 h-12"> 
            <div class="flex items-center gap-3"> 
                <button onclick="toggleMobileMenu()" class="md:hidden text-gray-600 hover:text-primary text-lg px-2"><i class="fa-solid fa-bars"></i></button> 
                <h1 class="text-xs font-bold text-primary flex items-center gap-2 uppercase tracking-tighter"><i class="fa-solid fa-file-invoice-dollar text-tertiary"></i> Cuentas por Cobrar (CxC)</h1> 
            </div> 
            <div class="flex items-center gap-3"> 
                <div class="text-[9px] font-bold uppercase tracking-wider bg-blue-50 text-primary border border-blue-200 shadow-sm px-2 py-1 rounded">
                    Tasa BCV: <span id="lbl-tasa-global" class="font-black">0.00</span>
                </div>
            </div> 
        </header> 

        <div class="flex-1 flex flex-col overflow-hidden p-4"> 
            
            <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-4 shrink-0">
                <div class="bg-white p-3 rounded-lg border border-gray-200 shadow-sm flex items-center justify-between border-l-4 border-l-primary">
                    <div>
                        <p class="text-[9px] font-bold text-gray-400 uppercase tracking-widest">Total Deuda Calle</p>
                        <h2 class="text-xl font-black text-primary mt-0.5" id="metric-total-deuda">$0.00</h2>
                    </div>
                    <div class="bg-blue-50 text-primary w-10 h-10 rounded-full flex items-center justify-center text-lg"><i class="fa-solid fa-chart-pie"></i></div>
                </div>
                
                <div class="md:col-span-3 bg-white p-2 rounded-lg border border-gray-200 shadow-sm flex items-center gap-2">
                    <i class="fa-solid fa-search text-gray-400 ml-2"></i>
                    <input type="text" id="buscador-cxc" oninput="buscarCuentas()" placeholder="Buscar por Cliente, Cédula o Nro Factura..." class="flex-1 border-none outline-none text-xs font-bold uppercase text-gray-700 bg-transparent h-full">
                </div>
            </div>

            <div class="flex-1 bg-white rounded-lg border border-gray-200 shadow-sm overflow-hidden flex flex-col"> 
                <div class="overflow-x-auto custom-scroll flex-1">
                    <table class="w-full text-left text-[10px] whitespace-nowrap">
                        <thead class="bg-gray-50 text-gray-500 uppercase tracking-wider sticky top-0 z-10 border-b border-gray-200">
                            <tr>
                                <th class="py-3 px-4 font-bold">Fecha / Vence</th>
                                <th class="py-3 px-4 font-bold">Factura</th>
                                <th class="py-3 px-4 font-bold">Cliente</th>
                                <th class="py-3 px-4 font-bold text-right">Facturado ($)</th>
                                <th class="py-3 px-4 font-bold text-right text-red-600">Saldo Restante ($)</th>
                                <th class="py-3 px-4 font-bold text-center">Acción</th>
                            </tr>
                        </thead>
                        <tbody class="divide-y divide-gray-100" id="tabla-cxc">
                            <tr><td colspan="6" class="p-10 text-center text-gray-400 font-bold uppercase tracking-widest"><i class="fa-solid fa-spinner fa-spin text-2xl mb-2 block"></i> Cargando Cartera...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div> 

        </div> 
    </main>
    <script> 
        const SUPABASE_URL = 'https://icvfmdvvochzaktugqvj.supabase.co'; 
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImljdmZtZHZ2b2NoemFrdHVncXZqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYyNDEzMzEsImV4cCI6MjA5MTgxNzMzMX0.gO3D39piT6KGbMMOzrPGWXUp5-g_nOBAgJ-nwPv8IcQ';
        const TOKEN_JWT = localStorage.getItem('pyp_token_seguro'); 
        
        let dbCuentas = [], fuseCuentas = null, empresaActual = null, tasaBCV = 1; 
        let facturaSeleccionada = null;

        window.onload = async () => { 
            try { 
                await iniciarModuloCxC(); 
            } catch(e) { 
                mostrarErrorConexion("Fallo al conectar con la base de datos."); 
            } 
        }; 

        function fmt(num) { return parseFloat(num || 0).toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 }); } 

        function mostrarErrorConexion(msg) { 
            document.getElementById('loading-text').innerText = "Error"; 
            document.getElementById('loading-error').innerText = msg;  
            document.getElementById('loading-error').classList.remove('hidden'); 
            document.getElementById('error-actions').classList.remove('hidden'); 
            document.getElementById('loading-icon').className = "fa-solid fa-wifi text-5xl text-red-500 mb-4";  
            document.getElementById('loading-overlay').classList.remove('hidden'); document.getElementById('loading-overlay').classList.add('flex'); 
        } 
        function cerrarErrorCarga() { document.getElementById('loading-overlay').classList.add('hidden'); document.getElementById('loading-overlay').classList.remove('flex'); } 
        function mostrarCarga(txt) {
            document.getElementById('loading-text').innerText = txt;
            document.getElementById('loading-error').classList.add('hidden'); 
            document.getElementById('error-actions').classList.add('hidden'); 
            document.getElementById('loading-icon').className = "fa-solid fa-circle-notch fa-spin text-5xl text-primary mb-4";  
            document.getElementById('loading-overlay').classList.remove('hidden'); document.getElementById('loading-overlay').classList.add('flex'); 
        }

        async function iniciarModuloCxC() { 
            mostrarCarga("Cargando Cartera CxC...");
            try { 
                const resUser = await fetch(`${SUPABASE_URL}/rest/v1/usuarios?select=id_empresa&limit=1`, { headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${TOKEN_JWT}` } }); 
                if (!resUser.ok) throw new Error("Sesión inválida."); 
                empresaActual = (await resUser.json())[0]?.id_empresa || null; 

                const resTasa = await fetch(`${SUPABASE_URL}/rest/v1/tasas_bcv?moneda=eq.USD&select=tasa&order=fecha_actualizacion.desc&limit=1`, { headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${TOKEN_JWT}` } }); 
                if (resTasa.ok) {
                    const dataT = await resTasa.json();
                    if(dataT.length > 0) tasaBCV = dataT[0].tasa;
                }
                document.getElementById('lbl-tasa-global').innerText = tasaBCV.toFixed(2);

                await cargarDataCxC();
                cerrarErrorCarga();
            } catch(e) { mostrarErrorConexion(e.message); } 
        } 

        async function cargarDataCxC() {
            const filtroEmpresa = empresaActual ? `id_empresa=eq.${empresaActual}&` : `id_empresa=is.null&`; 
            // Carga ultra-rápida filtrando estrictamente a nivel de DB por el pilar "saldo_pendiente_usd"
            const res = await fetch(`${SUPABASE_URL}/rest/v1/facturas?${filtroEmpresa}saldo_pendiente_usd=gt.0&select=*&order=fecha_emision.asc`, { headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${TOKEN_JWT}` } }); 
            if (!res.ok) throw new Error("Fallo al leer cuentas por cobrar."); 
            
            dbCuentas = await res.json(); 
            
            fuseCuentas = new Fuse(dbCuentas, { keys: ['nro_factura_manual', 'nro_control_manual', 'cliente_nombre', 'cliente_documento'], threshold: 0.3, ignoreLocation: true, getFn: function(obj, path) { let val = obj; for (let i = 0; i < path.length; i++) { val = val ? val[path[i]] : null; } return typeof val === 'string' ? val.normalize("NFD").replace(/[\u0300-\u036f]/g, "") : val; } }); 
            
            renderTablaCuentas(dbCuentas);
        }

        function buscarCuentas() {
            let query = document.getElementById('buscador-cxc').value.trim(); 
            if (query === '') { renderTablaCuentas(dbCuentas); return; }
            const queryNormalizada = query.normalize("NFD").replace(/[\u0300-\u036f]/g, ""); 
            let data = fuseCuentas.search(queryNormalizada).map(r => r.item); 
            renderTablaCuentas(data);
        }

        function renderTablaCuentas(data) {
            const tbody = document.getElementById('tabla-cxc');
            let html = ''; let totalDeuda = 0;

            if(data.length === 0) {
                tbody.innerHTML = `<tr><td colspan="6" class="p-10 text-center text-gray-400 font-bold uppercase tracking-widest"><i class="fa-solid fa-check-double text-3xl mb-2 block text-green-500"></i> Cartera Limpia. Sin deudas.</td></tr>`;
                document.getElementById('metric-total-deuda').innerText = `$0.00`;
                return;
            }

            data.forEach(f => {
                totalDeuda += parseFloat(f.saldo_pendiente_usd);
                const fEmision = new Date(f.fecha_emision).toLocaleDateString('es-VE');
                const fVence = new Date(f.fecha_vencimiento + 'T12:00:00Z').toLocaleDateString('es-VE');
                const esVencida = new Date(f.fecha_vencimiento + 'T12:00:00Z') < new Date() ? 'text-red-500 font-black' : 'text-gray-500';
                
                // Serializamos el objeto para inyectarlo en el botón de forma segura
                const fStr = encodeURIComponent(JSON.stringify(f));

                html += `<tr class="hover:bg-blue-50 transition border-b border-gray-100">
                    <td class="py-2 px-4">
                        <div class="text-[11px] font-bold text-gray-800">${fEmision}</div>
                        <div class="text-[9px] ${esVencida} uppercase tracking-wider">Vence: ${fVence}</div>
                    </td>
                    <td class="py-2 px-4">
                        <div class="text-[11px] font-mono font-black text-primary">${f.nro_factura_manual || f.id_factura.split('-')[0]}</div>
                        <div class="text-[8px] text-gray-500 font-mono">Ctrl: ${f.nro_control_manual || 'N/A'}</div>
                    </td>
                    <td class="py-2 px-4 min-w-[200px]">
                        <div class="text-[11px] font-bold text-gray-800 truncate uppercase">${f.cliente_nombre}</div>
                        <div class="text-[9px] text-gray-500 font-mono">${f.cliente_documento}</div>
                    </td>
                    <td class="py-2 px-4 text-right font-bold text-gray-600">$${fmt(f.total_usd)}</td>
                    <td class="py-2 px-4 text-right font-black text-red-600 text-[12px]">$${fmt(f.saldo_pendiente_usd)}</td>
                    <td class="py-2 px-4 text-center">
                        <button onclick="abrirModalAbono('${fStr}')" class="bg-tertiary hover:opacity-90 text-white px-3 py-1.5 rounded shadow-sm text-[10px] font-bold uppercase transition"><i class="fa-solid fa-hand-holding-dollar mr-1"></i> Abonar</button>
                    </td>
                </tr>`;
            });
            tbody.innerHTML = html;
            document.getElementById('metric-total-deuda').innerText = `$${fmt(totalDeuda)}`;
        }

        // ================= MOTOR DE ABONOS =================
        function abrirModalAbono(fStr) {
            facturaSeleccionada = JSON.parse(decodeURIComponent(fStr));
            document.getElementById('lbl-cliente').innerText = facturaSeleccionada.cliente_nombre;
            document.getElementById('lbl-factura').innerText = facturaSeleccionada.nro_factura_manual || 'S/N';
            document.getElementById('lbl-saldo').innerText = `US$ ${fmt(facturaSeleccionada.saldo_pendiente_usd)}`;
            document.getElementById('input-abono-usd').value = '';
            document.getElementById('lbl-abono-bs').innerText = `Bs. 0.00`;
            document.getElementById('abono-ref').value = '';
            document.getElementById('abono-metodo').selectedIndex = 0;
            
            document.getElementById('modal-abono').classList.remove('hidden');
            document.getElementById('modal-abono').classList.add('flex');
            setTimeout(() => document.getElementById('input-abono-usd').focus(), 100);
        }

        function cerrarModalAbono() {
            document.getElementById('modal-abono').classList.add('hidden');
            document.getElementById('modal-abono').classList.remove('flex');
            facturaSeleccionada = null;
        }

        function abonarTotal() {
            if(!facturaSeleccionada) return;
            document.getElementById('input-abono-usd').value = facturaSeleccionada.saldo_pendiente_usd;
            calcularEquivalenteBs();
        }

        function calcularEquivalenteBs() {
            let abonoUsd = parseFloat(document.getElementById('input-abono-usd').value) || 0;
            // Prevenir pasarse de la deuda
            if (abonoUsd > facturaSeleccionada.saldo_pendiente_usd) {
                abonoUsd = facturaSeleccionada.saldo_pendiente_usd;
                document.getElementById('input-abono-usd').value = abonoUsd.toFixed(2);
            }
            document.getElementById('lbl-abono-bs').innerText = `Bs. ${fmt(abonoUsd * tasaBCV)}`;
        }

        async function procesarAbono() {
            const abonoUsd = parseFloat(document.getElementById('input-abono-usd').value) || 0;
            if (abonoUsd <= 0 || !facturaSeleccionada) return alert("Ingrese un monto válido superior a 0.");
            
            const btn = document.getElementById('btn-procesar-abono'); btn.disabled = true;
            mostrarCarga("Registrando Abono Financiero...");

            try {
                const metodo = document.getElementById('abono-metodo').value;
                const ref = document.getElementById('abono-ref').value.trim().toUpperCase();
                const abonoBs = abonoUsd * tasaBCV;
                const nuevoSaldo = facturaSeleccionada.saldo_pendiente_usd - abonoUsd;
                const usuario = localStorage.getItem('pyp_usuario_nombre') || 'SISTEMA';

                // 1. Inyectar a Caja Chica
                const payloadCaja = { id_empresa: empresaActual || null, id_factura: facturaSeleccionada.id_factura, fecha: new Date().toISOString(), tipo: 'INGRESO', concepto: `ABONO/COBRO CxC FACT: ${facturaSeleccionada.nro_factura_manual || 'S/N'} - CLI: ${facturaSeleccionada.cliente_nombre}`, monto_usd: abonoUsd, monto_bs: abonoBs, metodo_pago: metodo, usuario: usuario }; 
                
                const resCaja = await fetch(`${SUPABASE_URL}/rest/v1/caja_movimientos`, { method: 'POST', headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${TOKEN_JWT}`, 'Content-Type': 'application/json', 'Prefer': 'return=representation' }, body: JSON.stringify(payloadCaja) }); 
                if(!resCaja.ok) throw new Error("Fallo al insertar en Caja.");
                const idMovCaja = (await resCaja.json())[0].id_movimiento;

                // 2. Registrar en cxc_abonos (Arquitectura Relacional Perfecta)
                const payloadAbono = { id_empresa: empresaActual || null, id_factura: facturaSeleccionada.id_factura, monto_usd: abonoUsd, monto_bs: abonoBs, tasa_bcv_aplicada: tasaBCV, metodo_pago: metodo, referencia_pago: ref || null, id_caja_movimiento: idMovCaja, cajero: usuario };
                
                const resAbono = await fetch(`${SUPABASE_URL}/rest/v1/cxc_abonos`, { method: 'POST', headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${TOKEN_JWT}`, 'Content-Type': 'application/json', 'Prefer': 'return=representation' }, body: JSON.stringify(payloadAbono) });
                if(!resAbono.ok) throw new Error("Fallo al crear el recibo CxC.");
                const reciboGenerado = (await resAbono.json())[0];

                // 3. Actualizar la Factura Principal (Restar Saldo)
                const estadoNuevo = nuevoSaldo <= 0.01 ? 'Completada' : 'Por Pagar'; // .01 de tolerancia flotante
                const payloadUpdFactura = { saldo_pendiente_usd: nuevoSaldo <= 0.01 ? 0 : nuevoSaldo, estatus: estadoNuevo };
                
                await fetch(`${SUPABASE_URL}/rest/v1/facturas?id_factura=eq.${facturaSeleccionada.id_factura}`, { method: 'PATCH', headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${TOKEN_JWT}`, 'Content-Type': 'application/json' }, body: JSON.stringify(payloadUpdFactura) });

                // 4. Generar e Imprimir Recibo
                imprimirReciboCxC(facturaSeleccionada, reciboGenerado, nuevoSaldo);

                // 5. Refrescar interfaz
                cerrarModalAbono();
                await cargarDataCxC();
                cerrarErrorCarga();

            } catch (e) {
                mostrarErrorConexion(e.message);
            } finally { btn.disabled = false; }
        }

        function imprimirReciboCxC(factura, recibo, saldoRestante) {
            const contenedor = document.getElementById('ticket-impresion');
            const fechaRecibo = new Date(recibo.fecha_abono).toLocaleString('es-VE');
            const nomEmpresa = 'P&P SOLUCIONES'; // Puedes traerlo de params si lo requieres
            
            contenedor.innerHTML = `
                <div style="text-align: center; margin-bottom: 10px; border-bottom: 1px dashed #000; padding-bottom: 5px;">
                    <strong style="font-size: 1.2em;">${nomEmpresa}</strong><br>
                    <strong style="font-size: 1.1em;">RECIBO DE COBRO</strong><br>
                    NRO RECIBO: ${recibo.numero_recibo}<br>
                    FECHA: ${fechaRecibo}
                </div>
                <div style="margin-bottom: 10px;">
                    <strong>Cliente:</strong> ${factura.cliente_nombre}<br>
                    <strong>C.I./RIF:</strong> ${factura.cliente_documento}<br>
                    <strong>Factura Afectada:</strong> ${factura.nro_factura_manual || factura.id_factura.split('-')[0]}
                </div>
                <div style="border-top: 1px dashed #000; border-bottom: 1px dashed #000; margin-bottom: 10px; padding: 5px 0;">
                    <div style="display: flex; justify-content: space-between;"><span>Monto Abono ($):</span><strong>$${fmt(recibo.monto_usd)}</strong></div>
                    <div style="display: flex; justify-content: space-between;"><span>Monto Abono (Bs):</span><strong>Bs. ${fmt(recibo.monto_bs)}</strong></div>
                    <div style="display: flex; justify-content: space-between; margin-top:3px; font-size:0.9em; color:#444;"><span>Método:</span><span>${recibo.metodo_pago.replace('_', ' ')}</span></div>
                    ${recibo.referencia_pago ? `<div style="display: flex; justify-content: space-between; font-size:0.9em; color:#444;"><span>Ref:</span><span>${recibo.referencia_pago}</span></div>` : ''}
                </div>
                <div style="text-align: right; font-size: 0.9em;">
                    <strong>Saldo Restante: $${fmt(saldoRestante <= 0.01 ? 0 : saldoRestante)}</strong>
                </div>
                <div style="text-align: center; margin-top: 15px; font-size: 0.8em; color: #555;">
                    Tasa Aplicada: Bs. ${fmt(recibo.tasa_bcv_aplicada)}<br>
                    Cajero: ${recibo.cajero}
                </div>`;
            window.print();
        }
    </script> 
</body>
