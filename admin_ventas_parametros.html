<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>P&P Admin | Parámetros POS</title>
    
    <script>
        const cPri = localStorage.getItem('pyp_color_primario') || '#143B62';
        const cSec = localStorage.getItem('pyp_color_secundario') || '#E67E22';
        const cTer = localStorage.getItem('pyp_color_terciario') || '#64748b';
        const fontFam = localStorage.getItem('pyp_fuente') || "'Inter', sans-serif";
        const fontSiz = localStorage.getItem('pyp_tamano') || "14px";
        
        // Inyectamos variables CSS (Motor Marca Blanca)
        document.documentElement.style.setProperty('--color-primary', cPri);
        document.documentElement.style.setProperty('--color-secondary', cSec);
        document.documentElement.style.setProperty('--color-tertiary', cTer);
        document.documentElement.style.setProperty('--font-global', fontFam);
        document.documentElement.style.setProperty('--size-global', fontSiz);
    </script>

    <link rel="stylesheet" href="styles.css">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;700;900&family=Poppins:wght@300;400;500;700;900&family=Roboto:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    
    <script src="config.js"></script>

    <script>
        // Guardián de Seguridad: Exige el Token Real
        if (!localStorage.getItem('pyp_token_seguro')) {
            window.location.href = 'login.html';
        }
    </script>
    
    <style>
        body { font-family: var(--font-global); font-size: var(--size-global); }
        .bg-primary { background-color: var(--color-primary) !important; }
        .text-primary { color: var(--color-primary) !important; }
        .bg-secondary { background-color: var(--color-secondary) !important; }
        .text-tertiary { color: var(--color-tertiary) !important; }
        .border-primary { border-color: var(--color-primary) !important; }
        .btn-press:active { transform: scale(0.96); }
        
        .fade-in { animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .custom-scroll::-webkit-scrollbar { width: 5px; height: 5px; }
        .custom-scroll::-webkit-scrollbar-thumb { background-color: var(--color-primary); border-radius: 4px; }
    </style>
</head>
<body class="bg-[#f4f6f8] flex h-screen overflow-hidden text-gray-800">
    <script src="menu.js"></script>
    <main class="flex-1 flex flex-col h-screen overflow-hidden bg-[#f4f6f8] w-full z-10 relative">
        <header class="bg-white shadow-sm px-4 py-3 flex justify-between items-center z-10 border-b border-gray-200">
            <div class="flex items-center gap-3">
                <button onclick="toggleMobileMenu()" class="md:hidden text-gray-600 hover:text-primary text-xl px-2"><i class="fa-solid fa-bars"></i></button>
                <h1 class="text-base font-black text-primary uppercase flex items-center gap-2"><i class="fa-solid fa-gears text-tertiary"></i> Parámetros de Ventas</h1>
            </div>
        </header>

        <div class="flex-1 overflow-auto p-4 md:p-8 flex flex-col items-center">
            <div class="w-full max-w-2xl bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
                <div class="bg-primary text-white px-5 py-4">
                    <h2 class="font-black text-sm uppercase tracking-widest flex items-center gap-2"><i class="fa-solid fa-sliders text-tertiary"></i> Configuración del Terminal (POS)</h2>
                    <p class="opacity-80 text-[10px] mt-1 uppercase font-bold tracking-wider">Preferencias locales de facturación</p>
                </div>
                <div class="p-6 space-y-6">
                    <div class="border border-gray-100 rounded-lg p-4 bg-gray-50 flex flex-col sm:flex-row items-start sm:items-center justify-between gap-4">
                        <div>
                            <h3 class="font-bold text-primary text-sm uppercase">Vista de Productos por Defecto</h3>
                            <p class="text-[10px] text-gray-500 mt-1">Elige cómo quieres que se muestre la lista al abrir el POS.</p>
                        </div>
                        <select id="param-vista" class="w-full sm:w-auto border border-gray-300 rounded px-3 py-2 text-xs font-bold text-gray-700 outline-none shadow-sm cursor-pointer focus:border-tertiary transition">
                            <option value="grid">Vista de Tarjetas (Imágenes)</option>
                            <option value="tabla">Vista Tipo Excel (Lista Compacta)</option>
                        </select>
                    </div>

                    <div class="border border-gray-100 rounded-lg p-4 bg-gray-50 flex flex-col sm:flex-row items-start sm:items-center justify-between gap-4">
                        <div>
                            <h3 class="font-bold text-primary text-sm uppercase">Filtro de Disponibilidad</h3>
                            <p class="text-[10px] text-gray-500 mt-1">Oculta automáticamente los productos sin existencia.</p>
                        </div>
                        <select id="param-stock" class="w-full sm:w-auto border border-gray-300 rounded px-3 py-2 text-xs font-bold text-gray-700 outline-none shadow-sm cursor-pointer focus:border-tertiary transition">
                            <option value="DISPONIBLE">Solo "Con Disponibilidad"</option>
                            <option value="TODOS">"Mostrar Todos"</option>
                        </select>
                    </div>
                </div>

                <div class="bg-gray-50 border-t border-gray-200 px-6 py-4 flex justify-end">
                    <button onclick="guardarParametrosPOS()" class="bg-secondary hover:opacity-90 text-white font-black px-6 py-2.5 rounded shadow-md transition-all text-xs uppercase tracking-widest btn-press flex items-center gap-2">
                        <i class="fa-solid fa-save"></i> Guardar Configuración
                    </button>
                </div>
            </div>
            
            <div id="msg-exito" class="hidden mt-4 bg-emerald-50 border border-emerald-200 text-emerald-700 px-4 py-2 rounded-lg text-xs font-bold uppercase tracking-wider flex items-center gap-2 fade-in">
                <i class="fa-solid fa-circle-check"></i> Parámetros guardados con éxito
            </div>
        </div>
    </main>

    <script>
        window.onload = () => {
            const vistaActual = localStorage.getItem('pyp_pos_vista_inventario') || 'grid';
            const stockActual = localStorage.getItem('pyp_pos_filtro_stock_default') || 'DISPONIBLE';
            document.getElementById('param-vista').value = vistaActual;
            document.getElementById('param-stock').value = stockActual;
        };

        function guardarParametrosPOS() {
            const vista = document.getElementById('param-vista').value;
            const stock = document.getElementById('param-stock').value;
            localStorage.setItem('pyp_pos_vista_inventario', vista);
            localStorage.setItem('pyp_pos_filtro_stock_default', stock);
            
            const msg = document.getElementById('msg-exito');
            msg.classList.remove('hidden');
            setTimeout(() => { msg.classList.add('hidden'); }, 3000);
        }
    </script>
</body>
</html>
