<!DOCTYPE html>
<html lang="es">
<head>
    <script src="config.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>P&P Admin | Centro de Servicios</title>

    <script>
        const cPri = localStorage.getItem('pyp_color_primario') || '#143B62';
        const cSec = localStorage.getItem('pyp_color_secundario') || '#E67E22';
        const cTer = localStorage.getItem('pyp_color_terciario') || '#64748b';
        const fontFam = localStorage.getItem('pyp_fuente') || "'Inter', sans-serif";
        const fontSiz = localStorage.getItem('pyp_tamano') || "14px";
        
        document.documentElement.style.setProperty('--color-primary', cPri);
        document.documentElement.style.setProperty('--color-secondary', cSec);
        document.documentElement.style.setProperty('--color-tertiary', cTer);
        document.documentElement.style.setProperty('--font-global', fontFam);
        document.documentElement.style.setProperty('--size-global', fontSiz);
    </script>

    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/fuse.js/dist/fuse.js"></script>
    
    <script>
        if (!localStorage.getItem('pyp_token_seguro')) {
            window.location.href = 'login.html';
        }
    </script>

    <style>
        body { font-family: var(--font-global); font-size: var(--size-global); }
        .bg-primary { background-color: var(--color-primary) !important; }
        .text-primary { color: var(--color-primary) !important; }
        .bg-secondary { background-color: var(--color-secondary) !important; }
        .text-secondary { color: var(--color-secondary) !important; }
        .text-tertiary { color: var(--color-tertiary) !important; }

        .custom-scroll::-webkit-scrollbar { width: 5px; height: 5px; }
        .custom-scroll::-webkit-scrollbar-thumb { background-color: var(--color-primary); border-radius: 4px; }
        .btn-press:active { transform: scale(0.96); }
        
        .fade-in { animation: fadeIn 0.2s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        /* Estilos Kanban */
        .kanban-column { min-height: 65vh; transition: background-color 0.3s; }
        .card-anim { animation: slideIn 0.3s ease-out; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Estilos Pestañas */
        .tab-btn { position: relative; transition: all 0.2s; }
        .tab-btn.active { color: var(--color-primary); font-weight: 900; }
        .tab-btn.active::after { content: ''; position: absolute; bottom: -1px; left: 0; right: 0; height: 3px; background-color: var(--color-primary); border-radius: 3px 3px 0 0; }
        .tab-content { display: none; }
        .tab-content.active { display: flex; animation: fadeIn 0.2s; }
    </style>
</head>
<body class="bg-[#f4f6f8] font-sans flex h-screen overflow-hidden text-gray-800">

    <script src="menu.js"></script>

    <main class="flex-1 flex flex-col h-screen overflow-hidden bg-gray-50 w-full z-10 relative">
        <header class="bg-white shadow-sm px-6 pt-4 flex flex-col z-10 shrink-0 border-b border-gray-200">
            <div class="flex justify-between items-start mb-2">
                <div class="flex items-center gap-3">
                    <button onclick="toggleMobileMenu()" class="md:hidden text-gray-600 hover:text-primary text-xl px-2 transition"><i class="fa-solid fa-bars"></i></button>
                    <div>
                        <h1 class="text-lg font-black text-primary uppercase flex items-center gap-2 tracking-wide"><i class="fa-solid fa-microchip text-tertiary"></i> Centro de Servicios</h1>
                        <p class="text-[10px] text-gray-500 font-bold uppercase tracking-widest mt-0.5">Gestión de Taller y Devoluciones</p>
                    </div>
                </div>
                <button id="btn-accion-maestro" onclick="ejecutarAccionMaestra()" class="bg-secondary hover:opacity-90 text-white px-4 py-2 rounded-lg font-black text-[11px] uppercase tracking-wider shadow-sm transition btn-press flex items-center gap-2">
                    <i class="fa-solid fa-plus"></i> <span id="txt-btn-maestro">Recibir Equipo</span>
                </button>
            </div>

            <div class="flex gap-6 mt-2 border-b border-gray-200">
                <button onclick="cambiarTab('taller')" id="tab-taller-btn" class="tab-btn active pb-2 text-xs font-bold text-gray-500 hover:text-primary uppercase tracking-wider flex items-center gap-1"><i class="fa-solid fa-screwdriver-wrench"></i> Taller Técnico</button>
                <button onclick="cambiarTab('rma')" id="tab-rma-btn" class="tab-btn pb-2 text-xs font-bold text-gray-500 hover:text-primary uppercase tracking-wider flex items-center gap-1"><i class="fa-solid fa-rotate-left"></i> Garantías (RMA)</button>
            </div>
        </header>

        <div id="tab-taller-content" class="tab-content active flex-1 overflow-x-auto p-6 gap-6 bg-[#f8f9fa] custom-scroll">
            <div class="w-80 shrink-0 flex flex-col"><div class="bg-blue-50 text-blue-700 px-4 py-2 rounded-t-lg font-black text-[10px] uppercase tracking-widest border border-blue-200 border-b-0 flex justify-between">Recibido <span id="count-recibido" class="bg-blue-200 text-blue-800 px-1.5 rounded">0</span></div><div id="col-Recibido" class="kanban-column bg-white border border-gray-200 border-t-blue-500 border-t-2 p-2 rounded-b-lg space-y-2 overflow-y-auto custom-scroll shadow-inner"></div></div>
            <div class="w-80 shrink-0 flex flex-col"><div class="bg-orange-50 text-orange-700 px-4 py-2 rounded-t-lg font-black text-[10px] uppercase tracking-widest border border-orange-200 border-b-0 flex justify-between">En Revisión <span id="count-revision" class="bg-orange-200 text-orange-800 px-1.5 rounded">0</span></div><div id="col-Revision" class="kanban-column bg-white border border-gray-200 border-t-orange-500 border-t-2 p-2 rounded-b-lg space-y-2 overflow-y-auto custom-scroll shadow-inner"></div></div>
            <div class="w-80 shrink-0 flex flex-col"><div class="bg-purple-50 text-purple-700 px-4 py-2 rounded-t-lg font-black text-[10px] uppercase tracking-widest border border-purple-200 border-b-0 flex justify-between">Espera de Repuesto <span id="count-repuesto" class="bg-purple-200 text-purple-800 px-1.5 rounded">0</span></div><div id="col-Repuesto" class="kanban-column bg-white border border-gray-200 border-t-purple-500 border-t-2 p-2 rounded-b-lg space-y-2 overflow-y-auto custom-scroll shadow-inner"></div></div>
            <div class="w-80 shrink-0 flex flex-col"><div class="bg-green-50 text-green-700 px-4 py-2 rounded-t-lg font-black text-[10px] uppercase tracking-widest border border-green-200 border-b-0 flex justify-between">Listo (Por Entregar) <span id="count-listo" class="bg-green-200 text-green-800 px-1.5 rounded">0</span></div><div id="col-Listo" class="kanban-column bg-white border border-gray-200 border-t-green-500 border-t-2 p-2 rounded-b-lg space-y-2 overflow-y-auto custom-scroll shadow-inner"></div></div>
        </div>

        <div id="tab-rma-content" class="tab-content flex-1 flex-col overflow-auto p-4 custom-scroll">
            <div class="bg-white rounded-xl border border-gray-200 shadow-sm overflow-hidden flex-1 flex flex-col">
                <div class="overflow-x-auto custom-scroll flex-1">
                    <table class="w-full text-left text-xs whitespace-nowrap">
                        <thead class="bg-primary text-white text-[9px] uppercase font-black tracking-wider sticky top-0 z-10">
                            <tr>
                                <th class="py-2.5 px-4">RMA #</th>
                                <th class="py-2.5 px-4">Cliente / Factura</th>
                                <th class="py-2.5 px-4">Producto Devuelto</th>
                                <th class="py-2.5 px-4">Motivo</th>
                                <th class="py-2.5 px-4 text-center">Estatus</th>
                                <th class="py-2.5 px-4 text-center">Acción</th>
                            </tr>
                        </thead>
                        <tbody id="tabla-rma" class="divide-y divide-gray-100">
                            <tr><td colspan="6" class="p-10 text-center text-gray-400"><i class="fa-solid fa-spinner fa-spin text-xl mb-2 block"></i> Cargando...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    </body>
</html>
