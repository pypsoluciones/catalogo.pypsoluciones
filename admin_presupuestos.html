<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin | Gestión de Cotizaciones</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .custom-scroll::-webkit-scrollbar { width: 6px; height: 6px; }
        .custom-scroll::-webkit-scrollbar-thumb { background-color: #cbd5e1; border-radius: 4px; }
    </style>
    <script>if (localStorage.getItem('pyp_sesion_activa') !== 'true') window.location.href = 'login.html';</script>
</head>
<body class="bg-[#f0f2f5] font-sans flex h-screen overflow-hidden text-gray-800">

    <aside class="w-64 bg-[#143B62] text-white flex flex-col hidden md:flex shrink-0 shadow-xl z-20">
        <div class="p-6 border-b border-white/10 flex items-center gap-3">
            <i class="fa-solid fa-layer-group text-[#E67E22] text-3xl"></i>
            <h2 class="font-bold text-xl tracking-wide">P&P Admin</h2>
        </div>
        <nav class="flex-1 p-4 space-y-2 overflow-y-auto custom-scroll">
            <a href="admin_dashboard.html" class="flex items-center gap-3 text-gray-300 hover:bg-white/10 px-4 py-3 rounded-lg font-semibold transition"><i class="fa-solid fa-chart-pie w-5"></i> Dashboard</a>
            <a href="admin_ventas.html" class="flex items-center gap-3 text-gray-300 hover:bg-white/10 px-4 py-3 rounded-lg font-semibold transition"><i class="fa-solid fa-cash-register w-5"></i> Ventas (POS)</a>
            <a href="#" class="flex items-center gap-3 bg-[#E67E22] text-white px-4 py-3 rounded-lg font-bold shadow-md"><i class="fa-solid fa-file-invoice w-5"></i> Cotizaciones</a>
            <a href="admin_compras.html" class="flex items-center gap-3 text-gray-300 hover:bg-white/10 px-4 py-3 rounded-lg font-semibold transition"><i class="fa-solid fa-truck-ramp-box w-5"></i> Compras</a>
            <a href="admin_productos.html" class="flex items-center gap-3 text-gray-300 hover:bg-white/10 px-4 py-3 rounded-lg font-semibold transition"><i class="fa-solid fa-boxes-stacked w-5"></i> Inventario</a>
            <a href="admin_contactos.html" class="flex items-center gap-3 text-gray-300 hover:bg-white/10 px-4 py-3 rounded-lg font-semibold transition"><i class="fa-solid fa-address-book w-5"></i> Directorio</a>
        </nav>
    </aside>

    <main class="flex-1 flex flex-col h-screen overflow-hidden bg-gray-50">
        <header class="bg-white shadow-sm px-6 py-4 flex justify-between items-center z-10 shrink-0">
            <h1 class="text-xl font-bold text-[#143B62] flex items-center gap-2"><i class="fa-solid fa-file-invoice"></i> Cotizaciones Guardadas</h1>
            <button onclick="cargarCotizaciones()" class="text-gray-500 hover:text-blue-600 transition"><i class="fa-solid fa-rotate"></i> Actualizar</button>
        </header>

        <div class="flex-1 overflow-auto p-4 md:p-6 custom-scroll">
            <div class="bg-white rounded-xl border shadow-sm overflow-hidden">
                <table class="w-full text-left text-sm border-collapse">
                    <thead class="bg-gray-100 text-gray-500 text-[10px] uppercase font-black">
                        <tr>
                            <th class="p-4"># Cot</th>
                            <th class="p-4">Fecha</th>
                            <th class="p-4">Cliente</th>
                            <th class="p-4 text-right">Monto Total</th>
                            <th class="p-4 text-center">Estatus</th>
                            <th class="p-4 text-center">Acción</th>
                        </tr>
                    </thead>
                    <tbody id="tabla-cotizaciones" class="divide-y divide-gray-100">
                        <tr><td colspan="6" class="p-10 text-center text-gray-400">Cargando cotizaciones...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <script>
        const SUPABASE_URL = 'https://icvfmdvvochzaktugqvj.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImljdmZtZHZ2b2NoemFrdHVncXZqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYyNDEzMzEsImV4cCI6MjA5MTgxNzMzMX0.gO3D39piT6KGbMMOzrPGWXUp5-g_nOBAgJ-nwPv8IcQ';

        window.onload = cargarCotizaciones;

        async function cargarCotizaciones() {
            try {
                // Buscamos transacciones tipo 'Presupuesto'
                const res = await fetch(`${SUPABASE_URL}/rest/v1/facturas?tipo_transaccion=eq.Presupuesto&order=fecha_emision.desc`, { headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` } });
                const data = await res.json();
                
                const tbody = document.getElementById('tabla-cotizaciones');
                if(!data.length) { tbody.innerHTML = `<tr><td colspan="6" class="p-10 text-center text-gray-400 font-bold">No hay presupuestos pendientes.</td></tr>`; return; }

                tbody.innerHTML = data.map(c => {
                    const badge = c.estatus === 'Pendiente' ? '<span class="bg-orange-100 text-orange-600 px-2 py-1 rounded text-[9px] font-bold">PENDIENTE</span>' : '<span class="bg-green-100 text-green-600 px-2 py-1 rounded text-[9px] font-bold">FACTURADO</span>';
                    const btn = c.estatus === 'Pendiente' ? `<button onclick="convertirAVenta('${c.id_factura}')" class="bg-[#25D366] text-white px-3 py-1.5 rounded-lg font-bold text-xs btn-press">Convertir a Venta</button>` : `<span class="text-gray-300 font-bold text-xs">Finalizado</span>`;
                    
                    return `<tr>
                        <td class="p-4 font-mono font-bold text-blue-600">#00${c.correlativo}</td>
                        <td class="p-4 text-gray-400 text-xs">${new Date(c.fecha_emision).toLocaleDateString()}</td>
                        <td class="p-4"><p class="font-bold text-gray-700">${c.cliente_nombre}</p><p class="text-[9px] text-gray-400">${c.cliente_documento}</p></td>
                        <td class="p-4 text-right font-black text-gray-800">$${Number(c.total_usd).toFixed(2)}</td>
                        <td class="p-4 text-center">${badge}</td>
                        <td class="p-4 text-center">${btn}</td>
                    </tr>`;
                }).join('');
            } catch(e) { alert("Error cargando datos"); }
        }

        async function convertirAVenta(id) {
            if(!confirm("¿Deseas convertir este presupuesto en una VENTA FINAL? Esto descontará el inventario en este momento.")) return;

            try {
                // Actualizamos el tipo a 'Venta' y el estatus a 'Completada'
                // Esto activará automáticamente el Robot (Trigger) que resta el stock.
                const res = await fetch(`${SUPABASE_URL}/rest/v1/facturas?id_factura=eq.${id}`, {
                    method: 'PATCH',
                    headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        tipo_transaccion: 'Venta',
                        estatus: 'Completada',
                        fecha_emision: new Date().toISOString() // Actualizamos la fecha a hoy
                    })
                });

                if(res.ok) {
                    alert("¡Éxito! El presupuesto ahora es una Factura de Venta y el inventario ha sido actualizado.");
                    cargarCotizaciones();
                }
            } catch(e) { alert("Error al procesar el cambio."); }
        }
    </script>
</body>
</html>
