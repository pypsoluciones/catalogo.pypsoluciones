<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin | Nómina y Empleados</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .custom-scroll::-webkit-scrollbar { width: 6px; height: 6px; }
        .custom-scroll::-webkit-scrollbar-thumb { background-color: #cbd5e1; border-radius: 4px; }
        .btn-press:active { transform: scale(0.95); }
    </style>
    <script>
    // Guardián de Seguridad: Exige el Token Real
    if (!localStorage.getItem('pyp_token_seguro')) {
        window.location.href = 'login.html';
    }
</script>
</head>
<body class="bg-[#f0f2f5] font-sans flex h-screen overflow-hidden text-gray-800">
    <main class="flex-1 flex flex-col h-screen overflow-hidden bg-gray-50">
        <header class="bg-white shadow-sm px-6 py-4 flex justify-between items-center z-10 shrink-0">
            <div>
                <h1 class="text-xl font-bold text-[#143B62] flex items-center gap-2"><i class="fa-solid fa-hand-holding-dollar"></i> Nómina y Comisiones</h1>
                <p class="text-xs text-gray-500 font-bold mt-1">Gestión de pagos al personal vinculada a Tesorería.</p>
            </div>
            <button onclick="abrirModalPago()" class="bg-[#25D366] hover:bg-[#1ebd5c] text-white px-4 py-2 rounded-lg font-bold text-sm shadow-md transition flex items-center gap-2 btn-press">
                <i class="fa-solid fa-file-invoice-dollar"></i> Procesar Pago
            </button>
        </header>

        <div class="flex-1 overflow-auto p-4 md:p-6 custom-scroll">
            <div class="bg-white rounded-xl border border-gray-200 shadow-sm overflow-hidden">
                <table class="w-full text-left text-sm border-collapse">
                    <thead class="bg-[#143B62] text-white text-[10px] uppercase font-black">
                        <tr>
                            <th class="p-4 rounded-tl-xl">Fecha</th>
                            <th class="p-4">Empleado</th>
                            <th class="p-4 text-right">Sueldo Base</th>
                            <th class="p-4 text-right">Comisiones / Bonos</th>
                            <th class="p-4 text-right">Deducciones</th>
                            <th class="p-4 text-right bg-[#E67E22]">Total Pagado</th>
                            <th class="p-4 text-center rounded-tr-xl">Pagado Desde</th>
                        </tr>
                    </thead>
                    <tbody id="tabla-nomina" class="divide-y divide-gray-100">
                        <tr><td colspan="7" class="p-10 text-center text-gray-400"><i class="fa-solid fa-spinner fa-spin text-xl"></i> Cargando historial...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <div id="modal-pago" class="fixed inset-0 bg-black/60 z-[100] hidden flex items-center justify-center p-4">
        <div class="bg-white rounded-xl shadow-2xl w-full max-w-lg flex flex-col transform scale-95 transition-transform" id="modal-content">
            <div class="bg-[#143B62] text-white p-4 flex justify-between items-center">
                <h3 class="font-bold text-lg"><i class="fa-solid fa-money-check-dollar mr-2"></i> Recibo de Pago</h3>
                <button onclick="cerrarModal()" class="text-gray-300 hover:text-white text-xl"><i class="fa-solid fa-times"></i></button>
            </div>
            
            <form id="form-pago" onsubmit="guardarPago(event)" class="p-6 bg-gray-50 space-y-4">
                
                <div>
                    <label class="block text-[10px] font-bold text-gray-500 uppercase tracking-wider mb-1">Seleccionar Empleado *</label>
                    <select id="nom-empleado" required class="w-full border border-gray-300 rounded px-3 py-2 text-sm focus:border-[#E67E22] outline-none font-bold text-gray-800 bg-white">
                        <option value="">Cargando empleados...</option>
                    </select>
                </div>

                <div class="bg-white p-4 border border-gray-200 rounded-lg space-y-3 shadow-sm">
                    <h4 class="text-xs font-bold text-gray-400 uppercase border-b pb-1">Desglose (Valores en USD)</h4>
                    
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-[10px] font-bold text-gray-500 mb-1">Salario Base (+)</label>
                            <input type="number" id="nom-base" step="0.01" min="0" value="0" oninput="calcularTotal()" class="w-full border border-gray-300 rounded px-2 py-1.5 text-sm outline-none font-bold text-green-700 bg-green-50">
                        </div>
                        <div>
                            <label class="block text-[10px] font-bold text-gray-500 mb-1">Comisiones (+)</label>
                            <input type="number" id="nom-comisiones" step="0.01" min="0" value="0" oninput="calcularTotal()" class="w-full border border-gray-300 rounded px-2 py-1.5 text-sm outline-none font-bold text-green-700 bg-green-50">
                        </div>
                        <div>
                            <label class="block text-[10px] font-bold text-gray-500 mb-1">Otros Bonos (+)</label>
                            <input type="number" id="nom-bonos" step="0.01" min="0" value="0" oninput="calcularTotal()" class="w-full border border-gray-300 rounded px-2 py-1.5 text-sm outline-none font-bold text-green-700 bg-green-50">
                        </div>
                        <div>
                            <label class="block text-[10px] font-bold text-red-500 mb-1">Deducciones / Adelantos (-)</label>
                            <input type="number" id="nom-deducciones" step="0.01" min="0" value="0" oninput="calcularTotal()" class="w-full border border-red-300 rounded px-2 py-1.5 text-sm outline-none font-bold text-red-700 bg-red-50">
                        </div>
                    </div>
                </div>

                <div class="flex justify-between items-center bg-[#143B62] text-white p-3 rounded-lg shadow-inner">
                    <span class="text-xs font-bold uppercase tracking-widest">Total a Pagar:</span>
                    <span class="text-2xl font-black text-yellow-400" id="nom-total-display">$0.00</span>
                </div>

                <div>
                    <label class="block text-[10px] font-bold text-gray-500 uppercase tracking-wider mb-1">Sacar dinero de la cuenta: *</label>
                    <select id="nom-cuenta" required class="w-full border border-blue-300 rounded px-3 py-2 text-sm focus:border-[#E67E22] outline-none font-bold text-blue-900 bg-blue-50">
                        <option value="">Cargando cuentas...</option>
                    </select>
                </div>

                <div>
                    <label class="block text-[10px] font-bold text-gray-500 uppercase tracking-wider mb-1">Concepto / Notas (Opcional)</label>
                    <input type="text" id="nom-notas" placeholder="Ej: Quincena 15 de Mayo + Comisiones POS" class="w-full border border-gray-300 rounded px-3 py-2 text-xs focus:border-[#E67E22] outline-none">
                </div>
                
                <div class="pt-4 flex gap-3">
                    <button type="button" onclick="cerrarModal()" class="flex-1 py-3 bg-gray-200 text-gray-700 font-bold rounded-lg btn-press">Cancelar</button>
                    <button type="submit" id="btn-guardar" class="flex-[2] py-3 bg-[#E67E22] text-white font-bold rounded-lg shadow-md btn-press flex justify-center items-center gap-2">
                        <i class="fa-solid fa-check"></i> Registrar y Pagar
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://icvfmdvvochzaktugqvj.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImljdmZtZHZ2b2NoemFrdHVncXZqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYyNDEzMzEsImV4cCI6MjA5MTgxNzMzMX0.gO3D39piT6KGbMMOzrPGWXUp5-g_nOBAgJ-nwPv8IcQ';

        let cuentasActivas = [];

        window.onload = async () => {
            await cargarNomina();
            await cargarCatalogos();
        };

        async function cargarNomina() {
            try {
                const res = await fetch(`${SUPABASE_URL}/rest/v1/nomina_pagos?order=fecha_pago.desc`, { headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${localStorage.getItem('pyp_token_seguro')}`;
                const data = await res.json();
                
                const tbody = document.getElementById('tabla-nomina');
                if(!data.length) { tbody.innerHTML = `<tr><td colspan="7" class="p-10 text-center text-gray-400 font-bold"><i class="fa-solid fa-wallet text-4xl mb-3 block opacity-50"></i> No hay pagos registrados.</td></tr>`; return; }

                tbody.innerHTML = data.map(n => {
                    const totalBonos = Number(n.comisiones) + Number(n.bonos);
                    return `
                    <tr class="hover:bg-gray-50 transition border-b border-gray-100">
                        <td class="p-4 text-xs text-gray-500 font-semibold">${new Date(n.fecha_pago).toLocaleDateString()}</td>
                        <td class="p-4 font-bold text-[#143B62]">${n.nombre_empleado}</td>
                        <td class="p-4 text-right font-mono">$${Number(n.salario_base).toFixed(2)}</td>
                        <td class="p-4 text-right font-mono text-green-600">+$${totalBonos.toFixed(2)}</td>
                        <td class="p-4 text-right font-mono text-red-500">-$${Number(n.deducciones).toFixed(2)}</td>
                        <td class="p-4 text-right font-black text-lg bg-orange-50/50">$${Number(n.total_pagado).toFixed(2)}</td>
                        <td class="p-4 text-center"><span class="bg-gray-100 text-gray-600 px-2 py-1 rounded text-[10px] font-bold uppercase">${n.cuenta_origen_nombre || 'N/A'}</span></td>
                    </tr>`;
                }).join('');
            } catch(e) { alert("Error cargando el historial de nómina."); }
        }

        async function cargarCatalogos() {
            try {
                // Cargar Empleados (Usuarios)
                const resEmp = await fetch(`${SUPABASE_URL}/rest/v1/usuarios?estatus=eq.Activo`, { headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${localStorage.getItem('pyp_token_seguro')}`;
                const empleados = await resEmp.json();
                document.getElementById('nom-empleado').innerHTML = empleados.map(e => `<option value="${e.nombre_completo}">${e.nombre_completo} (${e.rol})</option>`).join('');

                // Cargar Cuentas Bancarias (Solo USD porque la nómina se calcula en $)
                const resCta = await fetch(`${SUPABASE_URL}/rest/v1/cuentas_bancarias?moneda=eq.USD`, { headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${localStorage.getItem('pyp_token_seguro')}`;
                cuentasActivas = await resCta.json();
                document.getElementById('nom-cuenta').innerHTML = cuentasActivas.map(c => `<option value="${c.id_cuenta}|${c.nombre}">${c.nombre} (Saldo: $${Number(c.saldo).toFixed(2)})</option>`).join('');

            } catch(e) { console.error("Error cargando catálogos", e); }
        }

        function calcularTotal() {
            const base = parseFloat(document.getElementById('nom-base').value) || 0;
            const comisiones = parseFloat(document.getElementById('nom-comisiones').value) || 0;
            const bonos = parseFloat(document.getElementById('nom-bonos').value) || 0;
            const deducciones = parseFloat(document.getElementById('nom-deducciones').value) || 0;
            
            const total = (base + comisiones + bonos) - deducciones;
            document.getElementById('nom-total-display').innerText = `$${Math.max(0, total).toFixed(2)}`;
            return Math.max(0, total);
        }

        function abrirModalPago() {
            document.getElementById('form-pago').reset();
            calcularTotal();
            document.getElementById('modal-pago').classList.remove('hidden');
            setTimeout(() => document.getElementById('modal-content').classList.replace('scale-95', 'scale-100'), 10);
        }

        function cerrarModal() {
            document.getElementById('modal-content').classList.replace('scale-100', 'scale-95');
            setTimeout(() => document.getElementById('modal-pago').classList.add('hidden'), 150);
        }

        async function guardarPago(e) {
            e.preventDefault();
            const totalPagado = calcularTotal();
            if(totalPagado <= 0) return alert("El total a pagar debe ser mayor a cero.");

            const cuentaSeleccionada = document.getElementById('nom-cuenta').value; // Formato: id_cuenta|nombre
            if(!cuentaSeleccionada) return alert("Debes seleccionar una cuenta bancaria origen.");
            
            const [idCuenta, nombreCuenta] = cuentaSeleccionada.split('|');

            // Verificar si hay saldo suficiente
            const ctaData = cuentasActivas.find(c => c.id_cuenta === idCuenta);
            if(Number(ctaData.saldo) < totalPagado) {
                if(!confirm(`⚠️ ATENCIÓN: La cuenta "${nombreCuenta}" solo tiene $${ctaData.saldo}. Vas a pagar $${totalPagado}, lo que dejará la cuenta en negativo. ¿Deseas continuar de todos modos?`)) return;
            }

            const btn = document.getElementById('btn-guardar');
            btn.innerHTML = `<i class="fa-solid fa-spinner fa-spin"></i> Procesando...`; btn.disabled = true;

            try {
                // 1. Descontar dinero del Banco (Módulo Tesorería)
                const nuevoSaldo = Number(ctaData.saldo) - totalPagado;
                await fetch(`${SUPABASE_URL}/rest/v1/cuentas_bancarias?id_cuenta=eq.${idCuenta}`, {
                    method: 'PATCH',
                    headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${localStorage.getItem('pyp_token_seguro')}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({ saldo: nuevoSaldo })
                });

                // 2. Registrar el pago en Nómina
                const dataNomina = {
                    nombre_empleado: document.getElementById('nom-empleado').value,
                    salario_base: parseFloat(document.getElementById('nom-base').value) || 0,
                    comisiones: parseFloat(document.getElementById('nom-comisiones').value) || 0,
                    bonos: parseFloat(document.getElementById('nom-bonos').value) || 0,
                    deducciones: parseFloat(document.getElementById('nom-deducciones').value) || 0,
                    total_pagado: totalPagado,
                    cuenta_origen_id: idCuenta,
                    cuenta_origen_nombre: nombreCuenta,
                    notas: document.getElementById('nom-notas').value.trim()
                };

                await fetch(`${SUPABASE_URL}/rest/v1/nomina_pagos`, {
                    method: 'POST',
                    headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${localStorage.getItem('pyp_token_seguro')}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify(dataNomina)
                });

                cerrarModal();
                await cargarNomina();
                await cargarCatalogos(); // Actualizar saldo en el select
                alert("Pago procesado exitosamente. El dinero ha sido descontado de Tesorería.");

            } catch(error) {
                alert("Error al procesar el pago.");
            } finally {
                btn.innerHTML = `<i class="fa-solid fa-check"></i> Registrar y Pagar`; btn.disabled = false;
            }
        }
      
    </script>
    <script src="menu.js"></script>
</body>
</html>
