<!DOCTYPE html>
<html lang="es">
<head>
    <script src="config.js"></script>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin | Nómina y Empleados</title>

    <script>
        const cPri = localStorage.getItem('pyp_color_primario') || '#143B62';
        const cSec = localStorage.getItem('pyp_color_secundario') || '#E67E22';
        const cTer = localStorage.getItem('pyp_color_terciario') || '#64748b';
        const fontFam = localStorage.getItem('pyp_fuente') || "'Inter', sans-serif";
        const fontSiz = localStorage.getItem('pyp_tamano') || "14px";
        
        // Inyectamos variables CSS (Motor Marca Blanca)
        document.documentElement.style.setProperty('--color-primary', cPri);
        document.documentElement.style.setProperty('--color-secondary', cSec);
        document.documentElement.style.setProperty('--color-tertiary', cTer);
        document.documentElement.style.setProperty('--font-global', fontFam);
        document.documentElement.style.setProperty('--size-global', fontSiz);
    </script>

    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script>
        // Guardián de Seguridad
        if (!localStorage.getItem('pyp_token_seguro')) {
            window.location.href = 'login.html';
        }
    </script>

    <style>
        body { font-family: var(--font-global); font-size: var(--size-global); }
        .bg-primary { background-color: var(--color-primary) !important; }
        .text-primary { color: var(--color-primary) !important; }
        .bg-secondary { background-color: var(--color-secondary) !important; }
        .text-secondary { color: var(--color-secondary) !important; }
        .custom-scroll::-webkit-scrollbar { width: 6px; }
        .custom-scroll::-webkit-scrollbar-thumb { background-color: var(--color-primary); border-radius: 4px; }
        .btn-press:active { transform: scale(0.95); }
    </style>
</head>
<body class="bg-[#f0f2f5] font-sans flex w-full h-screen overflow-hidden text-gray-800 m-0 p-0">

    <main class="flex-1 w-0 flex flex-col h-screen overflow-hidden bg-gray-50">
        
        <header class="bg-white shadow-sm px-6 py-4 flex justify-between items-center z-10 shrink-0 border-b">
            <h1 class="text-xl font-bold text-[#143B62]"><i class="fa-solid fa-users-gears mr-2"></i> Gestión de Nómina</h1>
            <div class="flex gap-3">
                <button onclick="abrirModalEmpleado()" class="bg-[#143B62] text-white px-4 py-2 rounded-lg text-sm font-bold shadow-sm hover:bg-[#0f2d4a] transition btn-press">
                    <i class="fa-solid fa-user-plus mr-1"></i> Nuevo Empleado
                </button>
                <button onclick="abrirModalNomina()" class="bg-[#E67E22] text-white px-4 py-2 rounded-lg text-sm font-bold shadow-sm hover:bg-[#d35400] transition btn-press">
                    <i class="fa-solid fa-hand-holding-dollar mr-1"></i> Procesar Pago
                </button>
            </div>
        </header>

        <div class="flex-1 overflow-y-auto p-6 custom-scroll">
            <div class="grid grid-cols-1 xl:grid-cols-3 gap-6">
                
                <div class="xl:col-span-3 grid grid-cols-1 md:grid-cols-4 gap-4">
                    <div class="bg-white p-4 rounded-xl border shadow-sm">
                        <p class="text-[10px] font-bold text-gray-400 uppercase">Empleados Activos</p>
                        <p class="text-2xl font-black text-[#143B62]" id="total-empleados">0</p>
                    </div>
                    <div class="bg-white p-4 rounded-xl border shadow-sm">
                        <p class="text-[10px] font-bold text-gray-400 uppercase">Nómina Mensual Base</p>
                        <p class="text-2xl font-black text-blue-600" id="nomina-base-total">$ 0.00</p>
                    </div>
                    <div class="bg-white p-4 rounded-xl border shadow-sm">
                        <p class="text-[10px] font-bold text-gray-400 uppercase">Pagado este Mes</p>
                        <p class="text-2xl font-black text-green-600" id="pagado-mes">$ 0.00</p>
                    </div>
                    <div class="bg-white p-4 rounded-xl border shadow-sm">
                        <p class="text-[10px] font-bold text-gray-400 uppercase">Pendiente por Pagar</p>
                        <p class="text-2xl font-black text-red-500" id="pendiente-mes">$ 0.00</p>
                    </div>
                </div>

                <div class="xl:col-span-2 bg-white rounded-xl border shadow-sm flex flex-col">
                    <div class="p-4 border-b bg-gray-50 flex justify-between items-center">
                        <h3 class="text-sm font-bold text-[#143B62] uppercase tracking-wider">Directorio de Personal</h3>
                        <div class="relative w-64">
                            <i class="fa-solid fa-magnifying-glass absolute left-3 top-2.5 text-gray-400 text-xs"></i>
                            <input type="text" id="busqueda-emp" oninput="filtrarEmpleados()" placeholder="Buscar empleado..." class="w-full bg-white border rounded-lg pl-9 pr-4 py-1.5 text-xs focus:outline-none focus:border-[#143B62]">
                        </div>
                    </div>
                    <div class="overflow-x-auto">
                        <table class="w-full text-left border-collapse">
                            <thead>
                                <tr class="text-[10px] text-gray-400 uppercase bg-gray-50 border-b">
                                    <th class="px-6 py-3">Nombre / Cargo</th>
                                    <th class="px-6 py-3">ID / Cédula</th>
                                    <th class="px-6 py-3 text-right">Sueldo Base</th>
                                    <th class="px-6 py-3 text-center">Estatus</th>
                                    <th class="px-6 py-3"></th>
                                </tr>
                            </thead>
                            <tbody id="tabla-empleados" class="divide-y divide-gray-100">
                                </tbody>
                        </table>
                    </div>
                </div>

                <div class="bg-white rounded-xl border shadow-sm flex flex-col">
                    <div class="p-4 border-b bg-gray-50">
                        <h3 class="text-sm font-bold text-[#143B62] uppercase tracking-wider">Últimos Pagos</h3>
                    </div>
                    <div class="flex-1 overflow-y-auto custom-scroll p-4 space-y-3" id="historial-pagos">
                        </div>
                </div>

            </div>
        </div>
    </main>

    <div id="modal-empleado" class="fixed inset-0 bg-black/50 hidden items-center justify-center z-50 p-4">
        <div class="bg-white rounded-2xl w-full max-w-md shadow-2xl overflow-hidden animate-fade-in">
            <div class="bg-[#143B62] p-4 text-white flex justify-between items-center">
                <h3 class="font-bold"><i class="fa-solid fa-user-gear mr-2"></i> Datos del Empleado</h3>
                <button onclick="cerrarModal()" class="text-white/70 hover:text-white"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <div class="p-6 space-y-4">
                <input type="hidden" id="emp-id">
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-[10px] font-bold text-gray-400 uppercase mb-1">Cédula / ID *</label>
                        <input type="text" id="emp-cedula" class="w-full border rounded-lg px-3 py-2 text-sm focus:border-[#143B62] outline-none">
                    </div>
                    <div>
                        <label class="block text-[10px] font-bold text-gray-400 uppercase mb-1">Nombre Completo *</label>
                        <input type="text" id="emp-nombre" class="w-full border rounded-lg px-3 py-2 text-sm focus:border-[#143B62] outline-none">
                    </div>
                </div>
                <div>
                    <label class="block text-[10px] font-bold text-gray-400 uppercase mb-1">Cargo / Departamento</label>
                    <input type="text" id="emp-cargo" class="w-full border rounded-lg px-3 py-2 text-sm focus:border-[#143B62] outline-none">
                </div>
                <div>
                    <label class="block text-[10px] font-bold text-gray-400 uppercase mb-1">Sueldo Base Mensual (USD) *</label>
                    <div class="flex items-center">
                        <span class="bg-gray-100 border border-r-0 rounded-l-lg px-3 py-2 text-gray-500 text-sm">$</span>
                        <input type="number" step="0.01" id="emp-sueldo" class="w-full border rounded-r-lg px-3 py-2 text-sm focus:border-[#143B62] outline-none font-bold">
                    </div>
                </div>
                <div class="flex items-center gap-2 pt-2">
                    <input type="checkbox" id="emp-activo" checked class="w-4 h-4 accent-[#143B62]">
                    <label for="emp-activo" class="text-sm font-bold text-gray-700">Empleado Activo</label>
                </div>
            </div>
            <div class="bg-gray-50 p-4 flex justify-end gap-3">
                <button onclick="cerrarModal()" class="px-4 py-2 text-sm font-bold text-gray-500 hover:text-gray-700 transition">Cancelar</button>
                <button onclick="guardarEmpleado()" id="btn-guardar-emp" class="bg-[#143B62] text-white px-6 py-2 rounded-lg text-sm font-bold shadow hover:bg-[#0f2d4a] transition btn-press">
                    <i class="fa-solid fa-save mr-1"></i> Guardar Cambios
                </button>
            </div>
        </div>
    </div>

    <div id="modal-nomina" class="fixed inset-0 bg-black/50 hidden items-center justify-center z-50 p-4">
        <div class="bg-white rounded-2xl w-full max-w-lg shadow-2xl overflow-hidden">
            <div class="bg-[#E67E22] p-4 text-white flex justify-between items-center">
                <h3 class="font-bold"><i class="fa-solid fa-money-bill-transfer mr-2"></i> Procesar Pago de Nómina</h3>
                <button onclick="cerrarModal()" class="text-white/70 hover:text-white"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <div class="p-6 space-y-4">
                <div class="bg-orange-50 p-3 rounded-lg border border-orange-100">
                    <label class="block text-[10px] font-bold text-[#E67E22] uppercase mb-1">Seleccionar Empleado *</label>
                    <select id="nom-empleado" onchange="autoCompletarSueldo()" class="w-full border rounded-lg px-3 py-2 text-sm font-bold focus:outline-none">
                        <option value="">-- Seleccione un Empleado --</option>
                    </select>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-[10px] font-bold text-gray-400 uppercase mb-1">Sueldo Base (USD)</label>
                        <input type="number" id="nom-base" readonly class="w-full bg-gray-100 border rounded-lg px-3 py-2 text-sm font-bold text-gray-500">
                    </div>
                    <div>
                        <label class="block text-[10px] font-bold text-gray-400 uppercase mb-1">Comisiones</label>
                        <input type="number" id="nom-comisiones" oninput="calcularTotalNomina()" value="0" class="w-full border rounded-lg px-3 py-2 text-sm font-bold text-green-600 focus:border-[#E67E22] outline-none">
                    </div>
                    <div>
                        <label class="block text-[10px] font-bold text-gray-400 uppercase mb-1">Bonos Extras</label>
                        <input type="number" id="nom-bonos" oninput="calcularTotalNomina()" value="0" class="w-full border rounded-lg px-3 py-2 text-sm font-bold text-blue-600 focus:border-[#E67E22] outline-none">
                    </div>
                    <div>
                        <label class="block text-[10px] font-bold text-gray-400 uppercase mb-1">Deducciones (Préstamos/Faltas)</label>
                        <input type="number" id="nom-deducciones" oninput="calcularTotalNomina()" value="0" class="w-full border rounded-lg px-3 py-2 text-sm font-bold text-red-500 focus:border-[#E67E22] outline-none">
                    </div>
                </div>
                <div class="border-t pt-4">
                    <label class="block text-[10px] font-bold text-gray-400 uppercase mb-1">Cuenta de Origen (Tesorería)</label>
                    <select id="nom-cuenta" class="w-full border rounded-lg px-3 py-2 text-sm font-bold focus:outline-none bg-blue-50 border-blue-200">
                        </select>
                </div>
                <div class="bg-gray-50 p-4 rounded-xl flex justify-between items-center border">
                    <span class="text-sm font-bold text-gray-600 uppercase">Total Neto a Pagar:</span>
                    <span class="text-2xl font-black text-[#143B62]" id="nom-total-final">$ 0.00</span>
                </div>
                <div>
                    <label class="block text-[10px] font-bold text-gray-400 uppercase mb-1">Notas del Pago</label>
                    <textarea id="nom-notas" rows="2" class="w-full border rounded-lg px-3 py-2 text-xs focus:outline-none"></textarea>
                </div>
            </div>
            <div class="bg-gray-50 p-4 flex justify-end gap-3">
                <button onclick="cerrarModal()" class="px-4 py-2 text-sm font-bold text-gray-500">Cancelar</button>
                <button onclick="procesarPagoNomina()" id="btn-pagar-nom" class="bg-[#E67E22] text-white px-6 py-2 rounded-lg text-sm font-bold shadow-md hover:bg-[#d35400] transition btn-press">
                    <i class="fa-solid fa-check"></i> Registrar y Pagar
                </button>
            </div>
        </div>
    </div>

    <script>
        let listaEmpleados = [];
        let listaCuentas = [];

        window.onload = async () => {
            await cargarCatalogos();
            await cargarNomina();
        }

        async function cargarCatalogos() {
            try {
                // Cargar Empleados
                const resEmp = await fetch(`${SUPABASE_URL}/rest/v1/nomina_empleados?order=nombre.asc`, {
                    headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${localStorage.getItem('pyp_token_seguro')}` }
                });
                listaEmpleados = await resEmp.json();
                
                // Llenar select de nomina
                const selectEmp = document.getElementById('nom-empleado');
                selectEmp.innerHTML = '<option value="">-- Seleccione un Empleado --</option>' + 
                    listaEmpleados.filter(e => e.estatus === 'Activo').map(e => `<option value="${e.id_empleado}">${e.nombre}</option>`).join('');

                // Cargar Cuentas de Tesorería
                const resCuentas = await fetch(`${SUPABASE_URL}/rest/v1/tesoreria_cuentas?estatus=eq.Activa`, {
                    headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${localStorage.getItem('pyp_token_seguro')}` }
                });
                listaCuentas = await resCuentas.json();
                document.getElementById('nom-cuenta').innerHTML = listaCuentas.map(c => `<option value="${c.id_cuenta}">${c.nombre_cuenta} (Saldo: $${c.saldo_actual.toFixed(2)})</option>`).join('');

                renderEmpleados();
                actualizarResumen();
            } catch(e) { console.error(e); }
        }

        function renderEmpleados() {
            const tbody = document.getElementById('tabla-empleados');
            tbody.innerHTML = listaEmpleados.map(e => `
                <tr class="hover:bg-gray-50 transition">
                    <td class="px-6 py-4">
                        <p class="text-sm font-bold text-[#143B62]">${e.nombre}</p>
                        <p class="text-[10px] text-gray-400 font-bold uppercase">${e.cargo || 'Sin Cargo'}</p>
                    </td>
                    <td class="px-6 py-4 text-xs font-mono text-gray-500">${e.cedula_id}</td>
                    <td class="px-6 py-4 text-right font-bold text-blue-600">$ ${e.sueldo_base.toFixed(2)}</td>
                    <td class="px-6 py-4 text-center">
                        <span class="px-2 py-1 rounded-full text-[9px] font-bold uppercase ${e.estatus === 'Activo' ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-700'}">${e.estatus}</span>
                    </td>
                    <td class="px-6 py-4 text-right">
                        <button onclick="editarEmpleado('${e.id_empleado}')" class="text-gray-400 hover:text-[#143B62] transition mx-1"><i class="fa-solid fa-pen-to-square"></i></button>
                    </td>
                </tr>
            `).join('');
        }

        async function cargarNomina() {
            try {
                const resPagos = await fetch(`${SUPABASE_URL}/rest/v1/nomina_pagos?order=fecha_pago.desc&limit=20`, {
                    headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${localStorage.getItem('pyp_token_seguro')}` }
                });
                const pagos = await resPagos.json();
                
                const historial = document.getElementById('historial-pagos');
                if(pagos.length === 0) historial.innerHTML = '<p class="text-xs text-gray-400 text-center py-10">No hay pagos registrados este mes.</p>';
                else {
                    historial.innerHTML = pagos.map(p => `
                        <div class="bg-white border rounded-lg p-3 flex justify-between items-center shadow-sm">
                            <div>
                                <p class="text-[10px] font-bold text-gray-400 uppercase">${new Date(p.fecha_pago).toLocaleDateString()}</p>
                                <p class="text-xs font-bold text-[#143B62]">${p.empleado_nombre}</p>
                            </div>
                            <div class="text-right">
                                <p class="text-sm font-black text-green-600">$ ${p.total_pagado.toFixed(2)}</p>
                                <p class="text-[9px] text-gray-400 italic">${p.cuenta_origen_nombre}</p>
                            </div>
                        </div>
                    `).join('');
                }
            } catch(e) {}
        }

        function actualizarResumen() {
            const activos = listaEmpleados.filter(e => e.estatus === 'Activo');
            document.getElementById('total-empleados').innerText = activos.length;
            const sueldoBase = activos.reduce((acc, e) => acc + e.sueldo_base, 0);
            document.getElementById('nomina-base-total').innerText = `$ ${sueldoBase.toFixed(2)}`;
        }

        // --- Funciones de Modales ---
        function abrirModalEmpleado() {
            document.getElementById('emp-id').value = '';
            document.getElementById('emp-cedula').value = '';
            document.getElementById('emp-nombre').value = '';
            document.getElementById('emp-cargo').value = '';
            document.getElementById('emp-sueldo').value = '';
            document.getElementById('emp-activo').checked = true;
            document.getElementById('modal-empleado').classList.replace('hidden', 'flex');
        }

        function editarEmpleado(id) {
            const e = listaEmpleados.find(emp => emp.id_empleado == id);
            if(!e) return;
            document.getElementById('emp-id').value = e.id_empleado;
            document.getElementById('emp-cedula').value = e.cedula_id;
            document.getElementById('emp-nombre').value = e.nombre;
            document.getElementById('emp-cargo').value = e.cargo;
            document.getElementById('emp-sueldo').value = e.sueldo_base;
            document.getElementById('emp-activo').checked = e.estatus === 'Activo';
            document.getElementById('modal-empleado').classList.replace('hidden', 'flex');
        }

        function abrirModalNomina() {
            document.getElementById('nom-base').value = 0;
            document.getElementById('nom-comisiones').value = 0;
            document.getElementById('nom-bonos').value = 0;
            document.getElementById('nom-deducciones').value = 0;
            document.getElementById('nom-total-final').innerText = '$ 0.00';
            document.getElementById('modal-nomina').classList.replace('hidden', 'flex');
        }

        function cerrarModal() {
            document.getElementById('modal-empleado').classList.replace('flex', 'hidden');
            document.getElementById('modal-nomina').classList.replace('flex', 'hidden');
        }

        function autoCompletarSueldo() {
            const id = document.getElementById('nom-empleado').value;
            const emp = listaEmpleados.find(e => e.id_empleado == id);
            if(emp) {
                document.getElementById('nom-base').value = emp.sueldo_base;
                calcularTotalNomina();
            }
        }

        function calcularTotalNomina() {
            const base = parseFloat(document.getElementById('nom-base').value) || 0;
            const com = parseFloat(document.getElementById('nom-comisiones').value) || 0;
            const bon = parseFloat(document.getElementById('nom-bonos').value) || 0;
            const ded = parseFloat(document.getElementById('nom-deducciones').value) || 0;
            const total = (base + com + bon) - ded;
            document.getElementById('nom-total-final').innerText = `$ ${total.toFixed(2)}`;
        }

        async function guardarEmpleado() {
            const btn = document.getElementById('btn-guardar-emp');
            const id = document.getElementById('emp-id').value;
            const cedula = document.getElementById('emp-cedula').value.trim();
            const nombre = document.getElementById('emp-nombre').value.trim();
            const sueldo = parseFloat(document.getElementById('emp-sueldo').value) || 0;

            if(!cedula || !nombre || sueldo <= 0) return alert("Cédula, Nombre y Sueldo son campos obligatorios.");

            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i>'; btn.disabled = true;

            const payload = {
                cedula_id: cedula,
                nombre: nombre,
                cargo: document.getElementById('emp-cargo').value.trim(),
                sueldo_base: sueldo,
                estatus: document.getElementById('emp-activo').checked ? 'Activo' : 'Inactivo'
            };

            try {
                if(id) {
                    await fetch(`${SUPABASE_URL}/rest/v1/nomina_empleados?id_empleado=eq.${id}`, {
                        method: 'PATCH',
                        headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${localStorage.getItem('pyp_token_seguro')}`, 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });
                } else {
                    await fetch(`${SUPABASE_URL}/rest/v1/nomina_empleados`, {
                        method: 'POST',
                        headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${localStorage.getItem('pyp_token_seguro')}`, 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });
                }
                cerrarModal();
                await cargarCatalogos();
            } catch(e) { alert("Error al guardar empleado"); }
            finally { btn.innerHTML = '<i class="fa-solid fa-save mr-1"></i> Guardar Cambios'; btn.disabled = false; }
        }

        async function procesarPagoNomina() {
            const idEmp = document.getElementById('nom-empleado').value;
            const idCuenta = document.getElementById('nom-cuenta').value;
            if(!idEmp || !idCuenta) return alert("Seleccione el empleado y la cuenta de pago.");

            const totalPagado = parseFloat(document.getElementById('nom-total-final').innerText.replace('$ ', ''));
            const cuenta = listaCuentas.find(c => c.id_cuenta == idCuenta);
            
            if(cuenta.saldo_actual < totalPagado) return alert(`Saldo insuficiente en ${cuenta.nombre_cuenta}. El pago es de $${totalPagado} y solo hay $${cuenta.saldo_actual.toFixed(2)}`);

            const btn = document.getElementById('btn-pagar-nom');
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i>'; btn.disabled = true;

            try {
                const emp = listaEmpleados.find(e => e.id_empleado == idEmp);
                const nombreCuenta = cuenta.nombre_cuenta;

                const dataNomina = {
                    id_empleado: idEmp,
                    empleado_nombre: emp.nombre,
                    sueldo_base: parseFloat(document.getElementById('nom-base').value) || 0,
                    comisiones: parseFloat(document.getElementById('nom-comisiones').value) || 0,
                    bonos: parseFloat(document.getElementById('nom-bonos').value) || 0,
                    deducciones: parseFloat(document.getElementById('nom-deducciones').value) || 0,
                    total_pagado: totalPagado,
                    cuenta_origen_id: idCuenta,
                    cuenta_origen_nombre: nombreCuenta,
                    notas: document.getElementById('nom-notas').value.trim()
                };

                await fetch(`${SUPABASE_URL}/rest/v1/nomina_pagos`, {
                    method: 'POST',
                    headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${localStorage.getItem('pyp_token_seguro')}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify(dataNomina)
                });

                cerrarModal();
                await cargarNomina();
                await cargarCatalogos(); 
                alert("Pago procesado exitosamente.");

            } catch(error) {
                alert("Error al procesar el pago.");
            } finally {
                btn.innerHTML = `<i class="fa-solid fa-check"></i> Registrar y Pagar`; btn.disabled = false;
            }
        }
      
    </script>
    <script src="menu.js"></script>
</body>
</html>
