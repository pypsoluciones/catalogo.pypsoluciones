<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>P&P Admin | Parámetros</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .custom-scroll::-webkit-scrollbar { width: 5px; height: 5px; }
        .custom-scroll::-webkit-scrollbar-thumb { background-color: #cbd5e1; border-radius: 4px; }
    </style>
    
    <script>
        if (!localStorage.getItem('pyp_token_seguro')) window.location.href = 'login.html';
    </script>
</head>
<body class="bg-[#f4f6f8] flex h-screen overflow-hidden text-gray-800 relative">

    <main class="flex-1 flex flex-col h-screen overflow-hidden bg-[#f4f6f8] w-full">
        <header class="bg-white shadow-sm px-4 md:px-6 py-4 flex justify-between items-center z-10 shrink-0 border-b border-gray-200">
            <div class="flex items-center gap-3">
                <button onclick="toggleMobileMenu()" class="md:hidden text-gray-600 hover:text-[#143B62] text-xl transition px-2"><i class="fa-solid fa-bars"></i></button>
                <h1 class="text-lg font-semibold text-[#143B62] flex items-center gap-2"><i class="fa-solid fa-tags text-[#E67E22]"></i> Parámetros de Inventario</h1>
            </div>
            <div class="text-[11px] font-semibold text-gray-500 bg-gray-100 px-3 py-1 rounded border border-gray-200 uppercase tracking-wide">
                <i class="fa-solid fa-user-tie text-[#143B62] mr-1"></i> <span id="nombre-usuario">Admin</span>
            </div>
        </header>

        <div class="flex-1 overflow-auto p-4 md:p-6 custom-scroll flex flex-col md:flex-row gap-6">
            <div class="w-full md:w-1/3 bg-white rounded-xl shadow-sm border border-gray-200 p-5 shrink-0 h-fit">
                <h3 class="font-bold text-[#143B62] mb-4 flex items-center gap-2 border-b pb-2"><i class="fa-solid fa-layer-group"></i> Gestión de Etiquetas</h3>
                <form id="form-param" onsubmit="guardarParametro(event)">
                    <div class="mb-4">
                        <label class="block text-[10px] font-bold text-gray-500 uppercase tracking-wider mb-1">Seleccionar Grupo *</label>
                        <select id="param-grupo" onchange="cargarParametros()" required class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm font-semibold text-[#143B62] focus:border-[#E67E22] outline-none bg-gray-50 transition">
                            <option value="TODOS">-- 📦 MOSTRAR TODOS LOS GRUPOS --</option>
                            <option value="CATEGORIA">CATEGORÍA</option>
                            <option value="MARCA">MARCA</option>
                            <option value="TIPO_PRODUCTO">TIPO DE PRODUCTO</option>
                            <option value="UNIDAD_MEDIDA">UNIDAD DE MEDIDA</option>
                            <option value="ESTADO_PRODUCTO">ESTADO DEL PRODUCTO</option>
                            <option value="CONDICION_PRODUCTO">CONDICIÓN DEL PRODUCTO</option>
                            <option value="TALLA">TALLA</option>
                            <option value="COLOR">COLOR</option>
                        </select>
                    </div>
                    <div class="mb-4" id="caja-nuevo-valor" style="display:none;">
                        <label class="block text-[10px] font-bold text-gray-500 uppercase tracking-wider mb-1">Nuevo Valor a Registrar *</label>
                        <input type="text" id="param-valor" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm font-bold focus:border-[#E67E22] outline-none uppercase" oninput="this.value = this.value.toUpperCase()" placeholder="Ej: ELECTRODOMÉSTICOS">
                    </div>
                    <button type="submit" id="btn-guardar" style="display:none;" class="w-full bg-[#143B62] hover:bg-[#0f2d4a] text-white font-bold py-2.5 rounded-lg shadow-sm transition flex justify-center items-center gap-2"><i class="fa-solid fa-plus"></i> Guardar Parámetro</button>
                    <p id="msg-selecciona" class="text-xs text-center text-gray-400 font-medium mt-2">Selecciona un grupo específico arriba para agregar nuevos valores.</p>
                </form>
            </div>

            <div class="flex-1 bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden flex flex-col">
                <div class="overflow-x-auto flex-1 custom-scroll">
                    <table class="w-full text-left text-sm whitespace-nowrap">
                        <thead class="bg-[#143B62] text-white text-[10px] uppercase tracking-wider sticky top-0">
                            <tr>
                                <th class="py-3 px-4 w-1/4 min-w-[120px]">Grupo</th>
                                <th class="py-3 px-4 w-auto">Valor Registrado</th>
                                <th class="py-3 px-4 text-center w-24">Estatus</th>
                                <th class="py-3 px-4 text-center w-16">Acción</th>
                            </tr>
                        </thead>
                        <tbody id="tabla-parametros" class="divide-y divide-gray-100">
                            <tr><td colspan="4" class="p-10 text-center text-gray-400"><i class="fa-solid fa-spinner fa-spin text-2xl mb-2 block"></i> Cargando data maestra...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <script src="menu.js"></script>
    
    <script>
        const SUPABASE_URL = 'https://icvfmdvvochzaktugqvj.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImljdmZtZHZ2b2NoemFrdHVncXZqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYyNDEzMzEsImV4cCI6MjA5MTgxNzMzMX0.gO3D39piT6KGbMMOzrPGWXUp5-g_nOBAgJ-nwPv8IcQ';
        const TOKEN_JWT = localStorage.getItem('pyp_token_seguro');

        window.onload = () => { 
            const nombre = localStorage.getItem('pyp_usuario_nombre');
            if(nombre) document.getElementById('nombre-usuario').innerText = nombre.split(' ')[0];
            cargarParametros(); 
        };

        async function cargarParametros() {
            const grupo = document.getElementById('param-grupo').value;
            const cajaValor = document.getElementById('caja-nuevo-valor');
            const btnGuardar = document.getElementById('btn-guardar');
            const msg = document.getElementById('msg-selecciona');

            // Mostrar/Ocultar formulario de ingreso
            if(grupo === 'TODOS') {
                cajaValor.style.display = 'none'; btnGuardar.style.display = 'none'; msg.style.display = 'block';
            } else {
                cajaValor.style.display = 'block'; btnGuardar.style.display = 'flex'; msg.style.display = 'none';
            }

            // Construir URL de búsqueda
            let urlFetch = `${SUPABASE_URL}/rest/v1/parametros_inventario?select=*&order=grupo.asc,valor.asc`;
            if(grupo !== 'TODOS') { urlFetch += `&grupo=eq.${grupo}`; }

            try {
                // AQUI ESTÁ LA MAGIA DEL TOKEN VIP
                const res = await fetch(urlFetch, { headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${TOKEN_JWT}` } });
                if(!res.ok) throw new Error("Error cargando");
                const data = await res.json();
                pintarTabla(data);
            } catch(e) {
                document.getElementById('tabla-parametros').innerHTML = `<tr><td colspan="4" class="p-5 text-center text-red-500 font-bold uppercase"><i class="fa-solid fa-triangle-exclamation text-2xl mb-2 block"></i> Error de conexión</td></tr>`;
            }
        }

        function pintarTabla(arr) {
            const tbody = document.getElementById('tabla-parametros');
            if(arr.length === 0) { tbody.innerHTML = `<tr><td colspan="4" class="p-10 text-center text-gray-400 font-medium"><i class="fa-solid fa-folder-open text-3xl mb-2 block opacity-50"></i> No hay parámetros registrados en este grupo.</td></tr>`; return; }
            
            let html = '';
            arr.forEach(p => {
                const badge = p.estatus === 'ACTIVO' ? `<span class="bg-emerald-50 border border-emerald-200 text-emerald-600 px-2 py-0.5 rounded text-[9px] font-bold tracking-wider">ACTIVO</span>` : `<span class="bg-red-50 border border-red-200 text-red-600 px-2 py-0.5 rounded text-[9px] font-bold tracking-wider">INACTIVO</span>`;
                html += `
                <tr class="hover:bg-gray-50 transition border-b border-gray-100">
                    <td class="py-2 px-4 text-[10px] font-bold text-gray-400 tracking-wider">${p.grupo}</td>
                    <td class="py-2 px-4 text-xs font-bold text-[#143B62]">${p.valor}</td>
                    <td class="py-2 px-4 text-center">${badge}</td>
                    <td class="py-2 px-4 text-center">
                        <button onclick="eliminarParametro('${p.id_parametro}')" class="text-gray-400 hover:text-red-500 transition px-2 py-1 rounded hover:bg-red-50"><i class="fa-solid fa-trash"></i></button>
                    </td>
                </tr>`;
            });
            tbody.innerHTML = html;
        }

        async function guardarParametro(e) {
            e.preventDefault();
            const btn = document.getElementById('btn-guardar'); btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Guardando...'; btn.disabled = true;
            const grupo = document.getElementById('param-grupo').value;
            const valor = document.getElementById('param-valor').value.trim().toUpperCase();

            if(!valor) { alert("Debe escribir un valor."); btn.innerHTML = '<i class="fa-solid fa-plus"></i> Guardar Parámetro'; btn.disabled = false; return; }

            try {
                // Obtenemos el ID de empresa para el Multi-Tenant
                const resUser = await fetch(`${SUPABASE_URL}/rest/v1/usuarios?select=id_empresa&limit=1`, { headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${TOKEN_JWT}` } });
                const dataUser = await resUser.json();
                const miEmpresa = dataUser.length > 0 ? dataUser[0].id_empresa : null;

                const res = await fetch(`${SUPABASE_URL}/rest/v1/parametros_inventario`, {
                    method: 'POST',
                    headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${TOKEN_JWT}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({ grupo: grupo, valor: valor, estatus: 'ACTIVO', id_empresa: miEmpresa })
                });
                if(!res.ok) throw new Error("Error al guardar");
                
                document.getElementById('param-valor').value = '';
                cargarParametros();
            } catch(err) { alert("Error al guardar parámetro. Asegúrese de que no esté duplicado."); }
            finally { btn.innerHTML = '<i class="fa-solid fa-plus"></i> Guardar Parámetro'; btn.disabled = false; }
        }

        async function eliminarParametro(id) {
            if(!confirm("¿Estás seguro de eliminar este parámetro? Podría afectar a los productos que ya lo usan.")) return;
            try {
                const res = await fetch(`${SUPABASE_URL}/rest/v1/parametros_inventario?id_parametro=eq.${id}`, {
                    method: 'DELETE',
                    headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${TOKEN_JWT}` }
                });
                if(res.ok) cargarParametros();
            } catch(e) { alert("Error al eliminar."); }
        }
    </script>
</body>
</html>
