<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>P&P Admin | Inventario</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .custom-scroll::-webkit-scrollbar { width: 5px; height: 5px; }
        .custom-scroll::-webkit-scrollbar-thumb { background-color: #cbd5e1; border-radius: 4px; }
        .btn-press:active { transform: scale(0.97); }
        .fade-in { animation: fadeIn 0.2s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .uppercase-input { text-transform: uppercase; }
        .toggle-checkbox:checked { right: 0; border-color: #25D366; }
        .toggle-checkbox:checked + .toggle-label { background-color: #25D366; }
        
        .sidebar-link { font-weight: 500; padding: 8px 14px; font-size: 13px; letter-spacing: 0.01em; }
        .sidebar-icon { font-size: 14px; width: 22px; text-align: center; }
        .param-label { font-size: 10px; color: #64748b; text-transform: uppercase; letter-spacing: 0.05em; font-weight: 600; }
        .param-value { font-size: 13px; color: #1e293b; font-weight: 500; }
        
        .btn-vista.active { background-color: #e2e8f0; color: #143B62; border-color: #cbd5e1; }
        .text-truncate-25 { max-width: 250px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        
        .filter-panel { transition: max-height 0.3s ease-in-out, opacity 0.3s ease-in-out; overflow: hidden; max-height: 0; opacity: 0; }
        .filter-panel.open { max-height: 200px; opacity: 1; overflow: visible; }
    </style>
    <script>if (localStorage.getItem('pyp_sesion_activa') !== 'true') window.location.href = 'login.html';</script>
</head>
<body class="bg-[#f4f6f8] flex h-screen overflow-hidden text-gray-800 relative">

    <div id="mobile-overlay" onclick="toggleMobileMenu()" class="fixed inset-0 bg-gray-900/60 z-40 hidden backdrop-blur-sm md:hidden transition-opacity"></div>

    <aside id="sidebar" class="w-64 md:w-56 bg-[#143B62] text-white flex flex-col fixed inset-y-0 left-0 z-50 transform -translate-x-full md:translate-x-0 md:relative transition-transform duration-300 shadow-2xl md:shadow-xl">
        <div class="p-5 border-b border-white/10 flex items-center justify-between gap-3 shrink-0">
            <div class="flex items-center gap-3">
                <i class="fa-solid fa-layer-group text-[#E67E22] text-2xl"></i>
                <h2 class="font-semibold text-lg tracking-wide">P&P Admin</h2>
            </div>
            <button onclick="toggleMobileMenu()" class="md:hidden text-gray-300 hover:text-white text-xl"><i class="fa-solid fa-times"></i></button>
        </div>
        <nav class="flex-1 p-3 space-y-1 overflow-y-auto custom-scroll">
            <a href="admin_dashboard.html" class="flex items-center text-gray-300 hover:bg-white/10 rounded-md transition sidebar-link"><i class="fa-solid fa-chart-pie sidebar-icon"></i> Dashboard</a>
            <a href="admin_ventas.html" class="flex items-center text-gray-300 hover:bg-white/10 rounded-md transition sidebar-link"><i class="fa-solid fa-cash-register sidebar-icon"></i> Ventas (POS)</a>
            <a href="admin_compras.html" class="flex items-center text-gray-300 hover:bg-white/10 rounded-md transition sidebar-link"><i class="fa-solid fa-truck-ramp-box sidebar-icon"></i> Compras</a>
            
            <div class="space-y-1 pt-1">
                <button type="button" onclick="document.getElementById('submenu-inv').classList.toggle('hidden')" class="w-full flex items-center justify-between bg-[#E67E22] text-white rounded-md shadow-sm transition btn-press sidebar-link">
                    <div class="flex items-center"><i class="fa-solid fa-boxes-stacked sidebar-icon"></i> Inventario</div>
                    <i class="fa-solid fa-chevron-down text-[10px]"></i>
                </button>
                <div id="submenu-inv" class="pl-9 space-y-1 mt-1">
                    <a href="admin_productos.html" class="block py-1.5 text-white font-semibold text-xs border-l-2 border-[#E67E22] pl-3">PRODUCTOS</a>
                    <a href="admin_productos_parametros.html" class="block py-1.5 text-gray-400 hover:text-white font-medium text-xs pl-3 transition">PARÁMETROS</a>
                </div>
            </div>

            <a href="admin_contactos.html" class="flex items-center text-gray-300 hover:bg-white/10 rounded-md transition sidebar-link mt-1"><i class="fa-solid fa-address-book sidebar-icon"></i> Directorio</a>
        </nav>
        
        <div class="p-3 border-t border-white/10 shrink-0 bg-[#0f2d4a]">
            <button onclick="cerrarSesion()" class="w-full flex items-center justify-center gap-2 bg-red-500/10 text-red-400 hover:bg-red-500 hover:text-white py-2 rounded-md font-medium transition text-xs shadow-sm btn-press">
                <i class="fa-solid fa-power-off"></i> Cerrar Sesión
            </button>
        </div>
    </aside>

    <main class="flex-1 flex flex-col h-screen overflow-hidden bg-[#f4f6f8] w-full">
        
        <header class="bg-white shadow-sm px-4 md:px-6 py-3 flex justify-between items-center z-10 shrink-0 border-b border-gray-200">
            <div class="flex items-center gap-3">
                <button onclick="toggleMobileMenu()" class="md:hidden text-gray-600 hover:text-[#143B62] text-xl transition btn-press px-2"><i class="fa-solid fa-bars"></i></button>
                <h1 class="text-base md:text-lg font-semibold text-[#143B62] flex items-center gap-2 truncate">
                    <i class="fa-solid fa-boxes-stacked text-[#E67E22] hidden sm:inline-block"></i> Inventario
                </h1>
            </div>
            <div class="flex items-center gap-2 md:gap-3">
                <div class="bg-gray-50 px-2 md:px-3 py-1.5 rounded-md border border-gray-200 flex items-center gap-2 text-[10px] md:text-[11px] font-semibold text-gray-600 tracking-wide uppercase">
                    <i class="fa-solid fa-user-tie text-[#143B62]"></i> <span id="nombre-usuario" class="hidden sm:inline-block">Admin</span>
                </div>
                <button onclick="cerrarSesion()" class="hidden md:inline-block text-red-500 hover:text-red-700 text-lg transition btn-press"><i class="fa-solid fa-power-off"></i></button>
            </div>
        </header>

        <div class="flex-1 overflow-auto p-4 md:p-6 custom-scroll flex flex-col">
            
            <div class="flex flex-col md:flex-row gap-3 mb-3 items-center shrink-0">
                <div class="flex-1 flex gap-2 w-full">
                    <div class="relative flex-1">
                        <i class="fa-solid fa-search absolute left-3 top-2.5 text-gray-400 text-sm"></i>
                        <input type="text" id="buscador-inv" oninput="filtrarInventario()" placeholder="Buscar por SKU, Nombre o Barras..." class="uppercase-input w-full border border-gray-300 rounded-md pl-9 pr-4 py-2 text-[13px] font-medium focus:outline-none focus:border-[#143B62] focus:ring-1 focus:ring-[#143B62] bg-white shadow-sm transition">
                    </div>
                    <button onclick="toggleFiltrosPanel()" class="bg-white border border-gray-300 text-gray-600 px-3 md:px-4 py-2 rounded-md hover:bg-gray-50 hover:text-[#143B62] transition shadow-sm text-[13px] font-medium flex items-center gap-2 btn-press" title="Filtros Avanzados">
                        <i class="fa-solid fa-filter"></i> <span class="hidden sm:inline">Filtros</span>
                    </button>
                </div>
                
                <div class="flex gap-2 w-full md:w-auto justify-between md:justify-end">
                    <div class="flex bg-white rounded-md border border-gray-300 shadow-sm p-0.5">
                        <button id="btn-vista-tabla" onclick="cambiarVista('tabla')" class="btn-vista active px-3 py-1.5 rounded text-gray-500 hover:text-[#143B62] transition text-sm" title="Vista Excel"><i class="fa-solid fa-list"></i></button>
                        <button id="btn-vista-grid" onclick="cambiarVista('grid')" class="btn-vista px-3 py-1.5 rounded text-gray-500 hover:text-[#143B62] transition text-sm" title="Vista Web"><i class="fa-solid fa-border-all"></i></button>
                    </div>
                    <button onclick="abrirModalProducto()" class="bg-[#25D366] hover:bg-[#1ebd5c] text-white px-4 md:px-5 py-2 rounded-md font-semibold text-[13px] shadow-sm transition flex items-center justify-center gap-2 btn-press whitespace-nowrap">
                        <i class="fa-solid fa-plus"></i> <span class="hidden sm:inline">NUEVO PRODUCTO</span><span class="sm:hidden">NUEVO</span>
                    </button>
                </div>
            </div>

            <div id="panel-filtros" class="filter-panel shrink-0 bg-white border border-gray-200 rounded-md shadow-sm px-4 pt-4 pb-2 mb-4">
                <div class="grid grid-cols-2 md:grid-cols-5 gap-4 mb-3">
                    <div>
                        <label class="param-label block mb-1">Categoría</label>
                        <select id="filtro-categoria" onchange="filtrarInventario()" class="w-full border border-gray-300 rounded px-2 py-1.5 text-[11px] font-semibold text-gray-700 bg-gray-50 outline-none focus:border-[#143B62]"><option value="TODAS">TODAS</option></select>
                    </div>
                    <div>
                        <label class="param-label block mb-1">Marca</label>
                        <select id="filtro-marca" onchange="filtrarInventario()" class="w-full border border-gray-300 rounded px-2 py-1.5 text-[11px] font-semibold text-gray-700 bg-gray-50 outline-none focus:border-[#143B62]"><option value="TODAS">TODAS</option></select>
                    </div>
                    <div>
                        <label class="param-label block mb-1">Estado</label>
                        <select id="filtro-estado" onchange="filtrarInventario()" class="w-full border border-gray-300 rounded px-2 py-1.5 text-[11px] font-semibold text-gray-700 bg-gray-50 outline-none focus:border-[#143B62]"><option value="TODAS">TODOS</option></select>
                    </div>
                    <div>
                        <label class="param-label block mb-1">Condición</label>
                        <select id="filtro-condicion" onchange="filtrarInventario()" class="w-full border border-gray-300 rounded px-2 py-1.5 text-[11px] font-semibold text-gray-700 bg-gray-50 outline-none focus:border-[#143B62]"><option value="TODAS">TODAS</option></select>
                    </div>
                    <div>
                        <label class="param-label block mb-1">Nivel de Stock</label>
                        <select id="filtro-stock" onchange="filtrarInventario()" class="w-full border border-gray-300 rounded px-2 py-1.5 text-[11px] font-semibold text-gray-700 bg-gray-50 outline-none focus:border-[#143B62]">
                            <option value="TODOS">MOSTRAR TODOS</option>
                            <option value="CON_STOCK">EN EXISTENCIA (> 0)</option>
                            <option value="SIN_STOCK">AGOTADOS (0 o menos)</option>
                        </select>
                    </div>
                </div>
                <div class="flex justify-end border-t border-gray-100 pt-2">
                    <button onclick="limpiarFiltros()" class="text-[10px] font-bold text-red-500 hover:text-red-700 uppercase tracking-wider transition px-2 py-1 rounded hover:bg-red-50 btn-press">
                        <i class="fa-solid fa-eraser mr-1"></i> Limpiar Filtros
                    </button>
                </div>
            </div>

            <div id="contenedor-inventario" class="w-full flex-1">
                <div class="p-10 text-center text-gray-400"><i class="fa-solid fa-spinner fa-spin text-2xl mb-3 block"></i> Sincronizando datos...</div>
            </div>
        </div>
    </main>

    <div id="modal-producto" class="fixed inset-0 bg-gray-900/60 backdrop-blur-sm z-[100] hidden flex items-center justify-center p-4 fade-in">
        <div class="bg-white rounded-lg shadow-2xl w-full max-w-5xl max-h-[95vh] flex flex-col overflow-hidden border border-gray-200">
            <div class="bg-[#143B62] text-white px-5 py-3.5 flex justify-between items-center shrink-0">
                <h3 class="font-medium text-sm tracking-wide flex items-center" id="modal-titulo"><i class="fa-solid fa-box-open mr-2 text-[#E67E22]"></i> NUEVO REGISTRO</h3>
                <button onclick="cerrarModalProducto()" class="text-gray-300 hover:text-white text-lg transition"><i class="fa-solid fa-times"></i></button>
            </div>
            
            <form id="form-producto" onsubmit="guardarProducto(event)" class="flex-1 overflow-y-auto custom-scroll p-5 bg-[#f8fafc]">
                <input type="hidden" id="modo-edicion" value="false">
                
                <div class="grid grid-cols-1 lg:grid-cols-3 gap-5">
                    
                    <div class="lg:col-span-2 space-y-4">
                        <div class="bg-white p-4 rounded border border-gray-200 shadow-sm">
                            <h4 class="text-[11px] font-semibold text-[#E67E22] uppercase border-b border-gray-100 pb-2 mb-3 tracking-wider">Identificación Principal</h4>
                            <div class="grid grid-cols-2 md:grid-cols-3 gap-4 mb-3">
                                <div><label class="block param-label mb-1">SKU / Código Interno *</label><input type="text" id="prod-sku" required class="uppercase-input w-full border border-gray-300 rounded px-2.5 py-1.5 text-[13px] font-medium focus:border-[#143B62] outline-none" oninput="this.value = this.value.toUpperCase()"></div>
                                <div><label class="block param-label mb-1">Cód. Barras</label><input type="text" id="prod-barras" class="uppercase-input w-full border border-gray-300 rounded px-2.5 py-1.5 text-[13px] font-medium focus:border-[#143B62] outline-none" oninput="this.value = this.value.toUpperCase()"></div>
                                <div><label class="block param-label mb-1">Estado Operativo *</label><select id="prod-estado" required class="w-full border border-gray-300 rounded px-2.5 py-1.5 text-[13px] font-medium text-[#143B62] bg-blue-50/50 outline-none"></select></div>
                            </div>
                            <div><label class="block param-label mb-1">Nombre del Producto *</label><input type="text" id="prod-nombre" required class="uppercase-input w-full border border-gray-300 rounded px-2.5 py-1.5 text-[13px] font-medium focus:border-[#143B62] outline-none" oninput="this.value = this.value.toUpperCase()"></div>
                        </div>

                        <div class="bg-white p-4 rounded border border-gray-200 shadow-sm">
                            <h4 class="text-[11px] font-semibold text-[#E67E22] uppercase border-b border-gray-100 pb-2 mb-3 tracking-wider">Clasificación Maestra</h4>
                            <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-3">
                                <div><label class="block param-label mb-1">Categoría *</label><select id="prod-categoria" required class="w-full border border-gray-300 rounded px-2 py-1.5 text-[12px] font-medium focus:border-[#143B62] outline-none"></select></div>
                                <div><label class="block param-label mb-1">Marca *</label><select id="prod-marca" required class="w-full border border-gray-300 rounded px-2 py-1.5 text-[12px] font-medium focus:border-[#143B62] outline-none"></select></div>
                                <div><label class="block param-label mb-1">Tipo *</label><select id="prod-tipo" required class="w-full border border-gray-300 rounded px-2 py-1.5 text-[12px] font-medium focus:border-[#143B62] outline-none"></select></div>
                                <div><label class="block param-label mb-1">Condición *</label><select id="prod-condicion" required class="w-full border border-gray-300 rounded px-2 py-1.5 text-[12px] font-medium focus:border-[#143B62] outline-none"></select></div>
                            </div>
                            <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
                                <div><label class="block param-label mb-1">Cat. Venta</label><select id="prod-cat-venta" class="w-full border border-gray-300 rounded px-2 py-1.5 text-[12px] font-medium outline-none"></select></div>
                                <div><label class="block param-label mb-1">Unidad *</label><select id="prod-unidad" required class="w-full border border-gray-300 rounded px-2 py-1.5 text-[12px] font-medium outline-none"></select></div>
                                <div><label class="block param-label mb-1">Color</label><select id="prod-color" class="w-full border border-gray-300 rounded px-2 py-1.5 text-[12px] font-medium outline-none"></select></div>
                                <div><label class="block param-label mb-1">Talla</label><select id="prod-talla" class="w-full border border-gray-300 rounded px-2 py-1.5 text-[12px] font-medium outline-none"></select></div>
                            </div>
                        </div>

                        <div class="bg-white p-4 rounded border border-gray-200 shadow-sm">
                            <h4 class="text-[11px] font-semibold text-[#E67E22] uppercase border-b border-gray-100 pb-2 mb-3 tracking-wider">Multimedia</h4>
                            <div class="mb-3"><label class="block param-label mb-1">URL Imagen</label><input type="url" id="prod-imagen" placeholder="Ej: https://..." class="w-full border border-gray-300 rounded px-2.5 py-1.5 text-[12px] text-blue-600 outline-none"></div>
                            <div><label class="block param-label mb-1">Descripción</label><textarea id="prod-descripcion" rows="2" class="w-full border border-gray-300 rounded px-2.5 py-1.5 text-[13px] outline-none"></textarea></div>
                        </div>
                    </div>

                    <div class="space-y-4">
                        <div class="bg-white p-4 rounded border border-gray-200 shadow-sm border-t-2 border-t-emerald-500">
                            <h4 class="text-[11px] font-semibold text-emerald-600 uppercase border-b border-gray-100 pb-2 mb-3 tracking-wider">Inventario Físico</h4>
                            <div class="mb-4">
                                <label class="block param-label mb-1 text-center">Stock Actual</label>
                                <input type="number" id="prod-stock" value="0" class="w-full border border-gray-300 rounded px-3 py-2 text-xl font-semibold text-center focus:border-emerald-500 outline-none bg-gray-50">
                            </div>
                            <div class="flex items-center justify-between bg-gray-50 p-2.5 rounded border border-gray-200 mb-4">
                                <label class="param-label cursor-pointer" for="prod-negativo">¿Venta en Negativo?</label>
                                <div class="relative inline-block w-9 align-middle select-none transition">
                                    <input type="checkbox" id="prod-negativo" class="toggle-checkbox absolute block w-4 h-4 rounded-full bg-white border-4 appearance-none cursor-pointer mt-0.5 ml-0.5"/>
                                    <label for="prod-negativo" class="toggle-label block overflow-hidden h-5 rounded-full bg-gray-300 cursor-pointer"></label>
                                </div>
                            </div>
                            <div><label class="block param-label mb-1">Impuesto (IVA) *</label><select id="prod-iva" required class="w-full border border-gray-300 rounded px-2.5 py-1.5 text-[12px] font-medium bg-gray-50 outline-none"></select></div>
                        </div>

                        <div class="bg-white p-4 rounded border border-gray-200 shadow-sm border-t-2 border-t-blue-500">
                            <h4 class="text-[11px] font-semibold text-blue-600 uppercase border-b border-gray-100 pb-2 mb-3 tracking-wider">Estructura de Precios</h4>
                            
                            <div class="mb-4 flex items-center justify-between bg-blue-50 p-2.5 rounded border border-blue-100">
                                <label class="param-label text-[#143B62] cursor-pointer" for="prod-fijo-bs">¿Fijar Precio en Bs?</label>
                                <div class="relative inline-block w-9 align-middle select-none transition">
                                    <input type="checkbox" id="prod-fijo-bs" onchange="toggleInputsPrecio()" class="toggle-checkbox absolute block w-4 h-4 rounded-full bg-white border-4 appearance-none cursor-pointer mt-0.5 ml-0.5"/>
                                    <label for="prod-fijo-bs" class="toggle-label block overflow-hidden h-5 rounded-full bg-gray-300 cursor-pointer"></label>
                                </div>
                            </div>
                            
                            <div id="section-bs" class="hidden">
                                <label class="block param-label mb-1 text-center">Precio Fijo (Bs)</label>
                                <input type="number" id="prod-precio-bs" step="0.01" class="w-full border border-gray-300 rounded px-3 py-3 text-2xl font-bold text-emerald-600 text-center bg-emerald-50 outline-none">
                            </div>

                            <div id="section-usd" class="space-y-3">
                                <div><label class="block param-label mb-1">Costo Actual (USD)</label><input type="number" id="prod-costo" step="0.01" oninput="calcularPreciosPorMargen()" class="w-full border border-gray-300 rounded px-3 py-1.5 text-center font-bold bg-gray-50 outline-none focus:border-blue-400"></div>
                                
                                <div class="pt-2 border-t border-gray-100">
                                    <label class="block param-label mb-1">Precio General (USD)</label>
                                    <div class="flex gap-2">
                                        <input type="number" id="prod-margen-gen" placeholder="%" oninput="calcularPreciosPorMargen()" class="w-16 border border-gray-300 rounded px-2 py-2 text-center text-[12px] font-semibold bg-blue-50 text-blue-700 outline-none" title="Margen de Ganancia %">
                                        <input type="number" id="prod-precio-gen" step="0.01" class="flex-1 border border-gray-300 rounded px-3 py-2 text-lg font-bold text-[#143B62] text-center outline-none focus:border-[#143B62]">
                                    </div>
                                </div>

                                <div class="pt-2 border-t border-gray-100">
                                    <div class="grid grid-cols-3 gap-2 mb-1">
                                        <label class="param-label text-[9px] text-center text-blue-600">P1 Mayor</label>
                                        <label class="param-label text-[9px] text-center text-blue-600">P2 Gran Mayor</label>
                                        <label class="param-label text-[9px] text-center text-blue-600">P3 Distribuidor</label>
                                    </div>
                                    <div class="grid grid-cols-3 gap-2 mb-2">
                                        <input type="number" id="prod-req1" placeholder="Req. Unds" class="w-full border border-gray-300 rounded px-1 py-1.5 text-center text-[11px] font-medium outline-none">
                                        <input type="number" id="prod-req2" placeholder="Req. Unds" class="w-full border border-gray-300 rounded px-1 py-1.5 text-center text-[11px] font-medium outline-none">
                                        <input type="number" id="prod-req3" placeholder="Req. Unds" class="w-full border border-gray-300 rounded px-1 py-1.5 text-center text-[11px] font-medium outline-none">
                                    </div>
                                    <div class="grid grid-cols-3 gap-2 mb-2">
                                        <input type="number" id="prod-m1" placeholder="Margen %" oninput="calcularPreciosPorMargen()" class="w-full border border-gray-300 rounded px-1 py-1.5 text-center text-[11px] font-semibold bg-blue-50 text-blue-700 outline-none">
                                        <input type="number" id="prod-m2" placeholder="Margen %" oninput="calcularPreciosPorMargen()" class="w-full border border-gray-300 rounded px-1 py-1.5 text-center text-[11px] font-semibold bg-blue-50 text-blue-700 outline-none">
                                        <input type="number" id="prod-m3" placeholder="Margen %" oninput="calcularPreciosPorMargen()" class="w-full border border-gray-300 rounded px-1 py-1.5 text-center text-[11px] font-semibold bg-blue-50 text-blue-700 outline-none">
                                    </div>
                                    <div class="grid grid-cols-3 gap-2">
                                        <input type="text" id="prod-p1" placeholder="Precio $" readonly class="w-full border-none bg-gray-100 rounded py-1.5 text-[12px] text-center font-bold text-gray-600 outline-none">
                                        <input type="text" id="prod-p2" placeholder="Precio $" readonly class="w-full border-none bg-gray-100 rounded py-1.5 text-[12px] text-center font-bold text-gray-600 outline-none">
                                        <input type="text" id="prod-p3" placeholder="Precio $" readonly class="w-full border-none bg-gray-100 rounded py-1.5 text-[12px] text-center font-bold text-gray-600 outline-none">
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </form>

            <div class="bg-gray-50 border-t border-gray-200 px-5 py-3 flex gap-3 justify-end shrink-0">

        async function cargarTodo() {
            try {
                const resInv = await fetch(`${SUPABASE_URL}/rest/v1/productos?select=*&order=id_producto_sku.asc`, { headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` } });
                const resPre = await fetch(`${SUPABASE_URL}/rest/v1/precios?select=*`, { headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` } });
                const resPar = await fetch(`${SUPABASE_URL}/rest/v1/parametros_inventario?select=*&estatus=eq.ACTIVO`, { headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` } });
                
                dbInventario = await resInv.json();
                dbPrecios = await resPre.json();
                dataMaestra = await resPar.json();

                if(!Array.isArray(dbInventario)) throw new Error("Error en conexión.");

                llenarSelect('prod-iva', 'TIPO_IMPUESTO', false);

        function llenarSelect(id, grupo, permiteVacio) {
            const s = document.getElementById(id);
            const ops = dataMaestra.filter(p => p.grupo === grupo).sort((a,b) => a.valor.localeCompare(b.valor));
            let h = '';
            if (permiteVacio) h += '<option value="">N/A</option>';
            if (ops.length === 0 && !permiteVacio) h += '<option value="">(SIN CONFIG)</option>';
            for(let i=0; i<ops.length; i++) h += `<option value="${ops[i].valor}">${ops[i].valor}</option>`;
            s.innerHTML = h;
        }

        function llenarSelectFiltros(id, grupo) {
            const s = document.getElementById(id);
            const ops = dataMaestra.filter(p => p.grupo === grupo).sort((a,b) => a.valor.localeCompare(b.valor));
            let h = '<option value="TODAS">TODAS</option>';
            for(let i=0; i<ops.length; i++) h += `<option value="${ops[i].valor}">${ops[i].valor}</option>`;
            s.innerHTML = h;

        function calcularPreciosPorMargen() {
            const costo = parseFloat(document.getElementById('prod-costo').value) || 0;
            const mGen = parseFloat(document.getElementById('prod-margen-gen').value) || 0;
            const m1 = parseFloat(document.getElementById('prod-m1').value) || 0;
            const m2 = parseFloat(document.getElementById('prod-m2').value) || 0;
            const m3 = parseFloat(document.getElementById('prod-m3').value) || 0;

            if (mGen > 0) document.getElementById('prod-precio-gen').value = (costo * (1 + mGen/100)).toFixed(2);
            if (m1 > 0) document.getElementById('prod-p1').value = `$${(costo * (1 + m1/100)).toFixed(2)}`; else document.getElementById('prod-p1').value = '';
            if (m2 > 0) document.getElementById('prod-p2').value = `$${(costo * (1 + m2/100)).toFixed(2)}`; else document.getElementById('prod-p2').value = '';
            if (m3 > 0) document.getElementById('prod-p3').value = `$${(costo * (1 + m3/100)).toFixed(2)}`; else document.getElementById('prod-p3').value = '';
        }

        function filtrarInventario() {
            const q = document.getElementById('buscador-inv').value.toLowerCase();
            const fCat = document.getElementById('filtro-categoria').value;
            const fMar = document.getElementById('filtro-marca').value;
            const fEst = document.getElementById('filtro-estado').value;
            const fCon = document.getElementById('filtro-condicion').value;
            const fStock = document.getElementById('filtro-stock').value;

            const fusionada = dbInventario.map(p => {
                const pre = dbPrecios.find(pr => pr.id_producto_sku === p.id_producto_sku) || {};
                return { ...p, ...pre };
            });

            const dataFiltrada = fusionada.filter(p => {
                const nom = p.nombre ? String(p.nombre).toLowerCase() : '';
                const sku = p.id_producto_sku ? String(p.id_producto_sku).toLowerCase() : '';
                const bar = p.codigo_barras ? String(p.codigo_barras).toLowerCase() : '';
                const cat = p.categoria_del_producto || '';
                const mar = p.marca || '';
                const est = p.estado_producto || '';
                const con = p.condicion_producto || '';
                const stx = parseInt(p.stock_actual) || 0;

                const matchText = nom.includes(q) || sku.includes(q) || bar.includes(q);
                const matchCat = fCat === 'TODAS' || cat === fCat;
                const matchMar = fMar === 'TODAS' || mar === fMar;
                const matchEst = fEst === 'TODAS' || est === fEst;
                const matchCon = fCon === 'TODAS' || con === fCon;
                
                let matchStock = true;
                if(fStock === 'CON_STOCK') matchStock = stx > 0;
                if(fStock === 'SIN_STOCK') matchStock = stx <= 0;

                return matchText && matchCat && matchMar && matchEst && matchCon && matchStock;
            });

            if(vistaActual === 'tabla') pintarTabla(dataFiltrada);
            else pintarGrid(dataFiltrada);
        }

        function toggleDetalleTbl(id) { 
            const el = document.getElementById(`dt-tbl-${id}`);
            const icon = document.getElementById(`icon-tbl-${id}`);
            
            if(el.classList.contains('hidden')) { 
                el.classList.remove('hidden');
                if(el.tagName !== 'TR') el.classList.add('flex');
                icon.classList.remove('fa-chevron-down');
                icon.classList.add('fa-chevron-up');
            } else { 
                el.classList.add('hidden');
                if(el.tagName !== 'TR') el.classList.remove('flex');
                icon.classList.remove('fa-chevron-up');
                icon.classList.add('fa-chevron-down');
            }

        // --- MODAL Y GUARDADO ---
        function abrirModalProducto(prodStr = null) {
            const f = document.getElementById('form-producto');
            f.reset();
            
            document.getElementById('prod-fijo-bs').checked = false;
            document.getElementById('prod-margen-gen').value = '';
            document.getElementById('prod-m1').value = '';
            document.getElementById('prod-m2').value = '';
            document.getElementById('prod-m3').value = '';
            
            toggleInputsPrecio();

            if (prodStr) {
                const p = JSON.parse(decodeURIComponent(prodStr));
                document.getElementById('modal-titulo').innerHTML = `<i class="fa-solid fa-pen-to-square mr-2 text-blue-400"></i> EDITAR REGISTRO`;
                document.getElementById('modo-edicion').value = "true";
                
                document.getElementById('prod-sku').value = p.id_producto_sku || '';
                document.getElementById('prod-sku').readOnly = true;
                document.getElementById('prod-sku').classList.add('bg-gray-100', 'text-gray-500', 'cursor-not-allowed');

                document.getElementById('prod-barras').value = p.codigo_barras || '';
                document.getElementById('prod-nombre').value = p.nombre || '';
                document.getElementById('prod-imagen').value = p.imagen_principal || '';
                document.getElementById('prod-descripcion').value = p.descripcion || '';
                document.getElementById('prod-estado').value = p.estado_producto || '';
                document.getElementById('prod-categoria').value = p.categoria_del_producto || '';
                document.getElementById('prod-marca').value = p.marca || '';
                document.getElementById('prod-tipo').value = p.tipo_producto || '';
                document.getElementById('prod-condicion').value = p.condicion_producto || '';
                document.getElementById('prod-unidad').value = p.unidad_medida || '';
                document.getElementById('prod-iva').value = p.tipo_impuesto || '';
                document.getElementById('prod-talla').value = p.talla || '';
                document.getElementById('prod-color').value = p.color || '';
                document.getElementById('prod-cat-venta').value = p.categoria_venta || '';
                
                document.getElementById('prod-stock').value = p.stock_actual || 0;
                document.getElementById('prod-negativo').checked = p.permitir_negativo === true;
                
                document.getElementById('prod-req1').value = p.requerido_precio_1 || '';
                document.getElementById('prod-req2').value = p.requerido_precio_2 || '';
                document.getElementById('prod-req3').value = p.requerido_precio_3 || '';

                document.getElementById('prod-fijo-bs').checked = p.es_precio_fijo_bs || false;
                document.getElementById('prod-precio-bs').value = p.precio_fijo_bs || 0;
                document.getElementById('prod-costo').value = p.costo_actual || 0;
                document.getElementById('prod-precio-gen').value = p.precio_general_usd || 0;
                
                document.getElementById('prod-p1').value = p.precio_1_usd ? `$${p.precio_1_usd}` : '';
                document.getElementById('prod-p2').value = p.precio_2_usd ? `$${p.precio_2_usd}` : '';
                document.getElementById('prod-p3').value = p.precio_3_usd ? `$${p.precio_3_usd}` : '';
                
                toggleInputsPrecio();
            } else {
                document.getElementById('modal-titulo').innerHTML = `<i class="fa-solid fa-box-open mr-2 text-[#E67E22]"></i> NUEVO REGISTRO`;
                document.getElementById('modo-edicion').value = "false";
                document.getElementById('prod-sku').value = '';
                document.getElementById('prod-sku').readOnly = false;
                document.getElementById('prod-sku').classList.remove('bg-gray-100', 'text-gray-500', 'cursor-not-allowed');
            }

            document.getElementById('modal-producto').classList.remove('hidden');
        }

        function cerrarModalProducto() { 
            document.getElementById('modal-producto').classList.add('hidden'); 
        }

        async function guardarProducto(e) {
            e.preventDefault();
            const btn = document.getElementById('btn-guardar-prod');
            const isEdit = document.getElementById('modo-edicion').value === "true";
            
            btn.innerHTML = `<i class="fa-solid fa-spinner fa-spin"></i> Guardando...`;
            btn.disabled = true;

            const sku = document.getElementById('prod-sku').value.trim().toUpperCase();
            const esBs = document.getElementById('prod-fijo-bs').checked;
            
            const dataProd = {
                id_producto_sku: sku,
                nombre: document.getElementById('prod-nombre').value.toUpperCase(),
                codigo_barras: document.getElementById('prod-barras').value.toUpperCase() || null,
                imagen_principal: document.getElementById('prod-imagen').value || null,
                descripcion: document.getElementById('prod-descripcion').value || null,
                estado_producto: document.getElementById('prod-estado').value || null,
                categoria_del_producto: document.getElementById('prod-categoria').value || null,
                marca: document.getElementById('prod-marca').value || null,
                condicion_producto: document.getElementById('prod-condicion').value || null,
                tipo_producto: document.getElementById('prod-tipo').value || null,
                unidad_medida: document.getElementById('prod-unidad').value || null,
                tipo_impuesto: document.getElementById('prod-iva').value || null,
                talla: document.getElementById('prod-talla').value || null,
                color: document.getElementById('prod-color').value || null,
                categoria_venta: document.getElementById('prod-cat-venta').value || null,
                stock_actual: parseInt(document.getElementById('prod-stock').value) || 0,
                permitir_negativo: document.getElementById('prod-negativo').checked,
                
                requerido_precio_1: parseInt(document.getElementById('prod-req1').value) || null,
                requerido_precio_2: parseInt(document.getElementById('prod-req2').value) || null,
                requerido_precio_3: parseInt(document.getElementById('prod-req3').value) || null
            };

            let p1Val = document.getElementById('prod-p1').value.replace('$', '');
            let p2Val = document.getElementById('prod-p2').value.replace('$', '');
            let p3Val = document.getElementById('prod-p3').value.replace('$', '');

            const dataPre = {
                id_producto_sku: sku,
                es_precio_fijo_bs: esBs,
                precio_fijo_bs: esBs ? (parseFloat(document.getElementById('prod-precio-bs').value) || 0) : 0,
                costo_actual: parseFloat(document.getElementById('prod-costo').value) || 0,
                precio_general_usd: esBs ? 0 : (parseFloat(document.getElementById('prod-precio-gen').value) || 0),
                precio_1_usd: esBs ? 0 : (parseFloat(p1Val) || 0),
                precio_2_usd: esBs ? 0 : (parseFloat(p2Val) || 0),
                precio_3_usd: esBs ? 0 : (parseFloat(p3Val) || 0)
            };

            try {
                const method = isEdit ? 'PATCH' : 'POST';
                const urlProd = isEdit ? `${SUPABASE_URL}/rest/v1/productos?id_producto_sku=eq.${sku}` : `${SUPABASE_URL}/rest/v1/productos`;
                const urlPre = isEdit ? `${SUPABASE_URL}/rest/v1/precios?id_producto_sku=eq.${sku}` : `${SUPABASE_URL}/rest/v1/precios`;

                await Promise.all([
                    fetch(urlProd, { method, headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}`, 'Content-Type': 'application/json' }, body: JSON.stringify(dataProd) }),
                    fetch(urlPre, { method, headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}`, 'Content-Type': 'application/json' }, body: JSON.stringify(dataPre) })
                ]);

                cerrarModalProducto();
                await cargarTodo();
            } catch(e) { 
                alert("Error al guardar. Verifica que el SKU no esté duplicado."); 
            } finally {
                btn.innerHTML = `<i class="fa-solid fa-save"></i> Guardar Registro`;
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
