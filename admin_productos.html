<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>P&P Admin | Inventario</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/fuse.js/dist/fuse.js"></script>
    <style>
        body { font-family: 'Inter', sans-serif; }
        .custom-scroll::-webkit-scrollbar { width: 5px; height: 5px; }
        .custom-scroll::-webkit-scrollbar-thumb { background-color: #cbd5e1; border-radius: 4px; }
        .btn-press:active { transform: scale(0.96); }
        .fade-in { animation: fadeIn 0.2s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        .btn-vista.active { background-color: #e2e8f0; color: #143B62; border-color: #cbd5e1; }
    </style>
    <script src="config.js"></script>
    <script>if (!localStorage.getItem('pyp_token_seguro')) window.location.href = 'login.html';</script>
</head>
<body class="bg-[#f4f6f8] flex h-screen overflow-hidden text-gray-800 relative">

    <script src="menu.js"></script>

    <main class="flex-1 flex flex-col h-screen overflow-hidden bg-[#f4f6f8] w-full z-10 relative">
        <header class="bg-white shadow-sm px-4 py-3 flex justify-between items-center z-10 shrink-0 border-b border-gray-200">
            <div class="flex items-center gap-3">
                <button onclick="toggleMobileMenu()" class="md:hidden text-gray-600 hover:text-[#143B62] text-xl transition px-2"><i class="fa-solid fa-bars"></i></button>
                <h1 class="text-base font-black text-[#143B62] uppercase flex items-center gap-2"><i class="fa-solid fa-boxes-stacked text-[#E67E22]"></i> Gestión de Inventario</h1>
            </div>
            <div class="text-[11px] font-semibold text-gray-500 bg-gray-100 px-3 py-1 rounded border border-gray-200 uppercase tracking-wide hidden md:block">
                <i class="fa-solid fa-user-tie text-[#143B62] mr-1"></i> <span id="nombre-usuario">Admin</span>
            </div>
        </header>

        <div class="flex-1 overflow-auto p-4 custom-scroll pb-24 md:pb-6 flex flex-col">
            
            <div class="bg-white p-3 border border-gray-200 rounded-xl shadow-sm flex flex-col md:flex-row justify-between items-center gap-3 shrink-0 mb-4">
                <div class="w-full md:w-2/3 flex flex-col sm:flex-row gap-2">
                    <div class="relative flex-1">
                        <i class="fa-solid fa-search absolute left-3 top-2.5 text-gray-400"></i>
                        <input type="text" id="buscador-inv" oninput="filtrarInventario()" placeholder="Buscar SKU o nombre..." class="w-full border border-gray-300 rounded-lg pl-9 pr-4 py-2 text-xs focus:outline-none focus:border-[#143B62] uppercase transition font-bold shadow-inner">
                    </div>
                    <select id="filtro-cat-inv" onchange="filtrarInventario()" class="w-full sm:w-1/3 border border-gray-300 rounded-lg px-3 py-2 text-xs font-bold text-[#143B62] outline-none shadow-sm bg-gray-50">
                        <option value="TODAS">TODAS LAS CATEGORÍAS</option>
                    </select>
                    <select id="filtro-estatus-inv" onchange="filtrarInventario()" class="w-full sm:w-1/4 border border-gray-300 rounded-lg px-3 py-2 text-xs font-bold text-[#143B62] outline-none shadow-sm bg-gray-50">
                        <option value="TODOS">ESTATUS</option>
                        <option value="ACTIVO">ACTIVOS</option>
                        <option value="INACTIVO">INACTIVOS</option>
                    </select>
                </div>
                
                <div class="flex gap-2 w-full md:w-auto justify-end">
                    <div class="flex bg-gray-50 rounded-md border border-gray-300 p-0.5 shadow-inner">
                        <button id="btn-vista-tabla" onclick="cambiarVista('tabla')" class="btn-vista active px-3 py-1 rounded text-gray-500 hover:text-[#143B62] transition text-sm"><i class="fa-solid fa-list"></i></button>
                        <button id="btn-vista-grid" onclick="cambiarVista('grid')" class="btn-vista px-3 py-1 rounded text-gray-500 hover:text-[#143B62] transition text-sm"><i class="fa-solid fa-border-all"></i></button>
                    </div>
                    <button onclick="abrirModalProducto()" class="bg-[#25D366] hover:bg-[#1ebd5c] text-white px-5 py-2 rounded-lg font-black text-xs shadow-sm transition btn-press uppercase tracking-wider flex justify-center items-center gap-2">
                        <i class="fa-solid fa-plus"></i> Nuevo Producto
                    </button>
                </div>
            </div>

            <div id="contenedor-inventario" class="flex-1 bg-transparent">
                <div class="p-10 text-center text-gray-400"><i class="fa-solid fa-spinner fa-spin text-4xl mb-3 block text-[#143B62]"></i><p class="font-bold uppercase tracking-widest text-xs">Cargando Base de Datos...</p></div>
            </div>
        </div>
    </main>

    <div id="modal-producto" class="fixed inset-0 bg-slate-900/80 backdrop-blur-sm z-[100] hidden flex items-center justify-center p-4 fade-in">
        <div class="bg-white rounded-xl shadow-2xl w-full max-w-5xl max-h-[95vh] flex flex-col overflow-hidden border border-gray-200 relative">
            <div class="bg-[#143B62] text-white px-5 py-3 flex justify-between items-center shrink-0">
                <h3 class="font-black text-sm tracking-widest uppercase flex items-center" id="modal-titulo"><i class="fa-solid fa-box mr-2 text-[#E67E22]"></i> FICHA DE PRODUCTO</h3>
                <button onclick="cerrarModalProducto()" class="text-gray-300 hover:text-white text-xl transition"><i class="fa-solid fa-times"></i></button>
            </div>
            
            <form id="form-producto" onsubmit="guardarProducto(event)" class="flex-1 overflow-y-auto custom-scroll p-5 bg-gray-50 flex flex-col gap-5">
                <input type="hidden" id="prod-modo-edicion" value="false">
                <input type="hidden" id="prod-sku-original" value="">
                
                <div class="grid grid-cols-1 lg:grid-cols-3 gap-5">
                    
                    <div class="lg:col-span-1 space-y-4">
                        <div class="bg-white p-4 rounded-xl border border-gray-200 shadow-sm">
                            <h4 class="text-[10px] font-black text-gray-800 uppercase border-b border-gray-100 pb-2 mb-3 tracking-wider">Imagen Principal</h4>
                            <div class="border-2 border-dashed border-gray-300 rounded-lg p-2 flex flex-col items-center justify-center bg-gray-50 h-40 mb-3 relative group">
                                <img id="preview-img-principal" src="" class="max-h-full max-w-full object-contain hidden z-10 bg-white">
                                <i class="fa-solid fa-image text-3xl text-gray-300" id="icon-img-principal"></i>
                            </div>
                            <input type="hidden" id="url-img-principal">
                            <input type="file" id="file-img-principal" accept="image/*" class="hidden" onchange="subirImagenUnica(event, 'url-img-principal', 'preview-img-principal', 'icon-img-principal')">
                            <button type="button" onclick="document.getElementById('file-img-principal').click()" class="w-full bg-blue-50 text-blue-700 font-bold py-2 rounded text-[10px] uppercase tracking-wider hover:bg-blue-100 transition border border-blue-200"><i class="fa-solid fa-cloud-arrow-up mr-1"></i> Subir Principal</button>
                        </div>

                        <div class="bg-white p-4 rounded-xl border border-gray-200 shadow-sm">
                            <h4 class="text-[10px] font-black text-[#E67E22] uppercase border-b border-gray-100 pb-2 mb-3 tracking-wider">Galería Adicional</h4>
                            <div id="contenedor-galeria" class="grid grid-cols-3 gap-2 mb-3"></div>
                            <input type="file" id="file-img-galeria" accept="image/*" multiple class="hidden" onchange="subirImagenesGaleria(event)">
                            <button type="button" onclick="document.getElementById('file-img-galeria').click()" class="w-full bg-orange-50 text-[#E67E22] font-bold py-2 rounded text-[10px] uppercase tracking-wider hover:bg-orange-100 transition border border-orange-200"><i class="fa-solid fa-images mr-1"></i> Añadir Fotos</button>
                        </div>
                    </div>

                    <div class="lg:col-span-2 space-y-4">
                        <div class="bg-white p-4 rounded-xl border border-gray-200 shadow-sm">
                            <h4 class="text-[10px] font-black text-[#143B62] uppercase border-b border-gray-100 pb-2 mb-3 tracking-wider">Información Básica</h4>
                            <div class="grid grid-cols-1 md:grid-cols-3 gap-3 mb-3">
                                <div><label class="block text-[9px] font-bold text-gray-500 uppercase mb-1">Código SKU *</label><input type="text" id="prod-sku" required class="w-full border border-gray-300 rounded px-3 py-1.5 text-xs font-black uppercase focus:border-[#143B62] outline-none bg-gray-50"></div>
                                <div class="md:col-span-2"><label class="block text-[9px] font-bold text-gray-500 uppercase mb-1">Nombre del Producto *</label><input type="text" id="prod-nombre" required class="w-full border border-gray-300 rounded px-3 py-1.5 text-xs font-bold uppercase focus:border-[#143B62] outline-none"></div>
                            </div>
                            <div class="grid grid-cols-1 md:grid-cols-3 gap-3 mb-3">
                                <div><label class="block text-[9px] font-bold text-gray-500 uppercase mb-1">Categoría</label><select id="prod-categoria" class="w-full border border-gray-300 rounded px-3 py-1.5 text-xs font-bold uppercase outline-none"><option value="">Seleccione</option></select></div>
                                <div><label class="block text-[9px] font-bold text-gray-500 uppercase mb-1">Marca</label><select id="prod-marca" class="w-full border border-gray-300 rounded px-3 py-1.5 text-xs font-bold uppercase outline-none"><option value="">Seleccione</option></select></div>
                                <div><label class="block text-[9px] font-bold text-gray-500 uppercase mb-1">Estatus</label><select id="prod-estatus" class="w-full border border-gray-300 rounded px-3 py-1.5 text-xs font-bold uppercase outline-none"><option value="ACTIVO">ACTIVO</option><option value="INACTIVO">INACTIVO</option></select></div>
                            </div>
                            <div><label class="block text-[9px] font-bold text-gray-500 uppercase mb-1">Descripción</label><textarea id="prod-desc" rows="2" class="w-full border border-gray-300 rounded px-3 py-2 text-xs font-medium focus:border-[#143B62] outline-none custom-scroll"></textarea></div>
                        </div>

                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <div class="bg-white p-4 rounded-xl border border-gray-200 shadow-sm">
                                <h4 class="text-[10px] font-black text-blue-600 uppercase border-b border-gray-100 pb-2 mb-3 tracking-wider">Inventario Actual</h4>
                                <div class="flex items-center gap-4">
                                    <div class="flex-1"><label class="block text-[9px] font-bold text-gray-500 uppercase mb-1">Stock Físico</label><input type="number" id="prod-stock" value="0" class="w-full border-2 border-gray-300 rounded px-3 py-2 text-lg font-black text-center text-[#143B62] outline-none bg-blue-50"></div>
                                    <div class="flex-1"><label class="block text-[9px] font-bold text-gray-500 uppercase mb-1">Alerta Stock Mínimo</label><input type="number" id="prod-stock-min" value="0" class="w-full border border-gray-300 rounded px-3 py-2 text-sm font-bold text-center outline-none"></div>
                                </div>
                            </div>

                            <div class="bg-emerald-50 p-4 rounded-xl border border-emerald-200 shadow-sm">
                                <h4 class="text-[10px] font-black text-emerald-700 uppercase border-b border-emerald-200 pb-2 mb-3 tracking-wider">Precio Venta (General)</h4>
                                <div class="flex items-center gap-3">
                                    <div class="flex-1 relative"><label class="block text-[9px] font-bold text-emerald-600 uppercase mb-1">Precio Divisas (USD) *</label><span class="absolute left-3 top-[26px] font-black text-gray-400">$</span><input type="number" id="prod-precio-usd" step="0.01" required class="w-full border-2 border-emerald-300 rounded pl-7 pr-3 py-2 text-lg font-black text-emerald-700 outline-none bg-white"></div>
                                    <div class="flex-1"><label class="block text-[9px] font-bold text-emerald-600 uppercase mb-1">¿Precio Fijo Bs?</label><select id="prod-fijo-bs" onchange="togglePrecioBsFijo()" class="w-full border-2 border-emerald-300 rounded px-2 py-2 text-xs font-bold outline-none bg-white"><option value="NO">NO</option><option value="SI">SÍ</option></select></div>
                                </div>
                                <div id="caja-precio-bs-fijo" class="mt-2 hidden"><label class="block text-[9px] font-bold text-emerald-600 uppercase mb-1">Monto Fijo Bs</label><input type="number" id="prod-precio-bs" step="0.01" class="w-full border-2 border-emerald-300 rounded px-3 py-1.5 text-sm font-black text-gray-800 outline-none bg-white"></div>
                            </div>
                        </div>
                    </div>
                </div>
            </form>

            <div class="bg-gray-50 border-t border-gray-200 px-5 py-3 flex justify-between items-center shrink-0">
                <button type="button" onclick="eliminarProducto()" id="btn-eliminar-prod" class="text-xs font-bold text-red-500 hover:text-red-700 uppercase tracking-wider hidden"><i class="fa-solid fa-trash mr-1"></i> Eliminar</button>
                <div class="flex gap-3 ml-auto">
                    <button type="button" onclick="cerrarModalProducto()" class="px-6 py-2.5 bg-white border border-gray-300 text-gray-700 font-bold rounded-lg text-xs shadow-sm hover:bg-gray-100 transition btn-press uppercase tracking-wider">Cancelar</button>
                    <button type="submit" form="form-producto" id="btn-guardar-prod" class="px-8 py-2.5 bg-[#143B62] text-white font-black rounded-lg text-xs shadow-md hover:bg-[#0f2d4a] transition uppercase tracking-widest btn-press"><i class="fa-solid fa-save mr-2"></i> Guardar Ficha</button>
                </div>
            </div>
        </div>
    </div>

    <div id="loading-overlay" class="fixed inset-0 bg-white/90 z-[999] hidden flex-col items-center justify-center p-6 text-center backdrop-blur-sm">
        <i id="loading-icon" class="fa-solid fa-cloud-arrow-up text-5xl text-[#E67E22] mb-4 animate-bounce"></i>
        <h2 id="loading-text" class="text-xl font-black text-[#143B62] uppercase mb-2 tracking-widest">Sincronizando...</h2>
        <p class="text-xs text-gray-500 font-bold">Por favor no cierres esta ventana</p>
    </div>

    <script>
        const TOKEN_JWT = localStorage.getItem('pyp_token_seguro');
        let dbInventario = [], fuseInventario = null, empresaActual = null;
        let arrayGaleriaLocal = []; 
        let vistaActual = localStorage.getItem('pyp_vista_inventario') || 'tabla';

        window.onload = async () => {
            if(localStorage.getItem('pyp_usuario_nombre') && document.getElementById('nombre-usuario')) {
                document.getElementById('nombre-usuario').innerText = localStorage.getItem('pyp_usuario_nombre').split(' ')[0];
            }
            actualizarUIBotonesVista();
            await cargarBaseDatos();
        };

        async function cargarBaseDatos() {
            try {
                const resUser = await fetch(`${SUPABASE_URL}/rest/v1/usuarios?select=id_empresa&limit=1`, { headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${TOKEN_JWT}` } });
                empresaActual = (await resUser.json())[0].id_empresa;

                const [resProd, resPre, resPar] = await Promise.all([
                    fetch(`${SUPABASE_URL}/rest/v1/productos?select=*&order=fecha_creacion.desc`, { headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${TOKEN_JWT}` } }),
                    fetch(`${SUPABASE_URL}/rest/v1/precios?select=*`, { headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${TOKEN_JWT}` } }),
                    fetch(`${SUPABASE_URL}/rest/v1/parametros_inventario?select=*&estatus=eq.ACTIVO`, { headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${TOKEN_JWT}` } })
                ]);

                const dataProd = await resProd.json();
                const dataPre = await resPre.json();
                
                dbInventario = dataProd.map(p => {
                    const pre = dataPre.find(pr => pr.id_producto_sku === p.id_producto_sku) || {};
                    return { ...p, pre: pre };
                });

                fuseInventario = new Fuse(dbInventario, { keys: ['id_producto_sku', 'nombre'], threshold: 0.2 });

                const pars = await resPar.json();
                
                // Llenar Filtro Top
                const catArr = [...new Set(dbInventario.map(p => p.categoria_del_producto))];
                let fCatHtml = '<option value="TODAS">TODAS LAS CATEGORÍAS</option>';
                catArr.forEach(c => { if(c) fCatHtml += `<option value="${c}">${c}</option>` });
                document.getElementById('filtro-cat-inv').innerHTML = fCatHtml;

                // Llenar Selects Modal
                llenarSelect(document.getElementById('prod-categoria'), pars.filter(p => p.grupo === 'CATEGORIA'));
                llenarSelect(document.getElementById('prod-marca'), pars.filter(p => p.grupo === 'MARCA'));

                renderizarInventario();
            } catch(e) { alert("Error cargando inventario"); }
        }

        function llenarSelect(element, array) {
            let html = '<option value="">Seleccione</option>';
            array.forEach(item => html += `<option value="${item.valor}">${item.valor}</option>`);
            element.innerHTML = html;
        }

        function cambiarVista(v) { vistaActual = v; localStorage.setItem('pyp_vista_inventario', v); actualizarUIBotonesVista(); renderizarInventario(); }
        function actualizarUIBotonesVista() { 
            document.getElementById('btn-vista-tabla').classList.toggle('active', vistaActual === 'tabla'); 
            document.getElementById('btn-vista-grid').classList.toggle('active', vistaActual === 'grid'); 
        }

        function filtrarInventario() { renderizarInventario(); }

        function renderizarInventario() {
            const query = document.getElementById('buscador-inv').value.trim();
            const cat = document.getElementById('filtro-cat-inv').value;
            const estatus = document.getElementById('filtro-estatus-inv').value;
            
            let data = dbInventario;
            if (query !== '') data = fuseInventario.search(query).map(r => r.item);
            if (cat !== 'TODAS') data = data.filter(p => p.categoria_del_producto === cat);
            if (estatus !== 'TODOS') data = data.filter(p => p.estado_producto === estatus);

            const c = document.getElementById('contenedor-inventario');
            if(data.length === 0) { c.innerHTML = `<div class="p-10 text-center text-gray-400 font-bold uppercase"><i class="fa-solid fa-box-open text-4xl mb-3 block opacity-50"></i> Sin Resultados</div>`; return; }

            if(vistaActual === 'tabla') {
                let html = `<div class="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden"><div class="overflow-x-auto custom-scroll"><table class="w-full text-left text-xs whitespace-nowrap"><thead class="bg-[#143B62] text-white text-[10px] uppercase tracking-wider sticky top-0"><tr><th class="py-3 px-4 w-12 text-center">Img</th><th class="py-3 px-4">SKU</th><th class="py-3 px-4">Producto</th><th class="py-3 px-4 text-center">Categoría</th><th class="py-3 px-4 text-center">Stock</th><th class="py-3 px-4 text-right">Precio (USD)</th><th class="py-3 px-4 text-center">Estatus</th><th class="py-3 px-4 text-center">Acción</th></tr></thead><tbody class="divide-y divide-gray-100">`;
                
                data.slice(0, 150).forEach(p => {
                    const img = p.imagen_principal || 'https://via.placeholder.com/150?text=IMG';
                    const pUsd = p.pre.precio_general_usd || 0;
                    const pStr = encodeURIComponent(JSON.stringify(p));
                    const bEst = p.estado_producto === 'ACTIVO' ? `<span class="bg-emerald-50 text-emerald-600 px-2 py-0.5 rounded text-[9px] font-black border border-emerald-200">ACTIVO</span>` : `<span class="bg-red-50 text-red-600 px-2 py-0.5 rounded text-[9px] font-black border border-red-200">INACTIVO</span>`;
                    const bStk = p.stock_actual <= p.stock_minimo ? `<span class="text-red-500 font-black"><i class="fa-solid fa-triangle-exclamation"></i> ${p.stock_actual}</span>` : `<span class="text-gray-700 font-bold">${p.stock_actual}</span>`;

                    html += `<tr class="hover:bg-gray-50 transition border-b border-gray-50">
                        <td class="py-2 px-4 text-center"><img src="${img}" class="w-8 h-8 rounded object-contain border bg-white"></td>
                        <td class="py-2 px-4 font-mono font-bold text-gray-500">${p.id_producto_sku}</td>
                        <td class="py-2 px-4 font-bold text-[#143B62] truncate max-w-[250px]">${p.nombre}</td>
                        <td class="py-2 px-4 text-center"><span class="text-[9px] bg-gray-100 text-gray-600 px-2 py-0.5 rounded uppercase font-bold">${p.categoria_del_producto || '-'}</span></td>
                        <td class="py-2 px-4 text-center bg-gray-50/50">${bStk}</td>
                        <td class="py-2 px-4 text-right font-black text-[#25D366] text-sm">$${pUsd.toFixed(2)}</td>
                        <td class="py-2 px-4 text-center">${bEst}</td>
                        <td class="py-2 px-4 text-center"><button onclick="abrirModalProducto('${pStr}')" class="text-blue-500 hover:bg-blue-50 px-2 py-1.5 rounded transition shadow-sm border border-transparent hover:border-blue-200"><i class="fa-solid fa-pen-to-square"></i></button></td>
                    </tr>`;
                });
                html += `</tbody></table></div></div>`; c.innerHTML = html;
            } else {
                let html = `<div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 xl:grid-cols-6 gap-4 pb-10">`;
                data.slice(0, 150).forEach(p => {
                    const img = p.imagen_principal || 'https://via.placeholder.com/300?text=P%26P';
                    const pUsd = p.pre.precio_general_usd || 0;
                    const pStr = encodeURIComponent(JSON.stringify(p));
                    const bEst = p.estado_producto === 'ACTIVO' ? `<span class="bg-emerald-100 text-emerald-700 px-1.5 py-0.5 rounded text-[8px] font-black uppercase">Activo</span>` : `<span class="bg-red-100 text-red-700 px-1.5 py-0.5 rounded text-[8px] font-black uppercase">Inactivo</span>`;
                    const bStk = p.stock_actual <= p.stock_minimo ? `<span class="text-red-600 font-black"><i class="fa-solid fa-triangle-exclamation"></i> ${p.stock_actual}</span>` : `<span class="text-emerald-600 font-black">${p.stock_actual}</span>`;

                    html += `
                    <div class="bg-white border border-gray-200 rounded-xl p-3 flex flex-col shadow-sm hover:shadow-lg transition cursor-pointer fade-in group" onclick="abrirModalProducto('${pStr}')">
                        <div class="flex justify-between items-start mb-2">
                            <span class="text-[9px] font-mono text-gray-400 bg-gray-50 px-1.5 rounded border border-gray-100">${p.id_producto_sku}</span>
                            ${bEst}
                        </div>
                        <div class="h-28 w-full mb-3 bg-white flex items-center justify-center rounded">
                            <img src="${img}" class="max-h-full max-w-full object-contain group-hover:scale-105 transition-transform duration-300">
                        </div>
                        <h3 class="text-[10px] font-black text-[#143B62] leading-tight line-clamp-2 mb-2 uppercase">${p.nombre}</h3>
                        <div class="mt-auto border-t border-gray-50 pt-2 flex justify-between items-end">
                            <div><p class="text-[8px] text-gray-400 font-bold uppercase mb-0.5">Precio (USD)</p><p class="text-xs font-black text-[#25D366]">$${pUsd.toFixed(2)}</p></div>
                            <div class="text-right"><p class="text-[8px] text-gray-400 font-bold uppercase mb-0.5">Stock</p><p class="text-xs bg-gray-50 px-2 py-0.5 rounded border border-gray-100">${bStk}</p></div>
                        </div>
                    </div>`;
                });
                html += `</div>`; c.innerHTML = html;
            }
        }

        // --- SISTEMA DE IMÁGENES ---
        function actualizarPreview(url, previewId, iconId) {
            const preview = document.getElementById(previewId); const icon = document.getElementById(iconId);
            if(url) { preview.src = url; preview.classList.remove('hidden'); icon.classList.add('hidden'); } 
            else { preview.classList.add('hidden'); icon.classList.remove('hidden'); }
        }

        async function comprimirYSubir(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader(); reader.readAsDataURL(file);
                reader.onload = e => {
                    const img = new Image(); img.src = e.target.result;
                    img.onload = async () => {
                        const canvas = document.createElement('canvas'); const ctx = canvas.getContext('2d');
                        let w = img.width, h = img.height; const max = 1000;
                        if (w > h && w > max) { h *= max / w; w = max; } else if (h > max) { w *= max / h; h = max; }
                        canvas.width = w; canvas.height = h; ctx.drawImage(img, 0, 0, w, h);
                        canvas.toBlob(async (blob) => {
                            const ext = file.name.split('.').pop();
                            const fileName = `img_${Date.now()}_${Math.floor(Math.random()*1000)}.${ext}`;
                            try {
                                const formData = new FormData(); formData.append('file', blob, fileName);
                                const res = await fetch(`${SUPABASE_URL}/storage/v1/object/inventario/${fileName}`, { method: 'POST', headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${TOKEN_JWT}` }, body: formData });
                                if(!res.ok) throw new Error("Fallo upload");
                                resolve(`${SUPABASE_URL}/storage/v1/object/public/inventario/${fileName}`);
                            } catch(err) { reject(err); }
                        }, file.type, 0.8);
                    };
                };
            });
        }

        async function subirImagenUnica(event, urlInputId, previewId, iconId) {
            const file = event.target.files[0]; if(!file) return;
            document.getElementById('loading-overlay').classList.remove('hidden'); document.getElementById('loading-overlay').classList.add('flex');
            try {
                const url = await comprimirYSubir(file);
                document.getElementById(urlInputId).value = url;
                actualizarPreview(url, previewId, iconId);
            } catch(e) { alert("Error subiendo imagen"); } 
            finally { document.getElementById('loading-overlay').classList.add('hidden'); document.getElementById('loading-overlay').classList.remove('flex'); }
        }

        async function subirImagenesGaleria(event) {
            const files = event.target.files; if(files.length === 0) return;
            document.getElementById('loading-overlay').classList.remove('hidden'); document.getElementById('loading-overlay').classList.add('flex');
            try {
                for(let i = 0; i < files.length; i++) {
                    const url = await comprimirYSubir(files[i]);
                    arrayGaleriaLocal.push(url);
                }
                renderizarGaleriaLocal();
            } catch(e) { alert("Error subiendo a la galería"); } 
            finally { document.getElementById('loading-overlay').classList.add('hidden'); document.getElementById('loading-overlay').classList.remove('flex'); }
        }

        function renderizarGaleriaLocal() {
            const container = document.getElementById('contenedor-galeria');
            container.innerHTML = '';
            arrayGaleriaLocal.forEach((url, index) => {
                container.innerHTML += `
                <div class="relative group h-20 bg-white border border-gray-200 rounded flex items-center justify-center fade-in">
                    <img src="${url}" class="max-h-full max-w-full object-contain p-1">
                    <button type="button" onclick="eliminarFotoGaleria(${index})" class="absolute -top-2 -right-2 bg-red-500 text-white w-5 h-5 rounded-full text-[10px] font-bold shadow-md hover:bg-red-600 hover:scale-110 transition opacity-0 group-hover:opacity-100 z-10"><i class="fa-solid fa-times"></i></button>
                </div>`;
            });
        }

        function eliminarFotoGaleria(index) {
            arrayGaleriaLocal.splice(index, 1);
            renderizarGaleriaLocal();
        }

        // --- FORMULARIO ---
        function togglePrecioBsFijo() {
            const val = document.getElementById('prod-fijo-bs').value;
            document.getElementById('caja-precio-bs-fijo').classList.toggle('hidden', val === 'NO');
        }

        function abrirModalProducto(pStr = null) {
            document.getElementById('form-producto').reset();
            arrayGaleriaLocal = []; 
            renderizarGaleriaLocal();
            document.getElementById('url-img-principal').value = '';
            actualizarPreview('', 'preview-img-principal', 'icon-img-principal');
            document.getElementById('btn-eliminar-prod').classList.add('hidden');
            togglePrecioBsFijo();

            if (pStr) {
                const p = JSON.parse(decodeURIComponent(pStr));
                document.getElementById('modal-titulo').innerHTML = `<i class="fa-solid fa-pen-to-square mr-2 text-[#E67E22]"></i> EDITAR PRODUCTO`;
                document.getElementById('prod-modo-edicion').value = "true";
                document.getElementById('prod-sku-original').value = p.id_producto_sku;
                
                document.getElementById('prod-sku').value = p.id_producto_sku;
                document.getElementById('prod-nombre').value = p.nombre || '';
                document.getElementById('prod-categoria').value = p.categoria_del_producto || '';
                document.getElementById('prod-marca').value = p.marca || '';
                document.getElementById('prod-estatus').value = p.estado_producto || 'ACTIVO';
                document.getElementById('prod-desc').value = p.descripcion || '';
                document.getElementById('prod-stock').value = p.stock_actual || 0;
                document.getElementById('prod-stock-min').value = p.stock_minimo || 0;
                
                document.getElementById('url-img-principal').value = p.imagen_principal || '';
                actualizarPreview(p.imagen_principal, 'preview-img-principal', 'icon-img-principal');
                
                if(p.galeria_imagenes) {
                    try {
                        let parsed = typeof p.galeria_imagenes === 'string' ? JSON.parse(p.galeria_imagenes) : p.galeria_imagenes;
                        if(Array.isArray(parsed)) arrayGaleriaLocal = parsed;
                    } catch(e) {}
                }
                renderizarGaleriaLocal();

                document.getElementById('prod-precio-usd').value = p.pre.precio_general_usd || 0;
                document.getElementById('prod-fijo-bs').value = p.pre.es_precio_fijo_bs ? 'SI' : 'NO';
                document.getElementById('prod-precio-bs').value = p.pre.precio_fijo_bs || '';
                togglePrecioBsFijo();
                
                document.getElementById('prod-sku').readOnly = true; document.getElementById('prod-sku').classList.add('bg-gray-200');
                document.getElementById('btn-eliminar-prod').classList.remove('hidden');
            } else {
                document.getElementById('modal-titulo').innerHTML = `<i class="fa-solid fa-plus mr-2 text-[#25D366]"></i> NUEVO PRODUCTO`;
                document.getElementById('prod-modo-edicion').value = "false";
                document.getElementById('prod-sku').readOnly = false; document.getElementById('prod-sku').classList.remove('bg-gray-200');
            }
            document.getElementById('modal-producto').classList.remove('hidden'); document.getElementById('modal-producto').classList.add('flex');
        }

        function cerrarModalProducto() { document.getElementById('modal-producto').classList.add('hidden'); }

        async function guardarProducto(e) {
            e.preventDefault();
            const btn = document.getElementById('btn-guardar-prod'); btn.innerHTML = `Guardando...`; btn.disabled = true;
            document.getElementById('loading-overlay').classList.remove('hidden'); document.getElementById('loading-overlay').classList.add('flex');

            try {
                const isEdit = document.getElementById('prod-modo-edicion').value === "true";
                const sku = document.getElementById('prod-sku').value.trim().toUpperCase();
                
                const pProd = {
                    id_empresa: empresaActual,
                    id_producto_sku: sku,
                    nombre: document.getElementById('prod-nombre').value.trim().toUpperCase(),
                    descripcion: document.getElementById('prod-desc').value.trim(),
                    categoria_del_producto: document.getElementById('prod-categoria').value,
                    marca: document.getElementById('prod-marca').value,
                    stock_actual: parseInt(document.getElementById('prod-stock').value) || 0,
                    stock_minimo: parseInt(document.getElementById('prod-stock-min').value) || 0,
                    imagen_principal: document.getElementById('url-img-principal').value || null,
                    galeria_imagenes: JSON.stringify(arrayGaleriaLocal),
                    estado_producto: document.getElementById('prod-estatus').value
                };

                const isBsFijo = document.getElementById('prod-fijo-bs').value === 'SI';
                const pPre = {
                    id_empresa: empresaActual,
                    id_producto_sku: sku,
                    precio_general_usd: parseFloat(document.getElementById('prod-precio-usd').value) || 0,
                    es_precio_fijo_bs: isBsFijo,
                    precio_fijo_bs: isBsFijo ? (parseFloat(document.getElementById('prod-precio-bs').value) || 0) : 0
                };

                const uProd = isEdit ? `${SUPABASE_URL}/rest/v1/productos?id_producto_sku=eq.${document.getElementById('prod-sku-original').value}` : `${SUPABASE_URL}/rest/v1/productos`;
                const uPre = isEdit ? `${SUPABASE_URL}/rest/v1/precios?id_producto_sku=eq.${document.getElementById('prod-sku-original').value}` : `${SUPABASE_URL}/rest/v1/precios`;
                const mtd = isEdit ? 'PATCH' : 'POST';

                const rProd = await fetch(uProd, { method: mtd, headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${TOKEN_JWT}`, 'Content-Type': 'application/json' }, body: JSON.stringify(pProd) });
                if(!rProd.ok) throw new Error("SKU duplicado o error");
                await fetch(uPre, { method: mtd, headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${TOKEN_JWT}`, 'Content-Type': 'application/json' }, body: JSON.stringify(pPre) });

                cerrarModalProducto(); await cargarBaseDatos();
            } catch(e) { alert("Error al guardar: " + e.message); } 
            finally { btn.innerHTML = `<i class="fa-solid fa-save mr-2"></i> Guardar Ficha`; btn.disabled = false; document.getElementById('loading-overlay').classList.add('hidden'); }
        }

        async function eliminarProducto() {
            if(!confirm("¿Desea ELIMINAR este producto y todos sus precios/historial?")) return;
            document.getElementById('loading-overlay').classList.remove('hidden'); document.getElementById('loading-overlay').classList.add('flex');
            try {
                const sku = document.getElementById('prod-sku-original').value;
                await fetch(`${SUPABASE_URL}/rest/v1/productos?id_producto_sku=eq.${sku}`, { method: 'DELETE', headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${TOKEN_JWT}` } });
                cerrarModalProducto(); await cargarBaseDatos();
            } catch(e) { alert("No se pudo eliminar. Puede tener facturas asociadas."); }
            finally { document.getElementById('loading-overlay').classList.add('hidden'); }
        }
    </script>
</body>
