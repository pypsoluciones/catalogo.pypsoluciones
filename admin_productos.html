<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>P&P Admin | Inventario</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/fuse.js/dist/fuse.js"></script>
    <style>
        body { font-family: 'Inter', sans-serif; }
        .custom-scroll::-webkit-scrollbar { width: 5px; height: 5px; }
        .custom-scroll::-webkit-scrollbar-thumb { background-color: #cbd5e1; border-radius: 4px; }
        .btn-press:active { transform: scale(0.96); }
        .fade-in { animation: fadeIn 0.2s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        .btn-vista.active { background-color: #e2e8f0; color: #143B62; border-color: #cbd5e1; }
        input[type=number]::-webkit-inner-spin-button, input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
    </style>
    <script src="config.js"></script>
    <script>if (!localStorage.getItem('pyp_token_seguro')) window.location.href = 'login.html';</script>
</head>
<body class="bg-[#f4f6f8] flex h-screen overflow-hidden text-gray-800 relative">

    <script src="menu.js"></script>

    <main class="flex-1 flex flex-col h-screen overflow-hidden bg-[#f4f6f8] w-full z-10 relative">
        <header class="bg-white shadow-sm px-4 py-3 flex justify-between items-center z-10 shrink-0 border-b border-gray-200">
            <div class="flex items-center gap-3">
                <button onclick="toggleMobileMenu()" class="md:hidden text-gray-600 hover:text-[#143B62] text-xl transition px-2"><i class="fa-solid fa-bars"></i></button>
                <h1 class="text-base font-black text-[#143B62] uppercase flex items-center gap-2"><i class="fa-solid fa-boxes-stacked text-[#E67E22]"></i> Gestión de Inventario</h1>
            </div>
            <div class="text-[11px] font-semibold text-gray-500 bg-gray-100 px-3 py-1 rounded border border-gray-200 uppercase tracking-wide hidden md:block">
                <i class="fa-solid fa-user-tie text-[#143B62] mr-1"></i> <span id="nombre-usuario">Admin</span>
            </div>
        </header>

        <div class="flex-1 overflow-auto p-4 custom-scroll pb-24 md:pb-6 flex flex-col">
            
            <div class="bg-white p-3 border border-gray-200 rounded-xl shadow-sm flex flex-col gap-3 shrink-0 mb-4">
                <div class="flex flex-col xl:flex-row justify-between items-center gap-3 w-full">
                    <div class="w-full xl:w-4/5 grid grid-cols-1 md:grid-cols-5 gap-2">
                        <div class="relative md:col-span-2">
                            <i class="fa-solid fa-search absolute left-3 top-2.5 text-gray-400"></i>
                            <input type="text" id="buscador-inv" oninput="filtrarInventario()" placeholder="Buscar SKU, Barras o nombre..." class="w-full border border-gray-300 rounded-lg pl-9 pr-4 py-1.5 text-xs focus:outline-none focus:border-[#143B62] uppercase transition font-bold shadow-inner">
                        </div>
                        <select id="filtro-cat-inv" onchange="filtrarInventario()" class="w-full border border-gray-300 rounded-lg px-2 py-1.5 text-[10px] font-bold text-[#143B62] outline-none bg-gray-50 uppercase"><option value="TODAS">CATEGORÍA: TODAS</option></select>
                        <select id="filtro-marca-inv" onchange="filtrarInventario()" class="w-full border border-gray-300 rounded-lg px-2 py-1.5 text-[10px] font-bold text-[#143B62] outline-none bg-gray-50 uppercase"><option value="TODAS">MARCA: TODAS</option></select>
                        <select id="filtro-estatus-inv" onchange="filtrarInventario()" class="w-full border border-gray-300 rounded-lg px-2 py-1.5 text-[10px] font-bold text-[#143B62] outline-none bg-gray-50 uppercase"><option value="TODOS">ESTATUS: TODOS</option><option value="ACTIVO">SOLO ACTIVOS</option><option value="INACTIVO">SOLO INACTIVOS</option></select>
                    </div>
                    
                    <div class="flex gap-2 w-full xl:w-auto justify-end shrink-0">
                        <select id="filtro-stock-inv" onchange="filtrarInventario()" class="border border-red-300 text-red-700 rounded-lg px-2 py-1.5 text-[10px] font-bold outline-none bg-red-50 uppercase hidden md:block">
                            <option value="TODOS">STOCK: TODOS</option><option value="CRITICO">STOCK CRÍTICO</option><option value="DISPONIBLE">CON DISPONIBILIDAD</option>
                        </select>
                        <div class="flex bg-gray-50 rounded-lg border border-gray-300 p-0.5 shadow-inner">
                            <button id="btn-vista-tabla" onclick="cambiarVista('tabla')" class="btn-vista active px-3 py-1 rounded text-gray-500 hover:text-[#143B62] transition text-sm"><i class="fa-solid fa-list"></i></button>
                            <button id="btn-vista-grid" onclick="cambiarVista('grid')" class="btn-vista px-3 py-1 rounded text-gray-500 hover:text-[#143B62] transition text-sm"><i class="fa-solid fa-border-all"></i></button>
                        </div>
                        <button onclick="abrirModalProducto()" class="bg-[#25D366] hover:bg-[#1ebd5c] text-white px-4 py-1.5 rounded-lg font-black text-[11px] shadow-sm transition btn-press uppercase tracking-wider flex justify-center items-center gap-2 whitespace-nowrap">
                            <i class="fa-solid fa-plus"></i> Nuevo
                        </button>
                    </div>
                </div>
            </div>

            <div id="contenedor-inventario" class="flex-1 bg-transparent">
                <div class="p-10 text-center text-gray-400" id="loading-main-indicator"><i class="fa-solid fa-spinner fa-spin text-4xl mb-3 block text-[#143B62]"></i><p class="font-bold uppercase tracking-widest text-xs">Cargando Base de Datos...</p></div>
            </div>
        </div>
    </main>

    <div id="modal-producto" class="fixed inset-0 bg-slate-900/80 backdrop-blur-sm z-[100] hidden flex items-center justify-center p-4 fade-in">
        <div class="bg-white rounded-xl shadow-2xl w-full max-w-6xl max-h-[95vh] flex flex-col overflow-hidden border border-gray-200 relative">
            <div class="bg-[#143B62] text-white px-5 py-3 flex justify-between items-center shrink-0">
                <h3 class="font-black text-sm tracking-widest uppercase flex items-center" id="modal-titulo"><i class="fa-solid fa-box mr-2 text-[#E67E22]"></i> FICHA DE PRODUCTO</h3>
                <button onclick="cerrarModalProducto()" class="text-gray-300 hover:text-white text-xl transition"><i class="fa-solid fa-times"></i></button>
            </div>
            
            <form id="form-producto" onsubmit="guardarProducto(event)" class="flex-1 overflow-y-auto custom-scroll p-4 bg-gray-50 flex flex-col gap-4">
                <input type="hidden" id="prod-modo-edicion" value="false">
                <input type="hidden" id="prod-sku-original" value="">
                
                <div class="grid grid-cols-1 lg:grid-cols-4 gap-4">
                    
                    <div class="lg:col-span-1 space-y-4">
                        <div class="bg-white p-3 rounded-lg border border-gray-200 shadow-sm">
                            <h4 class="text-[10px] font-black text-gray-800 uppercase border-b border-gray-100 pb-2 mb-2 tracking-wider">Imagen Principal</h4>
                            <div class="border-2 border-dashed border-gray-300 rounded p-2 flex flex-col items-center justify-center bg-gray-50 h-32 mb-2 relative group">
                                <img id="preview-img-principal" src="" class="max-h-full max-w-full object-contain hidden z-10 bg-white">
                                <i class="fa-solid fa-image text-3xl text-gray-300" id="icon-img-principal"></i>
                            </div>
                            <input type="hidden" id="url-img-principal">
                            <input type="file" id="file-img-principal" accept="image/*" class="hidden" onchange="subirImagenUnica(event, 'url-img-principal', 'preview-img-principal', 'icon-img-principal')">
                            <button type="button" onclick="document.getElementById('file-img-principal').click()" class="w-full bg-blue-50 text-blue-700 font-bold py-1.5 rounded text-[10px] uppercase tracking-wider hover:bg-blue-100 transition border border-blue-200"><i class="fa-solid fa-cloud-arrow-up mr-1"></i> Subir Principal</button>
                        </div>

                        <div class="bg-white p-3 rounded-lg border border-gray-200 shadow-sm">
                            <h4 class="text-[10px] font-black text-[#E67E22] uppercase border-b border-gray-100 pb-2 mb-2 tracking-wider">Galería Adicional</h4>
                            <div id="contenedor-galeria" class="grid grid-cols-3 gap-1 mb-2"></div>
                            <input type="file" id="file-img-galeria" accept="image/*" multiple class="hidden" onchange="subirImagenesGaleria(event)">
                            <button type="button" onclick="document.getElementById('file-img-galeria').click()" class="w-full bg-orange-50 text-[#E67E22] font-bold py-1.5 rounded text-[10px] uppercase tracking-wider hover:bg-orange-100 transition border border-orange-200"><i class="fa-solid fa-images mr-1"></i> Añadir Fotos</button>
                        </div>

                        <div class="bg-white p-3 rounded-lg border border-gray-200 shadow-sm">
                            <h4 class="text-[10px] font-black text-red-600 uppercase border-b border-gray-100 pb-2 mb-2 tracking-wider"><i class="fa-brands fa-youtube"></i> Video Promocional</h4>
                            <input type="url" id="prod-video" placeholder="Link de YouTube..." class="w-full border border-gray-300 rounded px-2 py-1.5 text-[10px] outline-none focus:border-red-400">
                        </div>
                    </div>

                    <div class="lg:col-span-3 space-y-4">
                        
                        <div class="bg-white p-4 rounded-lg border border-gray-200 shadow-sm">
                            <h4 class="text-[10px] font-black text-[#143B62] uppercase border-b border-gray-100 pb-2 mb-3 tracking-wider">Identidad del Producto</h4>
                            <div class="grid grid-cols-1 md:grid-cols-4 gap-3 mb-3">
                                <div><label class="block text-[9px] font-bold text-gray-500 uppercase mb-1">Código SKU *</label><input type="text" id="prod-sku" required class="w-full border border-gray-300 rounded px-2 py-1.5 text-xs font-black uppercase focus:border-[#143B62] outline-none"></div>
                                <div><label class="block text-[9px] font-bold text-gray-500 uppercase mb-1">Código Barra (Números)</label><input type="number" id="prod-cod-barra" class="w-full border border-gray-300 rounded px-2 py-1.5 text-xs font-mono uppercase focus:border-[#143B62] outline-none"></div>
                                <div class="md:col-span-2"><label class="block text-[9px] font-bold text-gray-500 uppercase mb-1">Nombre / Descripción *</label><input type="text" id="prod-nombre" required class="w-full border border-gray-300 rounded px-2 py-1.5 text-xs font-bold uppercase focus:border-[#143B62] outline-none"></div>
                            </div>
                            <div class="grid grid-cols-2 md:grid-cols-5 gap-3">
                                <div><label class="block text-[9px] font-bold text-gray-500 uppercase mb-1">Tipo Producto</label><select id="prod-tipo" class="w-full border border-gray-300 rounded px-2 py-1.5 text-[10px] font-bold uppercase outline-none"></select></div>
                                <div><label class="block text-[9px] font-bold text-gray-500 uppercase mb-1">Categoría</label><select id="prod-categoria" class="w-full border border-gray-300 rounded px-2 py-1.5 text-[10px] font-bold uppercase outline-none"></select></div>
                                <div><label class="block text-[9px] font-bold text-gray-500 uppercase mb-1">Cat. Venta</label><select id="prod-cat-venta" class="w-full border border-gray-300 rounded px-2 py-1.5 text-[10px] font-bold uppercase outline-none"></select></div>
                                <div><label class="block text-[9px] font-bold text-gray-500 uppercase mb-1">Marca</label><select id="prod-marca" class="w-full border border-gray-300 rounded px-2 py-1.5 text-[10px] font-bold uppercase outline-none"></select></div>
                                <div><label class="block text-[9px] font-bold text-gray-500 uppercase mb-1">Condición</label><select id="prod-condicion" class="w-full border border-gray-300 rounded px-2 py-1.5 text-[10px] font-bold uppercase outline-none"></select></div>
                            </div>
                        </div>

                        <div class="grid grid-cols-1 lg:grid-cols-2 gap-4">
                            <div class="bg-white p-4 rounded-lg border border-gray-200 shadow-sm">
                                <h4 class="text-[10px] font-black text-blue-600 uppercase border-b border-gray-100 pb-2 mb-3 tracking-wider">Atributos y Logística</h4>
                                <div class="grid grid-cols-3 gap-2 mb-3">
                                    <div><label class="block text-[9px] font-bold text-gray-500 uppercase mb-1">Talla</label><select id="prod-talla" class="w-full border border-gray-300 rounded px-2 py-1.5 text-[10px] font-bold uppercase outline-none"></select></div>
                                    <div><label class="block text-[9px] font-bold text-gray-500 uppercase mb-1">Color</label><select id="prod-color" class="w-full border border-gray-300 rounded px-2 py-1.5 text-[10px] font-bold uppercase outline-none"></select></div>
                                    <div><label class="block text-[9px] font-bold text-gray-500 uppercase mb-1">Unidad</label><select id="prod-unidad" class="w-full border border-gray-300 rounded px-2 py-1.5 text-[10px] font-bold uppercase outline-none"></select></div>
                                </div>
                                <div class="grid grid-cols-3 gap-2">
                                    <div><label class="block text-[9px] font-bold text-gray-500 uppercase mb-1 text-blue-600">Stock Actual</label><input type="number" id="prod-stock" value="0" class="w-full border border-gray-300 bg-blue-50 rounded px-2 py-1.5 text-xs font-black text-center outline-none"></div>
                                    <div><label class="block text-[9px] font-bold text-gray-500 uppercase mb-1 text-red-500">Min. Alerta</label><input type="number" id="prod-stock-min" value="0" class="w-full border border-gray-300 bg-red-50 rounded px-2 py-1.5 text-xs font-bold text-center outline-none"></div>
                                    <div><label class="block text-[9px] font-bold text-gray-500 uppercase mb-1">P. Negativo</label><select id="prod-negativo" class="w-full border border-gray-300 rounded px-2 py-1.5 text-[10px] font-bold uppercase outline-none"><option value="FALSE">NO</option><option value="TRUE">SÍ</option></select></div>
                                </div>
                            </div>

                            <div class="bg-white p-4 rounded-lg border border-gray-200 shadow-sm">
                                <h4 class="text-[10px] font-black text-gray-600 uppercase border-b border-gray-100 pb-2 mb-3 tracking-wider">Reglas Sistema</h4>
                                <div class="grid grid-cols-2 gap-3 mb-3">
                                    <div><label class="block text-[9px] font-bold text-gray-500 uppercase mb-1">Estado del Producto</label><select id="prod-estatus" class="w-full border border-gray-300 rounded px-2 py-1.5 text-xs font-bold uppercase outline-none"><option value="ACTIVO">ACTIVO</option><option value="INACTIVO">INACTIVO</option></select></div>
                                    <div><label class="block text-[9px] font-bold text-gray-500 uppercase mb-1">Tipo de Impuesto</label><select id="prod-impuesto" class="w-full border border-gray-300 rounded px-2 py-1.5 text-xs font-bold uppercase outline-none"></select></div>
                                </div>
                                <div><label class="block text-[9px] font-bold text-gray-500 uppercase mb-1">Descripción Interna</label><textarea id="prod-desc" rows="2" class="w-full border border-gray-300 rounded px-2 py-1 text-xs outline-none custom-scroll"></textarea></div>
                            </div>
                        </div>

                        <div class="bg-emerald-50 p-4 rounded-lg border border-emerald-200 shadow-sm">
                            <h4 class="text-[10px] font-black text-emerald-700 uppercase border-b border-emerald-200 pb-2 mb-3 tracking-wider">Estructura de Precios</h4>
                            <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-4">
                                <div class="bg-white p-2 rounded border border-emerald-100"><label class="block text-[9px] font-black text-emerald-600 uppercase mb-1">P. General (USD) *</label><input type="number" id="prod-precio-usd" step="0.01" required class="w-full border border-gray-300 rounded px-2 py-1.5 text-base font-black text-emerald-700 outline-none"></div>
                                <div class="bg-white p-2 rounded border border-emerald-100"><label class="block text-[9px] font-bold text-emerald-600 uppercase mb-1">Fijar Precio Bs?</label><select id="prod-fijo-bs" onchange="togglePrecioBsFijo()" class="w-full border border-gray-300 rounded px-2 py-1.5 text-[10px] font-bold outline-none"><option value="NO">NO (Automático)</option><option value="SI">SÍ (Congelar)</option></select></div>
                                <div class="bg-white p-2 rounded border border-emerald-100 hidden" id="caja-precio-bs-fijo"><label class="block text-[9px] font-bold text-emerald-600 uppercase mb-1">Monto Fijo Bs</label><input type="number" id="prod-precio-bs" step="0.01" class="w-full border border-gray-300 rounded px-2 py-1.5 text-sm font-black text-gray-800 outline-none"></div>
                            </div>

                            <h4 class="text-[9px] font-black text-emerald-700 uppercase border-b border-emerald-100 pb-1 mb-2">Descuentos por Volumen</h4>
                            <div class="grid grid-cols-1 md:grid-cols-3 gap-3">
                                <div class="flex gap-2">
                                    <div class="w-1/2"><label class="block text-[8px] font-bold text-gray-500 uppercase mb-0.5">Req. Precio 1</label><input type="number" id="req-p1" value="0" class="w-full border border-gray-300 rounded px-2 py-1 text-xs text-center outline-none"></div>
                                    <div class="w-1/2"><label class="block text-[8px] font-bold text-emerald-600 uppercase mb-0.5">Precio 1 ($)</label><input type="number" id="usd-p1" step="0.01" value="0" class="w-full border border-gray-300 rounded px-2 py-1 text-xs text-center font-bold text-emerald-700 outline-none"></div>
                                </div>
                                <div class="flex gap-2">
                                    <div class="w-1/2"><label class="block text-[8px] font-bold text-gray-500 uppercase mb-0.5">Req. Precio 2</label><input type="number" id="req-p2" value="0" class="w-full border border-gray-300 rounded px-2 py-1 text-xs text-center outline-none"></div>
                                    <div class="w-1/2"><label class="block text-[8px] font-bold text-emerald-600 uppercase mb-0.5">Precio 2 ($)</label><input type="number" id="usd-p2" step="0.01" value="0" class="w-full border border-gray-300 rounded px-2 py-1 text-xs text-center font-bold text-emerald-700 outline-none"></div>
                                </div>
                                <div class="flex gap-2">
                                    <div class="w-1/2"><label class="block text-[8px] font-bold text-gray-500 uppercase mb-0.5">Req. Precio 3</label><input type="number" id="req-p3" value="0" class="w-full border border-gray-300 rounded px-2 py-1 text-xs text-center outline-none"></div>
                                    <div class="w-1/2"><label class="block text-[8px] font-bold text-emerald-600 uppercase mb-0.5">Precio 3 ($)</label><input type="number" id="usd-p3" step="0.01" value="0" class="w-full border border-gray-300 rounded px-2 py-1 text-xs text-center font-bold text-emerald-700 outline-none"></div>
                                </div>
                            </div>
                        </div>

                    </div>
                </div>
            </form>

            <div class="bg-gray-50 border-t border-gray-200 px-5 py-3 flex justify-between items-center shrink-0">
                <button type="button" onclick="eliminarProducto()" id="btn-eliminar-prod" class="text-[10px] font-black text-red-500 hover:text-red-700 uppercase tracking-wider hidden bg-red-50 px-3 py-1.5 rounded border border-red-100"><i class="fa-solid fa-trash mr-1"></i> Eliminar</button>
                <div class="flex gap-3 ml-auto">
                    <button type="button" onclick="cerrarModalProducto()" class="px-6 py-2 bg-white border border-gray-300 text-gray-700 font-bold rounded text-xs shadow-sm hover:bg-gray-100 transition btn-press uppercase tracking-wider">Cancelar</button>
                    <button type="submit" form="form-producto" id="btn-guardar-prod" class="px-8 py-2 bg-[#25D366] text-white font-black rounded text-xs shadow-md hover:bg-[#1ebd5c] transition uppercase tracking-widest btn-press"><i class="fa-solid fa-save mr-2"></i> Guardar Ficha</button>
                </div>
            </div>
        </div>
    </div>

    <div id="loading-overlay" class="fixed inset-0 bg-slate-900/95 z-[999] hidden flex-col items-center justify-center p-6 text-center backdrop-blur-sm">
        <i id="loading-icon" class="fa-solid fa-cloud-arrow-up text-5xl text-[#E67E22] mb-4 animate-bounce"></i>
        <h2 id="loading-text" class="text-xl font-black text-white uppercase mb-2 tracking-widest">Sincronizando...</h2>
        <p id="loading-desc" class="text-xs text-gray-400 font-bold max-w-lg mb-6">Asegurando los datos en el servidor</p>
        <button onclick="cerrarErrorCarga()" id="btn-cerrar-carga" class="hidden bg-[#E67E22] text-white px-8 py-3 rounded font-black uppercase text-xs btn-press tracking-widest hover:scale-105 transition">Entendido</button>
    </div>

    <script>
        const TOKEN_JWT = localStorage.getItem('pyp_token_seguro');
        let dbInventario = [], fuseInventario = null, empresaActual = null;
        let arrayGaleriaLocal = []; 
        let vistaActual = localStorage.getItem('pyp_vista_inventario') || 'tabla';
        const imgDefecto = 'https://via.placeholder.com/150/f8fafc/94a3b8?text=SIN+FOTO';

        window.onload = async () => {
            if(localStorage.getItem('pyp_usuario_nombre') && document.getElementById('nombre-usuario')) {
                document.getElementById('nombre-usuario').innerText = localStorage.getItem('pyp_usuario_nombre').split(' ')[0];
            }
            actualizarUIBotonesVista();
            await cargarBaseDatos();
            
            document.addEventListener('keydown', (e) => { 
                if (e.key === 'Escape') { 
                    if(!document.getElementById('loading-overlay').classList.contains('hidden')) {
                        if(!document.getElementById('btn-cerrar-carga').classList.contains('hidden')) cerrarErrorCarga();
                    } else { cerrarModalProducto(); }
                } 
            });
        };

        async function cargarBaseDatos() {
            try {
                const resUser = await fetch(`${SUPABASE_URL}/rest/v1/usuarios?select=id_empresa&limit=1`, { headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${TOKEN_JWT}` } });
                empresaActual = (await resUser.json())[0].id_empresa;

                // Consulta con fecha_creacion restaurada ya que validamos que SÍ existe
                const resProd = await fetch(`${SUPABASE_URL}/rest/v1/productos?select=*&order=fecha_creacion.desc`, { headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${TOKEN_JWT}` } });
                
                if(!resProd.ok) {
                    const e = await resProd.json();
                    throw new Error(e.message || "Error al descargar productos");
                }

                const resPre = await fetch(`${SUPABASE_URL}/rest/v1/precios?select=*`, { headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${TOKEN_JWT}` } });
                const resPar = await fetch(`${SUPABASE_URL}/rest/v1/parametros_inventario?select=*&estatus=eq.ACTIVO`, { headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${TOKEN_JWT}` } });

                const dataProd = await resProd.json(); 
                const dataPre = await resPre.json();
                dbInventario = dataProd.map(p => { const pre = dataPre.find(pr => pr.id_producto_sku === p.id_producto_sku) || {}; return { ...p, pre: pre }; });
                
                fuseInventario = new Fuse(dbInventario, { keys: ['id_producto_sku', 'codigo_barras', 'nombre'], threshold: 0.2 });

                const pars = await resPar.json();
                
                const catArr = [...new Set(dbInventario.map(p => p.categoria_del_producto))];
                let fCatHtml = '<option value="TODAS">CATEGORÍA: TODAS</option>';
                catArr.forEach(c => { if(c) fCatHtml += `<option value="${c}">${c}</option>` });
                document.getElementById('filtro-cat-inv').innerHTML = fCatHtml;

                const marcaArr = [...new Set(dbInventario.map(p => p.marca))];
                let fMarHtml = '<option value="TODAS">MARCA: TODAS</option>';
                marcaArr.forEach(m => { if(m) fMarHtml += `<option value="${m}">${m}</option>` });
                
                // SEGURIDAD: Evitar error si el select de marca no existe en el DOM por alguna razón
                const selectMarcaFiltro = document.getElementById('filtro-marca-inv');
                if(selectMarcaFiltro) selectMarcaFiltro.innerHTML = fMarHtml;

                const fil = g => pars.filter(p => p.grupo === g);
                llenarSelect('prod-categoria', fil('CATEGORIA')); llenarSelect('prod-marca', fil('MARCA'));
                llenarSelect('prod-tipo', fil('TIPO_PRODUCTO')); llenarSelect('prod-cat-venta', fil('CATEGORIA_VENTA'));
                llenarSelect('prod-condicion', fil('CONDICION_PRODUCTO')); llenarSelect('prod-unidad', fil('UNIDAD_MEDIDA'));
                llenarSelect('prod-impuesto', fil('TIPO_IMPUESTO')); llenarSelect('prod-talla', fil('TALLA'));
                llenarSelect('prod-color', fil('COLOR'));

                renderizarInventario();
            } catch(e) { 
                console.error("Error crítico:", e);
                // Si la base de datos falla al cargar, quitamos el loading infinito y mostramos error en pantalla
                document.getElementById('contenedor-inventario').innerHTML = `<div class="p-10 text-center text-red-500 font-bold uppercase"><i class="fa-solid fa-triangle-exclamation text-4xl mb-3 block"></i>Error de conexión:<br><span class="text-xs text-gray-500 mt-2 block lowercase">${e.message}</span></div>`;
                mostrarCarga("Error de Red", e.message, true); 
            }
        }

        function llenarSelect(id, array) {
            let html = '<option value="">Sel...</option>';
            array.forEach(item => html += `<option value="${item.valor}">${item.valor}</option>`);
            if(document.getElementById(id)) document.getElementById(id).innerHTML = html;
        }

        function cambiarVista(v) { vistaActual = v; localStorage.setItem('pyp_vista_inventario', v); actualizarUIBotonesVista(); renderizarInventario(); }
        function actualizarUIBotonesVista() { document.getElementById('btn-vista-tabla').classList.toggle('active', vistaActual === 'tabla'); document.getElementById('btn-vista-grid').classList.toggle('active', vistaActual === 'grid'); }
        
        function filtrarInventario() { renderizarInventario(); }

        function renderizarInventario() {
            const query = document.getElementById('buscador-inv').value.trim();
            const cat = document.getElementById('filtro-cat-inv').value;
            const marca = document.getElementById('filtro-marca-inv') ? document.getElementById('filtro-marca-inv').value : 'TODAS';
            const estatus = document.getElementById('filtro-estatus-inv').value;
            const stock = document.getElementById('filtro-stock-inv').value;
            
            let data = dbInventario;
            if (query !== '') data = fuseInventario.search(query).map(r => r.item);
            if (cat !== 'TODAS') data = data.filter(p => p.categoria_del_producto === cat);
            if (marca !== 'TODAS') data = data.filter(p => p.marca === marca);
            if (estatus !== 'TODOS') data = data.filter(p => p.estado_producto === estatus);
            if (stock === 'CRITICO') data = data.filter(p => p.stock_actual <= p.stock_minimo);
            if (stock === 'DISPONIBLE') data = data.filter(p => p.stock_actual > 0);

            const c = document.getElementById('contenedor-inventario');
            if(data.length === 0) { c.innerHTML = `<div class="p-10 text-center text-gray-400 font-bold uppercase"><i class="fa-solid fa-box-open text-4xl mb-3 block opacity-50"></i> Sin Resultados</div>`; return; }

            if(vistaActual === 'tabla') {
                let html = `<div class="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden"><div class="overflow-x-auto custom-scroll"><table class="w-full text-left text-[10px] whitespace-nowrap"><thead class="bg-[#143B62] text-white text-[9px] uppercase tracking-wider sticky top-0"><tr><th class="py-2 px-3 text-center">Img</th><th class="py-2 px-3">SKU / Barra</th><th class="py-2 px-3">Producto</th><th class="py-2 px-3 text-center">Categoría</th><th class="py-2 px-3 text-center">Stock</th><th class="py-2 px-3 text-right">Precio (USD)</th><th class="py-2 px-3 text-center">Estado</th><th class="py-2 px-3 text-center">Acción</th></tr></thead><tbody class="divide-y divide-gray-100">`;
                
                data.slice(0, 150).forEach(p => {
                    const img = p.imagen_principal || imgDefecto;
                    const pUsd = p.pre.precio_general_usd || 0;
                    const pStr = encodeURIComponent(JSON.stringify(p));
                    const bEst = p.estado_producto === 'ACTIVO' ? `<span class="bg-emerald-50 text-emerald-600 px-1.5 py-0.5 rounded font-black border border-emerald-200">ACTIVO</span>` : `<span class="bg-red-50 text-red-600 px-1.5 py-0.5 rounded font-black border border-red-200">INACTIVO</span>`;
                    const bStk = p.stock_actual <= p.stock_minimo ? `<span class="text-red-500 font-black"><i class="fa-solid fa-triangle-exclamation"></i> ${p.stock_actual}</span>` : `<span class="text-gray-700 font-bold">${p.stock_actual}</span>`;

                    html += `<tr class="hover:bg-gray-50 transition border-b border-gray-50">
                        <td class="py-1.5 px-3 text-center"><img src="${img}" class="w-8 h-8 rounded object-contain border bg-white"></td>
                        <td class="py-1.5 px-3 font-mono font-bold text-gray-500">${p.id_producto_sku}<br><span class="text-[8px] text-gray-400">${p.codigo_barras || ''}</span></td>
                        <td class="py-1.5 px-3 font-bold text-[#143B62] truncate max-w-[200px]">${p.nombre}</td>
                        <td class="py-1.5 px-3 text-center"><span class="bg-gray-100 text-gray-600 px-2 py-0.5 rounded uppercase font-bold">${p.categoria_del_producto || '-'}</span></td>
                        <td class="py-1.5 px-3 text-center bg-gray-50/50">${bStk}</td>
                        <td class="py-1.5 px-3 text-right font-black text-[#25D366] text-xs">$${pUsd.toFixed(2)}</td>
                        <td class="py-1.5 px-3 text-center">${bEst}</td>
                        <td class="py-1.5 px-3 text-center"><button onclick="abrirModalProducto('${pStr}')" class="text-blue-500 hover:bg-blue-50 px-2 py-1 rounded transition shadow-sm border border-transparent hover:border-blue-200"><i class="fa-solid fa-pen-to-square"></i></button></td>
                    </tr>`;
                });
                html += `</tbody></table></div></div>`; c.innerHTML = html;
            } else {
                let html = `<div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 xl:grid-cols-6 gap-3 pb-10">`;
                data.slice(0, 150).forEach(p => {
                    const img = p.imagen_principal || imgDefecto;
                    const pUsd = p.pre.precio_general_usd || 0;
                    const pStr = encodeURIComponent(JSON.stringify(p));
                    const bEst = p.estado_producto === 'ACTIVO' ? `<span class="bg-emerald-100 text-emerald-700 px-1 py-0.5 rounded text-[7px] font-black uppercase">Activo</span>` : `<span class="bg-red-100 text-red-700 px-1 py-0.5 rounded text-[7px] font-black uppercase">Inactivo</span>`;
                    const bStk = p.stock_actual <= p.stock_minimo ? `<span class="text-red-600 font-black"><i class="fa-solid fa-triangle-exclamation"></i> ${p.stock_actual}</span>` : `<span class="text-emerald-600 font-black">${p.stock_actual}</span>`;

                    html += `
                    <div class="bg-white border border-gray-200 rounded-lg p-2.5 flex flex-col shadow-sm hover:shadow-lg transition cursor-pointer fade-in group" onclick="abrirModalProducto('${pStr}')">
                        <div class="flex justify-between items-start mb-1.5">
                            <span class="text-[8px] font-mono text-gray-400 bg-gray-50 px-1.5 rounded border border-gray-100">${p.id_producto_sku}</span>
                            ${bEst}
                        </div>
                        <div class="h-24 w-full mb-2 bg-white flex items-center justify-center rounded">
                            <img src="${img}" class="max-h-full max-w-full object-contain group-hover:scale-105 transition-transform duration-300">
                        </div>
                        <h3 class="text-[9px] font-black text-[#143B62] leading-tight line-clamp-2 mb-2 uppercase">${p.nombre}</h3>
                        <div class="mt-auto border-t border-gray-50 pt-1.5 flex justify-between items-end">
                            <div><p class="text-[7px] text-gray-400 font-bold uppercase mb-0.5">Precio</p><p class="text-[11px] font-black text-[#25D366]">$${pUsd.toFixed(2)}</p></div>
                            <div class="text-right"><p class="text-[7px] text-gray-400 font-bold uppercase mb-0.5">Stock</p><p class="text-[10px] bg-gray-50 px-1.5 rounded border border-gray-100">${bStk}</p></div>
                        </div>
                    </div>`;
                });
                html += `</div>`; c.innerHTML = html;
            }
        }

        function mostrarCarga(titulo, desc, isError = false) {
            const ol = document.getElementById('loading-overlay'); const ic = document.getElementById('loading-icon');
            const tt = document.getElementById('loading-text'); const td = document.getElementById('loading-desc');
            const bt = document.getElementById('btn-cerrar-carga');
            ol.classList.remove('hidden'); ol.classList.add('flex');
            tt.innerText = titulo; td.innerText = desc;
            if(isError) {
                ic.className = "fa-solid fa-triangle-exclamation text-6xl text-red-500 mb-4";
                tt.classList.replace('text-white', 'text-red-400');
                bt.classList.remove('hidden');
            } else {
                ic.className = "fa-solid fa-cloud-arrow-up text-5xl text-[#E67E22] mb-4 animate-bounce";
                tt.classList.replace('text-red-400', 'text-white');
                bt.classList.add('hidden');
            }
        }
        function cerrarErrorCarga() { 
            const ol = document.getElementById('loading-overlay');
            ol.classList.add('hidden'); ol.classList.remove('flex'); 
        }

        function actualizarPreview(url, previewId, iconId) {
            const preview = document.getElementById(previewId); const icon = document.getElementById(iconId);
            if(url) { preview.src = url; preview.classList.remove('hidden'); icon.classList.add('hidden'); } 
            else { preview.classList.add('hidden'); icon.classList.remove('hidden'); }
        }

        async function comprimirYSubir(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader(); reader.readAsDataURL(file);
                reader.onload = e => {
                    const img = new Image(); img.src = e.target.result;
                    img.onload = async () => {
                        const canvas = document.createElement('canvas'); const ctx = canvas.getContext('2d');
                        let w = img.width, h = img.height; const max = 1000;
                        if (w > h && w > max) { h *= max / w; w = max; } else if (h > max) { w *= max / h; h = max; }
                        canvas.width = w; canvas.height = h; ctx.drawImage(img, 0, 0, w, h);
                        canvas.toBlob(async (blob) => {
                            const ext = file.name.split('.').pop() || 'jpg';
                            const fileName = `img_${Date.now()}_${Math.floor(Math.random()*1000)}.${ext}`;
                            try {
                                const formData = new FormData(); formData.append('file', blob, fileName);
                                const res = await fetch(`${SUPABASE_URL}/storage/v1/object/inventario/${fileName}`, { method: 'POST', headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${TOKEN_JWT}` }, body: formData });
                                if(!res.ok) throw new Error("Fallo upload");
                                resolve(`${SUPABASE_URL}/storage/v1/object/public/inventario/${fileName}`);
                            } catch(err) { reject(err); }
                        }, 'image/webp', 0.8);
                    };
                };
            });
        }

        async function subirImagenUnica(event, urlInputId, previewId, iconId) {
            const file = event.target.files[0]; if(!file) return;
            mostrarCarga("Subiendo...", "Optimizando y guardando imagen principal");
            try {
                const url = await comprimirYSubir(file);
                document.getElementById(urlInputId).value = url;
                actualizarPreview(url, previewId, iconId);
                cerrarErrorCarga();
            } catch(e) { mostrarCarga("Error de Subida", "No se pudo cargar la imagen.", true); }
        }

        async function subirImagenesGaleria(event) {
            const files = event.target.files; if(files.length === 0) return;
            mostrarCarga("Subiendo Galería...", `Optimizando ${files.length} imágenes adicionales`);
            try {
                for(let i = 0; i < files.length; i++) {
                    const url = await comprimirYSubir(files[i]);
                    arrayGaleriaLocal.push(url);
                }
                renderizarGaleriaLocal();
                cerrarErrorCarga();
            } catch(e) { mostrarCarga("Error de Galería", "Algunas imágenes fallaron.", true); }
        }

        function renderizarGaleriaLocal() {
            const container = document.getElementById('contenedor-galeria'); container.innerHTML = '';
            arrayGaleriaLocal.forEach((url, index) => {
                container.innerHTML += `<div class="relative group h-16 bg-white border border-gray-200 rounded flex items-center justify-center fade-in"><img src="${url}" class="max-h-full max-w-full object-contain p-1"><button type="button" onclick="eliminarFotoGaleria(${index})" class="absolute -top-1.5 -right-1.5 bg-red-500 text-white w-4 h-4 rounded-full text-[8px] font-bold shadow-md hover:bg-red-600 hover:scale-110 transition opacity-0 group-hover:opacity-100 z-10"><i class="fa-solid fa-times"></i></button></div>`;
            });
        }
        function eliminarFotoGaleria(index) { arrayGaleriaLocal.splice(index, 1); renderizarGaleriaLocal(); }

        function togglePrecioBsFijo() { document.getElementById('caja-precio-bs-fijo').classList.toggle('hidden', document.getElementById('prod-fijo-bs').value === 'NO'); }
        function valNum(id) { return parseFloat(document.getElementById(id).value) || 0; }

        function abrirModalProducto(pStr = null) {
            document.getElementById('form-producto').reset(); arrayGaleriaLocal = []; renderizarGaleriaLocal();
            document.getElementById('url-img-principal').value = ''; actualizarPreview('', 'preview-img-principal', 'icon-img-principal');
            togglePrecioBsFijo();

            if (pStr) {
                const p = JSON.parse(decodeURIComponent(pStr));
                document.getElementById('modal-titulo').innerHTML = `<i class="fa-solid fa-pen-to-square mr-2 text-[#E67E22]"></i> EDITAR FICHA`;
                document.getElementById('prod-modo-edicion').value = "true"; document.getElementById('prod-sku-original').value = p.id_producto_sku;
                
                document.getElementById('prod-sku').value = p.id_producto_sku; 
                document.getElementById('prod-cod-barra').value = p.codigo_barras || '';
                document.getElementById('prod-nombre').value = p.nombre || ''; 
                document.getElementById('prod-desc').value = p.descripcion || '';
                document.getElementById('prod-video').value = p.video_url || '';
                
                const sV = (id, val) => { if(document.getElementById(id)) document.getElementById(id).value = val || ''; };
                sV('prod-tipo', p.tipo_producto); sV('prod-categoria', p.categoria_del_producto); sV('prod-cat-venta', p.categoria_venta);
                sV('prod-marca', p.marca); sV('prod-condicion', p.condicion_producto); sV('prod-talla', p.talla);
                sV('prod-color', p.color); sV('prod-unidad', p.unidad_medida); sV('prod-estatus', p.estado_producto || 'ACTIVO');
                sV('prod-impuesto', p.tipo_impuesto); sV('prod-negativo', p.permitir_negativo ? 'TRUE' : 'FALSE');
                
                document.getElementById('prod-stock').value = p.stock_actual || 0; document.getElementById('prod-stock-min').value = p.stock_minimo || 0;
                document.getElementById('url-img-principal').value = p.imagen_principal || ''; actualizarPreview(p.imagen_principal, 'preview-img-principal', 'icon-img-principal');
                
                if(p.galeria_imagenes) { try { let parsed = typeof p.galeria_imagenes === 'string' ? JSON.parse(p.galeria_imagenes) : p.galeria_imagenes; if(Array.isArray(parsed)) arrayGaleriaLocal = parsed; } catch(e) {} }
                renderizarGaleriaLocal();

                document.getElementById('prod-precio-usd').value = p.pre.precio_general_usd || 0;
                document.getElementById('prod-fijo-bs').value = p.pre.es_precio_fijo_bs ? 'SI' : 'NO';
                document.getElementById('prod-precio-bs').value = p.pre.precio_fijo_bs || '';
                
                sV('req-p1', p.pre.requerido_precio_1); sV('usd-p1', p.pre.precio_1_usd);
                sV('req-p2', p.pre.requerido_precio_2); sV('usd-p2', p.pre.precio_2_usd);
                sV('req-p3', p.pre.requerido_precio_3); sV('usd-p3', p.pre.precio_3_usd);

                togglePrecioBsFijo(); document.getElementById('prod-sku').readOnly = true; document.getElementById('prod-sku').classList.add('bg-gray-200');
            } else {
                document.getElementById('modal-titulo').innerHTML = `<i class="fa-solid fa-plus mr-2 text-[#25D366]"></i> NUEVO REGISTRO`;
                document.getElementById('prod-modo-edicion').value = "false";
                document.getElementById('prod-sku').readOnly = false; document.getElementById('prod-sku').classList.remove('bg-gray-200');
            }
            document.getElementById('modal-producto').classList.remove('hidden'); document.getElementById('modal-producto').classList.add('flex');
        }

        function cerrarModalProducto() { document.getElementById('modal-producto').classList.add('hidden'); document.getElementById('modal-producto').classList.remove('flex'); }

        async function guardarProducto(e) {
            e.preventDefault();
            const btn = document.getElementById('btn-guardar-prod'); btn.innerHTML = `Guardando...`; btn.disabled = true;
            mostrarCarga("Sincronizando", "Enviando datos al servidor...");

            try {
                const isEdit = document.getElementById('prod-modo-edicion').value === "true";
                const sku = document.getElementById('prod-sku').value.trim().toUpperCase();
                const skuOrig = document.getElementById('prod-sku-original').value;
                const rawCodBarra = document.getElementById('prod-cod-barra').value.trim();
                
                const pProd = {
                    id_empresa: empresaActual, id_producto_sku: sku, 
                    codigo_barras: rawCodBarra ? Number(rawCodBarra) : null,
                    nombre: document.getElementById('prod-nombre').value.trim().toUpperCase(), descripcion: document.getElementById('prod-desc').value.trim() || null,
                    tipo_producto: document.getElementById('prod-tipo').value || null, categoria_del_producto: document.getElementById('prod-categoria').value || null,
                    categoria_venta: document.getElementById('prod-cat-venta').value || null, marca: document.getElementById('prod-marca').value || null,
                    condicion_producto: document.getElementById('prod-condicion').value || null, talla: document.getElementById('prod-talla').value || null,
                    color: document.getElementById('prod-color').value || null, unidad_medida: document.getElementById('prod-unidad').value || null,
                    estado_producto: document.getElementById('prod-estatus').value, tipo_impuesto: document.getElementById('prod-impuesto').value || null,
                    permitir_negativo: document.getElementById('prod-negativo').value === 'TRUE', stock_actual: valNum('prod-stock'), stock_minimo: valNum('prod-stock-min'),
                    imagen_principal: document.getElementById('url-img-principal').value || null, galeria_imagenes: JSON.stringify(arrayGaleriaLocal),
                    video_url: document.getElementById('prod-video').value.trim() || null
                };

                const isBsFijo = document.getElementById('prod-fijo-bs').value === 'SI';
                const pPre = {
                    id_empresa: empresaActual, id_producto_sku: sku, precio_general_usd: valNum('prod-precio-usd'),
                    es_precio_fijo_bs: isBsFijo, precio_fijo_bs: isBsFijo ? valNum('prod-precio-bs') : 0,
                    requerido_precio_1: valNum('req-p1'), precio_1_usd: valNum('usd-p1'), requerido_precio_2: valNum('req-p2'), precio_2_usd: valNum('usd-p2'),
                    requerido_precio_3: valNum('req-p3'), precio_3_usd: valNum('usd-p3')
                };

                const uProd = isEdit ? `${SUPABASE_URL}/rest/v1/productos?id_producto_sku=eq.${skuOrig}` : `${SUPABASE_URL}/rest/v1/productos`;
                const uPre = isEdit ? `${SUPABASE_URL}/rest/v1/precios?id_producto_sku=eq.${skuOrig}` : `${SUPABASE_URL}/rest/v1/precios`;
                const mtd = isEdit ? 'PATCH' : 'POST';

                const rProd = await fetch(uProd, { method: mtd, headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${TOKEN_JWT}`, 'Content-Type': 'application/json', 'Prefer': 'return=representation' }, body: JSON.stringify(pProd) });
                if(!rProd.ok) { const err = await rProd.json(); throw new Error(err.message || "Error al guardar en productos"); }
                
                const rPre = await fetch(uPre, { method: mtd, headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${TOKEN_JWT}`, 'Content-Type': 'application/json' }, body: JSON.stringify(pPre) });
                if(isEdit && rPre.status !== 200 && rPre.status !== 204) { await fetch(`${SUPABASE_URL}/rest/v1/precios`, { method: 'POST', headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${TOKEN_JWT}`, 'Content-Type': 'application/json' }, body: JSON.stringify(pPre) }); }

                cerrarErrorCarga(); cerrarModalProducto(); await cargarBaseDatos();
            } catch(e) { 
                mostrarCarga("Error al Guardar", e.message, true); 
            } 
            finally { btn.innerHTML = `<i class="fa-solid fa-save mr-2"></i> Guardar Ficha`; btn.disabled = false; }
        }

        async function eliminarProducto() {
            if(!confirm("¿CONFIRMAS ELIMINAR ESTE REGISTRO DEFINITIVAMENTE?")) return;
            mostrarCarga("Eliminando...", "Borrando base y dependencias");
            try {
                const sku = document.getElementById('prod-sku-original').value;
                const r = await fetch(`${SUPABASE_URL}/rest/v1/productos?id_producto_sku=eq.${sku}`, { method: 'DELETE', headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${TOKEN_JWT}` } });
                if(!r.ok) throw new Error("Dependencias activas.");
                cerrarErrorCarga(); cerrarModalProducto(); await cargarBaseDatos();
            } catch(e) { mostrarCarga("Fallo al Eliminar", "El producto tiene facturas asociadas y no puede borrarse.", true); }
        }
    </script>
