<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>P&P Admin | Directorio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .custom-scroll::-webkit-scrollbar { width: 5px; height: 5px; }
        .custom-scroll::-webkit-scrollbar-thumb { background-color: #cbd5e1; border-radius: 4px; }
        .btn-press:active { transform: scale(0.97); }
        .tab-active { border-bottom: 2px solid #E67E22; color: #143B62; font-weight: bold; }
        .tab-inactive { color: #64748b; font-weight: 500; border-bottom: 2px solid transparent; }
    </style>
    
    <script src="config.js"></script>
    <script>
        if (!localStorage.getItem('pyp_token_seguro')) window.location.href = 'login.html';
    </script>
</head>
<body class="bg-[#f4f6f8] flex h-screen overflow-hidden text-gray-800 relative">

    <script src="menu.js"></script>

    <main class="flex-1 flex flex-col h-screen overflow-hidden bg-[#f4f6f8] w-full z-10 relative">
        
        <header class="bg-white shadow-sm px-4 md:px-6 py-3 flex justify-between items-center z-10 shrink-0 border-b border-gray-200">
            <div class="flex items-center gap-2 min-w-0">
                <button onclick="toggleMobileMenu()" class="md:hidden text-gray-600 hover:text-[#143B62] text-xl transition btn-press px-1 shrink-0"><i class="fa-solid fa-bars"></i></button>
                <div class="flex items-center gap-2 overflow-hidden">
                    <img id="app-logo-header" src="" class="h-7 md:h-8 hidden object-contain shrink-0">
                    <h1 id="app-text-header" class="text-base md:text-lg font-semibold text-[#143B62] flex items-center gap-2 truncate">
                        <i id="app-icon-header" class="fa-solid fa-address-book text-[#143B62] hidden sm:inline-block shrink-0"></i> 
                        <span class="truncate">Directorio Maestro</span>
                    </h1>
                </div>
            </div>
            <div class="flex items-center gap-3 shrink-0">
                <button onclick="window.location.reload()" class="md:hidden text-blue-600 bg-blue-50 w-8 h-8 rounded-full flex items-center justify-center hover:bg-blue-100 transition shadow-sm btn-press"><i class="fa-solid fa-rotate-right"></i></button>
                <div class="bg-gray-50 px-2 md:px-3 py-1.5 rounded-md border border-gray-200 hidden sm:flex items-center gap-2 text-[11px] font-semibold text-gray-600 tracking-wide uppercase">
                    <i class="fa-solid fa-user-tie text-[#143B62]"></i> <span id="nombre-usuario">Admin</span>
                </div>
            </div>
        </header>

        <div class="flex-1 overflow-auto p-4 md:p-6 custom-scroll pb-24 md:pb-6 flex flex-col">
            
            <div class="bg-white rounded-t-xl border border-gray-200 border-b-0 px-4 pt-3 flex gap-6 shrink-0">
                <button onclick="cambiarPestana('clientes')" id="tab-clientes" class="tab-active pb-3 px-2 text-sm uppercase tracking-wider transition">Clientes</button>
                <button onclick="cambiarPestana('proveedores')" id="tab-proveedores" class="tab-inactive pb-3 px-2 text-sm uppercase tracking-wider transition">Proveedores</button>
            </div>

            <div class="bg-white p-4 border border-gray-200 shadow-sm flex flex-col sm:flex-row justify-between items-center gap-3 shrink-0">
                <div class="relative w-full sm:w-1/2 lg:w-1/3">
                    <i class="fa-solid fa-search absolute left-3 top-2.5 text-gray-400"></i>
                    <input type="text" id="buscador" oninput="filtrarContactos()" placeholder="Buscar por Documento o Nombre..." class="w-full border border-gray-300 rounded-lg pl-9 pr-4 py-2 text-sm focus:outline-none focus:border-[#143B62] uppercase transition">
                </div>
                <button onclick="alert('Módulo de registro en desarrollo')" class="w-full sm:w-auto bg-[#25D366] hover:bg-[#1ebd5c] text-white px-5 py-2.5 rounded-lg font-bold text-[13px] shadow-sm transition btn-press flex justify-center items-center gap-2">
                    <i class="fa-solid fa-plus"></i> NUEVO CONTACTO
                </button>
            </div>

            <div class="flex-1 bg-white border border-gray-200 border-t-0 rounded-b-xl shadow-sm overflow-hidden flex flex-col">
                <div class="overflow-x-auto flex-1 custom-scroll">
                    <table class="w-full text-left text-sm whitespace-nowrap min-w-[700px]">
                        <thead class="bg-[#143B62] text-white text-[10px] uppercase tracking-wider sticky top-0">
                            <tr>
                                <th class="py-3 px-4 w-32">Documento</th>
                                <th class="py-3 px-4">Nombre / Razón Social</th>
                                <th class="py-3 px-4 w-40">Contacto</th>
                                <th class="py-3 px-4">Dirección</th>
                                <th class="py-3 px-4 text-center w-24">Estado</th>
                            </tr>
                        </thead>
                        <tbody id="tabla-contactos" class="divide-y divide-gray-100">
                            <tr><td colspan="5" class="p-10 text-center text-gray-400"><i class="fa-solid fa-spinner fa-spin text-2xl mb-2 block"></i> Cargando contactos...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>

        </div>
    </main>

    <script>
        const TOKEN_JWT = localStorage.getItem('pyp_token_seguro');
        
        let pestanaActual = 'clientes';
        let dataClientes = [];
        let dataProveedores = [];

        window.onload = async () => {
            const nombre = localStorage.getItem('pyp_usuario_nombre');
            if(nombre) document.getElementById('nombre-usuario').innerText = nombre.split(' ')[0];
            await cargarDatos();
        };

        async function cargarDatos() {
            try {
                // Descargamos ambos al mismo tiempo para mayor velocidad
                const [resCli, resProv] = await Promise.all([
                    fetch(`${SUPABASE_URL}/rest/v1/clientes?select=*`, { headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${TOKEN_JWT}` } }),
                    fetch(`${SUPABASE_URL}/rest/v1/proveedores?select=*`, { headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${TOKEN_JWT}` } })
                ]);

                if(resCli.ok) dataClientes = await resCli.json();
                if(resProv.ok) dataProveedores = await resProv.json();

                renderizarTabla();
            } catch(e) {
                document.getElementById('tabla-contactos').innerHTML = `<tr><td colspan="5" class="p-10 text-center text-red-500 font-bold uppercase"><i class="fa-solid fa-triangle-exclamation text-2xl mb-2 block"></i> Error de conexión.</td></tr>`;
            }
        }

        function cambiarPestana(tipo) {
            pestanaActual = tipo;
            document.getElementById('tab-clientes').className = tipo === 'clientes' ? 'tab-active pb-3 px-2 text-sm uppercase tracking-wider transition' : 'tab-inactive pb-3 px-2 text-sm uppercase tracking-wider transition';
            document.getElementById('tab-proveedores').className = tipo === 'proveedores' ? 'tab-active pb-3 px-2 text-sm uppercase tracking-wider transition' : 'tab-inactive pb-3 px-2 text-sm uppercase tracking-wider transition';
            document.getElementById('buscador').value = '';
            renderizarTabla();
        }

        function filtrarContactos() { renderizarTabla(); }

        function renderizarTabla() {
            const query = document.getElementById('buscador').value.toLowerCase();
            const tbody = document.getElementById('tabla-contactos');
            const dataBase = pestanaActual === 'clientes' ? dataClientes : dataProveedores;

            // Mapeamos los nombres de columnas porque a veces varían entre Clientes y Proveedores en la Base de Datos
            const datosFiltrados = dataBase.filter(c => {
                const doc = (c.documento_identidad || c.rif || '').toLowerCase();
                const nom = (c.nombre_razon_social || c.razon_social || '').toLowerCase();
                return doc.includes(query) || nom.includes(query);
            });

            if(datosFiltrados.length === 0) {
                tbody.innerHTML = `<tr><td colspan="5" class="p-10 text-center text-gray-400 font-medium"><i class="fa-solid fa-folder-open text-3xl mb-2 block opacity-50"></i> No se encontraron ${pestanaActual}.</td></tr>`;
                return;
            }

            let html = '';
            datosFiltrados.forEach(c => {
                const doc = c.documento_identidad || c.rif || '-';
                const nom = c.nombre_razon_social || c.razon_social || '-';
                const tel = c.telefono || '-';
                const dir = c.direccion || '-';
                const estado = (c.estatus || 'ACTIVO').toUpperCase();
                
                const badge = estado === 'ACTIVO' ? `<span class="bg-emerald-50 text-emerald-600 px-2 py-1 rounded text-[9px] font-bold border border-emerald-200">ACTIVO</span>` : `<span class="bg-red-50 text-red-600 px-2 py-1 rounded text-[9px] font-bold border border-red-200">INACTIVO</span>`;

                html += `
                <tr class="hover:bg-gray-50 transition border-b border-gray-100">
                    <td class="py-3 px-4 font-mono text-[11px] text-gray-500">${doc}</td>
                    <td class="py-3 px-4 font-bold text-[#143B62] text-[12px] truncate max-w-xs">${nom}</td>
                    <td class="py-3 px-4 text-gray-600 text-[11px]"><i class="fa-solid fa-phone text-gray-400 mr-1"></i> ${tel}</td>
                    <td class="py-3 px-4 text-gray-500 text-[11px] truncate max-w-xs">${dir}</td>
                    <td class="py-3 px-4 text-center">${badge}</td>
                </tr>`;
            });

            tbody.innerHTML = html;
        }
    </script>
</body>
</html>
