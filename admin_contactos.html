<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin | Directorio Maestro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .custom-scroll::-webkit-scrollbar { width: 6px; height: 6px; }
        .custom-scroll::-webkit-scrollbar-thumb { background-color: #cbd5e1; border-radius: 4px; }
        .btn-press:active { transform: scale(0.95); }
    </style>
    <script>if (localStorage.getItem('pyp_sesion_activa') !== 'true') window.location.href = 'login.html';</script>
</head>
<body class="bg-[#f0f2f5] font-sans flex h-screen overflow-hidden text-gray-800">

    <aside class="w-64 bg-[#143B62] text-white flex flex-col hidden md:flex shrink-0 shadow-xl z-20">
        <div class="p-6 border-b border-white/10 flex items-center gap-3">
            <i class="fa-solid fa-layer-group text-[#E67E22] text-3xl"></i>
            <h2 class="font-bold text-xl tracking-wide">P&P Admin</h2>
        </div>
        <nav class="flex-1 p-4 space-y-1 overflow-y-auto custom-scroll text-sm">
            <a href="admin_dashboard.html" class="flex items-center gap-3 text-gray-300 hover:bg-white/10 px-4 py-2.5 rounded-lg font-semibold transition"><i class="fa-solid fa-chart-pie w-5"></i> Dashboard</a>
            <a href="admin_ventas.html" class="flex items-center gap-3 text-gray-300 hover:bg-white/10 px-4 py-2.5 rounded-lg font-semibold transition"><i class="fa-solid fa-cash-register w-5"></i> Ventas (POS)</a>
            <a href="admin_compras.html" class="flex items-center gap-3 text-gray-300 hover:bg-white/10 px-4 py-2.5 rounded-lg font-semibold transition"><i class="fa-solid fa-truck-ramp-box w-5"></i> Compras</a>
            
            <div class="space-y-1">
                <button type="button" onclick="document.getElementById('submenu-inv').classList.toggle('hidden')" class="w-full flex items-center justify-between bg-transparent text-gray-300 hover:bg-white/10 px-4 py-2.5 rounded-lg font-semibold transition btn-press">
                    <div class="flex items-center gap-3"><i class="fa-solid fa-boxes-stacked w-5"></i> Inventario</div>
                    <i class="fa-solid fa-chevron-down text-xs"></i>
                </button>
                <div id="submenu-inv" class="pl-10 space-y-1 mt-1 hidden">
                    <a href="admin_productos.html" class="block py-2 text-gray-400 hover:text-white font-semibold text-xs transition">PRODUCTOS</a>
                    <a href="admin_productos_parametros.html" class="block py-2 text-gray-400 hover:text-white font-semibold text-xs transition">PARÁMETROS</a>
                </div>
            </div>

            <a href="admin_contactos.html" class="flex items-center gap-3 bg-[#E67E22] text-white px-4 py-2.5 rounded-lg font-bold shadow-md"><i class="fa-solid fa-address-book w-5"></i> Directorio</a>
        </nav>
        
        <div class="p-4 border-t border-white/10 shrink-0 bg-[#0f2d4a]">
            <button onclick="cerrarSesion()" class="w-full flex items-center justify-center gap-2 bg-red-500/20 text-red-300 hover:bg-red-500 hover:text-white py-2.5 rounded-lg font-bold transition text-sm shadow-sm btn-press">
                <i class="fa-solid fa-power-off"></i> Cerrar Sesión
            </button>
        </div>
    </aside>

    <main class="flex-1 flex flex-col h-screen overflow-hidden bg-gray-50">
        <header class="bg-white shadow-sm px-6 py-4 flex justify-between items-center z-10 shrink-0">
            <div>
                <h1 class="text-xl font-bold text-[#143B62] flex items-center gap-2"><i class="fa-solid fa-address-book"></i> Directorio Maestro</h1>
            </div>
            <div class="flex items-center gap-3">
                <div class="bg-blue-50 px-3 py-1.5 rounded-lg border border-blue-100 flex items-center gap-2 text-xs font-bold text-[#143B62]">
                    <i class="fa-solid fa-user-tie"></i> <span id="nombre-usuario">Admin</span>
                </div>
                <button onclick="cerrarSesion()" class="md:hidden text-red-500 hover:text-red-700 text-xl transition btn-press"><i class="fa-solid fa-power-off"></i></button>
            </div>
        </header>

        <div class="flex-1 overflow-auto p-4 md:p-6 custom-scroll">
            <div class="bg-white rounded-xl border border-gray-200 shadow-sm overflow-hidden flex flex-col h-full">
                <div class="p-4 border-b border-gray-100 flex gap-3 bg-gray-50 justify-between items-center">
                    <div class="flex gap-2">
                        <button id="btn-clientes" onclick="cambiarPestana('Clientes')" class="bg-white border border-gray-300 px-4 py-1.5 rounded font-bold text-sm shadow-sm text-[#143B62] transition btn-press">CLIENTES</button>
                        <button id="btn-proveedores" onclick="cambiarPestana('Proveedores')" class="bg-gray-100 text-gray-500 px-4 py-1.5 rounded font-semibold text-sm hover:bg-gray-200 transition btn-press uppercase">Proveedores</button>
                    </div>
                    <button onclick="alert('Módulo de creación en construcción')" class="bg-[#25D366] hover:bg-[#1ebd5c] text-white px-4 py-2 rounded-lg font-bold text-sm shadow-sm transition flex items-center gap-2 btn-press">
                        <i class="fa-solid fa-plus"></i> <span class="hidden sm:inline">NUEVO CONTACTO</span>
                    </button>
                </div>

                <div class="p-4 border-b border-gray-100 bg-white">
                    <div class="relative">
                        <i class="fa-solid fa-search absolute left-3 top-2.5 text-gray-400"></i>
                        <input type="text" id="buscador-contactos" oninput="aplicarFiltros()" placeholder="BUSCAR POR RIF, NOMBRE O EMPRESA..." class="w-full border border-gray-300 rounded-lg pl-10 pr-4 py-2 text-sm focus:outline-none focus:border-[#E67E22] uppercase font-bold">
                    </div>
                </div>

                <div class="flex-1 overflow-y-auto custom-scroll">
                    <table class="w-full text-left text-sm border-collapse">
                        <thead class="bg-[#143B62] text-white text-[10px] uppercase font-black sticky top-0 z-10">
                            <tr>
                                <th class="p-4">DOCUMENTO</th>
                                <th class="p-4">NOMBRE / RAZÓN SOCIAL</th>
                                <th class="p-4" id="col-contacto-dinamica">CONTACTO</th>
                                <th class="p-4">DIRECCIÓN PRINCIPAL</th>
                                <th class="p-4 text-center">ACCIONES</th>
                            </tr>
                        </thead>
                        <tbody id="tabla-contactos" class="divide-y divide-gray-100"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <script>
        const SUPABASE_URL = 'https://icvfmdvvochzaktugqvj.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImljdmZtZHZ2b2NoemFrdHVncXZqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYyNDEzMzEsImV4cCI6MjA5MTgxNzMzMX0.gO3D39piT6KGbMMOzrPGWXUp5-g_nOBAgJ-nwPv8IcQ';
        
        let dataActual = [];
        let pestanaActual = 'Clientes';

        window.onload = async () => {
            const nombre = localStorage.getItem('pyp_usuario_nombre');
            if(nombre) document.getElementById('nombre-usuario').innerText = nombre.split(' ')[0].toUpperCase();
            await cargarDatosDesdeBD('Clientes');
        };

        function cerrarSesion() {
            if(confirm("¿Estás seguro que deseas cerrar sesión?")) {
                localStorage.removeItem('pyp_sesion_activa');
                window.location.href = 'login.html';
            }
        }

        // Blindaje contra números enteros y nulos
        function formatearTelefono(tel) {
            if (tel === null || tel === undefined || tel === '') return 'N/A';
            let telStr = String(tel).trim();
            if (telStr === '' || telStr.toUpperCase() === 'N/A') return 'N/A';
            
            let numStr = telStr.replace(/\D/g, '');
            if (numStr.length === 12 && numStr.startsWith('58')) {
                return `+${numStr.substring(0, 2)} ${numStr.substring(2, 5)}-${numStr.substring(5)}`;
            }
            if (numStr.length === 11 && numStr.startsWith('0')) {
                return `${numStr.substring(0, 4)}-${numStr.substring(4)}`;
            }
            return telStr;
        }

        async function cargarDatosDesdeBD(tipo) {
            pestanaActual = tipo;
            const tbody = document.getElementById('tabla-contactos');
            tbody.innerHTML = `<tr><td colspan="5" class="p-10 text-center text-gray-400"><i class="fa-solid fa-spinner fa-spin text-xl mb-2 block"></i> CARGANDO ${tipo.toUpperCase()}...</td></tr>`;

            const nombreTabla = tipo === 'Clientes' ? 'clientes' : 'proveedores';
            document.getElementById('col-contacto-dinamica').innerText = tipo === 'Clientes' ? 'CONTACTO' : 'VENDEDOR ASIGNADO';

            try {
                const res = await fetch(`${SUPABASE_URL}/rest/v1/${nombreTabla}?select=*`, { 
                    headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` } 
                });
                
                const respuestaJson = await res.json();
                
                if (!res.ok) {
                    tbody.innerHTML = `<tr><td colspan="5" class="p-5 text-center text-red-500 font-bold uppercase">ERROR BD: ${respuestaJson.message}</td></tr>`;
                    dataActual = [];
                    return;
                }

                dataActual = respuestaJson;
                aplicarFiltros();
            } catch(e) {
                tbody.innerHTML = `<tr><td colspan="5" class="p-5 text-center text-red-500 font-bold">ERROR DE RED O JAVASCRIPT.</td></tr>`;
                dataActual = [];
            }
        }

        function cambiarPestana(pestana) {
            if(pestana === pestanaActual) return;
            const btnC = document.getElementById('btn-clientes');
            const btnP = document.getElementById('btn-proveedores');
            
            if(pestana === 'Clientes') {
                btnC.className = "bg-white border border-gray-300 px-4 py-1.5 rounded font-bold text-sm shadow-sm text-[#143B62] transition btn-press";
                btnP.className = "bg-gray-100 text-gray-500 px-4 py-1.5 rounded font-semibold text-sm hover:bg-gray-200 transition btn-press uppercase";
            } else {
                btnP.className = "bg-white border border-gray-300 px-4 py-1.5 rounded font-bold text-sm shadow-sm text-[#143B62] transition btn-press uppercase";
                btnC.className = "bg-gray-100 text-gray-500 px-4 py-1.5 rounded font-semibold text-sm hover:bg-gray-200 transition btn-press";
            }
            
            document.getElementById('buscador-contactos').value = '';
            cargarDatosDesdeBD(pestana);
        }

        function pintarTabla(arr) {
            const tbody = document.getElementById('tabla-contactos');
            if(!arr.length) {
                tbody.innerHTML = `<tr><td colspan="5" class="p-10 text-center text-gray-500 font-bold">NO HAY REGISTROS.</td></tr>`;
                return;
            }
            
            tbody.innerHTML = arr.map(c => {
                let doc, nom, cel, tlf2, dir, extra;

                if(pestanaActual === 'Clientes') {
                    doc = c.documento_identidad || '-';
                    nom = c.nombre_razon_social || '-';
                    cel = formatearTelefono(c.celular_01 || c.telefono);
                    dir = c.direccion_fiscal || 'SIN DIRECCIÓN';
                    extra = (c.correo || '').toLowerCase();
                } else {
                    doc = c.rif || '-';
                    nom = c.razon_social || '-';
                    cel = formatearTelefono(c.telefono_01);
                    dir = c.direccion_fiscal || 'SIN DIRECCIÓN';
                    extra = c.vendedor_asignado ? `VND: ${c.vendedor_asignado}` : (c.correo || '').toLowerCase();
                }
                
                return `
                <tr class="hover:bg-gray-50 transition border-b border-gray-100">
                    <td class="p-4 font-bold text-blue-600 text-xs">${doc}</td>
                    <td class="p-4 font-bold text-gray-800 text-sm">${nom}</td>
                    <td class="p-4 text-xs text-gray-600 font-bold">
                        <div class="flex items-center gap-2 mb-1"><i class="fa-solid fa-phone text-gray-400"></i> <span class="tracking-wide">${cel}</span></div>
                        ${extra ? `<div class="flex items-center gap-2 text-blue-500"><i class="${extra.includes('@') ? 'fa-solid fa-envelope' : 'fa-solid fa-id-badge'} text-gray-400"></i> ${extra}</div>` : ''}
                    </td>
                    <td class="p-4 text-[10px] text-gray-500 max-w-[250px] leading-tight font-semibold">${dir}</td>
                    <td class="p-4 text-center">
                        <button onclick="alert('EDICIÓN EN DESARROLLO')" class="bg-white border border-gray-200 hover:border-[#143B62] text-[#143B62] px-3 py-2 rounded shadow-sm transition"><i class="fa-solid fa-pen-to-square"></i></button>
                    </td>
                </tr>
                `;
            }).join('');
        }

        function aplicarFiltros() {
            const texto = document.getElementById('buscador-contactos').value.toLowerCase();
            const filtrados = dataActual.filter(c => {
                const doc = (c.documento_identidad || c.rif || '').toLowerCase();
                const nom = (c.nombre_razon_social || c.razon_social || '').toLowerCase();
                return nom.includes(texto) || doc.includes(texto);
            });
            pintarTabla(filtrados);
        }
    </script>
</body>
</html>
