<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>P&P Admin | Directorio Maestro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
    <script src="config.js"></script>
    <script>if (!localStorage.getItem('pyp_token_seguro')) window.location.href = 'login.html';</script>
</head>
<body class="bg-[#f4f6f8] flex h-screen overflow-hidden text-gray-800">
    <script src="menu.js"></script>
    <main class="flex-1 flex flex-col h-screen overflow-hidden bg-[#f4f6f8] w-full z-10 relative">
        <header class="bg-white shadow-sm px-4 py-3 flex justify-between items-center z-10 border-b border-gray-200">
            <h1 class="text-base font-bold text-[#143B62] flex items-center gap-2"><i class="fa-solid fa-address-book text-[#E67E22]"></i> Gestión de Contactos</h1>
            <button onclick="abrirModal()" class="bg-[#25D366] text-white px-5 py-2 rounded-lg font-black text-xs uppercase shadow-md btn-press">+ Nuevo Cliente</button>
        </header>

        <div class="flex-1 overflow-auto p-4 custom-scroll" id="lista-contactos">
            </div>
    </main>

    <div id="modal-cont" class="fixed inset-0 bg-slate-900/80 hidden items-center justify-center z-[100] p-4">
        <div class="bg-white rounded-xl max-w-2xl w-full max-h-[90vh] overflow-y-auto p-6">
            <h2 class="font-black text-lg mb-4 uppercase">Datos del Cliente</h2>
            <form onsubmit="guardar(event)" class="grid grid-cols-2 gap-4">
                <input type="text" id="doc" placeholder="Cédula / RIF" required class="border p-2 rounded font-bold uppercase">
                <input type="text" id="nom" placeholder="Nombre o Razón Social" required class="border p-2 rounded font-bold uppercase">
                <input type="text" id="dir" placeholder="Dirección Fiscal" required class="col-span-2 border p-2 rounded font-bold uppercase">
                <select id="contrib" class="border p-2 rounded font-bold"><option value="NATURAL">NATURAL</option><option value="JURIDICA">JURÍDICA</option></select>
                <select id="nivel" class="border p-2 rounded font-bold"><option value="GENERAL">PRECIO GENERAL</option><option value="P1">PRECIO MAYOR (P1)</option><option value="P2">GRAN MAYOR (P2)</option><option value="P3">DISTRIBUIDOR (P3)</option></select>
                <button type="submit" class="col-span-2 bg-[#143B62] text-white py-3 rounded font-black uppercase shadow-lg">Guardar en Base de Datos</button>
            </form>
        </div>
    </div>
</body>
</html>
