<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin | Directorio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .custom-scroll::-webkit-scrollbar { width: 6px; height: 6px; }
        .custom-scroll::-webkit-scrollbar-thumb { background-color: #cbd5e1; border-radius: 4px; }
        .btn-press:active { transform: scale(0.95); }
    </style>
    <script>if (localStorage.getItem('pyp_sesion_activa') !== 'true') window.location.href = 'login.html';</script>
</head>
<body class="bg-[#f0f2f5] font-sans flex h-screen overflow-hidden text-gray-800">

    <aside class="w-64 bg-[#143B62] text-white flex flex-col hidden md:flex shrink-0 shadow-xl z-20">
        <div class="p-6 border-b border-white/10 flex items-center gap-3">
            <i class="fa-solid fa-layer-group text-[#E67E22] text-3xl"></i>
            <h2 class="font-bold text-xl tracking-wide">P&P Admin</h2>
        </div>
        <nav class="flex-1 p-4 space-y-1 overflow-y-auto custom-scroll text-sm">
            <a href="admin_dashboard.html" class="flex items-center gap-3 text-gray-300 hover:bg-white/10 px-4 py-2.5 rounded-lg font-semibold transition"><i class="fa-solid fa-chart-pie w-5"></i> Dashboard</a>
            <a href="admin_ventas.html" class="flex items-center gap-3 text-gray-300 hover:bg-white/10 px-4 py-2.5 rounded-lg font-semibold transition"><i class="fa-solid fa-cash-register w-5"></i> Ventas (POS)</a>
            <a href="admin_notas.html" class="flex items-center gap-3 text-gray-300 hover:bg-white/10 px-4 py-2.5 rounded-lg font-semibold transition"><i class="fa-solid fa-truck-fast w-5"></i> Despachos</a>
            <a href="admin_presupuestos.html" class="flex items-center gap-3 text-gray-300 hover:bg-white/10 px-4 py-2.5 rounded-lg font-semibold transition"><i class="fa-solid fa-file-invoice w-5"></i> Cotizaciones</a>
            <a href="admin_rma.html" class="flex items-center gap-3 text-gray-300 hover:bg-white/10 px-4 py-2.5 rounded-lg font-semibold transition"><i class="fa-solid fa-rotate-left w-5"></i> RMA / Garantías</a>
            <a href="admin_compras.html" class="flex items-center gap-3 text-gray-300 hover:bg-white/10 px-4 py-2.5 rounded-lg font-semibold transition"><i class="fa-solid fa-truck-ramp-box w-5"></i> Compras</a>
            <a href="admin_productos.html" class="flex items-center gap-3 text-gray-300 hover:bg-white/10 px-4 py-2.5 rounded-lg font-semibold transition"><i class="fa-solid fa-boxes-stacked w-5"></i> Inventario</a>
            <a href="admin_taller.html" class="flex items-center gap-3 text-gray-300 hover:bg-white/10 px-4 py-2.5 rounded-lg font-semibold transition"><i class="fa-solid fa-screwdriver-wrench w-5"></i> Taller</a>
            <a href="admin_bancos.html" class="flex items-center gap-3 text-gray-300 hover:bg-white/10 px-4 py-2.5 rounded-lg font-semibold transition"><i class="fa-solid fa-building-columns w-5"></i> Bancos / Cajas</a>
            <a href="admin_nomina.html" class="flex items-center gap-3 text-gray-300 hover:bg-white/10 px-4 py-2.5 rounded-lg font-semibold transition"><i class="fa-solid fa-hand-holding-dollar w-5"></i> Nómina</a>
            <a href="admin_usuarios.html" class="flex items-center gap-3 text-gray-300 hover:bg-white/10 px-4 py-2.5 rounded-lg font-semibold transition"><i class="fa-solid fa-users-gear w-5"></i> Usuarios y Roles</a>
            <a href="#" class="flex items-center gap-3 bg-[#E67E22] text-white px-4 py-2.5 rounded-lg font-bold shadow-md"><i class="fa-solid fa-address-book w-5"></i> Directorio</a>
        </nav>
        
        <div class="p-4 border-t border-white/10 shrink-0 bg-[#0f2d4a]">
            <button onclick="cerrarSesion()" class="w-full flex items-center justify-center gap-2 bg-red-500/20 text-red-300 hover:bg-red-500 hover:text-white py-2.5 rounded-lg font-bold transition text-sm shadow-sm btn-press">
                <i class="fa-solid fa-power-off"></i> Cerrar Sesión
            </button>
        </div>
    </aside>

    <main class="flex-1 flex flex-col h-screen overflow-hidden bg-gray-50">
        <header class="bg-white shadow-sm px-6 py-4 flex justify-between items-center z-10 shrink-0">
            <div>
                <h1 class="text-xl font-bold text-[#143B62] flex items-center gap-2"><i class="fa-solid fa-address-book"></i> Directorio de Contactos</h1>
            </div>
            
            <div class="flex items-center gap-3">
                <div class="bg-blue-50 px-3 py-1.5 rounded-lg border border-blue-100 flex items-center gap-2 text-xs font-bold text-[#143B62]">
                    <i class="fa-solid fa-user-tie"></i> <span id="nombre-usuario">Usuario</span>
                </div>
                <button onclick="cerrarSesion()" class="md:hidden text-red-500 hover:text-red-700 text-xl transition btn-press"><i class="fa-solid fa-power-off"></i></button>
            </div>
        </header>

        <div class="flex-1 overflow-auto p-4 md:p-6 custom-scroll">
            <div class="bg-white rounded-xl border border-gray-200 shadow-sm overflow-hidden flex flex-col h-full">
                
                <div class="p-4 border-b border-gray-100 flex gap-3 bg-gray-50 justify-between items-center">
                    <div class="flex gap-2">
                        <button id="btn-clientes" onclick="cambiarPestana('Clientes')" class="bg-white border border-gray-300 px-4 py-1.5 rounded font-bold text-sm shadow-sm text-[#143B62] transition btn-press">Clientes</button>
                        <button id="btn-proveedores" onclick="cambiarPestana('Proveedores')" class="bg-gray-100 text-gray-500 px-4 py-1.5 rounded font-semibold text-sm hover:bg-gray-200 transition btn-press">Proveedores</button>
                    </div>

                    <button onclick="alert('Módulo de creación en construcción')" class="bg-[#25D366] hover:bg-[#1ebd5c] text-white px-4 py-2 rounded-lg font-bold text-sm shadow-sm transition flex items-center gap-2 btn-press">
                        <i class="fa-solid fa-plus"></i> <span class="hidden sm:inline">Nuevo Contacto</span>
                    </button>
                </div>

                <div class="p-4 border-b border-gray-100 bg-white">
                    <div class="relative">
                        <i class="fa-solid fa-search absolute left-3 top-2.5 text-gray-400"></i>
                        <input type="text" id="buscador-contactos" oninput="aplicarFiltros()" placeholder="Buscar por RIF, Cédula, Nombre o Empresa..." class="w-full border border-gray-300 rounded-lg pl-10 pr-4 py-2 text-sm focus:outline-none focus:border-[#E67E22]">
                    </div>
                </div>

                <div class="flex-1 overflow-y-auto custom-scroll">
                    <table class="w-full text-left text-sm border-collapse">
                        <thead class="bg-[#143B62] text-white text-[10px] uppercase font-black sticky top-0 z-10">
                            <tr>
                                <th class="p-3">Documento</th>
                                <th class="p-3">Nombre / Razón Social</th>
                                <th class="p-3">Contacto</th>
                                <th class="p-3">Dirección Principal</th>
                                <th class="p-3 text-center">Acciones</th>
                            </tr>
                        </thead>
                        <tbody id="tabla-contactos" class="divide-y divide-gray-100">
                            </tbody>
                    </table>
                </div>

            </div>
        </div>
    </main>

    <script>
        const SUPABASE_URL = 'https://icvfmdvvochzaktugqvj.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImljdmZtZHZ2b2NoemFrdHVncXZqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYyNDEzMzEsImV4cCI6MjA5MTgxNzMzMX0.gO3D39piT6KGbMMOzrPGWXUp5-g_nOBAgJ-nwPv8IcQ';
        
        let dataActual = [];
        let pestanaActual = 'Clientes';

        window.onload = async () => {
            const nombre = localStorage.getItem('pyp_usuario_nombre');
            if(nombre) document.getElementById('nombre-usuario').innerText = nombre.split(' ')[0];
            await cargarDatosDesdeBD('Clientes');
        };

        function cerrarSesion() {
            if(confirm("¿Estás seguro que deseas cerrar sesión?")) {
                localStorage.removeItem('pyp_sesion_activa');
                localStorage.removeItem('pyp_usuario_rol');
                localStorage.removeItem('pyp_usuario_nombre');
                window.location.href = 'login.html';
            }
        }

        async function cargarDatosDesdeBD(tipo) {
            pestanaActual = tipo;
            const tbody = document.getElementById('tabla-contactos');
            tbody.innerHTML = `<tr><td colspan="5" class="p-10 text-center text-gray-400"><i class="fa-solid fa-spinner fa-spin text-xl mb-2 block"></i> Cargando ${tipo.toLowerCase()}...</td></tr>`;

            const nombreTabla = tipo === 'Clientes' ? 'clientes' : 'proveedores';

            try {
                const res = await fetch(`${SUPABASE_URL}/rest/v1/${nombreTabla}?select=*`, { 
                    headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` } 
                });
                
                if (!res.ok) throw new Error("Tabla no encontrada");
                
                dataActual = await res.json();
                aplicarFiltros();
            } catch(e) {
                tbody.innerHTML = `<tr><td colspan="5" class="p-5 text-center text-red-500 font-bold">Error cargando. Por favor asegúrate de que la tabla '${nombreTabla}' exista en Supabase.</td></tr>`;
                dataActual = [];
            }
        }

        function cambiarPestana(pestana) {
            if(pestana === pestanaActual) return;

            const btnC = document.getElementById('btn-clientes');
            const btnP = document.getElementById('btn-proveedores');
            
            if(pestana === 'Clientes') {
                btnC.className = "bg-white border border-gray-300 px-4 py-1.5 rounded font-bold text-sm shadow-sm text-[#143B62] transition btn-press";
                btnP.className = "bg-gray-100 text-gray-500 px-4 py-1.5 rounded font-semibold text-sm hover:bg-gray-200 transition btn-press";
            } else {
                btnP.className = "bg-white border border-gray-300 px-4 py-1.5 rounded font-bold text-sm shadow-sm text-[#143B62] transition btn-press";
                btnC.className = "bg-gray-100 text-gray-500 px-4 py-1.5 rounded font-semibold text-sm hover:bg-gray-200 transition btn-press";
            }
            
            document.getElementById('buscador-contactos').value = '';
            cargarDatosDesdeBD(pestana);
        }

        function pintarTabla(arr) {
            const tbody = document.getElementById('tabla-contactos');
            if(!arr.length) {
                tbody.innerHTML = `<tr><td colspan="5" class="p-10 text-center text-gray-500 font-bold">No hay registros para mostrar.</td></tr>`;
                return;
            }
            
            tbody.innerHTML = arr.map(c => {
                // RADAR AMPLIADO: Busca cualquier nombre posible de columna
                const doc = c.documento_identidad || c.rif || c.cedula || c.documento || c.id_proveedor || '-';
                const nom = c.nombre_razon_social || c.razon_social || c.nombre || c.empresa || c.proveedor || '-';
                const cel = c.celular || c.celular_principal || c.telefono || c.telefono_principal || c.tlf || c.contacto || 'N/A';
                const dir = c.direccion_fiscal || c.direccion_entrega || c.direccion || c.direccion_principal || 'Sin dirección registrada';
                const correo = c.correo || c.email || c.correo_electronico || '';
                
                return `
                <tr class="hover:bg-gray-50 transition border-b border-gray-100">
                    <td class="p-4 font-bold text-blue-600 text-xs">${doc}</td>
                    <td class="p-4 font-bold text-gray-800">${nom}</td>
                    <td class="p-4 text-xs text-gray-600">
                        <div class="flex items-center gap-2 mb-1"><i class="fa-solid fa-phone text-gray-400"></i> ${cel}</div>
                        ${correo ? `<div class="flex items-center gap-2"><i class="fa-solid fa-envelope text-gray-400"></i> ${correo}</div>` : ''}
                    </td>
                    <td class="p-4 text-xs text-gray-500 max-w-[200px] truncate" title="${dir}">${dir}</td>
                    <td class="p-4 text-center">
                        <button onclick="alert('Función de edición en construcción')" class="bg-gray-100 hover:bg-gray-200 text-[#143B62] px-3 py-1.5 rounded shadow-sm transition"><i class="fa-solid fa-pen-to-square"></i></button>
                    </td>
                </tr>
                `;
            }).join('');
        }

        function aplicarFiltros() {
            const texto = document.getElementById('buscador-contactos').value.toLowerCase();
            
            const filtrados = dataActual.filter(c => {
                const doc = c.documento_identidad || c.rif || c.cedula || c.documento || '';
                const nom = c.nombre_razon_social || c.razon_social || c.nombre || c.empresa || c.proveedor || '';
                
                return nom.toLowerCase().includes(texto) || doc.toLowerCase().includes(texto);
            });
            
            pintarTabla(filtrados);
        }
    </script>
</body>
</html>
