<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>P&P Admin | Directorio Maestro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/fuse.js/dist/fuse.js"></script>
    <style>
        body { font-family: 'Inter', sans-serif; }
        .custom-scroll::-webkit-scrollbar { width: 5px; height: 5px; }
        .custom-scroll::-webkit-scrollbar-thumb { background-color: #cbd5e1; border-radius: 4px; }
        .btn-press:active { transform: scale(0.97); }
        .fade-in { animation: fadeIn 0.2s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        .tab-active { border-bottom: 3px solid #E67E22; color: #143B62; font-weight: 800; }
        .tab-inactive { color: #64748b; font-weight: 500; border-bottom: 3px solid transparent; }
        .btn-vista.active { background-color: #e2e8f0; color: #143B62; border-color: #cbd5e1; }
        .param-label { font-size: 10px; color: #64748b; text-transform: uppercase; letter-spacing: 0.05em; font-weight: 700; }
    </style>
    
    <script src="config.js"></script>
    <script>if (!localStorage.getItem('pyp_token_seguro')) window.location.href = 'login.html';</script>
</head>
<body class="bg-[#f4f6f8] flex h-screen overflow-hidden text-gray-800 relative">

    <script src="menu.js"></script>

    <main class="flex-1 flex flex-col h-screen overflow-hidden bg-[#f4f6f8] w-full z-10 relative">
        <header class="bg-white shadow-sm px-4 py-2 flex justify-between items-center z-10 shrink-0 border-b border-gray-200 h-14">
            <div class="flex items-center gap-3">
                <button onclick="toggleMobileMenu()" class="md:hidden text-gray-600 hover:text-[#143B62] text-xl transition px-2"><i class="fa-solid fa-bars"></i></button>
                <h1 class="text-base font-semibold text-[#143B62] flex items-center gap-2"><i class="fa-solid fa-address-book text-[#E67E22]"></i> Directorio Maestro</h1>
            </div>
            <div class="flex items-center gap-3 shrink-0">
                <button onclick="window.location.reload()" class="md:hidden text-blue-600 bg-blue-50 w-8 h-8 rounded-full flex items-center justify-center hover:bg-blue-100 transition shadow-sm btn-press"><i class="fa-solid fa-rotate-right"></i></button>
                <div class="text-[11px] font-semibold text-gray-500 bg-gray-100 px-3 py-1 rounded border border-gray-200 uppercase tracking-wide hidden sm:block">
                    <i class="fa-solid fa-user-tie text-[#143B62] mr-1"></i> <span id="nombre-usuario">Admin</span>
                </div>
            </div>
        </header>

        <div class="flex-1 overflow-auto p-2 md:p-3 custom-scroll pb-24 md:pb-6 flex flex-col">
            
            <div class="bg-white rounded-t-xl border border-gray-200 border-b-0 px-4 pt-3 flex gap-6 shrink-0">
                <button onclick="cambiarPestana('CLIENTE')" id="tab-clientes" class="tab-active pb-2 px-2 text-xs uppercase tracking-wider transition">Clientes</button>
                <button onclick="cambiarPestana('PROVEEDOR')" id="tab-proveedores" class="tab-inactive pb-2 px-2 text-xs uppercase tracking-wider transition">Proveedores</button>
            </div>

            <div class="bg-white p-3 border border-gray-200 shadow-sm flex flex-col sm:flex-row justify-between items-center gap-3 shrink-0">
                <div class="w-full sm:w-2/3 flex flex-col sm:flex-row gap-2">
                    <div class="relative flex-1">
                        <i class="fa-solid fa-search absolute left-3 top-2.5 text-gray-400 text-sm"></i>
                        <input type="text" id="buscador" oninput="filtrarContactos()" placeholder="Buscar (Ignora acentos)..." class="w-full border border-gray-300 rounded-md pl-9 pr-4 py-1.5 text-xs focus:outline-none focus:border-[#143B62] uppercase transition">
                    </div>
                    <select id="filtro-categoria" onchange="filtrarContactos()" class="w-full sm:w-1/3 border border-gray-300 rounded-md px-3 py-1.5 text-xs text-[#143B62] font-semibold focus:outline-none focus:border-[#E67E22] bg-gray-50">
                        <option value="TODAS">TODOS LOS RUBROS</option>
                    </select>
                </div>
                
                <div class="flex gap-2 w-full sm:w-auto justify-end">
                    <div class="flex bg-gray-50 rounded-md border border-gray-300 p-0.5 shadow-inner">
                        <button id="btn-vista-tabla" onclick="cambiarVista('tabla')" class="btn-vista active px-3 py-1 rounded text-gray-500 hover:text-[#143B62] transition text-sm"><i class="fa-solid fa-list"></i></button>
                        <button id="btn-vista-grid" onclick="cambiarVista('grid')" class="btn-vista px-3 py-1 rounded text-gray-500 hover:text-[#143B62] transition text-sm"><i class="fa-solid fa-border-all"></i></button>
                    </div>
                    <button onclick="abrirModalContacto()" class="bg-[#25D366] hover:bg-[#1ebd5c] text-white px-4 py-1.5 rounded-md font-bold text-[12px] shadow-sm transition btn-press flex justify-center items-center gap-2 whitespace-nowrap">
                        <i class="fa-solid fa-plus"></i> <span id="lbl-btn-nuevo">NUEVO CLIENTE</span>
                    </button>
                </div>
            </div>

            <div id="contenedor-contactos" class="flex-1 bg-white border border-gray-200 border-t-0 rounded-b-xl shadow-sm flex flex-col min-h-[400px]">
                <div class="p-10 text-center text-gray-400"><i class="fa-solid fa-spinner fa-spin text-2xl mb-2 block"></i> Sincronizando Directorio...</div>
            </div>
        </div>
    </main>

    <div id="modal-contacto" class="fixed inset-0 bg-gray-900/60 backdrop-blur-sm z-[100] hidden flex items-center justify-center p-4 fade-in">
        <div class="bg-white rounded-lg shadow-2xl w-full max-w-3xl max-h-[90vh] flex flex-col overflow-hidden border border-gray-200 relative">
            <div class="bg-[#143B62] text-white px-5 py-3 flex justify-between items-center shrink-0">
                <h3 class="font-medium text-sm tracking-wide flex items-center uppercase" id="modal-titulo">REGISTRO</h3>
                <button onclick="cerrarModalContacto()" class="text-gray-300 hover:text-white text-lg transition"><i class="fa-solid fa-times"></i></button>
            </div>
            
            <form id="form-contacto" onsubmit="guardarContacto(event)" class="flex-1 overflow-y-auto custom-scroll p-4 md:p-5 bg-gray-50">
                <input type="hidden" id="cont-modo-edicion" value="false">
                <input type="hidden" id="cont-id-original" value="">
                
                <div class="bg-white p-4 rounded border border-gray-200 shadow-sm mb-4">
                    <h4 class="text-[11px] font-bold text-[#E67E22] uppercase border-b border-gray-100 pb-2 mb-3 tracking-wider">Identificación Legal</h4>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-3">
                        <div>
                            <label class="block param-label mb-1">Doc. Identidad / RIF *</label>
                            <input type="text" id="cont-doc" required class="w-full border border-gray-300 rounded px-2 py-1.5 text-xs font-bold focus:border-[#143B62] outline-none uppercase">
                        </div>
                        <div>
                            <label class="block param-label mb-1">Nombre o Razón Social *</label>
                            <input type="text" id="cont-nombre" required class="w-full border border-gray-300 rounded px-2 py-1.5 text-xs font-bold focus:border-[#143B62] outline-none uppercase">
                        </div>
                    </div>
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                        <div class="md:col-span-2"><label class="block param-label mb-1">Dirección Fiscal / Principal</label><input type="text" id="cont-dir-p" class="w-full border border-gray-300 rounded px-2 py-1.5 text-xs outline-none uppercase"></div>
                        <div><label class="block param-label mb-1 text-purple-600">Categoría / Rubro</label><select id="cont-categoria" class="w-full border border-gray-300 rounded px-2 py-1.5 text-xs font-semibold focus:border-purple-500 outline-none bg-purple-50"><option value="">SIN CATEGORIZAR</option></select></div>
                    </div>
                </div>

                <div class="bg-white p-4 rounded border border-gray-200 shadow-sm mb-4">
                    <h4 class="text-[11px] font-bold text-[#143B62] uppercase border-b border-gray-100 pb-2 mb-3 tracking-wider">Comunicación Directa</h4>
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-3">
                        <div><label class="block param-label mb-1">Celular Principal *</label><input type="text" id="cont-tel1" required class="w-full border border-gray-300 rounded px-2 py-1.5 text-xs font-bold focus:border-[#143B62] outline-none bg-blue-50" placeholder="Ej: 04141234567"></div>
                        <div><label class="block param-label mb-1">Teléfono Alternativo</label><input type="text" id="cont-tel2" class="w-full border border-gray-300 rounded px-2 py-1.5 text-xs outline-none"></div>
                        <div><label class="block param-label mb-1">Correo Electrónico</label><input type="email" id="cont-email" class="w-full border border-gray-300 rounded px-2 py-1.5 text-xs outline-none"></div>
                    </div>
                    <div class="w-1/3"><label class="block param-label mb-1">Estatus</label><select id="cont-estatus" class="w-full border border-gray-300 rounded px-2 py-1.5 text-xs font-bold outline-none"><option value="ACTIVO">ACTIVO</option><option value="INACTIVO">INACTIVO</option></select></div>
                </div>

                <div id="caja-cliente" class="bg-white p-4 rounded border border-gray-200 shadow-sm border-l-4 border-l-emerald-500">
                    <h4 class="text-[11px] font-bold text-emerald-600 uppercase border-b border-gray-100 pb-2 mb-3 tracking-wider">Parámetros de Venta (Cliente)</h4>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div><label class="block param-label mb-1">Dirección de Entrega</label><input type="text" id="cli-dir-sec" class="w-full border border-gray-300 rounded px-2 py-1.5 text-xs outline-none uppercase"></div>
                        <div class="grid grid-cols-2 gap-2">
                            <div><label class="block param-label mb-1">Tipo Persona</label><select id="cli-tipo" class="w-full border border-gray-300 rounded px-2 py-1.5 text-xs outline-none"><option value="NATURAL">NATURAL</option><option value="JURIDICA">JURÍDICA</option></select></div>
                            <div><label class="block param-label mb-1">Nivel de Precio</label><select id="cli-nivel" class="w-full border border-gray-300 rounded px-2 py-1.5 text-xs outline-none"><option value="GENERAL">GENERAL</option><option value="P1">MAYOR (P1)</option><option value="P2">GRAN MAYOR (P2)</option><option value="P3">DISTRIBUIDOR (P3)</option></select></div>
                        </div>
                    </div>
                </div>

                <div id="caja-proveedor" class="bg-white p-4 rounded border border-gray-200 shadow-sm border-l-4 border-l-purple-500 hidden">
                    <h4 class="text-[11px] font-bold text-purple-600 uppercase border-b border-gray-100 pb-2 mb-3 tracking-wider">Parámetros de Compra (Proveedor)</h4>
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-3">
                        <div class="md:col-span-2"><label class="block param-label mb-1">Dirección Sucursal</label><input type="text" id="prov-dir-sec" class="w-full border border-gray-300 rounded px-2 py-1.5 text-xs outline-none uppercase"></div>
                        <div><label class="block param-label mb-1">Contribuyente</label><select id="prov-clas" class="w-full border border-gray-300 rounded px-2 py-1.5 text-xs outline-none"><option value="ORDINARIO">ORDINARIO</option><option value="ESPECIAL">ESPECIAL</option><option value="FORMAL">FORMAL</option></select></div>
                    </div>
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                        <div><label class="block param-label mb-1">Vendedor Asignado</label><input type="text" id="prov-ven-nom" class="w-full border border-gray-300 rounded px-2 py-1.5 text-xs outline-none uppercase"></div>
                        <div><label class="block param-label mb-1">Celular Vendedor</label><input type="text" id="prov-ven-cel" class="w-full border border-gray-300 rounded px-2 py-1.5 text-xs outline-none"></div>
                        <div><label class="block param-label mb-1">Días de Crédito</label><input type="number" id="prov-dias" value="0" class="w-full border border-gray-300 rounded px-2 py-1.5 text-xs text-center font-bold bg-gray-50 outline-none"></div>
                    </div>
                </div>
            </form>

            <div class="bg-gray-50 border-t border-gray-200 px-4 py-3 flex gap-3 justify-end shrink-0">
                <button type="button" onclick="cerrarModalContacto()" class="px-5 py-2 bg-white border border-gray-300 text-gray-700 font-medium rounded-md text-[12px] shadow-sm hover:bg-gray-100 transition btn-press">Cancelar</button>
                <button type="submit" form="form-contacto" id="btn-guardar-cont" class="px-5 py-2 bg-[#143B62] text-white font-medium rounded-md text-[12px] shadow-sm hover:bg-[#0f2d4a] transition flex items-center gap-2 btn-press"><i class="fa-solid fa-save"></i> Guardar</button>
            </div>
        </div>
    </div>

    <script>
        const TOKEN_JWT = localStorage.getItem('pyp_token_seguro');
        let tipoActual = 'CLIENTE';
        let vistaActual = localStorage.getItem('pyp_vista_contactos') || 'tabla';
        let dbDirectorio = [];
        let fuseMaestro = null;

        window.onload = async () => {
            const nombre = localStorage.getItem('pyp_usuario_nombre');
            if(nombre) document.getElementById('nombre-usuario').innerText = nombre.split(' ')[0];
            actualizarUIBotonesVista();
            await cargarDatos();
        };

        document.addEventListener('keydown', (e) => { if(e.key === 'Escape') cerrarModalContacto(); });

        async function cargarDatos() {
            try {
                // Traemos los contactos y los parámetros (categorías)
                const [resDir, resPar] = await Promise.all([
                    fetch(`${SUPABASE_URL}/rest/v1/directorio_maestro?select=*&order=nombre_razon_social.asc`, { headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${TOKEN_JWT}` } }),
                    fetch(`${SUPABASE_URL}/rest/v1/parametros_inventario?select=*&grupo=eq.CATEGORIA_CONTACTO&estatus=eq.ACTIVO`, { headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${TOKEN_JWT}` } })
                ]);
                
                dbDirectorio = await resDir.json();
                const categorias = await resPar.json();
                
                // Llenar el filtro y el formulario con las categorías
                let optsHtml = '<option value="">SIN CATEGORIZAR</option>';
                let filtroHtml = '<option value="TODAS">TODOS LOS RUBROS</option><option value="SIN_CATEGORIA">SIN CATEGORIZAR</option>';
                categorias.forEach(c => { 
                    optsHtml += `<option value="${c.valor}">${c.valor}</option>`;
                    filtroHtml += `<option value="${c.valor}">${c.valor}</option>`;
                });
                document.getElementById('cont-categoria').innerHTML = optsHtml;
                document.getElementById('filtro-categoria').innerHTML = filtroHtml;

                fuseMaestro = new Fuse(dbDirectorio, { keys: ['documento_identidad', 'nombre_razon_social', 'vendedor_asignado'], threshold: 0.15, ignoreLocation: true });

                renderizarPantalla();
            } catch(e) { document.getElementById('contenedor-contactos').innerHTML = `<div class="p-10 text-center text-red-500 font-bold uppercase">Error de conexión a la Base de Datos.</div>`; }
        }

        function cambiarPestana(tipo) {
            tipoActual = tipo;
            document.getElementById('tab-clientes').className = tipo === 'CLIENTE' ? 'tab-active pb-2 px-2 text-xs uppercase tracking-wider transition' : 'tab-inactive pb-2 px-2 text-xs uppercase tracking-wider transition';
            document.getElementById('tab-proveedores').className = tipo === 'PROVEEDOR' ? 'tab-active pb-2 px-2 text-xs uppercase tracking-wider transition' : 'tab-inactive pb-2 px-2 text-xs uppercase tracking-wider transition';
            document.getElementById('lbl-btn-nuevo').innerText = tipo === 'CLIENTE' ? 'NUEVO CLIENTE' : 'NUEVO PROVEEDOR';
            document.getElementById('buscador').value = '';
            document.getElementById('filtro-categoria').value = 'TODAS';
            renderizarPantalla();
        }

        function cambiarVista(v) { vistaActual = v; localStorage.setItem('pyp_vista_contactos', v); actualizarUIBotonesVista(); renderizarPantalla(); }
        function actualizarUIBotonesVista() { document.getElementById('btn-vista-tabla').classList.toggle('active', vistaActual === 'tabla'); document.getElementById('btn-vista-grid').classList.toggle('active', vistaActual === 'grid'); }
        function filtrarContactos() { renderizarPantalla(); }

        function renderizarPantalla() {
            const query = document.getElementById('buscador').value.trim();
            const categoria = document.getElementById('filtro-categoria').value;
            
            let dataFiltrada = dbDirectorio.filter(p => p.tipo_persona === tipoActual);

            if (query !== '') {
                const resultadosFuse = fuseMaestro.search(query);
                dataFiltrada = resultadosFuse.map(r => r.item).filter(p => p.tipo_persona === tipoActual);
            }
            
            // Aplicar Filtro de Categoría
            if (categoria !== 'TODAS') {
                if(categoria === 'SIN_CATEGORIA') dataFiltrada = dataFiltrada.filter(p => !p.categoria_contacto);
                else dataFiltrada = dataFiltrada.filter(p => p.categoria_contacto === categoria);
            }

            const c = document.getElementById('contenedor-contactos');
            if(dataFiltrada.length === 0) {
                c.innerHTML = `<div class="p-10 text-center text-gray-400 font-medium"><i class="fa-solid fa-folder-open text-3xl mb-2 block opacity-50"></i> No se encontraron registros.</div>`;
                return;
            }

            if(vistaActual === 'tabla') {
                let html = `<div class="overflow-x-auto flex-1 custom-scroll"><table class="w-full text-left text-xs whitespace-nowrap min-w-[900px]">`;
                
                if(tipoActual === 'CLIENTE') {
                    html += `<thead class="bg-[#143B62] text-white text-[10px] uppercase tracking-wider sticky top-0"><tr><th class="py-3 px-4 w-[15%]">Doc / RIF</th><th class="py-3 px-4 w-[25%]">Razón Social</th><th class="py-3 px-4">Categoría</th><th class="py-3 px-4 w-[15%]">Celular</th><th class="py-3 px-4 w-[25%]">Dirección</th><th class="py-3 px-4 text-center w-[5%]">Acción</th></tr></thead><tbody class="divide-y divide-gray-100">`;
                    dataFiltrada.forEach(item => {
                        const itemStr = encodeURIComponent(JSON.stringify(item));
                        html += `<tr class="hover:bg-gray-50 transition border-b border-gray-50"><td class="py-2.5 px-4 font-mono text-[11px] font-semibold text-gray-500">${item.documento_identidad || '-'}</td><td class="py-2.5 px-4 font-bold text-[#143B62] truncate max-w-[200px]">${item.nombre_razon_social}</td><td class="py-2.5 px-4"><span class="bg-purple-50 text-purple-600 border border-purple-200 text-[9px] font-bold px-2 py-0.5 rounded">${item.categoria_contacto || 'N/A'}</span></td><td class="py-2.5 px-4 text-gray-600 font-mono">${item.telefono_principal || '-'}</td><td class="py-2.5 px-4 text-gray-500 truncate max-w-[250px]">${item.direccion_principal || '-'}</td><td class="py-2.5 px-4 text-center"><button onclick="abrirModalContacto('${itemStr}')" class="text-blue-500 hover:bg-blue-50 px-2 py-1 rounded transition"><i class="fa-solid fa-pen-to-square"></i></button></td></tr>`;
                    });
                } else {
                    html += `<thead class="bg-[#143B62] text-white text-[10px] uppercase tracking-wider sticky top-0"><tr><th class="py-3 px-4">Doc / RIF</th><th class="py-3 px-4">Razón Social</th><th class="py-3 px-4">Rubro</th><th class="py-3 px-4">Teléfono 1</th><th class="py-3 px-4">Vendedor</th><th class="py-3 px-4 text-center">Acción</th></tr></thead><tbody class="divide-y divide-gray-100">`;
                    dataFiltrada.forEach(item => {
                        const itemStr = encodeURIComponent(JSON.stringify(item));
                        html += `<tr class="hover:bg-gray-50 transition border-b border-gray-50"><td class="py-2.5 px-4 font-mono text-[11px] font-semibold text-gray-500">${item.documento_identidad || '-'}</td><td class="py-2.5 px-4 font-bold text-[#143B62] truncate max-w-[200px]">${item.nombre_razon_social}</td><td class="py-2.5 px-4"><span class="bg-purple-50 text-purple-600 border border-purple-200 text-[9px] font-bold px-2 py-0.5 rounded">${item.categoria_contacto || 'N/A'}</span></td><td class="py-2.5 px-4 text-gray-600 font-mono">${item.telefono_principal || '-'}</td><td class="py-2.5 px-4 text-gray-600 font-semibold truncate max-w-[150px]">${item.vendedor_asignado || 'NO ASIGNADO'}</td><td class="py-2.5 px-4 text-center"><button onclick="abrirModalContacto('${itemStr}')" class="text-blue-500 hover:bg-blue-50 px-2 py-1 rounded transition"><i class="fa-solid fa-pen-to-square"></i></button></td></tr>`;
                    });
                }
                html += `</tbody></table></div>`; c.innerHTML = html;
            } else {
                let html = `<div class="p-4 grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4 overflow-y-auto custom-scroll">`;
                dataFiltrada.forEach(item => {
                    const itemStr = encodeURIComponent(JSON.stringify(item));
                    const esCliente = tipoActual === 'CLIENTE';
                    html += `
                    <div class="bg-white border border-gray-200 rounded-lg p-4 flex flex-col shadow-sm relative hover:border-[#E67E22] transition fade-in">
                        <div class="flex justify-between items-start mb-2">
                            <div class="bg-gray-100 px-2 py-1 rounded font-mono text-[10px] font-bold text-gray-600 w-fit">${item.documento_identidad || '-'}</div>
                            ${item.categoria_contacto ? `<div class="bg-purple-50 text-purple-600 border border-purple-200 px-2 py-0.5 rounded text-[9px] font-bold uppercase tracking-wider">${item.categoria_contacto}</div>` : ''}
                        </div>
                        <h3 class="font-bold text-[#143B62] text-[13px] leading-tight mb-3 line-clamp-2">${item.nombre_razon_social}</h3>
                        <div class="text-[11px] text-gray-500 space-y-1.5 mb-4 flex-1">
                            <p><i class="fa-solid fa-phone w-4 text-gray-400"></i> ${item.telefono_principal || '-'}</p>
                            <p class="truncate" title="${item.correo_electronico}"><i class="fa-solid fa-envelope w-4 text-gray-400"></i> ${item.correo_electronico || '-'}</p>
                            <p class="line-clamp-2"><i class="fa-solid fa-location-dot w-4 text-gray-400"></i> ${item.direccion_principal || '-'}</p>
                            ${!esCliente ? `<div class="mt-2 pt-2 border-t border-gray-50"><p class="text-purple-600 font-bold uppercase text-[9px] mb-1">Vendedor</p><p><i class="fa-solid fa-user-tie w-4"></i> ${item.vendedor_asignado || 'N/A'}</p></div>` : ''}
                        </div>
                        <div class="border-t border-gray-100 pt-3 flex justify-end">
                            <button onclick="abrirModalContacto('${itemStr}')" class="text-[11px] bg-blue-50 text-blue-700 font-bold px-3 py-1.5 rounded uppercase tracking-wider hover:bg-blue-100 transition"><i class="fa-solid fa-pen-to-square mr-1"></i> Editar</button>
                        </div>
                    </div>`;
                });
                html += `</div>`; c.innerHTML = html;
            }
        }

        function abrirModalContacto(itemStr = null) {
            const f = document.getElementById('form-contacto'); f.reset();
            document.getElementById('caja-cliente').classList.toggle('hidden', tipoActual !== 'CLIENTE');
            document.getElementById('caja-proveedor').classList.toggle('hidden', tipoActual !== 'PROVEEDOR');

            if (itemStr) {
                const c = JSON.parse(decodeURIComponent(itemStr));
                document.getElementById('modal-titulo').innerText = `EDITAR ${tipoActual}`;
                document.getElementById('cont-modo-edicion').value = "true";
                document.getElementById('cont-id-original').value = c.id;
                document.getElementById('cont-doc').value = c.documento_identidad || '';
                document.getElementById('cont-nombre').value = c.nombre_razon_social || '';
                document.getElementById('cont-categoria').value = c.categoria_contacto || '';
                document.getElementById('cont-dir-p').value = c.direccion_principal || '';
                document.getElementById('cont-email').value = c.correo_electronico || '';
                document.getElementById('cont-tel1').value = c.telefono_principal || '';
                document.getElementById('cont-tel2').value = c.telefono_secundario || '';
                document.getElementById('cont-estatus').value = c.estatus || 'ACTIVO';
                
                if(tipoActual === 'CLIENTE') {
                    document.getElementById('cli-dir-sec').value = c.direccion_secundaria || '';
                    document.getElementById('cli-tipo').value = c.tipo_contribuyente || 'NATURAL';
                    document.getElementById('cli-nivel').value = c.nivel_precio || 'GENERAL';
                } else {
                    document.getElementById('prov-dir-sec').value = c.direccion_secundaria || '';
                    document.getElementById('prov-clas').value = c.clasificacion_fiscal || 'ORDINARIO';
                    document.getElementById('prov-ven-nom').value = c.vendedor_asignado || '';
                    document.getElementById('prov-ven-cel').value = c.celular_vendedor || '';
                    document.getElementById('prov-dias').value = c.dias_credito || 0;
                }
            } else {
                document.getElementById('modal-titulo').innerText = `NUEVO ${tipoActual}`;
                document.getElementById('cont-modo-edicion').value = "false";
                document.getElementById('cont-id-original').value = "";
            }
            document.getElementById('modal-contacto').classList.remove('hidden');
        }
        
        function cerrarModalContacto() { document.getElementById('modal-contacto').classList.add('hidden'); }

        async function guardarContacto(e) {
            e.preventDefault();
            const btn = document.getElementById('btn-guardar-cont'); btn.innerHTML = `<i class="fa-solid fa-spinner fa-spin"></i> Guardando...`; btn.disabled = true;
            const isEdit = document.getElementById('cont-modo-edicion').value === "true";
            const idOriginal = document.getElementById('cont-id-original').value;

            try {
                const resUser = await fetch(`${SUPABASE_URL}/rest/v1/usuarios?select=id_empresa&limit=1`, { headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${TOKEN_JWT}` } });
                const dataUser = await resUser.json();
                const miEmpresa = dataUser.length > 0 ? dataUser[0].id_empresa : null;

                const payload = {
                    id_empresa: miEmpresa,
                    tipo_persona: tipoActual,
                    documento_identidad: document.getElementById('cont-doc').value.trim().toUpperCase(),
                    nombre_razon_social: document.getElementById('cont-nombre').value.trim().toUpperCase(),
                    categoria_contacto: document.getElementById('cont-categoria').value || null,
                    direccion_principal: document.getElementById('cont-dir-p').value.trim().toUpperCase(),
                    correo_electronico: document.getElementById('cont-email').value.trim().toLowerCase(),
                    telefono_principal: document.getElementById('cont-tel1').value.trim(),
                    telefono_secundario: document.getElementById('cont-tel2').value.trim(),
                    estatus: document.getElementById('cont-estatus').value,
                    direccion_secundaria: tipoActual === 'CLIENTE' ? document.getElementById('cli-dir-sec').value.trim().toUpperCase() : document.getElementById('prov-dir-sec').value.trim().toUpperCase(),
                    tipo_contribuyente: tipoActual === 'CLIENTE' ? document.getElementById('cli-tipo').value : null,
                    nivel_precio: tipoActual === 'CLIENTE' ? document.getElementById('cli-nivel').value : null,
                    clasificacion_fiscal: tipoActual === 'PROVEEDOR' ? document.getElementById('prov-clas').value : null,
                    vendedor_asignado: tipoActual === 'PROVEEDOR' ? document.getElementById('prov-ven-nom').value.trim().toUpperCase() : null,
                    celular_vendedor: tipoActual === 'PROVEEDOR' ? document.getElementById('prov-ven-cel').value.trim() : null,
                    dias_credito: tipoActual === 'PROVEEDOR' ? parseInt(document.getElementById('prov-dias').value) || 0 : 0
                };

                const url = isEdit ? `${SUPABASE_URL}/rest/v1/directorio_maestro?id=eq.${idOriginal}` : `${SUPABASE_URL}/rest/v1/directorio_maestro`;
                const method = isEdit ? 'PATCH' : 'POST';

                const res = await fetch(url, { method: method, headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${TOKEN_JWT}`, 'Content-Type': 'application/json', 'Prefer': 'return=minimal' }, body: JSON.stringify(payload) });
                if(!res.ok) throw new Error("Error guardando en base de datos.");

                cerrarModalContacto(); await cargarTodo();
            } catch(e) { alert("Error al guardar: " + e.message); } finally { btn.innerHTML = `<i class="fa-solid fa-save"></i> Guardar`; btn.disabled = false; }
        }

        async function cargarTodo() { await cargarDatos(); }
    </script>
</body>
</html>
