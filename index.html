<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo P&P Soluciones</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-50 font-sans">

    <nav class="bg-[#1a365d] text-white sticky top-0 z-50 shadow-lg">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-16">
                <div class="flex-shrink-0 flex items-center gap-2">
                    <i class="fa-solid fa-layer-group text-2xl text-blue-400"></i>
                    <span class="font-bold text-xl tracking-wider">P&P Soluciones</span>
                </div>
                
                <div class="flex-1 max-w-2xl mx-8 hidden md:block">
                    <div class="relative">
                        <input type="text" id="buscador" onkeyup="filtrarProductos()" placeholder="Busca en P&P Soluciones..." 
                               class="w-full text-gray-900 rounded-full pl-4 pr-10 py-2 focus:outline-none focus:ring-2 focus:ring-blue-400">
                        <i class="fa-solid fa-search absolute right-4 top-3 text-gray-400"></i>
                    </div>
                </div>

                <div class="flex items-center gap-6">
                    <div class="bg-[#0f2342] px-3 py-1 rounded border border-blue-800 text-xs text-center">
                        <p class="text-blue-300 font-bold">Tasa BCV</p>
                        <p class="text-yellow-400 font-black" id="tasa-bcv-display">Bs. 0.00</p>
                    </div>
                    <button class="relative hover:text-blue-300 transition">
                        <i class="fa-solid fa-cart-shopping text-xl"></i>
                        <span class="absolute -top-2 -right-2 bg-red-500 text-white text-[10px] font-bold px-1.5 py-0.5 rounded-full">0</span>
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <div class="bg-white border-b shadow-sm overflow-x-auto">
        <div class="max-w-7xl mx-auto px-4 py-3 flex gap-4 text-sm font-semibold text-gray-600" id="contenedor-categorias">
            </div>
    </div>

    <main class="max-w-7xl mx-auto px-4 py-8">
        <h2 class="text-2xl font-black text-[#1a365d] mb-6 border-l-4 border-yellow-400 pl-3">Nuestros Productos</h2>
        
        <div id="catalogo" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-5 gap-4">
            <p class="col-span-full text-center text-gray-500 animate-pulse py-10">Cargando inventario...</p>
        </div>
    </main>

    <script>
        // ¡REEMPLAZA AQUÍ TUS LLAVES!
        const SUPABASE_URL = 'PAGA_AQUI_TU_URL_DE_SUPABASE';
        const SUPABASE_KEY = 'PEGA_AQUI_TU_LLAVE_ANON_LARGUISIMA';

        let todosLosProductos = []; // Memoria global para el buscador

        async function cargarDatos() {
            try {
                // 1. Obtener Tasa BCV
                const resTasa = await fetch(`${SUPABASE_URL}/rest/v1/tasas_bcv?select=tasa&order=fecha_actualizacion.desc&limit=1`, {
                    headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` }
                });
                const dataTasa = await resTasa.json();
                if(dataTasa.length > 0) {
                    document.getElementById('tasa-bcv-display').innerText = `Bs. ${dataTasa[0].tasa.toFixed(2)}`;
                }

                // 2. Obtener Productos
                const resProd = await fetch(`${SUPABASE_URL}/rest/v1/vista_catalogo_web?select=*`, {
                    headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` }
                });
                todosLosProductos = await resProd.json();
                
                extraerCategorias(todosLosProductos);
                renderizarProductos(todosLosProductos);

            } catch (error) {
                console.error('Error:', error);
                document.getElementById('catalogo').innerHTML = '<p class="text-red-500 col-span-full text-center">Error cargando los datos.</p>';
            }
        }

        // DIBUJAR LOS PRODUCTOS EN PANTALLA
        function renderizarProductos(productos) {
            const contenedor = document.getElementById('catalogo');
            contenedor.innerHTML = '';

            if (productos.length === 0) {
                contenedor.innerHTML = '<p class="col-span-full text-center text-gray-500 py-10">No se encontraron productos.</p>';
                return;
            }

            productos.forEach(prod => {
                const imagen = prod.imagen_principal || 'https://via.placeholder.com/300?text=Sin+Imagen';
                
                const card = `
                    <div class="bg-white rounded-lg shadow hover:shadow-lg transition-all overflow-hidden border border-gray-100 flex flex-col group relative">
                        <button class="absolute top-2 right-2 text-gray-300 hover:text-red-500 z-10"><i class="fa-solid fa-heart"></i></button>
                        
                        <div class="h-40 w-full p-2 bg-white flex justify-center items-center">
                            <img src="${imagen}" alt="${prod.nombre}" class="max-h-full max-w-full object-contain group-hover:scale-105 transition-transform duration-300">
                        </div>
                        <div class="p-3 flex flex-col flex-grow border-t border-gray-50">
                            <span class="text-[10px] font-bold text-blue-600 bg-blue-50 px-2 py-0.5 rounded w-max mb-1">${prod.categoria || 'General'}</span>
                            <h3 class="text-xs font-bold text-gray-800 leading-tight mb-2 line-clamp-2" title="${prod.nombre}">${prod.nombre}</h3>
                            
                            <div class="mt-auto">
                                <div class="flex items-baseline gap-1">
                                    <span class="text-[10px] text-gray-500 font-bold">US $</span>
                                    <span class="text-lg font-black text-[#1a365d]">${prod.precio_detal_usd.toFixed(2)}</span>
                                </div>
                                <div class="flex justify-between items-center mt-1">
                                    <span class="text-[10px] font-bold text-gray-400">Bs. ${prod.precio_detal_bs.toFixed(2)}</span>
                                    <span class="text-[10px] text-gray-400">Stock: ${prod.stock_actual}</span>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
                contenedor.innerHTML += card;
            });
        }

        // BUSCADOR EN TIEMPO REAL
        function filtrarProductos() {
            const texto = document.getElementById('buscador').value.toLowerCase();
            const filtrados = todosLosProductos.filter(p => p.nombre.toLowerCase().includes(texto));
            renderizarProductos(filtrados);
        }

        // EXTRAER CATEGORIAS DINÁMICAS
        function extraerCategorias(productos) {
            const categorias = [...new Set(productos.map(p => p.categoria).filter(c => c))];
            const contCat = document.getElementById('contenedor-categorias');
            
            contCat.innerHTML = `<button onclick="renderizarProductos(todosLosProductos)" class="px-4 py-1.5 rounded-full bg-[#1a365d] text-white hover:bg-blue-700 transition whitespace-nowrap">Todas</button>`;
            
            categorias.forEach(cat => {
                contCat.innerHTML += `<button onclick="filtrarPorCategoria('${cat}')" class="px-4 py-1.5 rounded-full bg-gray-100 hover:bg-gray-200 transition whitespace-nowrap">${cat}</button>`;
            });
        }

        function filtrarPorCategoria(categoria) {
            const filtrados = todosLosProductos.filter(p => p.categoria === categoria);
            renderizarProductos(filtrados);
        }

        // Iniciar
        cargarDatos();
    </script>
</body>
</html>
