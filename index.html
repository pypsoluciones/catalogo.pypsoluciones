<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo P&P Soluciones</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-4 md:p-8 font-sans">
    <div class="max-w-7xl mx-auto">
        
        <header class="bg-white shadow-md rounded-lg p-6 mb-8 border-t-4 border-blue-600">
            <h1 class="text-3xl md:text-4xl font-black text-gray-800 text-center">Catálogo Digital</h1>
            <p class="text-center text-gray-500 mt-2">P&P Soluciones</p>
        </header>

        <div id="catalogo" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6">
            <p class="text-center col-span-full text-blue-500 font-bold animate-pulse">Conectando con la base de datos...</p>
        </div>

    </div>

    <script>
        // ¡ATENCIÓN LESME! REEMPLAZA ESTOS DOS VALORES CON TUS LLAVES DE SUPABASE
        const SUPABASE_URL = 'https://icvfmdvvochzaktugqvj.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImljdmZtZHZ2b2NoemFrdHVncXZqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYyNDEzMzEsImV4cCI6MjA5MTgxNzMzMX0.gO3D39piT6KGbMMOzrPGWXUp5-g_nOBAgJ-nwPv8IcQ';

        async function cargarCatalogo() {
            try {
                // Llamamos a la "Vista Inteligente" que creamos en Supabase
                const response = await fetch(`${SUPABASE_URL}/rest/v1/vista_catalogo_web?select=*`, {
                    headers: {
                        'apikey': SUPABASE_KEY,
                        'Authorization': `Bearer ${SUPABASE_KEY}`
                    }
                });

                const productos = await response.json();
                const contenedor = document.getElementById('catalogo');

                if (productos.length === 0) {
                    contenedor.innerHTML = '<p class="text-center col-span-full text-gray-500">No hay productos activos o con stock en este momento.</p>';
                    return;
                }

                contenedor.innerHTML = ''; // Limpiar mensaje de carga

                // Dibujar cada producto
                productos.forEach(prod => {
                    const imagen = prod.imagen_principal || 'https://via.placeholder.com/300x300?text=Sin+Imagen';
                    
                    const card = `
                        <div class="bg-white rounded-xl shadow-sm hover:shadow-xl transition-shadow duration-300 overflow-hidden flex flex-col border border-gray-100">
                            <div class="h-56 w-full bg-gray-50 p-4">
                                <img src="${imagen}" alt="${prod.nombre}" class="h-full w-full object-contain mix-blend-multiply">
                            </div>
                            <div class="p-5 flex flex-col flex-grow">
                                <span class="text-xs font-bold text-blue-600 bg-blue-50 px-2 py-1 rounded w-max mb-2">${prod.categoria || 'General'}</span>
                                <h2 class="text-sm font-bold text-gray-800 leading-tight mb-1">${prod.nombre}</h2>
                                <p class="text-xs text-gray-400 mb-4">SKU: ${prod.sku}</p>
                                
                                <div class="mt-auto">
                                    <div class="flex justify-between items-end mb-1">
                                        <span class="text-xs text-gray-500">Detal USD</span>
                                        <span class="text-xl font-black text-green-600">$${prod.precio_detal_usd}</span>
                                    </div>
                                    <div class="flex justify-between items-end border-t border-gray-100 pt-2">
                                        <span class="text-xs text-gray-500">Detal Bs.</span>
                                        <span class="text-sm font-bold text-gray-700">Bs. ${prod.precio_detal_bs}</span>
                                    </div>
                                </div>
                            </div>
                        </div>
                    `;
                    contenedor.innerHTML += card;
                });
            } catch (error) {
                console.error('Error:', error);
                document.getElementById('catalogo').innerHTML = '<p class="text-red-500 text-center col-span-full font-bold">Error de conexión. Revisa las llaves de Supabase.</p>';
            }
        }

        // Ejecutar el motor al cargar la página
        cargarCatalogo();
    </script>
</body>
</html>
