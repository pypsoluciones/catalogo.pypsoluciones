<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo P&P Soluciones</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://cdn.jsdelivr.net/npm/fuse.js/dist/fuse.js"></script>
</head>
<body class="bg-[#F2F4F4] font-sans">

    <nav class="bg-[#143B62] text-white sticky top-0 z-50 shadow-md">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 flex items-center justify-between h-16">
            
            <div class="flex items-center gap-2">
                <i class="fa-solid fa-layer-group text-[#E67E22] text-2xl"></i>
                <span class="font-bold text-xl tracking-wide hidden sm:block">P&P Soluciones</span>
            </div>
            
            <div class="flex-1 max-w-lg mx-4 relative">
                <input type="text" id="buscador" oninput="filtrarProductosInteligente()" placeholder="Busca en P&P Soluciones..." 
                       class="w-full text-gray-900 rounded-full pl-4 pr-10 py-1.5 focus:outline-none focus:ring-2 focus:ring-[#E67E22]">
                <i class="fa-solid fa-search absolute right-4 top-2.5 text-gray-400"></i>
            </div>

            <div class="flex items-center gap-4">
                <div class="bg-[#0f2d4a] px-2 py-1 rounded text-xs text-center border border-[#1a4a7a]">
                    <p class="text-gray-300">Tasa BCV</p>
                    <p class="text-yellow-400 font-bold" id="tasa-bcv-display">Bs. 0.00</p>
                </div>
                <button class="relative hover:text-[#E67E22] transition">
                    <i class="fa-solid fa-cart-shopping text-xl"></i>
                </button>
            </div>
        </div>
    </nav>

    <div class="bg-white border-b shadow-sm overflow-x-auto whitespace-nowrap px-4 py-3 flex gap-3 text-sm font-semibold text-[#143B62]" id="contenedor-categorias">
        </div>

    <main class="max-w-7xl mx-auto px-4 py-8">
        <div id="catalogo" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-5 gap-4">
            <div class="col-span-full flex flex-col items-center justify-center py-20 text-[#143B62]">
                <i class="fa-solid fa-spinner fa-spin text-4xl mb-4 text-[#E67E22]"></i>
                <p class="font-bold text-lg animate-pulse">Preparando el catálogo...</p>
            </div>
        </div>
    </main>

    <script>
        // --- TUS LLAVES AQUÍ ---
        const SUPABASE_URL = 'https://icvfmdvvochzaktugqvj.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImljdmZtZHZ2b2NoemFrdHVncXZqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYyNDEzMzEsImV4cCI6MjA5MTgxNzMzMX0.gO3D39piT6KGbMMOzrPGWXUp5-g_nOBAgJ-nwPv8IcQ';

        let todosLosProductos = [];
        let fuse; // Motor de búsqueda

        async function cargarDatos() {
            try {
                // 1. Cargar Tasa (Tolerancia a errores si falla)
                try {
                    const resTasa = await fetch(`${SUPABASE_URL}/rest/v1/tasas_bcv?select=tasa&order=fecha_actualizacion.desc&limit=1`, {
                        headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` }
                    });
                    const dataTasa = await resTasa.json();
                    if(dataTasa.length > 0) document.getElementById('tasa-bcv-display').innerText = `Bs. ${dataTasa[0].tasa.toFixed(2)}`;
                } catch(e) { console.warn("No se pudo cargar la tasa", e); }

                // 2. Cargar Productos de la Nueva Vista
                const resProd = await fetch(`${SUPABASE_URL}/rest/v1/vista_catalogo_web?select=*`, {
                    headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` }
                });
                
                if (!resProd.ok) throw new Error("Fallo la consulta SQL de productos");
                
                todosLosProductos = await resProd.json();
                
                // 3. Configurar Fuse.js (Búsqueda predictiva, perdona errores ortográficos)
                const opcionesFuse = {
                    keys: ['nombre', 'categoria', 'sku'],
                    threshold: 0.3, // 0.0 es estricto, 1.0 es súper flexible. 0.3 perdona acentos y letras cambiadas.
                    ignoreLocation: true
                };
                fuse = new Fuse(todosLosProductos, opcionesFuse);

                extraerCategorias(todosLosProductos);
                renderizarProductos(todosLosProductos);

            } catch (error) {
                console.error('Error Fatal:', error);
                document.getElementById('catalogo').innerHTML = '<p class="text-red-500 col-span-full text-center">Error conectando con la base de datos.</p>';
            }
        }

        function renderizarProductos(productos) {
            const contenedor = document.getElementById('catalogo');
            contenedor.innerHTML = '';

            if (productos.length === 0) {
                contenedor.innerHTML = '<p class="col-span-full text-center text-gray-500 py-10">No se encontraron productos.</p>';
                return;
            }

            productos.forEach(prod => {
                // Asegurar valores numéricos para no tener errores en .toFixed(2)
                const precioUsd = Number(prod.precio_detal_usd) || 0;
                const precioBs = Number(prod.precio_detal_bs) || 0;
                const imagen = prod.imagen_principal || 'https://via.placeholder.com/300?text=P%26P+Soluciones';

                contenedor.innerHTML += `
                    <div class="bg-white rounded-lg shadow-sm hover:shadow-md transition-shadow border border-gray-200 flex flex-col relative group">
                        <button class="absolute top-2 right-2 text-gray-300 hover:text-red-500 z-10 text-lg transition-colors" title="Agregar a Favoritos"><i class="fa-solid fa-heart"></i></button>
                        
                        <div class="h-40 w-full p-2 flex justify-center items-center bg-white rounded-t-lg">
                            <img src="${imagen}" alt="Producto" class="max-h-full max-w-full object-contain group-hover:scale-105 transition-transform duration-300">
                        </div>
                        
                        <div class="p-3 flex flex-col flex-grow border-t border-gray-100">
                            <span class="text-[10px] font-bold text-gray-500 uppercase tracking-wider mb-1">${prod.categoria || 'Varios'}</span>
                            <h3 class="text-xs font-bold text-[#212529] leading-tight mb-3 line-clamp-2">${prod.nombre}</h3>
                            
                            <div class="mt-auto">
                                <div class="flex items-baseline gap-1 mb-0.5">
                                    <span class="text-[10px] text-gray-500 font-bold">US $</span>
                                    <span class="text-lg font-black text-[#143B62]">${precioUsd.toFixed(2)}</span>
                                </div>
                                <div class="flex justify-between items-center">
                                    <span class="text-[11px] font-bold text-gray-400">Bs. ${precioBs.toFixed(2)}</span>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            });
        }

        // BÚSQUEDA INTELIGENTE
        function filtrarProductosInteligente() {
            const texto = document.getElementById('buscador').value;
            if (texto.trim() === '') {
                renderizarProductos(todosLosProductos); // Mostrar todos si está vacío
                return;
            }
            // Buscar y mapear los resultados (Fuse devuelve {item: {...}, refIndex: ...})
            const resultados = fuse.search(texto).map(res => res.item);
            renderizarProductos(resultados);
        }

        function extraerCategorias(productos) {
            const categorias = [...new Set(productos.map(p => p.categoria).filter(c => c))];
            const contCat = document.getElementById('contenedor-categorias');
            
            contCat.innerHTML = `<button onclick="renderizarProductos(todosLosProductos)" class="px-4 py-1.5 rounded-full bg-[#143B62] text-white hover:bg-[#0f2d4a] transition">Todas</button>`;
            
            categorias.forEach(cat => {
                contCat.innerHTML += `<button onclick="filtrarPorCategoria('${cat}')" class="px-4 py-1.5 rounded-full bg-gray-200 text-[#143B62] hover:bg-[#E67E22] hover:text-white transition">${cat}</button>`;
            });
        }

        function filtrarPorCategoria(categoria) {
            const filtrados = todosLosProductos.filter(p => p.categoria === categoria);
            renderizarProductos(filtrados);
        }

        cargarDatos();
    </script>
</body>
</html>
